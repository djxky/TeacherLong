# 驾驶舱目录推送到 main 时发企微；「更新概要」摘自各条 commit 首行；另附 GitHub 提交/对比链接（可看 commit 正文）
# 提交时请把「产品稿更新说明」写进 commit（首行为主），与对话确认稿一致 — 见 git-push-confirm
# GitHub → Secrets：WEWORK_WEBHOOK_COCKPIT

name: 企微通知 · 驾驶舱

on:
  push:
    branches:
      - main
    paths:
      - "驾驶舱/**"

jobs:
  notify-wecom-cockpit:
    runs-on: ubuntu-latest
    steps:
      - name: 发送到企业微信（驾驶舱群）
        env:
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_COCKPIT }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
          GITHUB_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          GITHUB_COMPARE_URL: ${{ github.event.compare }}
        run: |
          if [ -z "${WEWORK_WEBHOOK_URL:-}" ]; then
            echo "未配置 Secret：WEWORK_WEBHOOK_COCKPIT，跳过企微通知。"
            exit 0
          fi
          PREVIEW_URL='https://djxky.github.io/TeacherLong/%E9%A9%BE%E9%A9%B6%E8%88%B1/%E9%BE%99%E8%80%81%E5%B8%88%E6%95%B0%E6%8D%AE%E9%A9%BE%E9%A9%B6%E8%88%B1-demo.html'

          BULLETS="$(
            echo "$COMMITS_JSON" | jq -r '
              [.[]? | ((.message // "") | split("\n") | .[0] // "" | gsub("\r";""))]
              | map(select(length > 0))
              | .[:8]
              | .[]
              | .[0:120]' 2>/dev/null | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          )"
          if [ -z "${BULLETS// }" ]; then
            SUMMARY="（未检测到提交说明，请以产品稿链接预览为准）"
          else
            SUMMARY="$(printf '%s\n' "$BULLETS" | sed 's/^/- /')"
          fi

          MSG="$(printf '%s\n' \
            "产品稿变更通知" \
            "" \
            "更新概要（摘自提交说明首行）：" \
            "${SUMMARY}" \
            "" \
            "完整说明（GitHub 提交页，含 commit 正文）：" \
            "${GITHUB_COMMIT_URL}" \
            "" \
            "本次推送变更对比：" \
            "${GITHUB_COMPARE_URL}" \
            "" \
            "产品稿链接：" \
            "${PREVIEW_URL}")"

          MSG="$(printf '%s' "$MSG" | head -c 2000)"

          jq -n --arg text "$MSG" '{msgtype:"text",text:{content:$text}}' | \
            curl -sfS -X POST "$WEWORK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @- \
            || { echo "企微 Webhook 请求失败"; exit 1; }
          echo "企微通知已发送（驾驶舱）。"
