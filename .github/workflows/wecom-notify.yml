# 小程序目录有推送到 main 时，向指定企业微信群发通知
# GitHub → Settings → Secrets → Actions：WEWORK_WEBHOOK_MINIPROGRAM = 群机器人 Webhook

name: 企微通知 · 小程序

on:
  push:
    branches:
      - main
    paths:
      - "小程序/**"

jobs:
  notify-wecom-miniprogram:
    runs-on: ubuntu-latest
    steps:
      - name: 发送到企业微信（小程序群）
        env:
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_MINIPROGRAM }}
        run: |
          if [ -z "${WEWORK_WEBHOOK_URL:-}" ]; then
            echo "未配置 Secret：WEWORK_WEBHOOK_MINIPROGRAM，跳过企微通知。"
            exit 0
          fi
          PREVIEW_URL='https://djxky.github.io/TeacherLong/%E5%B0%8F%E7%A8%8B%E5%BA%8F/%E9%A6%96%E9%A1%B5-v3.html'

          MSG="$(printf '%s\n' \
            "产品稿变更通知" \
            "" \
            "产品稿链接：" \
            "${PREVIEW_URL}")"

          jq -n --arg text "$MSG" '{msgtype:"text",text:{content:$text}}' | \
            curl -sfS -X POST "$WEWORK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @- \
            || { echo "企微 Webhook 请求失败"; exit 1; }
          echo "企微通知已发送（小程序）。"
