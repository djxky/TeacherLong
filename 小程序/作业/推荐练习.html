<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>推荐练习 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #e8edf4 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
            display: flex; flex-direction: column;
        }

        .mesh-bg { position: absolute; top: -10%; left: -20%; width: 80%; height: 60%; background: radial-gradient(ellipse at center, rgba(99,102,241,0.3) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-2 { position: absolute; top: 15%; right: -30%; width: 90%; height: 70%; background: radial-gradient(ellipse at center, rgba(236,72,153,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-3 { position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%; background: radial-gradient(ellipse at center, rgba(168,85,247,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }

        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        .wx-capsule {
            position: absolute; top: 56px; right: 10px; z-index: 999;
            display: flex; align-items: center; height: 32px; border-radius: 16px;
            background: rgba(0,0,0,0.06); border: 0.5px solid rgba(0,0,0,0.08); overflow: hidden;
        }
        .wx-capsule-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 32px; border: none; background: none; cursor: pointer; color: #3c3c3c; padding: 0; }
        .wx-capsule-btn:active { background: rgba(0,0,0,0.05); }
        .wx-capsule-divider { width: 0.5px; height: 18px; background: rgba(0,0,0,0.12); }

        .topbar {
            display: flex; align-items: center; padding: 0 16px; height: 44px; flex-shrink: 0;
            position: relative; z-index: 20;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.7); cursor: pointer;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06);
            -webkit-tap-highlight-color: transparent;
            transition: transform .18s cubic-bezier(0.16,1,0.3,1);
        }
        .back-btn:active { transform: scale(0.92); background: rgba(0,0,0,0.05); }
        .topbar-title {
            position: absolute; left: 0; right: 0; text-align: center;
            font-size: 1.0625rem; font-weight: 700;
            color: #0f172a; letter-spacing: -0.02em;
            pointer-events: none;
        }
        .topbar-spacer { width: 40px; height: 40px; flex-shrink: 0; }

        .scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            position: relative; z-index: 1; padding: 0 20px;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .glass-card {
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            border: none; background: rgba(255,255,255,0.55);
            border-radius: 16px;
        }

        .recommend-card { padding: 16px; margin-bottom: 16px; }
        .recommend-card p { font-size: 0.8125rem; color: #475569; line-height: 1.7; }
        .recommend-card strong { color: #0f172a; }

        .section-title {
            font-size: 0.8125rem; font-weight: 700; color: #0f172a; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }

        .pdf-container {
            background: rgba(255,255,255,0.55); border-radius: 16px; overflow: hidden;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            height: 420px; position: relative; margin-bottom: 20px;
        }
        .pdf-container embed, .pdf-container iframe { width: 100%; height: 100%; border: none; }
        .pdf-placeholder {
            display: none; position: absolute; inset: 0;
            flex-direction: column; align-items: center; justify-content: center;
            color: #94a3b8; background: rgba(248,250,252,0.95); border-radius: 16px;
            padding: 24px; text-align: center;
        }
        .pdf-placeholder.show { display: flex; }
        .pdf-placeholder svg { color: #cbd5e1; margin-bottom: 12px; }
        .pdf-placeholder p { font-size: 0.8125rem; font-weight: 500; margin: 0; }
        .pdf-placeholder .sub { font-size: 0.6875rem; color: #cbd5e1; margin-top: 8px; }

        .bottom-bar {
            flex-shrink: 0; padding: 12px 20px calc(env(safe-area-inset-bottom, 20px) + 12px);
            position: relative; z-index: 10;
            display: flex; gap: 10px;
        }
        .btn-share {
            flex: 1; padding: 14px 0; border-radius: 14px; border: none;
            font-size: 0.875rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            -webkit-tap-highlight-color: transparent;
            transition: transform .18s cubic-bezier(0.16,1,0.3,1);
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            color: #334155;
        }
        .btn-share:active { transform: scale(0.97); }
        .btn-save {
            flex: 1; padding: 14px 0; border-radius: 14px; border: none;
            font-size: 0.875rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            -webkit-tap-highlight-color: transparent;
            transition: transform .18s cubic-bezier(0.16,1,0.3,1);
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            box-shadow: 0 8px 24px -6px rgba(99,102,241,0.3);
        }
        .btn-save:active { transform: scale(0.97); }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="iphone-frame" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <div class="topbar">
                <button class="back-btn" onclick="goBack()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="topbar-title">推荐练习</span>
                <div class="topbar-spacer"></div>
            </div>

            <div class="scroll-area">
                <div class="glass-card recommend-card">
                    <p id="ai-recommend-text"></p>
                </div>

                <div class="section-title">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    练习内容
                </div>
                <div class="pdf-container">
                    <embed id="pdf-embed" src="" type="application/pdf" style="width:100%;height:100%;min-height:400px;" />
                    <div id="pdf-placeholder" class="pdf-placeholder">
                        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <p>推荐练习 PDF</p>
                        <p>《<span id="pdf-title-placeholder"></span>》</p>
                        <p class="sub">点击下方「保存」下载后查看</p>
                    </div>
                </div>
            </div>

            <div class="bottom-bar">
                <button class="btn-share" onclick="sendToWechat()">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                    发送到微信
                </button>
                <button class="btn-save" onclick="savePdf()">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    保存
                </button>
            </div>
        </div>
    </div>

    <script>
        const recommendCopy = {
            quanguo: {
                reason: '你在《分式化简》《二次根式》等章节的正确率较高，但在几何证明与计算上仍有提升空间。',
                recommend: '全区高频题「每日一练：几何基础」，帮助你在薄弱板块上对标全区水平，巩固基础。'
            },
            cuoti: {
                reason: '根据你的错题本，你在「分式化简」「二次根式混合运算」中多次出现计算与化简错误。',
                recommend: '为你生成了《分式与二次根式巩固》专项练习，针对易错点举一反三，建议本周完成。'
            },
            juyi: {
                reason: '你已掌握一次函数基础，但在与几何、方程结合的综合题上失分较多。',
                recommend: '为你推荐《一次函数综合应用》举一反三练习，强化数形结合与分类讨论能力。'
            }
        };

        function goBack() {
            window.location.href = '../首页.html';
        }

        function initPage() {
            const type = sessionStorage.getItem('recommendType') || 'quanguo';
            const title = sessionStorage.getItem('recommendTitle') || '每日一练:几何基础';

            const copy = recommendCopy[type] || recommendCopy.quanguo;
            const textEl = document.getElementById('ai-recommend-text');
            textEl.innerHTML = '基于你<strong>' + copy.reason + '</strong><br><br>为你推荐了<strong>' + copy.recommend + '</strong>';

            document.getElementById('pdf-title-placeholder').textContent = title;

            var pdfUrl = 'https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf';
            var embedEl = document.getElementById('pdf-embed');
            var placeholderEl = document.getElementById('pdf-placeholder');
            embedEl.src = pdfUrl;
            embedEl.onerror = function () {
                placeholderEl.classList.add('show');
                embedEl.style.display = 'none';
            };
            window._recommendPdfUrl = pdfUrl;
            window._recommendTitle = title;
        }

        function sendToWechat() {
            const url = window.location.href;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function () {
                    showToast('链接已复制，请打开微信粘贴发送');
                }).catch(function () {
                    showToast('请使用微信打开本页后点击右上角分享');
                });
            } else {
                showToast('请使用微信打开本页后点击右上角分享');
            }
        }

        function savePdf() {
            const url = window._recommendPdfUrl || 'https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf';
            const title = (window._recommendTitle || '推荐练习').replace(/[:\s]/g, '_');
            const a = document.createElement('a');
            a.href = url;
            a.download = title + '.pdf';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('正在下载，请稍候…');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function () { toast.classList.remove('show'); }, 2000);
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
