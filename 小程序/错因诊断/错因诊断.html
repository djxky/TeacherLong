<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>错因诊断 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .page-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; }
        .handwriting { font-family: 'Ma Shan Zheng', cursive; color: #334155; opacity: 0.8; transform: rotate(-1deg); }

        /* 原图上的错题标注框 */
        .photo-wrap { position: relative; width: 100%; }
        .photo-wrap img { width: 100%; display: block; }
        .error-hotspot {
            position: absolute; border: 2.5px solid #EF4444; border-radius: 6px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: rgba(239, 68, 68, 0.06);
        }
        .error-hotspot:active { border-color: #DC2626; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }
        .error-hotspot-badge {
            position: absolute; bottom: -9px; right: -9px;
            width: 20px; height: 20px; background: #EF4444; color: white;
            border-radius: 50%; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15); pointer-events: none;
        }

        /* 底部弹窗 — 和作业批改一致 */
        .bottom-sheet {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 85%;
            background: white; border-top-left-radius: 20px; border-top-right-radius: 20px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            transform: translateY(110%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 100; display: flex; flex-direction: column;
        }
        .bottom-sheet.open { transform: translateY(0); }

        /* 题目编号切换 */
        .q-num-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid #FECACA; background: white; color: #EF4444;
            font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; cursor: pointer; transition: all 0.15s;
        }
        .q-num-btn.active { border-color: #EF4444; background: #EF4444; color: white; }

        /* 诊断内容样式 */
        .diagnosis-error-highlight { background: #FEF3C7; color: #1E293B; font-weight: 700; padding: 1px 6px; border-radius: 4px; border-bottom: 2px solid #F59E0B; }
        .dimension-row { display: flex; gap: 14px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid #F1F5F9; }
        .dimension-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .dimension-left { width: 95px; flex-shrink: 0; }
        .dimension-status { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
        .dimension-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; flex-shrink: 0; }
        .dimension-icon.mastered { background: #22C55E; }
        .dimension-icon.needs-work { background: #EF4444; }
        .dimension-name { font-size: 14px; font-weight: 700; }
        .dimension-name.mastered { color: #16A34A; }
        .dimension-name.needs-work { color: #EF4444; }
        .dimension-sub { font-size: 11px; color: #94A3B8; line-height: 1.4; margin-top: 2px; }
        .dimension-right { flex: 1; min-width: 0; }
        .dimension-analysis { font-size: 13px; color: #475569; line-height: 1.7; }
        .dimension-error-detail { font-size: 13px; color: #DC2626; font-weight: 600; line-height: 1.7; margin-bottom: 8px; }
        .dimension-deep { font-size: 13px; color: #15803D; line-height: 1.7; }
        .tip-card { border: 1px solid #E2E8F0; border-radius: 14px; padding: 14px; }
        .tip-label { display: inline-block; font-size: 11px; font-weight: 600; color: #94A3B8; border: 1px solid #CBD5E1; border-radius: 4px; padding: 2px 8px; margin-bottom: 8px; }

        /* 单题诊断页（来自错题本） */
        .mesh-bg { position: absolute; top: -10%; left: -20%; width: 80%; height: 60%; background: radial-gradient(ellipse at center, rgba(99,102,241,0.25) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-2 { position: absolute; top: 20%; right: -30%; width: 90%; height: 70%; background: radial-gradient(ellipse at center, rgba(236,72,153,0.18) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .single-glass {
            background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65); border: none;
        }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 24px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s ease-out; z-index: 2000;
            display: flex; align-items: center; gap: 8px;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="iphone-frame" id="app-root">
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg><span id="toast-msg"></span></div>

        <!-- ====== 结果页：原图 + 标注框 ====== -->
        <div id="page-result" class="page-container flex flex-col hidden" style="z-index: 50; padding-top: 50px; background: #f1f5f9;">
            <header class="bg-white/90 backdrop-blur-md pt-2 pb-3 pl-4 pr-[100px] shadow-sm flex justify-between items-center z-20 flex-shrink-0">
                <button onclick="goBack()" class="p-1 -ml-1"><svg class="w-6 h-6 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg></button>
                <h1 class="text-lg font-bold text-slate-800">错因诊断</h1>
                <div class="w-6"></div>
            </header>

            <main class="flex-1 min-h-0 overflow-y-auto no-scrollbar">
                <div class="px-3 pt-3 pb-2">
                    <div class="text-center text-xs text-slate-400 mb-2">点击图片上的红框查看错因诊断</div>
                    <div id="photo-container" class="photo-wrap rounded-xl overflow-hidden shadow-sm">
                        <img src="../assets/homework-sample.png" alt="作业原图">
                        <!-- 错题热区将由 JS 动态生成 -->
                    </div>
                </div>
            </main>

            <div class="bg-white border-t border-gray-100 px-6 pt-3 pb-8 shadow-[0_-5px_20px_rgba(0,0,0,0.03)] z-50 flex-shrink-0">
                <div class="flex items-center justify-center">
                    <button onclick="goBackToCamera()" class="app-btn-primary app-btn-row" style="max-width:220px;">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        再拍一张
                    </button>
                </div>
            </div>

            <!-- ====== 底部弹窗 — 错因诊断详情（和作业批改 detail-sheet 同规范） ====== -->
            <div id="detail-sheet" class="bottom-sheet">
                <div class="w-full flex justify-center pt-3 pb-1" onclick="closeDetail()"><div class="w-12 h-1.5 bg-gray-200 rounded-full"></div></div>
                <div class="px-5 py-3 border-b border-gray-50 flex justify-between items-center">
                    <span id="detail-title" class="text-slate-900 font-bold text-base">第 1 题</span>
                    <button onclick="closeDetail()" class="text-slate-400"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                </div>
                <div id="question-selector" class="border-b border-gray-100 px-4 py-2 hidden flex-shrink-0">
                    <div id="question-selector-list" class="flex items-center gap-3 overflow-x-auto no-scrollbar py-1"></div>
                </div>
                <div id="detail-body" class="flex-1 min-h-0 overflow-y-auto p-5 pb-8 space-y-5">
                    <!-- 诊断内容将动态填充 -->
                </div>

                <div id="detail-buttons" class="border-t border-gray-100 p-4 flex gap-3 pb-8 flex-shrink-0">
                    <button type="button" id="btn-add-notebook" onclick="addToNotebook()" class="app-btn-secondary app-btn-row">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        加入错题本
                    </button>
                    <button type="button" onclick="goBackToCamera()" class="app-btn-primary app-btn-row">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        再拍一页
                    </button>
                </div>
            </div>
        </div>

        <!-- ====== 单题诊断页（来自错题本） ====== -->
        <div id="page-single" class="page-container flex flex-col hidden" style="z-index: 60; background: var(--app-page-fill);">
            <div class="mesh-bg"></div>
            <div class="mesh-bg-2"></div>
            <header class="sticky top-0 z-30 pt-[50px] pb-3 px-4 bg-white/60 backdrop-blur-md" style="border-bottom: 1px solid rgba(255,255,255,0.4);">
                <div class="flex items-center gap-2">
                    <button onclick="goBackFromSingle()" class="p-1 -ml-1 active:opacity-60">
                        <svg class="w-6 h-6 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <h1 class="text-lg font-bold text-slate-800">错因诊断</h1>
                </div>
            </header>
            <main id="single-body" class="flex-1 min-h-0 overflow-y-auto no-scrollbar p-4 space-y-3 relative z-10" style="padding-bottom: calc(5rem + env(safe-area-inset-bottom, 0px));">
            </main>
            <div class="sticky bottom-0 z-40 px-4 pt-3 pb-6 bg-white/60 backdrop-blur-md" style="border-top: 1px solid rgba(255,255,255,0.4);">
                <button onclick="goBackFromSingle()" class="app-btn-primary app-btn-row w-full">返回错题本</button>
            </div>
        </div>
    </div>

    <script>
        var QUESTIONS = [
            {
                number: 1,
                title: '计算: √18 × (-√8) - √(9/2) × (-√8) + 4',
                type: '计算题',
                status: 'wrong',
                box: { left: '8%', top: '12%', width: '42%', height: '18%' },
                diagnosis: {
                    summary: '该生能熟练调用乘法分配律及立方根性质，准确梳理运算顺序完成基础化简，但在二次根式乘法运算时<mark>误判负号运算规则</mark>，导致最终计算结果出错',
                    thumbnail: '../assets/homework-sample.png',
                    subQuestions: [
                        {
                            label: '第(2)问',
                            dimensions: [
                                { name: '审题感知', subDesc: '识别多项式化简计算目标', status: 'mastered', analysis: '该生能将算式按照加法与乘法划分为不同运算模块，准确完成了运算顺序的确立。' },
                                { name: '知识唤醒', subDesc: '运用二次根式混合运算化简', status: 'mastered', analysis: '此处准确调用了乘法分配律及立方根性质，体现了对基础运算法则的熟悉度。' },
                                {
                                    name: '推演求解', subDesc: '依次计算乘法和根式求值', status: 'needs_work',
                                    errorDetail: '学生在运用乘法分配律计算 -√(9/2) × (-√8) 时，得出的结果符号出错，错误地写成了 7 + √36。',
                                    deepAnalysis: '深度归因：该生在进行二次根式乘法运算时，忽略了负号的运算规则，导致符号判断错误。正确推演：原式 = -√144 + √36 + 4 = -12 + 6 + 4 = -2'
                                }
                            ]
                        }
                    ],
                    nextSteps: {
                        summary: '本题考查二次根式四则混合运算，核心是掌握运算顺序与符号判断规范',
                        tips: [
                            { label: 'Tip1', text: '带负号的二次根式乘法运算前先统计负号个数，按照偶正奇负先确定最终符号再计算根式数值' },
                            { label: 'Tip2', text: '运用乘法分配律展开时将项前面的符号和项作为整体绑定处理，避免符号判断错误' }
                        ]
                    }
                }
            },
            {
                number: 2,
                title: '(a+b)² - (a-b)²，其中 a=√3, b=√2',
                type: '化简求值',
                status: 'correct',
                box: { left: '8%', top: '32%', width: '42%', height: '12%' },
                diagnosis: null
            },
            {
                number: 3,
                title: '若 x = 2+√3，求 x² - 4x + 1 的值',
                type: '解答题',
                status: 'correct',
                box: { left: '52%', top: '32%', width: '42%', height: '12%' },
                diagnosis: null
            },
            {
                number: 4,
                title: '解方程：2/(x-1) + 1 = (x+2)/(x-1)',
                type: '解方程',
                status: 'wrong',
                box: { left: '52%', top: '60%', width: '42%', height: '20%' },
                diagnosis: {
                    summary: '该生能正确识别分式方程的基本形式，但在去分母化简过程中<mark>遗漏了对增根的验证</mark>，直接将 x=1 作为方程的解，导致答案无效',
                    thumbnail: '../assets/homework-sample.png',
                    subQuestions: [
                        {
                            label: '全题',
                            dimensions: [
                                { name: '审题感知', subDesc: '识别分式方程类型', status: 'mastered', analysis: '能正确辨认分式方程，找到公分母 (x-1)。' },
                                { name: '知识唤醒', subDesc: '去分母法解分式方程', status: 'mastered', analysis: '去分母步骤正确，两边同乘 (x-1) 后整理得到 x=1。' },
                                {
                                    name: '推演求解', subDesc: '验根与结论', status: 'needs_work',
                                    errorDetail: '将 x=1 代入原方程分母 (x-1)=0，分式无意义，x=1 是增根。',
                                    deepAnalysis: '深度归因：学生缺少验根意识，解分式方程时必须将结果代回原方程检验分母是否为零。正确结论：原方程无解。'
                                }
                            ]
                        }
                    ],
                    nextSteps: {
                        summary: '分式方程解题的最后一步必须验根，将求得的解代入最简公分母检验',
                        tips: [
                            { label: 'Tip1', text: '解完分式方程后，把结果代入各分母表达式，若出现分母为零则为增根，需舍去' },
                            { label: 'Tip2', text: '养成在答案旁写"经检验，x=... 是（不是）原方程的解"的习惯' }
                        ]
                    }
                }
            },
            {
                number: 5,
                title: '已知等腰三角形 ABC 中，AB=AC，∠A=80°，求 ∠B',
                type: '几何',
                status: 'wrong',
                box: { left: '8%', top: '72%', width: '84%', height: '16%' },
                diagnosis: {
                    summary: '该生正确运用三角形内角和定理列出方程，但在最终计算中<mark>把 (180°-80°) 误算为 120°</mark>，导致 ∠B 结果错误',
                    thumbnail: '../assets/homework-sample.png',
                    subQuestions: [
                        {
                            label: '全题',
                            dimensions: [
                                { name: '审题感知', subDesc: '提取等腰三角形条件', status: 'mastered', analysis: '正确识别 AB=AC 推出 ∠B=∠C。' },
                                {
                                    name: '推演求解', subDesc: '计算底角度数', status: 'needs_work',
                                    errorDetail: '180°-80°=100°，再除以2应得50°，但该生写成了 120°÷2=60°。',
                                    deepAnalysis: '深度归因：计算 180-80 时进位出错，属于粗心运算失误。正确答案：∠B = (180°-80°)/2 = 50°。'
                                }
                            ]
                        }
                    ],
                    nextSteps: {
                        summary: '几何计算题建议在草稿纸上列竖式验算关键步骤',
                        tips: [
                            { label: 'Tip1', text: '列出 ∠A+∠B+∠C=180° 后，先算 180-∠A 再除以 2，分步写出避免口算出错' },
                            { label: 'Tip2', text: '答完后可以把三个角加起来检验是否等于 180°' }
                        ]
                    }
                }
            }
        ];

        var currentWrongIdx = -1;
        var wrongIndices = [];

        // 收集错题索引
        QUESTIONS.forEach(function(q, i) { if (q.status === 'wrong') wrongIndices.push(i); });

        // 在原图上渲染标注框
        function renderPhotoOverlays() {
            var container = document.getElementById('photo-container');
            if (!container) return;
            // 清除旧热区
            container.querySelectorAll('.error-hotspot').forEach(function(el) { el.remove(); });

            var wrongSeq = 0;
            QUESTIONS.forEach(function(q, idx) {
                if (!q.box || q.status !== 'wrong') return;
                wrongSeq++;
                var hotspot = document.createElement('div');
                hotspot.className = 'error-hotspot';
                hotspot.style.left = q.box.left;
                hotspot.style.top = q.box.top;
                hotspot.style.width = q.box.width;
                hotspot.style.height = q.box.height;
                hotspot.onclick = function() { openDetail(idx); };
                hotspot.innerHTML = '<span class="error-hotspot-badge">' + wrongSeq + '</span>';
                container.appendChild(hotspot);
            });
        }

        function goBack() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('show') === 'result' || params.get('from') === 'notebook') {
                window.history.back();
            } else {
                window.location.href = '../作业/作业批改.html?mode=diagnosis';
            }
        }
        function goBackToCamera() {
            window.location.href = '../作业/作业批改.html?mode=diagnosis';
        }

        // === 打开弹窗 ===
        function openDetail(idx) {
            var q = QUESTIONS[idx];
            if (!q || q.status !== 'wrong' || !q.diagnosis) {
                showToast('该题目正确，无需诊断');
                return;
            }
            currentWrongIdx = idx;
            renderDetailContent(q);
            renderQuestionSelector();
            document.getElementById('detail-sheet').classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detail-sheet').classList.remove('open');
        }

        function renderQuestionSelector() {
            var wrap = document.getElementById('question-selector');
            var list = document.getElementById('question-selector-list');
            if (wrongIndices.length <= 1) { wrap.classList.add('hidden'); return; }
            wrap.classList.remove('hidden');
            var html = '';
            wrongIndices.forEach(function(idx, seq) {
                var cls = idx === currentWrongIdx ? ' active' : '';
                html += '<button class="q-num-btn' + cls + '" onclick="switchQuestion(' + idx + ')">' + (seq + 1) + '</button>';
            });
            list.innerHTML = html;
        }

        function switchQuestion(idx) {
            var q = QUESTIONS[idx];
            if (!q || q.status !== 'wrong' || !q.diagnosis) return;
            currentWrongIdx = idx;
            renderDetailContent(q);
            renderQuestionSelector();
            document.getElementById('detail-body').scrollTop = 0;
        }

        // === 渲染弹窗内容 ===
        function renderDetailContent(q) {
            var d = q.diagnosis;
            var seqNum = wrongIndices.indexOf(QUESTIONS.indexOf(q)) + 1;
            document.getElementById('detail-title').textContent = '第 ' + seqNum + ' 题';

            var summaryText = d.summary.replace(/<mark>/g, '<span class="diagnosis-error-highlight">').replace(/<\/mark>/g, '</span>');
