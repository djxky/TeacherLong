<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 首页 v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/app-shell.css">
    <style>
        /* ═══════════════════════════════════════════════
           AI 龙老师 v3 — 宫格 + Suggested Prompts
           ═══════════════════════════════════════════════ */

        .v2-scroll {
            flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; position: relative; z-index: 1;
        }
        .v2-scroll::-webkit-scrollbar { display: none; }

        /* ── 明亮渐变背景 ── */
        .page-bg {
            position: absolute; inset: 0; z-index: 0;
            background: linear-gradient(170deg, #f0ecff 0%, #faf8ff 25%, #f8fafc 50%, #f1f5f9 100%);
        }
        .bg-blob-1 {
            position: absolute; top: -5%; left: -10%; width: 65%; height: 45%;
            background: radial-gradient(ellipse, rgba(139,92,246,0.12) 0%, transparent 70%);
            filter: blur(50px); pointer-events: none; z-index: 0;
        }
        .bg-blob-2 {
            position: absolute; top: 20%; right: -15%; width: 55%; height: 40%;
            background: radial-gradient(ellipse, rgba(251,191,36,0.1) 0%, transparent 70%);
            filter: blur(50px); pointer-events: none; z-index: 0;
        }
        .bg-blob-3 {
            position: absolute; bottom: 10%; left: -5%; width: 50%; height: 40%;
            background: radial-gradient(ellipse, rgba(96,165,250,0.08) 0%, transparent 70%);
            filter: blur(45px); pointer-events: none; z-index: 0;
        }

        /* ── 顶栏 ── */
        .v2-topbar {
            height: 44px; padding: 0 20px;
            padding-right: var(--app-capsule-clearance, 96px);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .v2-topbar-tabs { display: flex; gap: 18px; align-items: baseline; }
        .v2-tab {
            font-size: 1rem; font-weight: 400; color: #94a3b8;
            cursor: pointer; transition: all 0.2s; padding: 0;
            background: none; border: none; font-family: inherit;
        }
        .v2-tab.active { font-size: 1.125rem; font-weight: 700; color: #0f172a; }
        .v2-topbar-right { display: flex; align-items: center; gap: 4px; }
        .v2-icon-btn {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; cursor: pointer; background: none; border: none;
            transition: all 0.18s; -webkit-tap-highlight-color: transparent;
        }
        .v2-icon-btn:active { transform: scale(0.9); background: rgba(0,0,0,0.03); }

        /* ── AI 入口卡片 ── */
        .ai-card {
            margin: 8px 20px 0; padding: 16px 16px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f5f3ff 0%, #eef2ff 40%, #faf8ff 100%);
            box-shadow: 0 2px 20px -4px rgba(99,102,241,0.10), 0 1px 3px rgba(0,0,0,0.03);
            position: relative; overflow: hidden;
            border: 1px solid rgba(139,92,246,0.08);
        }
        .ai-card-glow {
            position: absolute; top: -40px; right: -40px; width: 130px; height: 130px;
            background: radial-gradient(circle, rgba(139,92,246,0.10) 0%, transparent 70%);
            pointer-events: none;
        }
        .ai-top {
            display: flex; align-items: center; gap: 11px;
            margin-bottom: 12px; position: relative; z-index: 1;
        }
        .ai-avatar {
            width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
            object-fit: cover; object-position: top center;
            border: 2px solid rgba(139,92,246,0.12);
        }
        .ai-info { flex: 1; min-width: 0; }
        .ai-name {
            font-size: 0.9375rem; font-weight: 700; color: #1e1b4b; margin: 0;
            line-height: 1.35;
        }
        .ai-name strong { font-weight: 800; }
        .ai-sub {
            font-size: 0.6875rem; color: #7c3aed; margin: 3px 0 0;
            display: flex; align-items: center; gap: 4px;
            height: 16px; overflow: hidden;
        }
        .ai-sub-track {
            position: relative; flex: 1; height: 16px; overflow: hidden;
        }
        .ai-sub-item {
            position: absolute; left: 0; top: 0; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            opacity: 0; transform: translateY(8px);
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            font-weight: 500; line-height: 16px;
        }
        .ai-sub-item.active { opacity: 1; transform: translateY(0); }
        .ai-input-bar {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.8); border-radius: 14px;
            padding: 8px 8px 8px 14px;
            border: 1.5px solid rgba(139,92,246,0.1);
            cursor: pointer; transition: all 0.18s;
            -webkit-tap-highlight-color: transparent;
            position: relative; z-index: 1;
            backdrop-filter: blur(10px);
        }
        .ai-input-bar:active { border-color: #a78bfa; transform: scale(0.99); }
        .ai-input-placeholder {
            flex: 1; font-size: 0.8125rem; color: #a5a0b8; font-weight: 400;
        }
        .ai-input-btn {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.7); color: #8b5cf6;
            border: none; cursor: pointer; flex-shrink: 0;
            transition: all 0.18s; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 1px 3px rgba(139,92,246,0.06);
        }
        .ai-input-btn:active { transform: scale(0.9); background: rgba(139,92,246,0.1); }

        /* 语音录入浮层 */
        .voice-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .voice-overlay.show { opacity: 1; pointer-events: auto; }
        .voice-box {
            width: 220px; padding: 32px 24px 28px; border-radius: 24px;
            background: #fff; text-align: center;
            box-shadow: 0 20px 60px -12px rgba(0,0,0,0.25);
            transform: scale(0.9); transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
        }
        .voice-overlay.show .voice-box { transform: scale(1); }
        .voice-ring {
            width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 16px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            position: relative; color: #fff;
        }
        .voice-ring::before {
            content: ''; position: absolute; inset: -8px; border-radius: 50%;
            border: 2px solid rgba(139,92,246,0.3);
            animation: voicePulse 1.5s ease-out infinite;
        }
        .voice-ring::after {
            content: ''; position: absolute; inset: -16px; border-radius: 50%;
            border: 2px solid rgba(139,92,246,0.15);
            animation: voicePulse 1.5s ease-out 0.3s infinite;
        }
        @keyframes voicePulse {
            0% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .voice-status {
            font-size: 0.875rem; font-weight: 600; color: #0f172a; margin-bottom: 4px;
        }
        .voice-hint {
            font-size: 0.6875rem; color: #94a3b8;
        }
        .voice-text {
            font-size: 0.8125rem; font-weight: 500; color: #7c3aed;
            margin-top: 8px; min-height: 20px;
        }
        .voice-cancel {
            margin-top: 16px; padding: 6px 20px; border-radius: 20px;
            border: 1px solid #e2e8f0; background: none;
            font-size: 0.75rem; font-weight: 500; color: #64748b;
            cursor: pointer; font-family: inherit;
        }

        



        /* ── 通用 section ── */
        .sec { padding: 0 20px; margin-top: 28px; position: relative; z-index: 1; }
        .sec-hd { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
        .sec-hd h2 {
            font-size: 1rem; font-weight: 700; color: #0f172a; margin: 0;
            display: flex; align-items: center; gap: 6px;
        }
        .sec-hd h2 svg { color: #64748b; }

        /* ── 视频课堂 ── */
        .vid-big {
            border-radius: 16px; padding: 16px; position: relative; overflow: hidden;
            cursor: pointer; transition: transform 0.18s; -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 50%, #f5f3ff 100%);
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }
        .vid-big:active { transform: scale(0.98); }
        .vb-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.5625rem; font-weight: 700; padding: 3px 9px;
            border-radius: 7px; background: rgba(139,92,246,0.08);
            color: #7c3aed; margin-bottom: 8px;
        }
        .vb-title { font-size: 0.9375rem; font-weight: 700; color: #0f172a; margin: 0; }
        .vb-desc { font-size: 0.75rem; color: #64748b; margin: 3px 0 0; }
        .vb-tags { display: flex; gap: 6px; margin-top: 10px; }
        .vb-tag {
            font-size: 0.625rem; font-weight: 600; padding: 3px 9px;
            border-radius: 7px; background: rgba(255,255,255,0.7); color: #64748b;
        }

        .vid-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .vid-mini {
            border-radius: 14px; padding: 14px 12px; cursor: pointer;
            transition: transform 0.18s; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }
        .vid-mini:active { transform: scale(0.97); }
        .vm-green { background: linear-gradient(135deg, #f0fdf4, #ecfdf5); }
        .vm-orange { background: linear-gradient(135deg, #fffbeb, #fef3c7); }
        .vm-icon {
            width: 30px; height: 30px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 7px; background: rgba(255,255,255,0.7);
        }
        .vm-green .vm-icon { color: #059669; }
        .vm-orange .vm-icon { color: #d97706; }
        .vid-mini h4 { font-size: 0.8125rem; font-weight: 700; color: #0f172a; margin: 0; }
        .vid-mini p { font-size: 0.625rem; color: #64748b; margin: 3px 0 0; }
        .vm-tags { display: flex; gap: 4px; margin-top: 7px; flex-wrap: wrap; }
        .vm-tag {
            font-size: 0.5625rem; font-weight: 600; padding: 2px 7px;
            border-radius: 5px; background: rgba(255,255,255,0.6); color: #64748b;
        }

        /* ── 专项大招课 ── */
        .zk-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .zk-card {
            display: flex; align-items: center; gap: 0;
            padding: 12px 10px 12px 0; border-radius: 14px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 10px -3px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.6);
            cursor: pointer; transition: transform .18s cubic-bezier(0.16,1,0.3,1);
            -webkit-tap-highlight-color: transparent; overflow: hidden;
        }
        .zk-card:active { transform: scale(0.97); }
        .zk-card:last-child:nth-child(odd) { grid-column: 1 / -1; }
        .zk-bar { width: 3px; align-self: stretch; border-radius: 0 3px 3px 0; flex-shrink: 0; margin-right: 10px; }
        .zk-bar-cn { background: linear-gradient(180deg, #f59e0b, #ef4444); }
        .zk-bar-en { background: linear-gradient(180deg, #3b82f6, #6366f1); }
        .zk-body { flex: 1; min-width: 0; }
        .zk-title { font-size: 0.75rem; font-weight: 700; color: #0f172a; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .zk-desc { font-size: 0.5625rem; color: #64748b; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .zk-arrow { flex-shrink: 0; color: #d4d4d8; margin-left: 4px; }

        /* ── 主功能双卡 ── */
        .tools-area { margin: 12px 20px 0; }
        .main-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .main-card {
            padding: 16px 14px; border-radius: 16px; position: relative; overflow: hidden;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.18s cubic-bezier(0.16,1,0.3,1);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
        }
        .main-card:active { transform: scale(0.97); }
        .main-card-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px; background: rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05);
        }
        .main-card h3 { font-size: 0.875rem; font-weight: 700; margin: 0; color: #0f172a; line-height: 1.3; }
        .main-card p { font-size: 0.6875rem; margin: 3px 0 0; color: #64748b; line-height: 1.3; }
        .mc-indigo { background: linear-gradient(135deg, rgba(238,242,255,0.7) 0%, rgba(255,255,255,0.4) 100%); }
        .mc-indigo .main-card-icon { color: #4f46e5; }
        .mc-amber { background: linear-gradient(135deg, rgba(255,251,235,0.7) 0%, rgba(255,255,255,0.4) 100%); }
        .mc-amber .main-card-icon { color: #d97706; }
        /* ── 次级工具行 ── */
        .minor-tools {
            display: grid; grid-template-columns: repeat(4, 1fr);
            border-radius: 16px; padding: 14px 6px 10px; row-gap: 10px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
        }
        .minor-tool {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.18s;
        }
        .minor-tool:active { transform: scale(0.93); }
        .minor-tool-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.7); box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .minor-tool-label { font-size: 0.625rem; font-weight: 500; color: #64748b; text-align: center; }
        .minor-tool-icon.mi-green { color: #059669; }
        .minor-tool-icon.mi-orange { color: #ea580c; }
        .minor-tool-icon.mi-purple { color: #7c3aed; }
        .minor-tool-icon.mi-rose { color: #e11d48; }
        .minor-tool-icon.mi-blue { color: #2563eb; }
        .minor-tool-icon.mi-amber { color: #d97706; }
        .minor-tool-icon.mi-teal { color: #0d9488; }

        /* ── 年级选择器 & 筛选按钮 ── */
        .grade-picker { position: relative; flex-shrink: 0; }
        .grade-btn {
            display: flex; align-items: center; gap: 3px;
            padding: 5px 12px; font-size: 0.625rem; font-weight: 600;
            color: #6366f1; background: #fff;
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 16px; cursor: pointer; font-family: inherit;
            -webkit-tap-highlight-color: transparent; transition: all .18s;
        }
        .grade-btn svg { transition: transform .2s; }
        .grade-btn.open svg { transform: rotate(180deg); }
        .grade-popup {
            position: absolute; top: calc(100% + 6px); left: 0;
            width: 200px; padding: 8px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: 14px;
            box-shadow: 0 8px 32px -4px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.6);
            z-index: 100; opacity: 0; pointer-events: none;
            transform: translateY(-4px);
            transition: all .18s cubic-bezier(0.16,1,0.3,1);
        }
        .grade-popup.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .semester-toggle {
            display: flex; gap: 4px; margin-bottom: 8px;
            background: rgba(0,0,0,0.03); border-radius: 8px; padding: 3px;
        }
        .semester-btn {
            flex: 1; padding: 5px 0; font-size: 0.625rem; font-weight: 600;
            color: #94a3b8; background: transparent; border: none; border-radius: 6px;
            cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
            transition: all .15s;
        }
        .semester-btn.active { color: #0f172a; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .grade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .grade-option {
            padding: 7px 0; text-align: center;
            font-size: 0.6875rem; font-weight: 500; color: #475569;
            border: none; background: transparent; border-radius: 8px;
            cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
            transition: background .12s;
        }
        .grade-option:active { background: rgba(99,102,241,0.08); }
        .grade-option.active { color: #6366f1; font-weight: 700; background: rgba(99,102,241,0.06); }
        .paper-filters {
            display: flex; gap: 6px; margin-bottom: 12px;
            overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap;
            padding-bottom: 2px;
        }
        .paper-filters::-webkit-scrollbar { display: none; }
        .paper-filter {
            flex-shrink: 0; padding: 5px 12px; font-size: 0.625rem; font-weight: 600;
            color: #64748b; background: #fff; border: 1px solid #e2e8f0;
            border-radius: 16px; cursor: pointer; transition: all .18s; font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .paper-filter.active { color: #6366f1; background: rgba(99,102,241,0.08); border-color: rgba(99,102,241,0.3); }

        /* ── 精品试卷推荐 ── */
        /* paper-sec removed — unified to .sec */
        .paper-tabs-row { display: flex; gap: 4px; margin-bottom: 12px; }
        .pt-btn {
            padding: 5px 14px; font-size: 0.75rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: none;
            cursor: pointer; border-radius: 10px; font-family: inherit;
            transition: all 0.18s; -webkit-tap-highlight-color: transparent;
        }
        .pt-btn.active { color: #0f172a; background: #fff; box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06); }
        .paper-rec-list { display: flex; flex-direction: column; gap: 10px; }
        .paper-item {
            position: relative; display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: 14px;
            background: rgba(255,255,255,0.55);
            border: 1px solid rgba(255,255,255,0.7);
            cursor: pointer; transition: transform .12s;
            -webkit-tap-highlight-color: transparent;
        }
        .paper-item:active { transform: scale(0.98); }
        .paper-icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .pi-chinese { background: linear-gradient(135deg, rgba(238,242,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #6366f1; }
        .pi-math { background: linear-gradient(135deg, rgba(255,251,235,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #d97706; }
        .pi-eng { background: linear-gradient(135deg, rgba(236,253,245,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #059669; }
        .pi-sci { background: linear-gradient(135deg, rgba(236,254,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #0891b2; }
        .paper-info { flex: 1; min-width: 0; }
        .paper-title {
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            margin: 0; line-height: 1.4; max-height: 2.8em; overflow: hidden;
        }
        .paper-recommend {
            display: inline; font-size: 0.5625rem; font-weight: 700; padding: 1px 6px;
            border-radius: 3px; letter-spacing: .02em; margin-right: 4px;
            vertical-align: middle;
        }
        .pr-recommend { background: rgba(239,68,68,0.08); color: #ef4444; }
        .pr-pick { background: rgba(99,102,241,0.08); color: #6366f1; }
        .paper-row {
            display: flex; align-items: center; gap: 8px; margin-top: 6px;
        }
        .paper-dl {
            font-size: 0.625rem; color: #64748b;
            display: flex; align-items: center; gap: 3px;
        }
        .paper-arrow { color: #d4d4d8; flex-shrink: 0; }

        .v2-more {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 8px 24px; border-radius: 999px;
            border: 1px solid #e2e8f0; background: #fff; color: #6366f1;
            font-size: 0.75rem; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent;
        }
        .v2-more:active { transform: scale(0.96); background: #faf8ff; }

        /* ── 入场动画 ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
        .d1{animation-delay:.05s} .d2{animation-delay:.1s} .d3{animation-delay:.15s}
        .d4{animation-delay:.2s} .d5{animation-delay:.25s} .d6{animation-delay:.3s}

        /* Toast */
        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.92); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1); z-index: 2000;
            box-shadow: 0 8px 24px -4px rgba(0,0,0,0.08);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 版本切换 */
        .ver-sw {
            position: fixed; bottom: 24px; right: 32px; z-index: 900;
            display: flex; background: #fff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .ver-sw a {
            padding: 10px 20px; text-decoration: none;
            color: #94a3b8; font-size: 0.8125rem; font-weight: 600; font-family: inherit;
        }
        .ver-sw a.active { background: #7c3aed; color: #fff; }

        /* 模式切换按钮（页面右上角） */
        .mode-toggle {
            position: fixed; top: 24px; right: 32px; z-index: 900;
            display: flex; background: #fff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .mode-toggle button {
            padding: 10px 24px; border: none; background: transparent;
            color: #94a3b8; cursor: pointer; font-family: inherit;
            font-size: 0.8125rem; font-weight: 600; transition: all 0.2s;
        }
        .mode-toggle button.active { background: #7c3aed; color: #fff; }

        /* ── 过稿面板 ── */
        .review-panel {
            position: fixed; top: 60px; right: 32px;
            width: 380px; height: 520px; min-width: 280px; min-height: 300px;
            background: #fff; z-index: 1500; border-radius: 16px;
            box-shadow: 0 12px 48px -8px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
            display: none; flex-direction: column;
            font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
            overflow: hidden;
        }
        .review-panel.open { display: flex; }
        .rp-header {
            padding: 12px 16px; border-bottom: 1px solid #f1f5f9;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
            cursor: move; user-select: none; -webkit-user-select: none;
            background: linear-gradient(180deg, #faf8ff, #fff);
        }
        .rp-header h2 { font-size: 14px; font-weight: 700; color: #0f172a; margin: 0; pointer-events: none; }
        .rp-header span { font-size: 11px; color: #94a3b8; pointer-events: none; }
        .rp-close {
            width: 26px; height: 26px; border-radius: 8px; border: none;
            background: #f8fafc; color: #64748b; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 13px;
        }
        .rp-close:hover { background: #fee2e2; color: #ef4444; }
        .rp-body {
            flex: 1; overflow-y: auto; padding: 12px 16px;
        }
        .rp-body::-webkit-scrollbar { width: 4px; }
        .rp-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
        .rp-section { margin-bottom: 16px; }
        .rp-section-title {
            font-size: 11px; font-weight: 700; color: #7c3aed; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 8px;
            padding-bottom: 6px; border-bottom: 1px solid #f5f3ff;
        }
        .rp-item {
            padding: 10px 12px; margin-bottom: 6px;
            border-radius: 10px; background: #faf8ff; border: 1px solid #f0ecff;
            cursor: pointer; transition: all .15s;
        }
        .rp-item:hover { background: #f0ecff; border-color: #c4b5fd; }
        .rp-item.rp-highlight { background: #ede9fe; border-color: #8b5cf6; }
        .rp-item-id {
            font-size: 10px; font-weight: 600; color: #a78bfa;
            font-family: 'SF Mono', 'Menlo', monospace; margin-bottom: 3px;
        }
        .rp-item-prd { font-size: 12px; color: #334155; line-height: 1.5; }
        .rp-item-track {
            font-size: 10px; color: #94a3b8; margin-top: 4px;
            font-family: 'SF Mono', 'Menlo', monospace; word-break: break-all;
        }

        /* 过稿模式下页面元素高亮 */
        [data-doc].review-highlight {
            outline: 2px solid #8b5cf6 !important;
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* Tab 切换 */
        .rp-tabs {
            display: flex; border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
            padding: 0 12px; gap: 2px; background: #faf8ff;
        }
        .rp-tab {
            flex: 1; padding: 8px 0; font-size: 12px; font-weight: 600;
            color: #94a3b8; background: none; border: none; border-bottom: 2px solid transparent;
            cursor: pointer; font-family: inherit; transition: all .15s;
        }
        .rp-tab.active { color: #7c3aed; border-bottom-color: #7c3aed; }
        .rp-tab:hover:not(.active) { color: #64748b; }

        /* Markdown 渲染 */
        .rp-mdoc {
            padding: 16px; font-size: 13px; color: #334155; line-height: 1.7;
        }
        .rp-mdoc h1 { font-size: 16px; font-weight: 800; color: #0f172a; margin: 0 0 8px; padding-bottom: 8px; border-bottom: 2px solid #ede9fe; }
        .rp-mdoc h2 { font-size: 14px; font-weight: 700; color: #1e1b4b; margin: 20px 0 8px; padding: 6px 10px; background: #f5f3ff; border-radius: 6px; border-left: 3px solid #7c3aed; }
        .rp-mdoc h3 { font-size: 13px; font-weight: 700; color: #0f172a; margin: 14px 0 4px; }
        .rp-mdoc h4 { font-size: 12px; font-weight: 700; color: #475569; margin: 10px 0 4px; }
        .rp-mdoc p { margin: 0 0 6px; }
        .rp-mdoc ul { padding-left: 16px; margin: 0 0 8px; }
        .rp-mdoc li { margin-bottom: 3px; }
        .rp-mdoc table { width: 100%; border-collapse: collapse; margin: 8px 0 12px; font-size: 12px; }
        .rp-mdoc th { background: #f8fafc; font-weight: 600; color: #475569; text-align: left; padding: 6px 8px; border: 1px solid #e2e8f0; }
        .rp-mdoc td { padding: 5px 8px; border: 1px solid #e2e8f0; vertical-align: top; }
        .rp-mdoc code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-size: 11px; font-family: 'SF Mono','Menlo',monospace; color: #7c3aed; }
        .rp-mdoc pre { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 11px; line-height: 1.5; }
        .rp-mdoc pre code { background: none; color: inherit; padding: 0; }
        .rp-mdoc hr { border: none; border-top: 1px solid #f1f5f9; margin: 16px 0; }
        .rp-mdoc blockquote { margin: 8px 0; padding: 8px 12px; background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 0 6px 6px 0; font-size: 12px; color: #92400e; }
        .rp-mdoc .prd-note { margin: 6px 0; padding: 6px 10px; background: #fef2f2; border-left: 3px solid #ef4444; border-radius: 0 6px 6px 0; font-size: 11px; color: #991b1b; }

        /* 拖拽调整大小手柄 */
        .rp-resize {
            position: absolute; z-index: 10;
        }
        .rp-resize-e { top: 0; right: -4px; width: 8px; height: 100%; cursor: ew-resize; }
        .rp-resize-w { top: 0; left: -4px; width: 8px; height: 100%; cursor: ew-resize; }
        .rp-resize-s { bottom: -4px; left: 0; width: 100%; height: 8px; cursor: ns-resize; }
        .rp-resize-n { top: -4px; left: 0; width: 100%; height: 8px; cursor: ns-resize; }
        .rp-resize-se { bottom: -4px; right: -4px; width: 16px; height: 16px; cursor: nwse-resize; }
        .rp-resize-sw { bottom: -4px; left: -4px; width: 16px; height: 16px; cursor: nesw-resize; }
        .rp-resize-ne { top: -4px; right: -4px; width: 16px; height: 16px; cursor: nesw-resize; }
        .rp-resize-nw { top: -4px; left: -4px; width: 16px; height: 16px; cursor: nwse-resize; }
    </style>
</head>

        function renderMd(md) {
            var inCode = false, codeLines = [], inTable = false, tableLines = [];
            var out = [];
            md.split('\n').forEach(function(line) {
                if (line.match(/^```/)) {
                    if (inCode) { out.push('<pre><code>' + codeLines.join('\n') + '</code></pre>'); codeLines = []; }
                    inCode = !inCode; return;
                }
                if (inCode) { codeLines.push(line.replace(/</g,'&lt;')); return; }
                if (line.match(/^\|.+\|$/)) {
                    if (line.match(/^\|[\s:|-]+\|$/)) return;
                    var cells = line.split('|').filter(function(c,i,a){return i>0&&i<a.length-1;}).map(function(c){return c.trim();});
                    if (!inTable) { inTable = true; tableLines = []; }
                    tableLines.push(cells);
                    return;
                }
                if (inTable) { flushTable(); inTable = false; }
                if (line.match(/^#{1}\s/)) { out.push('<h1>'+inline(line.replace(/^#\s+/,''))+'</h1>'); return; }
                if (line.match(/^#{2}\s/)) { out.push('<h2>'+inline(line.replace(/^##\s+/,''))+'</h2>'); return; }
                if (line.match(/^#{3}\s/)) { out.push('<h3>'+inline(line.replace(/^###\s+/,''))+'</h3>'); return; }
                if (line.match(/^#{4}\s/)) { out.push('<h4>'+inline(line.replace(/^####\s+/,''))+'</h4>'); return; }
                if (line.match(/^>\s+/)) { out.push('<blockquote>'+inline(line.replace(/^>\s+/,''))+'</blockquote>'); return; }
                if (line.match(/^\[!\]/)) { out.push('<div class="prd-note">'+inline(line.replace(/^\[!\]\s*/,''))+'</div>'); return; }
                if (line.match(/^---$/)) { out.push('<hr>'); return; }
                if (line.match(/^[-*]\s/)) { out.push('<li>'+inline(line.replace(/^[-*]\s+/,''))+'</li>'); return; }
                if (line.match(/^\d+\.\s/)) { out.push('<li>'+inline(line.replace(/^\d+\.\s+/,''))+'</li>'); return; }
                if (line.trim()) out.push('<p>'+inline(line)+'</p>');
            });
            if (inTable) flushTable();
            function flushTable() {
                var h='<table><thead><tr>'+tableLines[0].map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
                for(var i=1;i<tableLines.length;i++) h+='<tr>'+tableLines[i].map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>';
                out.push(h+'</tbody></table>');
            }
            function inline(s) {
                return s
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
            }
            return out.join('\n');
        }

                header = document.getElementById('rpHeader');
                header.addEventListener('mousedown', startDrag);
                header.addEventListener('touchstart', startDragTouch, { passive: false });
                panel.querySelectorAll('.rp-resize').forEach(function(h) {
                    h.addEventListener('mousedown', startResize);
                    h.addEventListener('touchstart', startResizeTouch, { passive: false });
                });
            });
            function startDrag(e) {
                if (e.target.closest('.rp-close')) return;
                dragging = true;
                ox = e.clientX; oy = e.clientY;
                sx = panel.offsetLeft; sy = panel.offsetTop;
                document.addEventListener('mousemove', onDrag);
                document.addEventListener('mouseup', stopDrag);
                e.preventDefault();
            }
            function startDragTouch(e) {
                if (e.target.closest('.rp-close')) return;
                dragging = true;
                var t = e.touches[0];
                ox = t.clientX; oy = t.clientY;
                sx = panel.offsetLeft; sy = panel.offsetTop;
                document.addEventListener('touchmove', onDragTouch, { passive: false });
                document.addEventListener('touchend', stopDrag);
                e.preventDefault();
            }
            function onDrag(e) {
                if (!dragging) return;
                moveTo(e.clientX, e.clientY);
            }
            function onDragTouch(e) {
                if (!dragging) return;
                var t = e.touches[0];
                moveTo(t.clientX, t.clientY);
                e.preventDefault();
            }
            function moveTo(cx, cy) {
                var nx = sx + (cx - ox);
                var ny = sy + (cy - oy);
                nx = Math.max(0, Math.min(nx, window.innerWidth - 80));
                ny = Math.max(0, Math.min(ny, window.innerHeight - 40));
                panel.style.left = nx + 'px';
                panel.style.top = ny + 'px';
                panel.style.right = 'auto';
            }
            function stopDrag() {
                dragging = false;
                document.removeEventListener('mousemove', onDrag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchmove', onDragTouch);
                document.removeEventListener('touchend', stopDrag);
            }

            /* ── 调整大小 ── */
            var resizing = false, rDir, rox, roy, rRect;
            function startResize(e) {
                rDir = e.target.dataset.dir;
                resizing = true;
                rox = e.clientX; roy = e.clientY;
                rRect = { l: panel.offsetLeft, t: panel.offsetTop, w: panel.offsetWidth, h: panel.offsetHeight };
                document.addEventListener('mousemove', onResize);
                document.addEventListener('mouseup', stopResize);
                e.preventDefault(); e.stopPropagation();
            }
            function startResizeTouch(e) {
                rDir = e.target.dataset.dir;
                resizing = true;
                var t = e.touches[0];
                rox = t.clientX; roy = t.clientY;
                rRect = { l: panel.offsetLeft, t: panel.offsetTop, w: panel.offsetWidth, h: panel.offsetHeight };
                document.addEventListener('touchmove', onResizeTouch, { passive: false });
                document.addEventListener('touchend', stopResize);
                e.preventDefault(); e.stopPropagation();
            }
            function onResize(e) { if (resizing) applyResize(e.clientX, e.clientY); }
            function onResizeTouch(e) {
                if (!resizing) return;
                var t = e.touches[0];
                applyResize(t.clientX, t.clientY);
                e.preventDefault();
            }
            function applyResize(cx, cy) {
                var dx = cx - rox, dy = cy - roy;
                var minW = 280, minH = 300;
                var nl = rRect.l, nt = rRect.t, nw = rRect.w, nh = rRect.h;
                if (rDir.indexOf('e') >= 0) nw = Math.max(minW, rRect.w + dx);
                if (rDir.indexOf('w') >= 0) { nw = Math.max(minW, rRect.w - dx); nl = rRect.l + rRect.w - nw; }
                if (rDir.indexOf('s') >= 0) nh = Math.max(minH, rRect.h + dy);
                if (rDir.indexOf('n') >= 0) { nh = Math.max(minH, rRect.h - dy); nt = rRect.t + rRect.h - nh; }
                panel.style.width = nw + 'px';
                panel.style.height = nh + 'px';
                panel.style.left = nl + 'px';
                panel.style.top = nt + 'px';
                panel.style.right = 'auto';
            }
            function stopResize() {
                resizing = false;
                document.removeEventListener('mousemove', onResize);
                document.removeEventListener('mouseup', stopResize);
                document.removeEventListener('touchmove', onResizeTouch);
                document.removeEventListener('touchend', stopResize);
            }
        })();
    </script>

</body>
</html>
