<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 首页 v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/app-shell.css">
    <style>
        /* ═══════════════════════════════════════════════
           AI 龙老师 v3 — 宫格 + Suggested Prompts
           ═══════════════════════════════════════════════ */

        .v2-scroll {
            flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; position: relative; z-index: 1;
        }
        .v2-scroll::-webkit-scrollbar { display: none; }

        /* ── 明亮渐变背景 ── */
        .page-bg {
            position: absolute; inset: 0; z-index: 0;
            background: linear-gradient(170deg, #f0ecff 0%, #faf8ff 25%, #f8fafc 50%, #f1f5f9 100%);
        }
        .bg-blob-1 {
            position: absolute; top: -5%; left: -10%; width: 65%; height: 45%;
            background: radial-gradient(ellipse, rgba(139,92,246,0.12) 0%, transparent 70%);
            filter: blur(50px); pointer-events: none; z-index: 0;
        }
        .bg-blob-2 {
            position: absolute; top: 20%; right: -15%; width: 55%; height: 40%;
            background: radial-gradient(ellipse, rgba(251,191,36,0.1) 0%, transparent 70%);
            filter: blur(50px); pointer-events: none; z-index: 0;
        }
        .bg-blob-3 {
            position: absolute; bottom: 10%; left: -5%; width: 50%; height: 40%;
            background: radial-gradient(ellipse, rgba(96,165,250,0.08) 0%, transparent 70%);
            filter: blur(45px); pointer-events: none; z-index: 0;
        }

        /* ── 顶栏 ── */
        .v2-topbar {
            height: 44px; padding: 0 20px;
            padding-right: var(--app-capsule-clearance, 96px);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .v2-topbar-tabs { display: flex; gap: 18px; align-items: baseline; }
        .v2-tab {
            font-size: 1rem; font-weight: 400; color: #94a3b8;
            cursor: pointer; transition: all 0.2s; padding: 0;
            background: none; border: none; font-family: inherit;
        }
        .v2-tab.active { font-size: 1.125rem; font-weight: 700; color: #0f172a; }
        .v2-topbar-right { display: flex; align-items: center; gap: 4px; }
        .v2-icon-btn {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; cursor: pointer; background: none; border: none;
            transition: all 0.18s; -webkit-tap-highlight-color: transparent;
        }
        .v2-icon-btn:active { transform: scale(0.9); background: rgba(0,0,0,0.03); }

        /* ── AI 对话卡片（核心区域） ── */
        .ai-card {
            margin: 8px 20px 0; padding: 16px 14px 12px;
            border-radius: 20px; position: relative; overflow: hidden;
            background: #fff;
            box-shadow: 0 2px 16px -4px rgba(99,102,241,0.08),
                        0 1px 3px rgba(0,0,0,0.03);
        }
        .ai-card-glow {
            position: absolute; top: -30px; right: -30px; width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* 顶部角色行 */
        .ai-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px; position: relative; z-index: 1;
        }
        .ai-avatar-wrap { position: relative; flex-shrink: 0; }
        .ai-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            object-fit: cover; object-position: top center;
            border: 2px solid rgba(139,92,246,0.15);
        }
        .ai-online {
            position: absolute; bottom: 0; right: 0;
            width: 12px; height: 12px; border-radius: 50%;
            background: #22c55e; border: 2px solid #fff;
        }
        .ai-row-text { flex: 1; min-width: 0; }
        .ai-row-text .ai-name {
            font-size: 0.9375rem; font-weight: 700; color: #0f172a; margin: 0;
            display: flex; align-items: center; gap: 5px;
        }
        .ai-name .ai-badge {
            font-size: 0.5rem; font-weight: 700; color: #7c3aed;
            background: rgba(139,92,246,0.08); padding: 1.5px 6px;
            border-radius: 4px; letter-spacing: 0.03em;
        }

        /* 打字机气泡 */
        .ai-bubble {
            background: #f5f3ff; border-radius: 4px 16px 16px 16px;
            padding: 10px 14px; position: relative; z-index: 1;
            margin-bottom: 10px;
        }
        .ai-bubble-text {
            font-size: 0.8125rem; color: #334155; line-height: 1.55;
            font-weight: 400;
        }
        .ai-bubble-text .tw-cursor {
            display: inline-block; width: 2px; height: 13px;
            background: #a78bfa; margin-left: 1px;
            vertical-align: text-bottom; border-radius: 1px;
            animation: twBlink 0.8s step-end infinite;
        }
        @keyframes twBlink { 0%,100% { opacity:1; } 50% { opacity:0; } }

        /* 输入区 */
        .ai-input-wrap {
            display: flex; align-items: flex-end; gap: 8px;
            background: #f8fafc; border-radius: 16px;
            padding: 5px 5px 5px 14px;
            border: 1.5px solid #e2e8f0;
            transition: border-color 0.2s;
            position: relative; z-index: 1;
        }
        .ai-input-wrap.focused { border-color: #a78bfa; }
        .ai-input-field {
            flex: 1; border: none; outline: none; background: transparent;
            font-family: inherit; font-size: 0.8125rem; font-weight: 500;
            color: #0f172a; padding: 9px 0; resize: none;
            line-height: 1.4; min-height: 20px; max-height: 76px;
        }
        .ai-input-field::placeholder { color: #b4b8c4; font-weight: 400; }
        .ai-input-btns { display: flex; align-items: center; gap: 4px; flex-shrink: 0; padding-bottom: 1px; }
        .ai-btn-cam, .ai-btn-send {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: all 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .ai-btn-cam { background: rgba(139,92,246,0.06); color: #8b5cf6; }
        .ai-btn-cam:active { transform: scale(0.9); background: rgba(139,92,246,0.12); }
        .ai-btn-send {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: #fff; opacity: 0.3; pointer-events: none;
            box-shadow: 0 2px 8px -2px rgba(139,92,246,0.3);
        }
        .ai-btn-send.active { opacity: 1; pointer-events: auto; }
        .ai-btn-send.active:active { transform: scale(0.9); }

        /* 拍照菜单 */
        .cam-pop {
            position: absolute; bottom: calc(100% + 8px); right: 50px;
            background: #fff; border-radius: 16px; padding: 6px; min-width: 160px;
            box-shadow: 0 8px 32px -4px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.04);
            z-index: 60;
            opacity: 0; pointer-events: none; transform: translateY(6px) scale(0.96);
            transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
        }
        .cam-pop.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
        .cam-pop-item {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 14px; border-radius: 12px; width: 100%;
            border: none; background: none; cursor: pointer;
            font-family: inherit; font-size: 0.8125rem; font-weight: 600;
            color: #334155; text-align: left; transition: background 0.12s;
            -webkit-tap-highlight-color: transparent;
        }
        .cam-pop-item:active { background: #f5f3ff; }
        .cam-pop-icon {
            width: 30px; height: 30px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .cpi-violet { background: rgba(139,92,246,0.08); color: #8b5cf6; }
        .cpi-amber { background: rgba(245,158,11,0.08); color: #f59e0b; }

        /* ── Suggested Prompts ── */
        .ai-prompts {
            display: flex; gap: 6px;
            margin-top: 10px; position: relative; z-index: 1;
        }
        .ai-prompt-chip {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 6px 11px; border-radius: 16px;
            background: #f5f3ff; border: 1px solid rgba(139,92,246,0.1);
            font-size: 0.625rem; font-weight: 600; color: #7c3aed;
            cursor: pointer; transition: all 0.18s;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .ai-prompt-chip:active { transform: scale(0.96); background: #ede9fe; border-color: #a78bfa; }

        /* ── 工具宫格 ── */
        .tool-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin: 14px 20px 0; position: relative; z-index: 1;
        }
        .tool-cell {
            display: flex; flex-direction: column; align-items: center; gap: 7px;
            padding: 14px 6px 12px; border-radius: 14px;
            background: #fff; border: 1px solid #f0f0f4;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
            cursor: pointer; transition: all 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .tool-cell:active { transform: scale(0.96); border-color: #c4b5fd; background: #faf8ff; }
        .tc-icon {
            width: 36px; height: 36px; border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
        }
        .tc-indigo { background: rgba(99,102,241,0.08); color: #6366f1; }
        .tc-amber { background: rgba(245,158,11,0.08); color: #d97706; }
        .tc-green { background: rgba(5,150,105,0.08); color: #059669; }
        .tc-orange { background: rgba(234,88,12,0.08); color: #ea580c; }
        .tc-warm { background: rgba(217,119,6,0.08); color: #d97706; }
        .tc-purple { background: rgba(124,58,237,0.08); color: #7c3aed; }
        .tool-cell span {
            font-size: 0.6875rem; font-weight: 600; color: #475569;
            text-align: center; line-height: 1.2;
        }

        /* ── 通用 section ── */
        .sec { padding: 0 20px; margin-top: 28px; position: relative; z-index: 1; }
        .sec-hd { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
        .sec-hd h2 {
            font-size: 1rem; font-weight: 700; color: #0f172a; margin: 0;
            display: flex; align-items: center; gap: 6px;
        }
        .sec-badge {
            font-size: 0.5rem; font-weight: 700; padding: 2px 7px;
            border-radius: 5px; letter-spacing: 0.02em;
        }
        .sb-ai { background: rgba(139,92,246,0.08); color: #7c3aed; }
        .sb-hot { background: rgba(239,68,68,0.06); color: #ef4444; }

        /* ── 视频课堂 ── */
        .vid-big {
            border-radius: 16px; padding: 16px; position: relative; overflow: hidden;
            cursor: pointer; transition: transform 0.18s; -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 50%, #f5f3ff 100%);
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }
        .vid-big:active { transform: scale(0.98); }
        .vb-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.5625rem; font-weight: 700; padding: 3px 9px;
            border-radius: 7px; background: rgba(139,92,246,0.08);
            color: #7c3aed; margin-bottom: 8px;
        }
        .vb-title { font-size: 0.9375rem; font-weight: 700; color: #0f172a; margin: 0; }
        .vb-desc { font-size: 0.75rem; color: #64748b; margin: 3px 0 0; }
        .vb-tags { display: flex; gap: 6px; margin-top: 10px; }
        .vb-tag {
            font-size: 0.625rem; font-weight: 600; padding: 3px 9px;
            border-radius: 7px; background: rgba(255,255,255,0.7); color: #64748b;
        }

        .vid-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .vid-mini {
            border-radius: 14px; padding: 14px 12px; cursor: pointer;
            transition: transform 0.18s; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }
        .vid-mini:active { transform: scale(0.97); }
        .vm-green { background: linear-gradient(135deg, #f0fdf4, #ecfdf5); }
        .vm-orange { background: linear-gradient(135deg, #fffbeb, #fef3c7); }
        .vm-icon {
            width: 30px; height: 30px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 7px; background: rgba(255,255,255,0.7);
        }
        .vm-green .vm-icon { color: #059669; }
        .vm-orange .vm-icon { color: #d97706; }
        .vid-mini h4 { font-size: 0.8125rem; font-weight: 700; color: #0f172a; margin: 0; }
        .vid-mini p { font-size: 0.625rem; color: #64748b; margin: 3px 0 0; }
        .vm-tags { display: flex; gap: 4px; margin-top: 7px; flex-wrap: wrap; }
        .vm-tag {
            font-size: 0.5625rem; font-weight: 600; padding: 2px 7px;
            border-radius: 5px; background: rgba(255,255,255,0.6); color: #64748b;
        }

        /* ── 专项横滑 ── */
        .zk-scroll {
            display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        .zk-scroll::-webkit-scrollbar { display: none; }
        .zk-item {
            flex-shrink: 0; width: 144px; padding: 14px; border-radius: 14px;
            position: relative; overflow: hidden; cursor: pointer;
            transition: transform 0.18s; -webkit-tap-highlight-color: transparent;
            background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }
        .zk-item:active { transform: scale(0.97); }
        .zk-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
        .zk-bar-cn { background: linear-gradient(180deg, #f59e0b, #ef4444); }
        .zk-bar-en { background: linear-gradient(180deg, #3b82f6, #6366f1); }
        .zk-item h4 { font-size: 0.75rem; font-weight: 700; color: #0f172a; margin: 0; }
        .zk-item p { font-size: 0.5625rem; color: #94a3b8; margin: 3px 0 0; }
        .zk-count { font-size: 0.5rem; font-weight: 700; color: #a78bfa; margin-top: 7px; }

        /* ── 练一练 ── */
        .prac-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .prac-card {
            padding: 14px; border-radius: 14px; cursor: pointer;
            transition: transform 0.18s; -webkit-tap-highlight-color: transparent;
            background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }
        .prac-card:active { transform: scale(0.97); }
        .pc-icon {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }
        .pc-violet { background: rgba(139,92,246,0.06); color: #8b5cf6; }
        .pc-green { background: rgba(5,150,105,0.06); color: #059669; }
        .pc-teal { background: rgba(13,148,136,0.06); color: #0d9488; }
        .pc-rose { background: rgba(225,29,72,0.06); color: #e11d48; }
        .prac-card h4 { font-size: 0.8125rem; font-weight: 700; color: #0f172a; margin: 0; }
        .prac-card p { font-size: 0.625rem; color: #94a3b8; margin: 3px 0 0; }

        /* ── 精品试卷推荐 ── */
        .paper-sec { padding: 0 20px; margin-top: 28px; position: relative; z-index: 1; }
        .paper-tabs-row { display: flex; gap: 4px; margin-bottom: 12px; }
        .pt-btn {
            padding: 5px 14px; font-size: 0.75rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: none;
            cursor: pointer; border-radius: 10px; font-family: inherit;
            transition: all 0.18s; -webkit-tap-highlight-color: transparent;
        }
        .pt-btn.active { color: #0f172a; background: #fff; box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06); }
        .paper-rec-list { display: flex; flex-direction: column; gap: 8px; }
        .paper-rec-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; border-radius: 14px; background: #fff;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            cursor: pointer; transition: transform 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .paper-rec-item:active { transform: scale(0.98); }
        .pr-icon {
            width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .pri-cn { background: linear-gradient(135deg, #eef2ff, #f5f3ff); color: #6366f1; }
        .pri-ma { background: linear-gradient(135deg, #fffbeb, #fef9c3); color: #d97706; }
        .pri-en { background: linear-gradient(135deg, #ecfdf5, #d1fae5); color: #059669; }
        .pri-sc { background: linear-gradient(135deg, #ecfeff, #cffafe); color: #0891b2; }
        .pr-body { flex: 1; min-width: 0; }
        .pr-title {
            font-size: 0.75rem; font-weight: 600; color: #0f172a; margin: 0;
            line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .pr-rec-tag {
            display: inline-block; font-size: 0.5rem; font-weight: 700;
            padding: 1px 5px; border-radius: 3px; margin-right: 3px;
            vertical-align: middle;
        }
        .prt-hot { background: rgba(239,68,68,0.08); color: #ef4444; }
        .prt-pick { background: rgba(99,102,241,0.08); color: #6366f1; }
        .pr-meta {
            display: flex; align-items: center; gap: 6px; margin-top: 4px;
            font-size: 0.5625rem; color: #94a3b8;
        }
        .pr-arrow { color: #d4d4d8; flex-shrink: 0; }

        .v2-more {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 8px 24px; border-radius: 999px;
            border: 1px solid #e2e8f0; background: #fff; color: #6366f1;
            font-size: 0.75rem; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent;
        }
        .v2-more:active { transform: scale(0.96); background: #faf8ff; }

        /* ── 入场动画 ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
        .d1{animation-delay:.05s} .d2{animation-delay:.1s} .d3{animation-delay:.15s}
        .d4{animation-delay:.2s} .d5{animation-delay:.25s} .d6{animation-delay:.3s}

        /* Toast */
        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.92); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1); z-index: 2000;
            box-shadow: 0 8px 24px -4px rgba(0,0,0,0.08);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 版本切换 */
        .ver-sw {
            position: fixed; bottom: 24px; right: 32px; z-index: 900;
            display: flex; background: #fff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .ver-sw a {
            padding: 10px 20px; text-decoration: none;
            color: #94a3b8; font-size: 0.8125rem; font-weight: 600; font-family: inherit;
        }
        .ver-sw a.active { background: #7c3aed; color: #fff; }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col" id="app-root">
        <div class="page-bg"></div>
        <div class="bg-blob-1"></div>
        <div class="bg-blob-2"></div>
        <div class="bg-blob-3"></div>
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div id="toast"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#8b5cf6" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><span id="toast-msg">AI 思考中…</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">

            <!-- 顶栏 -->
            <nav class="v2-topbar anim">
                <div class="v2-topbar-tabs">
                    <button class="v2-tab active">首页</button>

    <script>
        /* ── 打字机（AI 龙老师说话） ── */
        (function() {
            var h = new Date().getHours();
            var greet = h < 6 ? '夜深了还在学习' : h < 11 ? '早上好' : h < 14 ? '中午好' : h < 18 ? '下午好' : '晚上好';

            var phrases = [
                greet + '呀～有什么不会的题，拍给我看看 📸',
                '今天想复习哪个科目？我帮你找试卷 📝',
                '错题不用怕，拍一下我帮你分析原因 🔍',
                '新课标重点课已更新，快来看看吧 📚',
            ];
            var el = document.getElementById('twText');
            var cursor = document.getElementById('twCursor');
            var pi = 0, ci = 0, deleting = false;

            function tick() {
                var phrase = phrases[pi];
                if (!deleting) {
                    ci++;
                    el.innerHTML = phrase.substring(0, ci) + '<span class="tw-cursor"></span>';
                    if (ci >= phrase.length) {
                        setTimeout(function() { deleting = true; tick(); }, 2800);
                        return;
                    }
                    setTimeout(tick, 40 + Math.random() * 25);
                } else {
                    ci--;
                    el.innerHTML = phrase.substring(0, ci) + '<span class="tw-cursor"></span>';
                    if (ci <= 0) {
                        deleting = false;
                        pi = (pi + 1) % phrases.length;
                        setTimeout(tick, 350);
                        return;
                    }
                    setTimeout(tick, 18);
                }
            }
            setTimeout(tick, 500);
        })();

        /* ── 输入框交互 ── */
        (function() {
            var input = document.getElementById('aiInput');
            var wrap = document.getElementById('aiInputWrap');
            var sendBtn = document.getElementById('sendBtn');
            var camBtn = document.getElementById('camBtn');
            var camPop = document.getElementById('camPop');

            input.addEventListener('focus', function() { wrap.classList.add('focused'); });
            input.addEventListener('blur', function() { wrap.classList.remove('focused'); });
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 76) + 'px';
                sendBtn.classList.toggle('active', this.value.trim().length > 0);
            });
            sendBtn.addEventListener('click', function() {
                var q = input.value.trim();
                if (!q) return;
                sessionStorage.setItem('aiQuestion', q);
                sessionStorage.setItem('aiSource', 'home-input');
                window.location.href = '作业/ai讲题.html';
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
            });
            camBtn.addEventListener('click', function(e) {
                e.stopPropagation(); camPop.classList.toggle('open');
            });
            document.addEventListener('click', function() { camPop.classList.remove('open'); });
            camPop.addEventListener('click', function(e) { e.stopPropagation(); });
        })();

        function fillPrompt(text) {
            sessionStorage.setItem('aiQuestion', text);
            sessionStorage.setItem('aiSource', 'home-prompt');
            window.location.href = '作业/ai讲题.html';
        }

        /* ── 页面跳转 ── */
        function goToCorrection(m) { sessionStorage.setItem('cameraMode',m); window.location.href='作业/作业批改.html?mode='+m; }
        function openAiJiangTi() { sessionStorage.setItem('cameraMode','qa'); window.location.href='作业/作业批改.html?mode=qa'; }
        function openBook() { window.location.href='错题本/错题本.html'; }
        function openUploadWrong() { sessionStorage.setItem('cameraMode','wrong'); window.location.href='作业/作业批改.html?mode=wrong'; }
        function openErase() { window.location.href='试卷/试卷擦除.html'; }
        function openPaperExplain() { window.location.href='试卷讲解/试卷讲解.html'; }
        function openErrorAnalysis() { window.location.href='作业/作业批改.html?mode=diagnosis'; }
        function openRealExam(t) { window.location.href='试卷/试卷列表.html?type='+t; }
