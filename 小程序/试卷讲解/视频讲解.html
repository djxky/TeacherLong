<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>试卷讲解 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }

        .fs-page { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; }
        .fs-video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .fs-tap { position: absolute; inset: 0; z-index: 6; cursor: pointer; }

        /* 控制层 */
        .fs-controls { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; opacity: 1; transition: opacity .25s; pointer-events: none; }
        .fs-controls.hidden { opacity: 0; }
        .fs-controls > * { pointer-events: auto; }

        .fs-ctrl-top { display: flex; align-items: center; justify-content: space-between; padding: env(safe-area-inset-top, 12px) 16px 8px; background: linear-gradient(180deg, rgba(0,0,0,.5) 0%, transparent 100%); }
        .fs-ctrl-back { width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(255,255,255,.12); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; flex-shrink: 0; }
        .fs-ctrl-back:active { background: rgba(255,255,255,.2); }

        .fs-center { flex: 1; display: flex; align-items: center; justify-content: center; }
        .fs-center-play { width: 52px; height: 52px; border-radius: 50%; border: none; background: rgba(255,255,255,.18); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; opacity: 0; transition: opacity .2s; }
        .fs-controls:not(.hidden) .fs-center-play { opacity: 1; }

        .fs-ctrl-bottom { padding: 0 16px max(env(safe-area-inset-bottom, 8px), 12px); background: linear-gradient(0deg, rgba(0,0,0,.55) 0%, transparent 100%); }

        /* 分段进度条 */
        .fs-seg-bar { display: flex; align-items: center; gap: 0; height: 32px; position: relative; cursor: pointer; touch-action: none; margin-bottom: 4px; }
        .fs-seg { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
        .fs-seg-track { width: 100%; height: 3px; background: rgba(255,255,255,.2); border-radius: 1.5px; position: relative; overflow: hidden; }
        .fs-seg:first-child .fs-seg-track { border-radius: 1.5px 0 0 1.5px; }
        .fs-seg:last-child .fs-seg-track { border-radius: 0 1.5px 1.5px 0; }
        .fs-seg-fill { position: absolute; left: 0; top: 0; height: 100%; background: #fbbf24; border-radius: inherit; transition: width .15s linear; }
        .fs-seg-label { font-size: .625rem; color: rgba(255,255,255,.45); font-weight: 600; white-space: nowrap; }
        .fs-seg.active .fs-seg-label { color: rgba(255,255,255,.85); }
        .fs-seg-gap { width: 4px; height: 3px; flex-shrink: 0; }

        .fs-ctrl-row { display: flex; align-items: center; gap: 8px; }
        .fs-play-sm { width: 28px; height: 28px; border: none; background: none; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; border-radius: 6px; flex-shrink: 0; }
        .fs-play-sm:active { background: rgba(255,255,255,.1); }
        .fs-time { color: rgba(255,255,255,.75); font-size: .6875rem; font-weight: 500; white-space: nowrap; }
        .fs-spacer { flex: 1; }
        .fs-watermark { font-size: .5625rem; color: rgba(255,255,255,.35); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .fs-watermark svg { opacity: .5; }

        .fs-btn { height: 24px; padding: 0 10px; border: none; border-radius: 5px; background: rgba(255,255,255,.1); color: #fff; font-size: .6875rem; font-weight: 600; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; gap: 3px; }
        .fs-btn:active { background: rgba(255,255,255,.18); }
        .fs-btn svg { flex-shrink: 0; }

        /* 重播覆盖层 */
        .fs-replay { position: absolute; inset: 0; z-index: 15; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; background: rgba(0,0,0,.55); }
        .fs-replay.show { display: flex; }
        .fs-replay-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: rgba(255,255,255,.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: transform .12s; }
        .fs-replay-btn:active { transform: scale(.9); }
        .fs-replay-label { color: rgba(255,255,255,.85); font-size: .8125rem; font-weight: 600; }

        /* 无视频提示 */
        .fs-novideo { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 120; display: none; flex-direction: column; align-items: center; gap: 12px; color: rgba(255,255,255,.75); text-align: center; }
        .fs-novideo.show { display: flex; }
        .fs-novideo-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; }
        .fs-novideo-text { font-size: .875rem; font-weight: 600; }
        .fs-novideo-sub { font-size: .75rem; color: rgba(255,255,255,.4); }

        /* 底部弹窗 — 通用样式（倍速 + 切题共用） */
        .fs-sheet-overlay { position: absolute; inset: 0; z-index: 200; background: rgba(0,0,0,.5); display: none; align-items: flex-end; }
        .fs-sheet-overlay.open { display: flex; }
        .fs-sheet { width: 100%; background: #fff; border-radius: 16px 16px 0 0; padding: 0 0 max(env(safe-area-inset-bottom, 16px), 16px); max-height: 70vh; display: flex; flex-direction: column; }
        .fs-sheet-title { font-size: .875rem; font-weight: 700; color: #0f172a; text-align: center; padding: 16px 16px 12px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }

        /* 倍速选项 */
        .fs-speed-options { display: flex; flex-direction: column; padding: 8px 0; }
        .fs-speed-opt { padding: 12px 20px; font-size: .875rem; font-weight: 500; color: #475569; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
        .fs-speed-opt:active { background: #f8fafc; }
        .fs-speed-opt.active { color: #ea580c; font-weight: 700; }

        /* 题目选择面板 */
        .fs-q-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 20px 6px; justify-content: center; }
        .fs-q-item {
            width: 42px; height: 42px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: .875rem; font-weight: 700; color: #475569;
            background: #f1f5f9; border: 2px solid transparent;
            cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .15s;
            position: relative;
        }
        .fs-q-item:active { transform: scale(.92); }
        .fs-q-item.active { background: #fbbf24; border-color: #f59e0b; color: #0f172a; box-shadow: 0 2px 8px rgba(251,191,36,.35); }
        .fs-q-item.disabled { color: #d4d4d8; background: #f8f8f8; border-color: transparent; cursor: not-allowed; }
        .fs-q-item.disabled::after { content: ''; position: absolute; bottom: 2px; width: 12px; height: 2px; border-radius: 1px; background: #e5e5e5; }
        .fs-q-hint { width: 100%; padding: 0 20px 12px; font-size: .6875rem; color: #94a3b8; text-align: center; }

        /* toast */
        .fs-toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 100; background: rgba(0,0,0,.75); backdrop-filter: blur(12px); color: #fff; padding: 6px 16px; border-radius: 8px; font-size: .8125rem; font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; }
        .fs-toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="fs-page" id="fsPage">
        <video class="fs-video" id="fsVideo" preload="metadata" playsinline webkit-playsinline x5-playsinline
               src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

        <div class="fs-tap" id="fsTapArea"></div>

        <div class="fs-controls" id="fsControls">
            <div class="fs-ctrl-top">
                <button class="fs-ctrl-back" onclick="goBack()">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span id="fsTitle" style="color:rgba(255,255,255,.85);font-size:.8125rem;font-weight:600;flex:1;text-align:center;padding:0 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                <div style="width:32px"></div>
            </div>
            <div class="fs-center">
                <button class="fs-center-play" id="fsCenterPlay">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24" id="fsCenterIcon"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>
            <div class="fs-ctrl-bottom">
                <div class="fs-seg-bar" id="fsSegBar">
                    <div class="fs-seg active" data-seg="0">
                        <div class="fs-seg-track"><div class="fs-seg-fill" id="segFill0" style="width:0"></div></div>
                        <span class="fs-seg-label">分析题干</span>
                    </div>
                    <div class="fs-seg-gap"></div>
                    <div class="fs-seg" data-seg="1">
                        <div class="fs-seg-track"><div class="fs-seg-fill" id="segFill1" style="width:0"></div></div>
                        <span class="fs-seg-label">步骤书写</span>
                    </div>
                    <div class="fs-seg-gap"></div>
                    <div class="fs-seg" data-seg="2">
                        <div class="fs-seg-track"><div class="fs-seg-fill" id="segFill2" style="width:0"></div></div>
                        <span class="fs-seg-label">本题小结</span>
                    </div>
                </div>
                <div class="fs-ctrl-row">
                    <button class="fs-play-sm" id="fsPlayBtn">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24" id="fsPlayIcon"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <span class="fs-time"><span id="fsCur">00:00</span></span>
                    <div class="fs-spacer"></div>
                    <span class="fs-watermark">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
                        AI 龙老师
                    </span>
                    <span class="fs-time" style="margin-left:6px"><span id="fsDur">00:00</span></span>
                    <button class="fs-btn" id="fsQBtn" onclick="openQPanel()">
                        <span id="fsQBtnLabel">第1题</span>
                        <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <button class="fs-btn" id="fsSpeedBtn" onclick="openSpeedPanel()">倍速</button>
                </div>
            </div>
        </div>

        <!-- 重播 -->
        <div class="fs-replay" id="fsReplay">
            <button class="fs-ctrl-back" onclick="goBack()" style="position:absolute;top:env(safe-area-inset-top,12px);left:16px;">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button class="fs-replay-btn" onclick="replayVideo()">
                <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5"/><path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 005.64 5.64L4 4m16 16l-1.64-1.64A9 9 0 013.51 15"/></svg>
            </button>
            <span class="fs-replay-label">重新播放</span>
        </div>

        <!-- 无视频 -->
        <div class="fs-novideo" id="fsNoVideo">
            <div class="fs-novideo-icon">
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M12 12h.01M18.364 5.636a9 9 0 010 12.728"/><line x1="4" y1="4" x2="20" y2="20" stroke-linecap="round"/></svg>
            </div>
            <span class="fs-novideo-text">本题暂无视频讲解</span>
            <span class="fs-novideo-sub">点击下方「第X题」切换至其他题目</span>
        </div>

        <!-- 倍速面板 -->
        <div class="fs-sheet-overlay" id="speedPanel" onclick="closeSpeedPanel(event)">
            <div class="fs-sheet" onclick="event.stopPropagation()">
                <div class="fs-sheet-title">播放速度</div>
                <div class="fs-speed-options" id="speedOptions"></div>
            </div>
        </div>

        <!-- 题目选择面板 -->
        <div class="fs-sheet-overlay" id="qPanel" onclick="closeQPanel(event)">
            <div class="fs-sheet" onclick="event.stopPropagation()">
                <div class="fs-sheet-title">选择题目</div>
                <div class="fs-q-list" id="qGrid"></div>
                <div class="fs-q-hint">灰色题目暂无视频讲解</div>
            </div>
        </div>

        <div class="fs-toast" id="fsToast"></div>
    </div>

    <script>
    /* ══════════ Mock 题目数据 ══════════ */
    const QUESTIONS = [
        { num: 1, hasVideo: true, dur: 72, segments: [0, 0.35, 0.75, 1] },
        { num: 2, hasVideo: true, dur: 95, segments: [0, 0.3, 0.7, 1] },
        { num: 3, hasVideo: true, dur: 154, segments: [0, 0.25, 0.65, 1] },
        { num: 4, hasVideo: false, dur: 58, segments: [0, 0.3, 0.7, 1] },
        { num: 5, hasVideo: true, dur: 88, segments: [0, 0.35, 0.7, 1] },
        { num: 6, hasVideo: true, dur: 76, segments: [0, 0.4, 0.75, 1] },
        { num: 7, hasVideo: true, dur: 82, segments: [0, 0.3, 0.7, 1] },
        { num: 8, hasVideo: false, dur: 65, segments: [0, 0.35, 0.75, 1] },
        { num: 9, hasVideo: true, dur: 110, segments: [0, 0.3, 0.65, 1] },
        { num: 10, hasVideo: true, dur: 78, segments: [0, 0.35, 0.75, 1] },
    ];

    /* ══════════ 状态 ══════════ */
    const $ = id => document.getElementById(id);
    const video = $('fsVideo');
    let currentQ = 0;
    let controlsTimer = null;
    let currentSpeed = 1.0;
    const SPEEDS = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
    const PLAY_D = 'M8 5v14l11-7z';
    const PAUSE_D = 'M6 4h4v16H6V4zm8 0h4v16h-4V4z';

    /* ══════════ URL 参数 ══════════ */
    const params = new URLSearchParams(window.location.search);
    const paperTitle = decodeURIComponent(params.get('title') || '试卷讲解');
    document.title = paperTitle + ' - AI 龙老师';

    /* ══════════ 播放器 ══════════ */
    function fmt(sec) {
        if (!sec || !isFinite(sec)) return '00:00';
        const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
        return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    function syncPlayIcon() {
        const d = video.paused ? PLAY_D : PAUSE_D;
        $('fsPlayIcon').innerHTML = '<path d="' + d + '"/>';
        $('fsCenterIcon').innerHTML = '<path d="' + d + '"/>';
    }

    function togglePlay() {
        if (video.paused) video.play().catch(()=>{});
        else video.pause();
    }

    $('fsPlayBtn').addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
    $('fsCenterPlay').addEventListener('click', e => { e.stopPropagation(); togglePlay(); });

    video.addEventListener('play', () => { syncPlayIcon(); showControls(); $('fsReplay').classList.remove('show'); });
    video.addEventListener('pause', () => { syncPlayIcon(); showControls(); clearTimeout(controlsTimer); });
    video.addEventListener('ended', () => {
        syncPlayIcon();
        clearTimeout(controlsTimer);
        $('fsReplay').classList.add('show');
    });
    video.addEventListener('timeupdate', () => {
        $('fsCur').textContent = fmt(video.currentTime);
        updateSegProgress();
    });
    video.addEventListener('loadedmetadata', () => {
        $('fsDur').textContent = fmt(video.duration);
    });

    /* ── 分段进度条 ── */
    function updateSegProgress() {
        const q = QUESTIONS[currentQ];
        const pct = video.duration ? (video.currentTime / video.duration) : 0;
        const segs = q.segments;
        for (let i = 0; i < 3; i++) {
            const start = segs[i], end = segs[i + 1];
            const segEl = document.querySelector(`.fs-seg[data-seg="${i}"]`);
            let fill = 0;
            if (pct >= end) fill = 100;
            else if (pct > start) fill = ((pct - start) / (end - start)) * 100;
            $('segFill' + i).style.width = fill + '%';
            segEl.classList.toggle('active', pct >= start && pct < end);
        }
    }

    /* ── 控制层显隐 ── */
    function showControls() {
        $('fsControls').classList.remove('hidden');
        clearTimeout(controlsTimer);
        if (!video.paused) {
            controlsTimer = setTimeout(() => $('fsControls').classList.add('hidden'), 4000);
        }
    }

    let tapTimer = null, tapCount = 0;
    $('fsTapArea').addEventListener('click', () => {
        tapCount++;
        if (tapCount === 1) {
            tapTimer = setTimeout(() => {
                $('fsControls').classList.contains('hidden') ? showControls() : $('fsControls').classList.add('hidden');
                tapCount = 0;
            }, 250);
        } else if (tapCount === 2) {
            clearTimeout(tapTimer);
            tapCount = 0;
            togglePlay();
        }
    });

    /* ══════════ 切换题目 ══════════ */
    function switchQuestion(qi) {
        currentQ = qi;
        const q = QUESTIONS[currentQ];

        $('fsTitle').textContent = '第' + q.num + '题';
        $('fsQBtnLabel').textContent = '第' + q.num + '题';
        $('fsReplay').classList.remove('show');
        $('fsNoVideo').classList.remove('show');

        if (q.hasVideo) {
            video.src = 'https://www.w3schools.com/html/mov_bbb.mp4';
            video.currentTime = 0;
            video.playbackRate = currentSpeed;
            video.play().catch(()=>{});
            syncPlayIcon();
            showControls();
        } else {
            video.pause();
            video.removeAttribute('src');
            video.load();
            $('fsNoVideo').classList.add('show');
            $('fsControls').classList.remove('hidden');
            clearTimeout(controlsTimer);
            syncPlayIcon();
            for (let i = 0; i < 3; i++) $('segFill' + i).style.width = '0';
            $('fsCur').textContent = '00:00';
            $('fsDur').textContent = '00:00';
        }
    }

    /* ══════════ 题目选择面板 ══════════ */
    function renderQGrid() {
        $('qGrid').innerHTML = QUESTIONS.map((q, i) => {
            let cls = 'fs-q-item';
            if (i === currentQ) cls += ' active';
            if (!q.hasVideo) cls += ' disabled';
            return `<div class="${cls}" data-qi="${i}">${q.num}</div>`;
        }).join('');
    }

    $('qGrid').addEventListener('click', e => {
        const item = e.target.closest('.fs-q-item');
        if (!item || item.classList.contains('disabled')) return;
        const qi = parseInt(item.dataset.qi);
        closeQPanel();
        if (qi === currentQ) return;
        switchQuestion(qi);
    });

    function openQPanel() {
        renderQGrid();
        $('qPanel').classList.add('open');
        clearTimeout(controlsTimer);
    }

    function closeQPanel(e) {
        if (e && e.target !== $('qPanel')) return;
        $('qPanel').classList.remove('open');
        showControls();
    }

    /* ══════════ 倍速面板 ══════════ */
    function openSpeedPanel() {
        $('speedOptions').innerHTML = SPEEDS.map(s =>
            `<div class="fs-speed-opt${s === currentSpeed ? ' active' : ''}" data-speed="${s}" onclick="setSpeed(${s})">${s === 1 ? '1.0x 正常' : s + 'x'}</div>`
        ).join('');
        $('speedPanel').classList.add('open');
        clearTimeout(controlsTimer);
    }

    function closeSpeedPanel(e) {
        if (e && e.target !== $('speedPanel')) return;
        $('speedPanel').classList.remove('open');
        showControls();
    }

    function setSpeed(s) {
        currentSpeed = s;
        video.playbackRate = s;
        $('fsSpeedBtn').textContent = s === 1 ? '倍速' : s + 'x';
        $('speedPanel').classList.remove('open');
        showFsToast('播放速度 ' + s + 'x');
        showControls();
    }

    /* ── toast ── */
    let toastT = null;
    function showFsToast(msg) {
        $('fsToast').textContent = msg;
        $('fsToast').classList.add('show');
        clearTimeout(toastT);
        toastT = setTimeout(() => $('fsToast').classList.remove('show'), 1200);
    }

    /* ── 导航 ── */
    function goBack() {
        video.pause();
        history.back();
    }

    function replayVideo() {
        $('fsReplay').classList.remove('show');
        video.currentTime = 0;
        video.play().catch(()=>{});
    }

    /* ══════════ 初始化 ══════════ */
    const q = QUESTIONS[currentQ];
    $('fsTitle').textContent = '第' + q.num + '题';
    $('fsQBtnLabel').textContent = '第' + q.num + '题';
    syncPlayIcon();
    showControls();

    if (q.hasVideo) {
        video.play().catch(()=>{});
    }
    </script>
</body>
</html>
