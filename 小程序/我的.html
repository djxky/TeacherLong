<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/app-shell.css">
    <style>
        .mesh-bg {
            position: absolute; top: -10%; left: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.3) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-2 {
            position: absolute; top: 15%; right: -30%; width: 90%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(236,72,153,0.22) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-3 {
            position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.22) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-4 {
            position: absolute; top: 40%; left: 10%; width: 70%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(56,189,248,0.18) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-5 {
            position: absolute; bottom: 10%; right: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(245,158,11,0.15) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }

        .top-nav {
            height: 44px; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .top-nav-tabs { display: flex; gap: 20px; align-items: baseline; }
        .top-nav-tab {
            font-size: 1.125rem; font-weight: 400; color: #a1a1aa;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 0; background: none; border: none;
            font-family: inherit; position: relative; text-decoration: none;
        }
        .top-nav-tab.active { font-size: 1.25rem; font-weight: 700; color: #18181b; }

        .glass-card {
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.7);
            border: none; background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
        }

        .me-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .me-scroll::-webkit-scrollbar { display: none; }

        .me-header { padding: 20px 20px 20px; }
        .me-username {
            font-size: 1.75rem; font-weight: 700; color: #0f172a;
            margin: 0; letter-spacing: -0.02em; line-height: 1.2;
        }

        .me-section { margin: 0 20px 16px; }
        .me-section-title {
            font-size: 0.6875rem; font-weight: 600; color: #94a3b8;
            letter-spacing: 0.05em; padding: 0 4px 8px;
        }
        .me-info-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; font-size: 0.875rem;
        }
        .me-info-row + .me-info-row { border-top: 1px solid rgba(0,0,0,0.04); }
        .me-info-row .info-icon {
            width: 18px; height: 18px; color: #94a3b8; flex-shrink: 0; margin-right: 10px;
        }
        .me-info-row .info-left {
            display: flex; align-items: center; color: #64748b; font-weight: 500;
        }
        .me-info-row .info-right { color: #0f172a; font-weight: 500; }

        .me-action-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; font-size: 0.9375rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: background 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .me-action-row:active { background: rgba(15,23,42,0.03); }
        .me-action-row + .me-action-row { border-top: 1px solid rgba(0,0,0,0.04); }
        .me-action-row .act-left {
            display: flex; align-items: center; gap: 12px; color: #334155; font-weight: 500;
        }
        .me-action-row .act-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .me-action-row .act-icon svg { width: 18px; height: 18px; }
        .act-icon-switch { background: rgba(99,102,241,0.08); color: #6366f1; }
        .act-icon-settings { background: rgba(100,116,139,0.08); color: #64748b; }
        .me-action-row .act-arrow { color: #cbd5e1; }

        /* ── 设置页 ── */
        .settings-panel {
            position: absolute; inset: 0; z-index: 200;
            background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #e8edf4 100%);
            display: none; flex-direction: column;
            overflow: hidden;
        }
        .settings-panel.open { display: flex; }

        .settings-top-bar {
            height: 44px; padding: 0 16px; display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .settings-back {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #52525b; cursor: pointer; background: none; border: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .settings-back:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }
        .settings-title { font-size: 1.125rem; font-weight: 600; color: #18181b; }

        .settings-scroll {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            display: flex; flex-direction: column;
        }
        .settings-scroll::-webkit-scrollbar { display: none; }

        .settings-brand {
            display: flex; flex-direction: column; align-items: center;
            padding: 32px 20px 24px; gap: 4px;
        }
        .settings-mascot {
            width: 80px; height: 80px; border-radius: 24px; overflow: hidden;
            background: rgba(255,255,255,0.7);
            box-shadow: 0 8px 24px -6px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .settings-mascot img { width: 100%; height: 100%; object-fit: cover; }
        .settings-app-name { font-size: 1.125rem; font-weight: 700; color: #0f172a; margin: 12px 0 0; }
        .settings-version { font-size: 0.6875rem; color: #94a3b8; font-weight: 500; }

        .settings-section { margin: 0 20px 16px; }
        .settings-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; font-size: 0.9375rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: background 0.2s;
        }
        .settings-row:active { background: rgba(15,23,42,0.03); }
        .settings-row .sr-left {
            display: flex; align-items: center; gap: 12px; font-weight: 500;
        }
        .settings-row .sr-left svg { width: 18px; height: 18px; color: #94a3b8; }
        .settings-row .sr-arrow { color: #cbd5e1; }
        .settings-row.logout .sr-left { color: #e11d48; }
        .settings-row.logout .sr-left svg { color: #e11d48; }

        .settings-protocols {
            margin-top: auto; padding: 16px 20px 32px; text-align: center;
            font-size: 0.6875rem; color: #a1a1aa; line-height: 1.8;
        }
        .settings-protocols a { color: #a1a1aa; text-decoration: none; }

        /* 退出确认弹窗 */
        .modal-overlay {
            position: absolute; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.25); display: none;
            align-items: center; justify-content: center; padding: 32px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: rgba(255,255,255,0.95); border-radius: 24px; padding: 28px 24px 20px;
            width: 100%; max-width: 300px; text-align: center;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,0.8);
            backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border: none;
        }
        .modal-box h3 { font-size: 1.0625rem; font-weight: 700; color: #0f172a; margin: 0; }
        .modal-box p { font-size: 0.8125rem; color: #64748b; margin: 10px 0 0; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions button {
            flex: 1; padding: 13px; border-radius: 14px; font-size: 0.9375rem;
            font-weight: 600; cursor: pointer; border: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-actions button:active { transform: scale(0.96); }
        .btn-cancel { color: #475569; background: rgba(0,0,0,0.04); }
        .btn-confirm-red { color: #fff; background: #e11d48; }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── 模式切换按钮（手机框外，页面右上角） ── */
        .mode-toggle {
            position: fixed; top: 24px; right: 32px;
            z-index: 900;
            display: flex; align-items: center; gap: 0;
            background: #ffffff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden; font-size: 0.8125rem; font-weight: 600;
        }
        .mode-toggle button {
            padding: 10px 24px; border: none; background: transparent;
            color: #94a3b8; cursor: pointer; font-family: inherit;
            font-size: 0.8125rem; font-weight: 600; transition: all 0.2s;
        }
        .mode-toggle button.active {
            background: #4f46e5; color: #ffffff;
        }

        /* ── 侧边栏浮窗（手机框右侧） ── */
        .sb-panel {
            position: fixed; top: 50%; right: 32px; width: 380px;
            max-height: 80vh; transform: translateY(-50%) translateX(20px);
            background: #ffffff; border-radius: 20px;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
            z-index: 800; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            overflow: hidden;
        }
        .sb-panel.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }

        .sb-drag-bar {
            padding: 12px 16px 8px; cursor: move; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .sb-drag-title {
            font-size: 0.8125rem; font-weight: 700; color: #0f172a;
            display: flex; align-items: center; gap: 6px;
        }
        .sb-drag-title .sb-ver {
            font-size: 0.5625rem; font-weight: 600; color: #4f46e5;
            background: rgba(99,102,241,0.08); padding: 2px 8px; border-radius: 6px;
        }
        .sb-close {
            width: 24px; height: 24px; border-radius: 8px; border: none;
            background: rgba(0,0,0,0.04); color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; transition: background 0.2s;
        }
        .sb-close:hover { background: rgba(0,0,0,0.08); }

        .sb-content {
            flex: 1; overflow-y: auto; padding: 12px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .sb-content::-webkit-scrollbar { width: 3px; }
        .sb-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

        .sb-changelog { margin-bottom: 16px; }
        .sb-changelog-toggle {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; font-weight: 600; color: #64748b;
            cursor: pointer; padding: 8px 0; user-select: none;
        }
        .sb-changelog-toggle svg { transition: transform 0.2s; }
        .sb-changelog-toggle.open svg { transform: rotate(90deg); }
        .sb-changelog-body {
            display: none; padding: 0 0 0 8px;
            border-left: 2px solid rgba(99,102,241,0.15);
            margin-left: 4px;
        }
        .sb-changelog-body.open { display: block; }
        .sb-changelog-body h3 { font-size: 0.6875rem; font-weight: 700; color: #334155; margin: 12px 0 4px; padding: 0; }
        .sb-changelog-body ul { margin: 0; padding: 0 0 0 16px; font-size: 0.6875rem; color: #475569; line-height: 1.8; }

        .sb-section { margin-bottom: 2px; }
        .sb-hd {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 8px; border-radius: 10px; cursor: pointer;
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            transition: background 0.15s; user-select: none;
        }
        .sb-hd:hover { background: rgba(0,0,0,0.02); }
        .sb-hd .sb-arrow { width: 16px; height: 16px; color: #94a3b8; flex-shrink: 0; transition: transform 0.2s; }
        .sb-section.op .sb-hd .sb-arrow { transform: rotate(90deg); }
        .sb-hd .sb-badge-new { font-size: 0.5rem; font-weight: 700; color: #059669; background: rgba(5,150,105,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-hd .sb-badge-updated { font-size: 0.5rem; font-weight: 700; color: #d97706; background: rgba(217,119,6,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-bd {
            display: none; padding: 4px 8px 12px 32px;
            font-size: 0.75rem; color: #475569; line-height: 1.75;
        }
        .sb-section.op .sb-bd { display: block; }
        .sb-bd h4 { font-size: 0.75rem; font-weight: 700; color: #2563eb; margin: 12px 0 4px; padding: 0; }
        .sb-bd blockquote { margin: 8px 0; padding: 8px 12px; border-radius: 8px; background: rgba(37,99,235,0.04); border-left: 3px solid rgba(37,99,235,0.3); font-size: 0.6875rem; color: #334155; }
        .sb-bd ul, .sb-bd ol { margin: 4px 0; padding-left: 16px; }
        .sb-bd li { margin: 2px 0; }
        .sb-bd table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 0.6875rem; }
        .sb-bd th, .sb-bd td { padding: 4px 8px; border: 1px solid rgba(0,0,0,0.06); text-align: left; }
        .sb-bd th { background: rgba(0,0,0,0.02); font-weight: 600; color: #334155; }
        .sb-bd .diff-add { background: rgba(5,150,105,0.06); color: #065f46; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-mod { background: rgba(217,119,6,0.06); color: #92400e; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-note { background: rgba(234,179,8,0.06); color: #854d0e; padding: 4px 8px; border-radius: 6px; display: block; margin: 6px 0; }

        [data-s].sb-glow { animation: sbGlow 2s ease-out; }
        @keyframes sbGlow {
            0% { box-shadow: 0 0 0 3px rgba(99,102,241,0.4); }
            100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
        }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="mesh-bg-4"></div>
        <div class="mesh-bg-5"></div>
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <nav class="top-nav" data-s="1">
                <div class="top-nav-tabs">
                    <a class="top-nav-tab" id="homeLink" href="首页-v3.html" data-doc="nav-home" data-prd="跳转首页" data-track="/click/teacherLongMinePage/home | 点击首页 | 无">首页</a>
                    <button class="top-nav-tab active" data-doc="nav-me" data-prd="当前页面高亮态，不可点击">我的</button>
                </div>
            </nav>

            <div class="me-scroll">
                <div class="me-header" data-s="2">
                    <h1 id="me-username" class="me-username" data-doc="me-username" data-prd="显示当前登录学生的姓名，从 localStorage 的 students 数组中读取 currentStudentIndex 对应的学生">薛云腾</h1>
                </div>

                <div class="me-section" data-s="3">
                    <div class="me-section-title">学生信息</div>
                    <div class="glass-card" data-doc="student-info-card" data-prd="展示当前学生的手机号、学校、学号、班级，纯展示不可交互。班级来源为当前学年可激活的行政班，休学/毕业/未配班级时为空">
                        <div class="me-info-row">
                            <span class="info-left">
                                <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/></svg>
                                手机号
                            </span>
                            <span id="me-phone" class="info-right">138****8888</span>
                        </div>
                        <div class="me-info-row">
                            <span class="info-left">
                                <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21"/></svg>
                                学校
                            </span>
                            <span id="me-school" class="info-right">龙岗区外国语学校</span>
                        </div>
                        <div class="me-info-row">
                            <span class="info-left">
                                <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z"/></svg>
                                学号
                            </span>
                            <span id="me-studentId" class="info-right">2024001</span>
                        </div>
                        <div class="me-info-row">
                            <span class="info-left">
                                <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342"/></svg>
                                班级
                            </span>
                            <span id="me-class" class="info-right">三年级(1)班</span>
                        </div>
                    </div>
                </div>

                <div class="me-section" data-s="4">
                    <div class="glass-card">
                        <div class="me-action-row" onclick="goSwitchStudent()" data-doc="act-switch-student" data-prd="跳转切换学生页（独立页面 切换学生.html），展示已验证的学生列表，可选中后切换" data-track="/click/teacherLongMinePage/switchStudent | 点击切换学生 | 无">

    <script>
        (function() {
            var v = sessionStorage.getItem('homeVersion');
            if (v === 'v1') { var el = document.getElementById('homeLink'); if (el) el.href = '首页.html'; }
        })();

        function getStudents() {
            try { return JSON.parse(localStorage.getItem('students')) || []; } catch(e) { return []; }
        }
        function getCurrentIndex() {
            return parseInt(localStorage.getItem('currentStudentIndex') || '0', 10);
        }
        function getCurrentStudent() {
            var list = getStudents();
            if (list.length === 0) {
                var fallback = {
                    name: sessionStorage.getItem('name') || '薛云腾',
                    phone: sessionStorage.getItem('phone') || '138****8888',
                    school: sessionStorage.getItem('school') || '龙岗区外国语学校',
                    studentId: sessionStorage.getItem('studentId') || '2024001',
                    className: sessionStorage.getItem('gradeClass') || '三年级(1)班'
                };
                list.push(fallback);
                localStorage.setItem('students', JSON.stringify(list));
                localStorage.setItem('currentStudentIndex', '0');
                return fallback;
            }
            var idx = getCurrentIndex();
            if (idx >= list.length) idx = 0;
            return list[idx];
        }

        function maskPhone(phone) {
            if (!phone) return '';
            phone = String(phone);
            if (phone.length >= 7) return phone.substring(0, 3) + '****' + phone.substring(phone.length - 4);
            return phone;
        }

        function loadMeInfo() {
            var s = getCurrentStudent();
            document.getElementById('me-username').textContent = s.name;
            document.getElementById('me-phone').textContent = maskPhone(s.phone || sessionStorage.getItem('phone') || '');
            document.getElementById('me-school').textContent = s.school || '';
            document.getElementById('me-studentId').textContent = s.studentId || '';
            document.getElementById('me-class').textContent = s.className || '';

            sessionStorage.setItem('name', s.name);
            sessionStorage.setItem('school', s.school || '');
            sessionStorage.setItem('gradeClass', s.className || '');
        }

        function goSwitchStudent() { window.location.href = '个人/切换学生.html'; }
        function openSettings() { document.getElementById('settings-panel').classList.add('open'); }
        function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }
        function openLogoutConfirm() { document.getElementById('modal-logout').classList.add('open'); }
        function closeLogoutConfirm() { document.getElementById('modal-logout').classList.remove('open'); }

        function logout() {
            sessionStorage.clear();
            localStorage.removeItem('students');
            localStorage.removeItem('currentStudentIndex');
            window.location.href = '登录/index.html';
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        loadMeInfo();

        /* ═══ 模式切换 & 侧边栏浮窗 ═══ */
        var _currentMode = 'demo';
        var _sidebarBound = false;

        function setMode(mode) {
            if (mode === _currentMode) return;
            _currentMode = mode;
            var btns = document.querySelectorAll('#modeToggle button');
            btns.forEach(function(b, i) { b.classList.toggle('active', (mode === 'demo' ? i === 0 : i === 1)); });
            var panel = document.getElementById('sbPanel');
            if (mode === 'review') {
                panel.classList.add('open');
                renderSidebar();
            } else {
                panel.classList.remove('open');
            }
        }

        document.getElementById('modeToggle').addEventListener('click', function(e) {
            e.stopPropagation();
        });

        if (new URLSearchParams(window.location.search).get('mode') === 'review') {
            setTimeout(function() { _currentMode = 'demo'; setMode('review'); }, 100);
        }

        function renderSidebar() {
            var container = document.getElementById('sidebarContent');
            var changelogSrc = document.getElementById('prd-changelog');
            var sectionsSrc = document.getElementById('prd-sections');
            if (!changelogSrc || !sectionsSrc) return;
            container.innerHTML = buildChangelog(changelogSrc.textContent) + buildSections(sectionsSrc.textContent);
            container.querySelectorAll('.sb-hd').forEach(function(hd) {
                hd.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.parentElement.classList.toggle('op');
                });
            });
            container.querySelectorAll('.sb-changelog-toggle').forEach(function(t) {
                t.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('open');
                    this.nextElementSibling.classList.toggle('open');
                });
            });
            if (!_sidebarBound) {
                bindSidebarLinkage();
                _sidebarBound = true;
            }
        }

        function buildChangelog(md) {
            var html = marked.parse(md);
            return '<div class="sb-changelog">' +
                '<div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div>' +
                '<div class="sb-changelog-body">' + html + '</div></div>';
        }

        function buildSections(md) {
            var lines = md.split('\n');
            var sections = []; var cur = null;
            lines.forEach(function(line) {
                var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
                if (m) {
                    if (cur) sections.push(cur);
                    cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] };
                } else if (cur) {
                    cur.lines.push(line);
                }
            });
            if (cur) sections.push(cur);
            return sections.map(function(s) {
                var badge = '';
                if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
                if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
                var body = marked.parse(s.lines.join('\n'));
                body = body.replace(/\[\+\]\s*/g, '<span class="diff-add">[+] </span>');
                body = body.replace(/\[~\]\s*/g, '<span class="diff-mod">[~] </span>');
                body = body.replace(/\[!\]\s*(.+?)(<br|<\/p|$)/g, '<span class="diff-note">[!] $1</span>$2');
                return '<div class="sb-section" data-sb="' + s.num + '">' +
                    '<div class="sb-hd"><svg class="sb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' +
                    s.num + '. ' + s.title + badge + '</div>' +
                    '<div class="sb-bd">' + body + '</div></div>';
            }).join('');
        }

        function bindSidebarLinkage() {
            document.querySelectorAll('[data-s]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    if (_currentMode !== 'review') return;
                    if (e.target.closest('.sb-panel') || e.target.closest('.mode-toggle')) return;
                    var sId = this.getAttribute('data-s');
                    var target = document.querySelector('[data-sb="' + sId + '"]');
                    if (target) {
                        target.parentElement.classList.add('op');
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        target.style.background = 'rgba(99,102,241,0.08)';
                        setTimeout(function() { target.style.background = ''; }, 2000);
                    }
                });
            });

            document.getElementById('sbPanel').addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }

        /* 浮窗拖拽 */
        (function() {
            var panel = document.getElementById('sbPanel');
            var bar = document.getElementById('sbDragBar');
            var isDragging = false, startX, startY, origX, origY;
            bar.addEventListener('mousedown', function(e) {
                isDragging = true;
                startX = e.clientX; startY = e.clientY;
                var r = panel.getBoundingClientRect();
                origX = r.left; origY = r.top;
                e.preventDefault();
            });
            function clampPos(x, y) {
                var pw = panel.offsetWidth, ph = panel.offsetHeight;
                var maxX = window.innerWidth - pw, maxY = window.innerHeight - 40;
                return { x: Math.max(0, Math.min(x, maxX)), y: Math.max(0, Math.min(y, maxY)) };
            }
            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                var p = clampPos(origX + e.clientX - startX, origY + e.clientY - startY);
                panel.style.position = 'fixed';
                panel.style.left = p.x + 'px';
                panel.style.top = p.y + 'px';
                panel.style.right = 'auto';
                panel.style.transform = 'none';
            });
            document.addEventListener('mouseup', function() { isDragging = false; });
            bar.addEventListener('touchstart', function(e) {
                isDragging = true;
                var t = e.touches[0];
                startX = t.clientX; startY = t.clientY;
                var r = panel.getBoundingClientRect();
                origX = r.left; origY = r.top;
            }, { passive: true });
            document.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                var t = e.touches[0];
                var p = clampPos(origX + t.clientX - startX, origY + t.clientY - startY);
                panel.style.position = 'fixed';
                panel.style.left = p.x + 'px';
                panel.style.top = p.y + 'px';
                panel.style.right = 'auto';
                panel.style.transform = 'none';
            }, { passive: true });
            document.addEventListener('touchend', function() { isDragging = false; });
        })();
    </script>

    <script type="text/markdown" id="prd-sections">
## 1. 顶部导航栏

#### 结构说明

与首页共用导航栏样式，包含两部分：

- **左侧 Tab**：「首页」和「我的」，文字形式切换。「我的」为当前高亮态（加粗加大），「首页」点击跳转 `首页.html`
- 右侧无额外图标

#### 交互逻辑

- 「首页」为 `<a>` 标签直接跳转独立页面
- 「我的」为当前页面，高亮态不可点击

## 2. 学生姓名

#### 结构说明

页面首屏最大文字区域，展示当前登录学生的姓名。

#### 数据来源

- 优先从 `localStorage.students[currentStudentIndex]` 读取
- 若 `students` 数组为空，fallback 到 `sessionStorage.name`（登录验证时写入）
- 若都为空，展示默认值「薛云腾」

> 首次登录时，登录流程会将验证通过的学生信息写入 sessionStorage。我的页面初始化时自动将 sessionStorage 中的数据同步到 localStorage.students 数组，确保后续切换学生功能可用。

## 3. 学生信息卡片 [UPDATED]

#### 结构说明

卡片展示当前学生的四项基本信息：

| 字段 | 图标 | 数据来源 | 说明 |
|------|------|----------|------|
| [+] 手机号 | 手机 | 登录手机号，脱敏展示（138\*\*\*\*8888） | 新增字段 |
| 学校 | 学校建筑 | student.school | — |
| 学号 | 身份证 | student.studentId | — |
| [~] 班级 | 学位帽 | 当前学年可激活的行政班 | 数据来源变更 |

#### 班级字段逻辑

- 数据来源：查询当前学年已激活的行政班
- 休学 → 班级显示为空
- 毕业 → 能查到显示，查不到为空
- 未配班级 → 班级显示为空
- 允许学生不配班级

#### 交互逻辑

- 纯展示，不可交互
- 数据随「切换学生」操作实时更新

## 4. 功能入口

#### 结构说明

卡片包含两个可操作入口：

| 入口 | 跳转/动作 | 说明 |
|------|-----------|------|
| 切换学生 | 跳转 `切换学生.html` | 展示已验证学生列表，支持选中切换 |
| 设置 | 打开设置覆盖层 | 应用品牌信息 + 退出登录 |

#### 切换学生流程

1. 点击「切换学生」→ 跳转 `切换学生.html`
2. 页面展示所有已验证学生卡片（姓名、学校、学号、班级）
3. 点击卡片可选中（单选）
4. 导航栏右上角「+」按钮 → 跳转 `添加学生.html`
5. 添加学生页：选择学校 → 输入姓名 → 输入学号 → 点击「验证并添加」
6. 验证成功 → 自动添加到学生列表并选中 → 返回切换学生页
7. 点击底部「确定」→ 写入 localStorage.currentStudentIndex → 更新 sessionStorage → 返回我的页面

#### 绑定规则

- [+] 每个手机号最多绑定 **10 个**学生
- [+] 一个学生可以被**多个家长**（手机号）绑定
- [+] 支持**解除绑定**：每个学生卡片有「解除绑定」入口，需二次确认

## 5. 设置页

#### 结构说明

全屏覆盖层（`position: absolute; inset: 0`），覆盖在我的页面之上：

- **导航栏**：返回按钮（← 箭头）+ 标题「设置」
- **品牌区**：龙老师 IP 形象 + 应用名「AI 龙老师」+ 版本号 v1.0.0
- **功能区**：退出登录入口
- **底部**：协议链接（《AI龙老师用户协议》《隐私政策》《儿童隐私保护政策》）

#### 退出登录逻辑

1. 点击「退出登录」→ 弹出确认弹窗
2. 弹窗内容：标题「确认退出登录？」+ 描述「退出登录不会丢失任何数据。」
3. 取消 → 关闭弹窗
4. 确认退出 → `sessionStorage.clear()` + `localStorage.removeItem('students')` + `localStorage.removeItem('currentStudentIndex')` → 跳转 `登录/index.html`

[!] 设置页当前仅包含退出登录功能。后续如需添加「隐私设置」「关于我们」等入口，在退出登录上方增加新的 settings-section 卡片即可。
