<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知识点讲解视频 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <style>
        .mesh-bg{position:absolute;top:-10%;left:-20%;width:80%;height:60%;background:radial-gradient(ellipse at center,rgba(99,102,241,0.3) 0%,transparent 65%);filter:blur(70px);pointer-events:none;z-index:0}
        .mesh-bg-2{position:absolute;top:15%;right:-30%;width:90%;height:70%;background:radial-gradient(ellipse at center,rgba(236,72,153,0.22) 0%,transparent 65%);filter:blur(70px);pointer-events:none;z-index:0}
        .mesh-bg-3{position:absolute;bottom:-10%;left:-20%;width:80%;height:70%;background:radial-gradient(ellipse at center,rgba(168,85,247,0.22) 0%,transparent 65%);filter:blur(70px);pointer-events:none;z-index:0}

        /* ── 顶栏 ── */
        .v-topbar{min-height:44px;padding:4px 4px;display:flex;align-items:center;gap:4px;flex-shrink:0;position:relative;z-index:20}
        .v-back{width:40px;height:40px;border-radius:12px;border:none;background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;color:#52525b;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
        .v-back:active{background:rgba(0,0,0,.05)}
        .v-topbar-title{position:absolute;left:0;right:0;text-align:center;font-size:1.0625rem;font-weight:700;color:#18181b;letter-spacing:-.02em;pointer-events:none}
        .v-topbar-spacer{width:var(--app-capsule-clearance,96px);height:40px;flex-shrink:0;pointer-events:none}

        /* ── 学科 Tab ── */
        .v-subj-bar{display:flex;gap:4px;padding:8px 20px 6px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
        .v-subj-bar::-webkit-scrollbar{display:none}
        .v-subj-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:.8125rem;font-weight:600;cursor:pointer;color:#94a3b8;background:transparent;transition:all .2s;border:none;-webkit-tap-highlight-color:transparent}
        .v-subj-tab:active{transform:scale(.97)}
        .v-subj-tab.active{background:rgba(255,255,255,.75);color:#0f172a;box-shadow:0 1px 6px rgba(0,0,0,.05);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

        /* ── 科目介绍卡片（含课程设置） ── */
        .v-intro{position:relative;margin:6px 20px 12px;border-radius:16px;padding:18px 18px 16px;overflow:hidden;color:#fff;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1)}
        .v-intro::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%);border-radius:16px;pointer-events:none}
        .v-intro[data-cat="new-standard"]{background:linear-gradient(145deg,#3730a3 0%,#4f46e5 35%,#6366f1 65%,#818cf8 100%)}
        .v-intro[data-cat="sync-course"]{background:linear-gradient(145deg,#065f46 0%,#059669 35%,#10b981 65%,#34d399 100%)}
        .v-intro[data-cat="special-skills"]{background:linear-gradient(145deg,#9a3412 0%,#ea580c 35%,#f97316 65%,#fb923c 100%)}
        .v-intro-content{position:relative;z-index:2}
        .v-intro h3{font-size:1rem;font-weight:800;line-height:1.3;letter-spacing:-.02em;margin-bottom:5px}
        .v-intro p{font-size:.6875rem;opacity:.82;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .v-intro-decor{position:absolute;right:-10px;bottom:-14px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06);z-index:1;pointer-events:none}
        .v-intro-decor2{position:absolute;right:42px;bottom:24px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.04);z-index:1;pointer-events:none}

        /* 卡片内课程设置条 */
        .v-intro-settings{display:none;position:relative;z-index:2;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.18)}
        .v-intro.has-settings .v-intro-settings{display:flex}
        .v-intro-settings-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;color:rgba(255,255,255,.95);font-size:.6875rem;font-weight:600}
        .v-intro-settings-btn:active{background:rgba(255,255,255,.25)}
        .v-intro-settings-btn svg{width:12px;height:12px;opacity:.7;flex-shrink:0}

        /* ── 内容滚动区 ── */
        .v-content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:4px}
        .v-content::-webkit-scrollbar{display:none}

        /* ── 章节手风琴 ── */
        .v-chapter{margin:0 20px 8px;background:rgba(255,255,255,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;border:1px solid rgba(255,255,255,.6);box-shadow:0 2px 12px rgba(0,0,0,.03);overflow:hidden}
        .v-ch-header{display:flex;align-items:center;gap:12px;padding:13px 14px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
        .v-ch-header:active{background:rgba(0,0,0,.02)}
        .v-chapter.is-open .v-ch-header{border-bottom:1px solid rgba(226,232,240,.5)}
        .v-ch-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.125rem}
        [data-active-cat="new-standard"] .v-ch-icon{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));color:#6366f1}
        [data-active-cat="sync-course"] .v-ch-icon{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(5,150,105,.08));color:#059669}
        [data-active-cat="special-skills"] .v-ch-icon{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(234,88,12,.08));color:#ea580c}
        .v-ch-body{flex:1;min-width:0}
        .v-ch-title{font-size:.8125rem;font-weight:700;color:#0f172a;line-height:1.35}
        .v-ch-meta{font-size:.625rem;color:#94a3b8;margin-top:3px}
        .v-ch-arrow{color:#cbd5e1;flex-shrink:0;transition:transform .25s ease}
        .v-chapter.is-open .v-ch-arrow{transform:rotate(90deg)}

        .v-ch-expand{display:none;padding:8px 10px 6px}
        .v-chapter.is-open .v-ch-expand{display:block}

        /* 视频条目 */
        .v-ep{margin-bottom:5px;background:rgba(255,255,255,.85);border-radius:10px;padding:10px 12px;border:1px solid rgba(226,232,240,.5);display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .v-ep:active{transform:scale(.99);background:rgba(241,245,249,.9)}
        .v-ep-num{width:22px;height:22px;border-radius:6px;background:#f1f5f9;color:#94a3b8;font-size:.625rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .v-ep-info{flex:1;min-width:0}
        .v-ep-title{font-size:.75rem;font-weight:600;color:#1e293b;line-height:1.35}
        .v-ep-dur{font-size:.5625rem;color:#94a3b8;margin-top:2px}
        .v-ep-play-icon{flex-shrink:0;color:#d4d4d8;transition:color .15s}
        .v-ep:active .v-ep-play-icon{color:#6366f1}
        [data-active-cat="sync-course"] .v-ep:active .v-ep-play-icon{color:#059669}
        [data-active-cat="special-skills"] .v-ep:active .v-ep-play-icon{color:#ea580c}

        /* ── 课程设置弹窗 ── */
        .v-modal-overlay{position:absolute;inset:0;z-index:500;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center}
        .v-modal-overlay.open{display:flex}
        .v-modal-sheet{width:100%;background:#fff;border-radius:20px 20px 0 0;max-height:70%;display:flex;flex-direction:column;box-shadow:0 -12px 48px rgba(0,0,0,.12)}
        .v-modal-handle{width:40px;height:4px;border-radius:999px;background:#e2e8f0;margin:10px auto 0}
        .v-modal-head{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between}
        .v-modal-head h3{font-size:1rem;font-weight:700;color:#0f172a}
        .v-modal-close{width:32px;height:32px;border-radius:999px;border:none;background:#f1f5f9;color:#64748b;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .v-modal-close:active{background:#e2e8f0}
        .v-modal-body{flex:1;overflow-y:auto;padding:0 20px 16px;-webkit-overflow-scrolling:touch}
        .v-modal-body::-webkit-scrollbar{display:none}
        .v-modal-label{font-size:.6875rem;font-weight:700;color:#94a3b8;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.05em}
        .v-modal-label:first-child{margin-top:6px}
        .v-modal-options{display:flex;flex-wrap:wrap;gap:8px}
        .v-modal-opt{padding:8px 16px;border-radius:10px;font-size:.8125rem;font-weight:600;color:#64748b;background:#f8fafc;border:1.5px solid #e2e8f0;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .v-modal-opt:active{transform:scale(.97)}
        .v-modal-opt.selected{background:rgba(99,102,241,.08);color:#4f46e5;border-color:rgba(99,102,241,.35)}

        .v-modal-footer{padding:12px 20px 24px;flex-shrink:0}
        .v-modal-confirm{width:100%;padding:13px 0;border:none;border-radius:14px;background:#ffd036;color:#0f172a;font-size:.9375rem;font-weight:700;cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 16px -4px rgba(255,208,54,.4)}
        .v-modal-confirm:active{transform:scale(.98);background:#f5c518}

        /* ── 空状态 ── */
        .v-empty{padding:60px 20px;text-align:center;color:#94a3b8;font-size:.8125rem;line-height:1.6}

        .mode-toggle { position: fixed; top: 24px; right: 32px; z-index: 900; display: flex; align-items: center; gap: 0; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06); overflow: hidden; font-size: 0.8125rem; font-weight: 600; }
        .mode-toggle button { padding: 10px 24px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-family: inherit; font-size: 0.8125rem; font-weight: 600; transition: all 0.2s; }
        .mode-toggle button.active { background: #4f46e5; color: #ffffff; }
        .sb-panel { position: fixed; top: 50%; right: 32px; width: 380px; max-height: 80vh; transform: translateY(-50%) translateX(20px); background: #ffffff; border-radius: 20px; box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06); z-index: 800; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; overflow: hidden; }
        .sb-panel.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
        .sb-drag-bar { padding: 12px 16px 8px; cursor: move; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .sb-drag-title { font-size: 0.8125rem; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 6px; }
        .sb-drag-title .sb-ver { font-size: 0.5625rem; font-weight: 600; color: #4f46e5; background: rgba(99,102,241,0.08); padding: 2px 8px; border-radius: 6px; }
        .sb-close { width: 24px; height: 24px; border-radius: 8px; border: none; background: rgba(0,0,0,0.04); color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; transition: background 0.2s; }
        .sb-close:hover { background: rgba(0,0,0,0.08); }
        .sb-content { flex: 1; overflow-y: auto; padding: 12px 16px 20px; -webkit-overflow-scrolling: touch; }
        .sb-content::-webkit-scrollbar { width: 3px; }
        .sb-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .sb-changelog { margin-bottom: 16px; }
        .sb-changelog-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; padding: 8px 0; user-select: none; }
        .sb-changelog-toggle svg { transition: transform 0.2s; }
        .sb-changelog-toggle.open svg { transform: rotate(90deg); }
        .sb-changelog-body { display: none; padding: 0 0 0 8px; border-left: 2px solid rgba(99,102,241,0.15); margin-left: 4px; }
        .sb-changelog-body.open { display: block; }
        .sb-changelog-body h3 { font-size: 0.6875rem; font-weight: 700; color: #334155; margin: 12px 0 4px; padding: 0; }
        .sb-changelog-body ul { margin: 0; padding: 0 0 0 16px; font-size: 0.6875rem; color: #475569; line-height: 1.8; }
        .sb-section { margin-bottom: 2px; }
        .sb-hd { display: flex; align-items: center; gap: 8px; padding: 10px 8px; border-radius: 10px; cursor: pointer; font-size: 0.8125rem; font-weight: 600; color: #0f172a; transition: background 0.15s; user-select: none; }
        .sb-hd:hover { background: rgba(0,0,0,0.02); }
        .sb-hd .sb-arrow { width: 16px; height: 16px; color: #94a3b8; flex-shrink: 0; transition: transform 0.2s; }
        .sb-section.op .sb-hd .sb-arrow { transform: rotate(90deg); }
        .sb-hd .sb-badge-new { font-size: 0.5rem; font-weight: 700; color: #059669; background: rgba(5,150,105,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-hd .sb-badge-updated { font-size: 0.5rem; font-weight: 700; color: #d97706; background: rgba(217,119,6,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-bd { display: none; padding: 4px 8px 12px 32px; font-size: 0.75rem; color: #475569; line-height: 1.75; }
        .sb-section.op .sb-bd { display: block; }
        .sb-bd h4 { font-size: 0.75rem; font-weight: 700; color: #2563eb; margin: 12px 0 4px; padding: 0; }
        .sb-bd blockquote { margin: 8px 0; padding: 8px 12px; border-radius: 8px; background: rgba(37,99,235,0.04); border-left: 3px solid rgba(37,99,235,0.3); font-size: 0.6875rem; color: #334155; }
        .sb-bd ul, .sb-bd ol { margin: 4px 0; padding-left: 16px; }
        .sb-bd li { margin: 2px 0; }
        .sb-bd .diff-add { background: rgba(5,150,105,0.06); color: #065f46; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-mod { background: rgba(217,119,6,0.06); color: #92400e; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-note { background: rgba(234,179,8,0.06); color: #854d0e; padding: 4px 8px; border-radius: 6px; display: block; margin: 6px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="iphone-frame is-column" id="app" data-active-cat="new-standard">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <!-- 顶栏 -->
            <header class="v-topbar">
                <button type="button" class="v-back" onclick="goBack()" aria-label="返回" data-doc="back-btn" data-prd="返回首页，跳转至首页.html" data-track="/click/videoListPage/back | 点击返回 | 无">
                    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="v-topbar-title" data-doc="page-title" data-prd="页面标题，根据 URL 参数 cat 动态设置（新课标重点讲/校内同步课/拓展提升课）；无参数时默认显示'知识点讲解视频'">知识点讲解视频</span>
                <div class="v-topbar-spacer" aria-hidden="true"></div>
            </header>

            <!-- 学科 Tab -->
            <div class="v-subj-bar" id="subj-bar" data-doc="subj-bar" data-s="1" data-prd="科目横向Tab栏，根据当前分类动态渲染可选科目；专项大招课(special-skills)时隐藏Tab栏；切换科目联动刷新介绍卡片、教材选择器和视频列表" data-track="/click/videoListPage/switchSubject | 切换科目 | subject#String"></div>

            <!-- 科目介绍卡片（含课程设置入口） -->
            <div class="v-intro" id="intro-card" data-cat="new-standard" data-doc="intro-card" data-s="2" data-prd="科目介绍卡片，切换科目时标题和描述文案跟随变化；校内同步课时底部展示课程设置入口（年级·教材版本·学期），点击弹出设置弹窗">
                <div class="v-intro-content">
                    <h3 id="intro-title"></h3>
                    <p id="intro-desc"></p>
                </div>
                <div class="v-intro-settings" id="intro-settings">
                    <div class="v-intro-settings-btn" onclick="openTextbookModal()">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span id="tb-settings-label"></span>
                        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </div>
                </div>
                <div class="v-intro-decor"></div>
                <div class="v-intro-decor2"></div>
            </div>

            <!-- 内容列表 -->
            <div class="v-content" id="content-area" data-doc="content-area" data-s="4" data-prd="视频章节列表区域，手风琴交互：点击章节头展开/折叠视频列表；视频条目点击跳转到横屏播放页(视频播放.html)，携带 title/dur/cat/nextTitle/nextDur 参数；初中学生(七八九年级)展示 middleData 数据源"></div>
        </div>

        <!-- 课程设置弹窗 -->
        <div class="v-modal-overlay" id="tb-modal">
            <div class="v-modal-sheet">
                <div class="v-modal-handle"></div>
                <div class="v-modal-head">
                    <h3>课程设置</h3>
                    <button class="v-modal-close" onclick="closeTextbookModal()">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="v-modal-body" id="tb-modal-body"></div>
                <div class="v-modal-footer">
                    <button class="v-modal-confirm" onclick="confirmSettings()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 模式切换（手机框外） -->
    <div class="mode-toggle" id="modeToggle">
        <button class="active" onclick="setMode('demo')">演示</button>
        <button onclick="setMode('review')">过稿</button>
    </div>

    <!-- 产品稿侧边栏浮窗（手机框外） -->
    <div class="sb-panel" id="sbPanel">
        <div class="sb-drag-bar" id="sbDragBar">
            <div class="sb-drag-title">产品稿 · 知识点讲解 <span class="sb-ver">v1.0</span></div>
            <button class="sb-close" onclick="setMode('demo')">✕</button>
        </div>
        <div class="sb-content" id="sidebarContent"></div>
    </div>

        $('app').dataset.activeCat = activeCat;
        $('intro-title').textContent = intro.title;
        $('intro-desc').textContent = intro.desc;
    }

        const cat = CATEGORIES.find(c => c.id === activeCat);

        const cat = CATEGORIES.find(c => c.id === activeCat);

            intro.classList.remove('has-settings');
            return;

        intro.classList.add('has-settings');
        const subj = activeSubject[activeCat];
        const edition = syncEdition[subj] || '人教版';

        const cat = CATEGORIES.find(c => c.id === activeCat);

        const chapters = (dataSource && dataSource[subj]) || [];

        if (!chapters.length) {
            area.innerHTML = '<div class="v-empty">该学科视频即将上线，敬请期待</div>';
            return;
        }

        const key = activeCat + '|' + subj;

        area.innerHTML = chapters.map((ch, ci) => {
            const isOpen = expandedChapter[key] === ci;

            const eps = ch.videos.map((v, vi) => `
                <div class="v-ep" data-chi="${ci}" data-vi="${vi}">

                </div>
            `).join('');

            return `
                <div class="v-chapter${isOpen ? ' is-open' : ''}" data-chi="${ci}">
                    <div class="v-ch-header" role="button" tabindex="0" aria-expanded="${isOpen}">
                        <div class="v-ch-icon">

                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="v-ch-body">
                            <p class="v-ch-title">${ch.title}</p>

                        </div>
                        <div class="v-ch-arrow">

                        </div>
                    </div>
                    <div class="v-ch-expand">
                        ${eps}
                    </div>
                </div>`;
        }).join('');

                    qs.set('nextCat', activeCat);
                }
                window.location.href = '视频播放.html?' + qs.toString();
            }
            return;
        }
    });

    /* ── 课程设置弹窗 ── */
    const SEMESTERS = ['上学期', '下学期'];

    function openTextbookModal() {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const subj = activeSubject[activeCat];
        const editions = cat.editions[subj] || ['人教版'];
        const curEdition = syncEdition[subj] || editions[0];

        tempGrade = syncGrade;
        tempEdition = curEdition;
        tempSemester = syncSemester;

        $('tb-modal-body').innerHTML = `
            <p class="v-modal-label">教材版本</p>
            <div class="v-modal-options" data-group="edition">${editions.map(e =>
                `<div class="v-modal-opt${e === tempEdition ? ' selected' : ''}" data-val="${e}">${e}</div>`
            ).join('')}</div>
            <p class="v-modal-label">年级</p>
            <div class="v-modal-options" data-group="grade">${cat.grades.map(g =>
                `<div class="v-modal-opt${g === tempGrade ? ' selected' : ''}" data-val="${g}">${g}</div>`
            ).join('')}</div>
            ${activeCat !== 'special-skills' ? `<p class="v-modal-label">学期</p>
            <div class="v-modal-options" data-group="semester">${SEMESTERS.map(s =>
                `<div class="v-modal-opt${s === tempSemester ? ' selected' : ''}" data-val="${s}">${s}</div>`
            ).join('')}</div>` : ''}`;

        $('tb-modal').classList.add('open');
    }

    function closeTextbookModal() {
        $('tb-modal').classList.remove('open');
    }

    function confirmSettings() {
        syncGrade = tempGrade;
        syncEdition[activeSubject[activeCat]] = tempEdition;
        syncSemester = tempSemester;
        closeTextbookModal();
        renderTextbookBar();
        renderContent();
    }

    $('tb-modal').addEventListener('click', e => {
        if (e.target === $('tb-modal')) { closeTextbookModal(); return; }
        const opt = e.target.closest('.v-modal-opt');
        if (!opt) return;
        const group = opt.closest('.v-modal-options');
        if (!group) return;
        const gType = group.dataset.group;
        group.querySelectorAll('.v-modal-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        if (gType === 'grade') tempGrade = opt.dataset.val;
        else if (gType === 'edition') tempEdition = opt.dataset.val;
        else if (gType === 'semester') tempSemester = opt.dataset.val;
    });

    /* ══════════ 初始化 ══════════ */
    const urlParams = new URLSearchParams(window.location.search);
    const urlCat = urlParams.get('cat');
    if (urlCat && CATEGORIES.find(c => c.id === urlCat)) {
        activeCat = urlCat;
        const catObj = CATEGORIES.find(c => c.id === urlCat);
        document.querySelector('.v-topbar-title').textContent = catObj.label;
        document.title = catObj.label + ' - AI 龙老师';
    }
    const urlSubj = urlParams.get('subj');
    if (urlSubj) {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        if (cat && cat.subjects.includes(urlSubj)) {
            activeSubject[activeCat] = urlSubj;
        }
    }
    renderAll();

    const urlTopic = urlParams.get('topic');
    if (urlTopic) {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const isMiddle = /[七八九]年级|初[一二三]/.test(STUDENT_GRADE);
        const dataSource = (isMiddle && cat.middleData) ? cat.middleData : cat.data;
        const subj = activeSubject[activeCat];
        const chapters = (dataSource && dataSource[subj]) || [];
        const idx = chapters.findIndex(ch => ch.title === urlTopic);
        if (idx >= 0) {
            expandedChapter[activeCat + '|' + subj] = idx;
            renderContent();
            const chapterEl = document.querySelector(`.v-chapter[data-chi="${idx}"]`);
            if (chapterEl) chapterEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
    </script>

    <script type="text/markdown" id="prd-changelog">
### v1.0 · 2026-04-03
- [新增] 知识点讲解视频产品稿初版
- [新增] 三种课程类别：新课标重点讲、校内同步课、拓展提升课

    <script type="text/markdown" id="prd-sections">
## 1. 页面概述

知识点讲解视频目录页，按手风琴结构展示各章节的视频列表。支持三种课程类别切换，页面标题根据 URL 参数 `cat` 动态变化。

## 2. 课程类别

#### 三种课程

| 类别 | cat 参数 | 学科 |
|------|----------|------|
| 新课标重点讲 | new-standard | 语文/数学/英语 |
| 校内同步课 | sync-course | 语文/数学/英语 |
| 拓展提升课 | special-skills | 语文/英语 |

#### 交互逻辑

- 通过 URL 参数 `cat` 决定当前展示的课程类别
- 拓展提升课不显示学科切换 Tab（直接展示专项课程列表）

## 3. 科目介绍卡片与设置

#### 结构说明

顶部展示当前课程的介绍卡片，包含课程名称、描述和设置入口（齿轮图标）

#### 设置弹窗

点击设置入口弹出设置弹窗，可切换：
1. 教材版本（人教版/北师大版/苏教版）
2. 年级（一年级至九年级）
3. 学期（上学期/下学期）

设置变更后刷新视频目录内容，设置对所有三种课程类别生效

## 4. 学科切换 Tab

#### 交互逻辑

1. 新课标重点讲和校内同步课显示学科 Tab：语文、数学、英语
2. 拓展提升课不显示学科 Tab
3. 点击切换后渲染对应学科的章节和视频目录

## 5. 手风琴章节视频目录

#### 结构说明

按章节分组的可折叠视频列表，每个章节包含标题和视频条目。

#### 交互逻辑

1. 点击章节标题展开/收起该章节的视频列表
2. 每个视频条目显示：视频标题、时长
3. 点击视频条目跳转 `视频播放.html?title={title}&dur={dur}&cat={cat}`，进入全屏横屏播放

> 视频数据为前端 mock，上线后需对接视频资源接口。

## 6. 底部「上次观看」浮条

#### 交互逻辑

若用户有上次播放记录（localStorage），页面底部显示「继续观看：{视频标题}」浮条。点击浮条直接跳转上次播放的视频。
    </script>

    <script>
    var _currentMode = 'demo';
    function setMode(mode) {
        if (mode === _currentMode) return;
        _currentMode = mode;
        var btns = document.querySelectorAll('#modeToggle button');
        btns.forEach(function(b, i) { b.classList.toggle('active', (mode === 'demo' ? i === 0 : i === 1)); });
        var panel = document.getElementById('sbPanel');
        if (mode === 'review') { panel.classList.add('open'); renderSidebar(); } else { panel.classList.remove('open'); }
    }
    document.getElementById('modeToggle').addEventListener('click', function(e) { e.stopPropagation(); });
    if (new URLSearchParams(window.location.search).get('mode') === 'review') {
        setTimeout(function() { _currentMode = 'demo'; setMode('review'); }, 100);
    }
    function renderSidebar() {
        var container = document.getElementById('sidebarContent');
        var changelogSrc = document.getElementById('prd-changelog');
        var sectionsSrc = document.getElementById('prd-sections');
        if (!changelogSrc || !sectionsSrc) return;
        container.innerHTML = buildChangelog(changelogSrc.textContent) + buildSections(sectionsSrc.textContent);
        container.querySelectorAll('.sb-hd').forEach(function(hd) {
            hd.addEventListener('click', function(e) { e.stopPropagation(); this.parentElement.classList.toggle('op'); });
        });
        container.querySelectorAll('.sb-changelog-toggle').forEach(function(t) {
            t.addEventListener('click', function(e) { e.stopPropagation(); this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); });
        });
    }
    function buildChangelog(md) {
        var html = marked.parse(md);
        return '<div class="sb-changelog"><div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div><div class="sb-changelog-body">' + html + '</div></div>';
    }
    function buildSections(md) {
        var lines = md.split('\n'); var sections = []; var cur = null;
        lines.forEach(function(line) {
            var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
            if (m) { if (cur) sections.push(cur); cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] }; }
            else if (cur) { cur.lines.push(line); }
        });
        if (cur) sections.push(cur);
        return sections.map(function(s) {
            var badge = '';
            if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
            if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
            var body = marked.parse(s.lines.join('\n'));
            body = body.replace(/\[\+\]\s*/g, '<span class="diff-add">[+] </span>');
            body = body.replace(/\[~\]\s*/g, '<span class="diff-mod">[~] </span>');
            body = body.replace(/\[!\]\s*(.+?)(<br|<\/p|$)/g, '<span class="diff-note">[!] $1</span>$2');
            return '<div class="sb-section" data-sb="' + s.num + '"><div class="sb-hd"><svg class="sb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' + s.num + '. ' + s.title + badge + '</div><div class="sb-bd">' + body + '</div></div>';
        }).join('');
    }
    (function() {
        var panel = document.getElementById('sbPanel'); var bar = document.getElementById('sbDragBar');
        var isDragging = false, startX, startY, origX, origY;
        function clampPos(x, y) { var pw = panel.offsetWidth, ph = panel.offsetHeight; return { x: Math.max(0, Math.min(x, window.innerWidth - pw)), y: Math.max(0, Math.min(y, window.innerHeight - ph)) }; }
        bar.addEventListener('mousedown', function(e) { isDragging = true; startX = e.clientX; startY = e.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; });
        document.addEventListener('mousemove', function(e) { if (!isDragging) return; var p = clampPos(origX + e.clientX - startX, origY + e.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; });
        document.addEventListener('mouseup', function() { isDragging = false; });
        bar.addEventListener('touchstart', function(e) { isDragging = true; var t = e.touches[0]; startX = t.clientX; startY = t.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; }, { passive: true });
        document.addEventListener('touchmove', function(e) { if (!isDragging) return; var t = e.touches[0]; var p = clampPos(origX + t.clientX - startX, origY + t.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; }, { passive: true });
        document.addEventListener('touchend', function() { isDragging = false; });
    })();
    </script>
