<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>对话历史 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/app-shell.css">
    <style>
        .page-wrap {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
        }

        /* ── 渐变背景 + 光斑（与首页 v3 统一） ── */
        .page-bg {
            position: absolute; inset: 0; z-index: 0;
            background: linear-gradient(170deg, #f0ecff 0%, #faf8ff 25%, #f8fafc 50%, #f1f5f9 100%);
        }
        .bg-blob-1 {
            position: absolute; top: -5%; left: -10%; width: 65%; height: 45%;
            background: radial-gradient(ellipse, rgba(139,92,246,0.12) 0%, transparent 70%);
            filter: blur(50px); pointer-events: none;
        }
        .bg-blob-2 {
            position: absolute; top: 30%; right: -15%; width: 55%; height: 40%;
            background: radial-gradient(ellipse, rgba(251,191,36,0.08) 0%, transparent 70%);
            filter: blur(50px); pointer-events: none;
        }
        .bg-blob-3 {
            position: absolute; bottom: 5%; left: -5%; width: 50%; height: 40%;
            background: radial-gradient(ellipse, rgba(96,165,250,0.07) 0%, transparent 70%);
            filter: blur(45px); pointer-events: none;
        }

        /* ── 顶栏 ── */
        .ch-header {
            padding: 56px 20px 8px;
            padding-right: var(--app-capsule-clearance, 96px);
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .ch-back {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #1e293b; background: none; border: none; cursor: pointer;
            transition: all 0.18s; -webkit-tap-highlight-color: transparent;
        }
        .ch-back:active { transform: scale(0.9); background: rgba(0,0,0,0.03); }
        .ch-title {
            font-size: 1.0625rem; font-weight: 700; color: #0f172a; flex: 1;
        }

        /* ── 列表 ── */
        .chat-list {
            flex: 1; overflow-y: auto; padding: 8px 20px 20px;
            -webkit-overflow-scrolling: touch;
            position: relative; z-index: 1;
        }
        .chat-list::-webkit-scrollbar { display: none; }

        .chat-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; margin-bottom: 8px;
            border-radius: 14px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 10px -3px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.6);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.18s cubic-bezier(0.16,1,0.3,1);
        }
        .chat-item:active { transform: scale(0.98); }

        .ci-icon {
            width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05);
            color: #8b5cf6;
        }

        .ci-body { flex: 1; min-width: 0; }
        .ci-title {
            font-size: 0.875rem; font-weight: 600; color: #0f172a;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1.4;
        }
        .ci-preview {
            font-size: 0.75rem; color: #64748b; margin-top: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1.3;
        }

        .ci-arrow {
            flex-shrink: 0; color: #d4d4d8;
        }

        /* ── 空状态 ── */
        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 40px; text-align: center;
            position: relative; z-index: 1;
        }
        .empty-icon {
            width: 64px; height: 64px; border-radius: 20px; margin-bottom: 16px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: center;
            color: #c4b5fd;
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
        }
        .empty-title { font-size: 15px; font-weight: 600; color: #64748b; margin-bottom: 4px; }
        .empty-desc { font-size: 13px; color: #94a3b8; }

        /* ── 入场动画 ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }

        /* ── 过稿面板 ── */
        .mode-toggle {
            position: fixed; top: 24px; right: 32px; z-index: 900;
            display: flex; background: #fff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .mode-toggle button {
            padding: 10px 24px; border: none; background: transparent;
            color: #94a3b8; cursor: pointer; font-family: inherit;
            font-size: 0.8125rem; font-weight: 600; transition: all 0.2s;
        }
        .mode-toggle button.active { background: #7c3aed; color: #fff; }
        .review-panel {
            position: fixed; top: 60px; right: 32px;
            width: 380px; height: 480px; min-width: 280px; min-height: 300px;
            background: #fff; z-index: 1500; border-radius: 16px;
            box-shadow: 0 12px 48px -8px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
            display: none; flex-direction: column; overflow: hidden;
            font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
        }
        .review-panel.open { display: flex; }
        .rp-header {
            padding: 12px 16px; border-bottom: 1px solid #f1f5f9;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
            background: linear-gradient(180deg, #faf8ff, #fff);
        }
        .rp-header h2 { font-size: 14px; font-weight: 700; color: #0f172a; margin: 0; }
        .rp-header span { font-size: 11px; color: #94a3b8; }
        .rp-close {
            width: 26px; height: 26px; border-radius: 8px; border: none;
            background: #f8fafc; color: #64748b; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 13px;
        }
        .rp-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 13px; color: #334155; line-height: 1.7; }
        .rp-body::-webkit-scrollbar { width: 4px; }
        .rp-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
        .rp-body h2 { font-size: 14px; font-weight: 700; color: #1e1b4b; margin: 16px 0 8px; padding: 6px 10px; background: #f5f3ff; border-radius: 6px; border-left: 3px solid #7c3aed; }
        .rp-body h3 { font-size: 13px; font-weight: 700; margin: 12px 0 4px; }
        .rp-body p { margin: 0 0 6px; }
        .rp-body ul { padding-left: 16px; margin: 0 0 8px; }
        .rp-body li { margin-bottom: 3px; }
        .rp-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
        .rp-body th { background: #f8fafc; font-weight: 600; text-align: left; padding: 6px 8px; border: 1px solid #e2e8f0; }
        .rp-body td { padding: 5px 8px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="iphone-frame is-column">
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div class="page-wrap">
            <div class="page-bg">
                <div class="bg-blob-1"></div>
                <div class="bg-blob-2"></div>
                <div class="bg-blob-3"></div>
            </div>

            <div class="ch-header" data-doc="header" data-prd="对话历史页顶栏">
                <button class="ch-back" onclick="goBack()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div class="ch-title">对话历史</div>
            </div>

            <div class="chat-list" id="chatList" data-doc="chat-list" data-prd="文字对话列表（不含搜题/批改等功能性记录），按时间倒序，点击续聊"></div>
        </div>
    </div>

    <!-- 过稿面板 -->
    <div class="review-panel" id="reviewPanel">
        <div class="rp-header" id="rpHeader">
            <div>
                <h2>📋 产品稿 · 对话历史页</h2>
                <span>AI 龙老师对话记录管理</span>
            </div>
            <button class="rp-close" onclick="setMode('demo')">✕</button>
        </div>
        <div class="rp-body">
            <h2>页面定位</h2>
            <p>仅展示用户与 AI 龙老师的<strong>文字对话</strong>历史记录，支持续聊。返回即回到首页（新对话）。</p>
            <p>注：搜题、作业批改、错因诊断、试卷擦除、错题录入等功能性记录，分别在各自的入口里查看，不在此页展示。</p>

            <h2>页面结构</h2>
            <h3>1. 顶栏</h3>
            <ul><li>返回按钮（返回首页 = 新对话）+ 标题「对话历史」</li></ul>
            <h3>2. 对话列表</h3>
            <ul>
                <li>按时间倒序排列，最近的对话在最上方</li>
                <li>每条展示：图标 + 标题 + 最近回复预览</li>
                <li>点击 → 进入对话详情页加载该会话继续聊</li>
            </ul>

            <h2>交互规则</h2>
            <table>
                <tr><th>交互</th><th>行为</th></tr>
                <tr><td>点击条目</td><td>进入对话详情页</td></tr>
                <tr><td>返回</td><td>回到首页（即新对话）</td></tr>
            </table>
        </div>
    </div>

    <div class="mode-toggle" id="modeToggle">
        <button class="active" onclick="setMode('demo')">演示</button>
        <button onclick="setMode('review')">过稿</button>
    </div>

<script>
var CHAT_HISTORY = [
    { id: 'ch01', title: '方程求解的方法', preview: '一元二次方程的求解方法主要有公式法、配方法和因式分解法三种…' },
    { id: 'ch03', title: '天空为什么是蓝色的', preview: '这是因为太阳光穿过大气层时，发生了瑞利散射现象…' },
    { id: 'ch04', title: '英语作文开头怎么写', preview: '好的开头要做到吸引读者注意，可以用提问、引用或描写场景…' },
    { id: 'ch07', title: '恐龙灭绝的原因', preview: '目前学界普遍接受的是小行星撞击假说，大约6600万年前…' },
    { id: 'ch09', title: '光合作用的原理', preview: '光合作用是绿色植物利用光能将二氧化碳和水转化为有机物…' },
    { id: 'ch11', title: '月球有多远', preview: '月球距离地球平均约38.4万公里，光从地球到月球约需1.3秒' },
    { id: 'ch13', title: '李白和杜甫谁更厉害', preview: '李白和杜甫被后人合称"李杜"，是唐诗双璧，各有千秋…' },
    { id: 'ch14', title: '为什么会下雨', preview: '下雨是水循环的一部分，水蒸气在高空遇冷凝结成小水滴…' },
    { id: 'ch15', title: '勾股定理是怎么证明的', preview: '勾股定理有数百种证明方法，最经典的是赵爽弦图证明法…' },
    { id: 'ch16', title: '介绍一下太阳系的行星', preview: '太阳系有八大行星，按距离太阳远近排列：水星、金星、地球…' },
];

function goBack() {
    if (window.history.length > 1) window.history.back();
    else window.location.href = '首页-v3.html';
}

function openChat(id) {
    sessionStorage.setItem('aiSource', 'history-resume');
    sessionStorage.setItem('aiChatId', id);
    window.location.href = '对话.html?id=' + id;
}

var CHAT_ICON = '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>';

function renderList() {
    var data = CHAT_HISTORY;

    if (data.length === 0) {
        document.getElementById('chatList').innerHTML =
            '<div class="empty-state anim">' +
                '<div class="empty-icon"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div>' +
                '<div class="empty-title">\u8fd8\u6ca1\u6709\u5bf9\u8bdd\u8bb0\u5f55</div>' +
                '<div class="empty-desc">\u8fd4\u56de\u9996\u9875\u5f00\u59cb\u7b2c\u4e00\u6b21\u5bf9\u8bdd\u5427</div>' +
            '</div>';
        return;
    }

    var html = '';
    data.forEach(function(c, idx) { html += renderItem(c, idx); });

    document.getElementById('chatList').innerHTML = html;
}

function renderItem(chat, idx) {
    var delay = Math.min(idx * 0.04, 0.5);
    var arrow = '<svg class="ci-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>';
    return '<div class="chat-item anim" style="animation-delay:' + delay + 's" onclick="openChat(\'' + chat.id + '\')">' +
        '<div class="ci-icon">' + CHAT_ICON + '</div>' +
        '<div class="ci-body">' +
            '<div class="ci-title">' + chat.title + '</div>' +
            '<div class="ci-preview">' + (chat.preview || '') + '</div>' +
        '</div>' +
        arrow +
    '</div>';
}

var _currentMode = 'demo';
function setMode(mode) {
    if (mode === _currentMode) return;
    _currentMode = mode;
    var btns = document.querySelectorAll('#modeToggle button');
    btns.forEach(function(b, i) { b.classList.toggle('active', mode === 'demo' ? i === 0 : i === 1); });
    document.getElementById('reviewPanel').classList.toggle('open', mode === 'review');
}
if (new URLSearchParams(window.location.search).get('mode') === 'review') {
    setTimeout(function() { _currentMode = 'demo'; setMode('review'); }, 100);
}

renderList();
</script>

<script src="assets/demo-mode.js"></script>
<script>
DemoMode.register({
    empty: {
        label: '暂无对话',
        panelIcon: '💬',
        render(c) {
            c.innerHTML = DemoMode.emptyState({
                icon: 'chat', title: '还没有对话记录',
                desc: '返回首页开始第一次对话吧',
                actionLabel: '开始对话'
            });
        }
    }
});
</script>
</body>
</html>
