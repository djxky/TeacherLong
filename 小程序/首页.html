<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/app-shell.css">
    <style>

        /* Mesh Gradients */
        .mesh-bg {
            position: absolute; top: -10%; left: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.3) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-2 {
            position: absolute; top: 15%; right: -30%; width: 90%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(236,72,153,0.22) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-3 {
            position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.22) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-4 {
            position: absolute; top: 40%; left: 10%; width: 70%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(56,189,248,0.18) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-5 {
            position: absolute; bottom: 10%; right: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(245,158,11,0.15) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }

        .tab-panel { display: flex !important; visibility: visible; pointer-events: auto; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

        .home-scroll {
            flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; position: relative; z-index: 1;
        }
        .home-scroll::-webkit-scrollbar { display: none; }

        /* 顶部导航 */
        .top-nav {
            height: 44px; padding: 0 20px;
            padding-right: var(--app-capsule-clearance, 96px);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; position: relative; z-index: 20;
            box-sizing: border-box;
        }
        .top-nav-tabs { display: flex; gap: 18px; align-items: baseline; }
        .top-nav-tab {
            font-size: 1rem; font-weight: 400; color: #94a3b8;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 0; background: none; border: none;
            font-family: inherit; position: relative;
        }
        .top-nav-tab.active {
            font-size: 1.125rem; font-weight: 700; color: #0f172a;
        }
        .top-nav-icon {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; cursor: pointer; transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .top-nav-icon:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }

        /* 通用玻璃拟态样式 */
        .main-card, .minor-tools, .vz-featured, .vz-mini, .zk-card, .paper-item {
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            border: none;
        }
        .minor-tools, .paper-item { background: rgba(255, 255, 255, 0.55); }
        
        .main-card, .minor-tool, .minor-tool-icon, .vz-featured, .vz-mini, .zk-card, .paper-item {
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-card:active, .minor-tool:active, .vz-featured:active, .vz-mini:active, .zk-card:active, .paper-item:active {
            transform: scale(0.97);
        }

        /* AI 龙老师问候区 */
        .hero-banner {
            margin: 8px 20px 0; padding: 14px 12px;
            position: relative;
            display: flex; align-items: center; gap: 14px;
        }
        .mascot-img {
            position: relative; z-index: 2; width: 56px; height: 56px;
            object-fit: cover; object-position: top center;
            border-radius: 50%; flex-shrink: 0;
            box-shadow: 0 4px 12px -4px rgba(15,23,42,0.08);
            border: 2px solid rgba(255,255,255,0.8);
        }
        .hero-text {
            flex: 1; min-width: 0; position: relative; z-index: 1;
        }
        .hero-text h1 {
            font-size: 1.0625rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; line-height: 1.3;
            background: linear-gradient(135deg, #312e81, #7c3aed);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-text p {
            font-size: 0.6875rem; color: #64748b; margin: 4px 0 0 0; line-height: 1.4;
            display: flex; align-items: center; gap: 4px;
        }
        .hero-text p svg { color: #a78bfa; }

        /* ── 主功能双卡 ── */
        .tools-area { margin: 20px 20px 0; }
        .main-tools {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            margin-bottom: 16px;
        }
        .main-card {
            padding: 16px 14px; border-radius: 16px;
            position: relative; overflow: hidden;
        }
        .main-card-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px; position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05);
        }
        .main-card h3 {
            font-size: 0.875rem; font-weight: 700; margin: 0; color: #0f172a;
            line-height: 1.3; position: relative; z-index: 2;
        }
        .main-card p {
            font-size: 0.6875rem; margin: 3px 0 0; color: #64748b;
            line-height: 1.3; position: relative; z-index: 2;
        }
        .mc-indigo { background: linear-gradient(135deg, rgba(238,242,255,0.7) 0%, rgba(255,255,255,0.4) 100%); }
        .mc-indigo .main-card-icon { color: #4f46e5; }
        .mc-amber { background: linear-gradient(135deg, rgba(255,251,235,0.7) 0%, rgba(255,255,255,0.4) 100%); }
        .mc-amber .main-card-icon { color: #d97706; }

        /* ── 次级工具行 ── */
        .minor-tools {
            display: grid; grid-template-columns: repeat(4, 1fr);
            border-radius: 16px; padding: 14px 6px 10px;
            row-gap: 10px;
        }
        .minor-tool {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .minor-tool-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .minor-tool-label {
            font-size: 0.625rem; font-weight: 500; color: #64748b;
            text-align: center;
        }
        .minor-tool-icon.mi-green { color: #059669; }
        .minor-tool-icon.mi-orange { color: #ea580c; }
        .minor-tool-icon.mi-purple { color: #7c3aed; }
        .minor-tool-icon.mi-rose { color: #e11d48; }
        .minor-tool-icon.mi-blue { color: #2563eb; }
        .minor-tool-icon.mi-amber { color: #d97706; }
        .minor-tool-icon.mi-teal { color: #0d9488; }

        /* ── 通用 section 样式 ── */
        .sec { padding: 0 20px; margin-top: 28px; }
        .sec-hd {
            display: flex; align-items: center; margin-bottom: 16px;
        }
        .sec-hd h2 {
            font-size: 1.0625rem; font-weight: 700; color: #0f172a;
            margin: 0; letter-spacing: -0.01em;
            display: flex; align-items: center; gap: 6px;
        }
        .sec-hd h2 svg { color: #64748b; }

        /* ── 视频课堂卡片 ── */
        .vz-featured {
            border-radius: 16px; padding: 18px 16px;
            position: relative; overflow: hidden;
            margin-bottom: 10px;
            background: linear-gradient(135deg, rgba(240,253,250,0.65) 0%, rgba(255,255,255,0.35) 100%);
        }
        .vz-featured .vf-glow {
            position: absolute; right: -30px; top: -30px; width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, transparent 70%);
            pointer-events: none; filter: blur(28px);
        }
        .vz-featured .vf-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.5625rem; font-weight: 700; padding: 3px 8px;
            border-radius: 6px; background: rgba(99,102,241,0.08); color: #6366f1;
            margin-bottom: 10px; position: relative; z-index: 1;
        }
        .vz-featured .vf-title {
            font-size: 1rem; font-weight: 700; margin: 0; color: #0f172a;
            line-height: 1.3; position: relative; z-index: 1;
        }
        .vz-featured .vf-desc {
            font-size: 0.75rem; color: #64748b;
            margin: 4px 0 0; position: relative; z-index: 1;
        }
        .vz-featured .vf-tags {
            display: flex; gap: 6px; margin-top: 12px; position: relative; z-index: 1;
        }
        .vz-featured .vf-tag {
            font-size: 0.625rem; font-weight: 600; padding: 3px 8px;
            border-radius: 6px; background: rgba(255,255,255,0.5); color: #64748b;
        }

        .vz-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .vz-mini {
            border-radius: 14px; padding: 14px 12px;
            position: relative; overflow: hidden;
        }
        .vz-mini-icon {
            width: 32px; height: 32px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.7);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .vz-mini-green { background: linear-gradient(135deg, rgba(240,253,244,0.65) 0%, rgba(255,255,255,0.35) 100%); }
        .vz-mini-green .vz-mini-icon { color: #059669; }
        .vz-mini-orange { background: linear-gradient(135deg, rgba(255,247,237,0.65) 0%, rgba(255,255,255,0.35) 100%); }
        .vz-mini-orange .vz-mini-icon { color: #d97706; }
        .vz-mini h4 {
            font-size: 0.8125rem; font-weight: 700; color: #0f172a;
            margin: 0; line-height: 1.3;
        }
        .vz-mini p {
            font-size: 0.625rem; color: #64748b;
            margin: 3px 0 0;
        }
        .vz-mini-tags {
            display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
        }
        .vm-tag {
            font-size: 0.5625rem; font-weight: 600; padding: 2px 7px; border-radius: 5px;
            background: rgba(255,255,255,0.5); color: #64748b;
        }

        /* ── 专项大招课模块 ── */
        .zk-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .zk-card {
            display: flex; align-items: center; gap: 0;
            padding: 12px 10px 12px 0; border-radius: 14px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 10px -3px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.6);
            cursor: pointer; transition: transform .18s cubic-bezier(0.16,1,0.3,1);
            -webkit-tap-highlight-color: transparent; overflow: hidden;
        }
        .zk-card:active { transform: scale(0.97); }
        .zk-card:last-child:nth-child(odd) { grid-column: 1 / -1; }
        .zk-bar {
            width: 3px; align-self: stretch; border-radius: 0 3px 3px 0; flex-shrink: 0; margin-right: 10px;
        }
        .zk-bar-cn { background: linear-gradient(180deg, #f59e0b, #ef4444); }
        .zk-bar-en { background: linear-gradient(180deg, #3b82f6, #6366f1); }
        .zk-body { flex: 1; min-width: 0; }
        .zk-title { font-size: 0.75rem; font-weight: 700; color: #0f172a; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .zk-desc { font-size: 0.5625rem; color: #64748b; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .zk-arrow { flex-shrink: 0; color: #d4d4d8; margin-left: 4px; }

        /* ── 精品试卷区 ── */
        .paper-tabs {
            display: flex; gap: 4px; margin-bottom: 12px;
        }
        .paper-tab {
            padding: 5px 14px; font-size: 0.75rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: none;
            cursor: pointer; border-radius: 10px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .paper-tab.active {
            color: #0f172a;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05);
        }
        .paper-filters {
            display: flex; gap: 6px; margin-bottom: 12px;
            overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap;
        }
        .paper-filters::-webkit-scrollbar { display: none; }
        .paper-filter {
            flex-shrink: 0; padding: 4px 10px; font-size: 0.625rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: 1px solid rgba(226,232,240,0.5);
            border-radius: 16px; cursor: pointer; transition: all .18s;
            -webkit-tap-highlight-color: transparent;
        }
        .paper-filter.active {
            color: #6366f1; background: rgba(99,102,241,0.06);
            border-color: rgba(99,102,241,0.25);
        }
        .grade-picker {
            position: relative; flex-shrink: 0;
        }
        .grade-btn {
            display: flex; align-items: center; gap: 3px;
            padding: 4px 10px; font-size: 0.625rem; font-weight: 600;
            color: #6366f1; background: rgba(99,102,241,0.06);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 16px; cursor: pointer;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            transition: all .18s;
        }
        .grade-btn svg { transition: transform .2s; }
        .grade-btn.open svg { transform: rotate(180deg); }
        .grade-popup {
            position: absolute; top: calc(100% + 6px); left: 0;
            width: 200px; padding: 8px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: 14px;
            box-shadow: 0 8px 32px -4px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.6);
            z-index: 100;
            opacity: 0; pointer-events: none;
            transform: translateY(-4px);
            transition: all .18s cubic-bezier(0.16,1,0.3,1);
        }
        .grade-popup.open {
            opacity: 1; pointer-events: auto;
            transform: translateY(0);
        }
        .semester-toggle {
            display: flex; gap: 4px; margin-bottom: 8px;
            background: rgba(0,0,0,0.03); border-radius: 8px; padding: 3px;
        }
        .semester-btn {
            flex: 1; padding: 5px 0; font-size: 0.625rem; font-weight: 600;
            color: #94a3b8; background: transparent; border: none; border-radius: 6px;
            cursor: pointer; font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            transition: all .15s;
        }
        .semester-btn.active {
            color: #0f172a; background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .grade-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
        }
        .grade-option {
            padding: 7px 0; text-align: center;
            font-size: 0.6875rem; font-weight: 500; color: #475569;
            border: none; background: transparent; border-radius: 8px;
            cursor: pointer; font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            transition: background .12s;
        }
        .grade-option:active { background: rgba(99,102,241,0.08); }
        .grade-option.active {
            color: #6366f1; font-weight: 700;
            background: rgba(99,102,241,0.06);
        }

        .paper-recommend {
            display: inline; font-size: 0.5625rem; font-weight: 700; padding: 1px 6px;
            border-radius: 3px; letter-spacing: .02em; margin-right: 4px;
            vertical-align: middle;
        }
        .pr-recommend { background: rgba(239,68,68,0.08); color: #ef4444; }
        .pr-pick { background: rgba(99,102,241,0.08); color: #6366f1; }
        .paper-list { display: flex; flex-direction: column; gap: 10px; }
        .paper-item {
            position: relative; display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: 14px;
        }
        .paper-icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .pi-chinese { background: linear-gradient(135deg, rgba(238,242,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #6366f1; }
        .pi-math { background: linear-gradient(135deg, rgba(255,251,235,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #d97706; }
        .pi-eng { background: linear-gradient(135deg, rgba(236,253,245,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #059669; }
        .pi-sci { background: linear-gradient(135deg, rgba(236,254,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #0891b2; }
        .paper-info { flex: 1; min-width: 0; }
        .paper-title {
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            margin: 0; line-height: 1.4;
            max-height: 2.8em; overflow: hidden;
        }
        .paper-row {
            display: flex; align-items: center; gap: 8px; margin-top: 6px;
        }
        .paper-dl {
            font-size: 0.625rem; color: #64748b;
            display: flex; align-items: center; gap: 3px;
        }
        .paper-arrow { color: #d4d4d8; flex-shrink: 0; }

        /* ── 模式切换按钮（手机框外，页面右上角） ── */
        .mode-toggle {
            position: fixed; top: 24px; right: 32px;
            z-index: 900;
            display: flex; align-items: center; gap: 0;
            background: #ffffff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden; font-size: 0.8125rem; font-weight: 600;
        }
        .mode-toggle button {
            padding: 10px 24px; border: none; background: transparent;
            color: #94a3b8; cursor: pointer; font-family: inherit;
            font-size: 0.8125rem; font-weight: 600; transition: all 0.2s;
        }
        .mode-toggle button.active {
            background: #4f46e5; color: #ffffff;
        }

        /* ── 侧边栏浮窗（手机框右侧） ── */
        .sb-panel {
            position: fixed; top: 50%; right: 32px; width: 380px;
            max-height: 80vh; transform: translateY(-50%) translateX(20px);
            background: #ffffff; border-radius: 20px;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
            z-index: 800; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            overflow: hidden;
        }
        .sb-panel.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }

        .sb-drag-bar {
            padding: 12px 16px 8px; cursor: move; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .sb-drag-title {
            font-size: 0.8125rem; font-weight: 700; color: #0f172a;
            display: flex; align-items: center; gap: 6px;
        }
        .sb-drag-title .sb-ver {
            font-size: 0.5625rem; font-weight: 600; color: #4f46e5;
            background: rgba(99,102,241,0.08); padding: 2px 8px; border-radius: 6px;
        }
        .sb-close {
            width: 24px; height: 24px; border-radius: 8px; border: none;
            background: rgba(0,0,0,0.04); color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; transition: background 0.2s;
        }
        .sb-close:hover { background: rgba(0,0,0,0.08); }

        .sb-content {
            flex: 1; overflow-y: auto; padding: 12px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .sb-content::-webkit-scrollbar { width: 3px; }
        .sb-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

        /* 产品稿 changelog */
        .sb-changelog { margin-bottom: 16px; }
        .sb-changelog-toggle {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; font-weight: 600; color: #64748b;
            cursor: pointer; padding: 8px 0; user-select: none;
        }
        .sb-changelog-toggle svg { transition: transform 0.2s; }
        .sb-changelog-toggle.open svg { transform: rotate(90deg); }
        .sb-changelog-body {
            display: none; padding: 0 0 0 8px;
            border-left: 2px solid rgba(99,102,241,0.15);
            margin-left: 4px;
        }
        .sb-changelog-body.open { display: block; }
        .sb-changelog-body h3 {
            font-size: 0.6875rem; font-weight: 700; color: #334155;
            margin: 12px 0 4px; padding: 0;
        }
        .sb-changelog-body ul {
            margin: 0; padding: 0 0 0 16px;
            font-size: 0.6875rem; color: #475569; line-height: 1.8;
        }

        function renderSidebar() {
            var container = document.getElementById('sidebarContent');
            var changelogSrc = document.getElementById('prd-changelog');
            var sectionsSrc = document.getElementById('prd-sections');
            if (!changelogSrc || !sectionsSrc) return;
            container.innerHTML = buildChangelog(changelogSrc.textContent) + buildSections(sectionsSrc.textContent);
            container.querySelectorAll('.sb-hd').forEach(function(hd) {
                hd.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.parentElement.classList.toggle('op');
                });
            });
            container.querySelectorAll('.sb-changelog-toggle').forEach(function(t) {
                t.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('open');
                    this.nextElementSibling.classList.toggle('open');
                });
            });
            if (!_sidebarBound) {
                bindSidebarLinkage();
                _sidebarBound = true;
            }
        }

        function buildChangelog(md) {
            var html = marked.parse(md);
            return '<div class="sb-changelog">' +
                '<div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div>' +
                '<div class="sb-changelog-body">' + html + '</div></div>';
        }

        function buildSections(md) {
            var lines = md.split('\n');
            var sections = []; var cur = null;
            lines.forEach(function(line) {
                var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
                if (m) {
                    if (cur) sections.push(cur);
                    cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] };
                } else if (cur) {
                    cur.lines.push(line);
                }
            });
            if (cur) sections.push(cur);
            return sections.map(function(s) {
                var badge = '';
                if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
                if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
                var body = marked.parse(s.lines.join('\n'));
                body = body.replace(/\[\+\]\s*/g, '<span class="diff-add">[+] </span>');
                body = body.replace(/\[~\]\s*/g, '<span class="diff-mod">[~] </span>');
                body = body.replace(/\[!\]\s*(.+?)(<br|<\/p|$)/g, '<span class="diff-note">[!] $1</span>$2');
                return '<div class="sb-section" data-sb="' + s.num + '">' +
                    '<div class="sb-hd"><svg class="sb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' +
                    s.num + '. ' + s.title + badge + '</div>' +
                    '<div class="sb-bd">' + body + '</div></div>';
            }).join('');
        }

        function bindSidebarLinkage() {

                    if (e.target.closest('.sb-panel') || e.target.closest('.mode-toggle')) return;
                    var sId = this.getAttribute('data-s');

                        setTimeout(function() { target.style.background = ''; }, 2000);
                    }
                });
            });

            document.getElementById('sbPanel').addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }

        /* 浮窗拖拽 */
        (function() {
            var panel = document.getElementById('sbPanel');
            var bar = document.getElementById('sbDragBar');
            var isDragging = false, startX, startY, origX, origY;
            bar.addEventListener('mousedown', function(e) {
                isDragging = true;
                startX = e.clientX; startY = e.clientY;
                var r = panel.getBoundingClientRect();
                origX = r.left; origY = r.top;
                e.preventDefault();
            });
            function clampPos(x, y) {
                var pw = panel.offsetWidth, ph = panel.offsetHeight;
                var maxX = window.innerWidth - pw, maxY = window.innerHeight - 40;
                return { x: Math.max(0, Math.min(x, maxX)), y: Math.max(0, Math.min(y, maxY)) };
            }
            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                var p = clampPos(origX + e.clientX - startX, origY + e.clientY - startY);
                panel.style.position = 'fixed';
                panel.style.transform = 'none';
                panel.style.left = p.x + 'px';
                panel.style.top = p.y + 'px';
                panel.style.right = 'auto';
            });
            document.addEventListener('mouseup', function() { isDragging = false; });
            bar.addEventListener('touchstart', function(e) {
                isDragging = true;
                var t = e.touches[0];
                startX = t.clientX; startY = t.clientY;
                var r = panel.getBoundingClientRect();
                origX = r.left; origY = r.top;
            }, { passive: true });
            document.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                var t = e.touches[0];
                var p = clampPos(origX + t.clientX - startX, origY + t.clientY - startY);
                panel.style.position = 'fixed';
                panel.style.transform = 'none';
                panel.style.left = p.x + 'px';
                panel.style.top = p.y + 'px';
                panel.style.right = 'auto';
            }, { passive: true });
            document.addEventListener('touchend', function() { isDragging = false; });
        })();

    <script type="text/markdown" id="prd-sections">
## 1. 顶部导航栏

#### 结构说明

页面顶部导航栏包含两部分：

- **左侧 Tab**：「首页」和「我的」，文字形式切换。首页为当前页面高亮态（加粗加大），我的点击后跳转独立页面 `我的.html`
- **右侧图标**：历史记录入口（时钟图标），点击跳转历史记录页面

#### 交互逻辑

- 「我的」为 `<a>` 标签直接跳转，非 Tab 面板切换（页面已拆分为独立 HTML）
- 历史记录展示作业批改和拍照答疑的历史记录列表，支持按类型筛选

## 2. AI 龙老师问候区

#### 结构说明

品牌 IP 问候区，不可交互，纯展示用途：

- **左侧**：AI 龙老师 IP 形象图
- **右侧**：问候文案
  - 标题：「Hi，我是AI 龙老师」
  - 副标题：闪电图标 + 「学习有疑问，尽管找我」

#### 说明

- IP 图片使用 `assets/logo.png`，后续替换为正式 IP 形象资源
- 文案固定，不随用户信息变化

> 这是品牌展示区，不承载功能逻辑。

## 3. 主功能双卡

#### 结构说明

双列等宽卡片，是首页最核心的两个功能入口：

| 卡片 | 名称 | 描述 | 跳转 |
|------|------|------|------|
| 左 | 作业批改 | 拍照即出批改结果 | `作业/作业批改.html?mode=correction` |
| 右 | 拍照解题 | AI 逐步解析答疑 | `作业/作业批改.html?mode=qa` |

#### 交互逻辑

- 两个入口共用同一拍照页面 `作业/作业批改.html`，通过 URL 参数 `mode` 区分功能模式
- 作业批改（mode=correction）：拍照后识别题目并返回批改结果，标记对错
- 拍照解题（mode=qa）：拍照后 AI 逐步解析答题过程，进入苏氏问答交互页
- 点击时同步写入 `sessionStorage.cameraMode`，拍照页读取决定识别逻辑

## 4. 次级工具栏

#### 结构说明

4 列网格布局（grid），两行共 8 个工具入口。每个工具包含圆角图标 + 底部文字标签。

| 序号 | 名称 | 跳转目标 | 状态 | 说明 |
|------|------|----------|------|------|
| 1 | 错题本 | `错题本/错题本.html` | 已上线 | 查看按学科分类的错题列表 |
| 2 | 上传错题 | `作业/作业批改.html?mode=wrong` | 已上线 | 拍照上传错题到错题本 |
| 3 | 错因分析 | `作业/作业批改.html?mode=wrong` | 已上线 | 拍照识别错题后 AI 分析错因，复用上传错题拍照入口 |
| 4 | 试卷擦除 | `试卷/试卷擦除.html` | 已上线 | 拍照后自动擦除试卷上的手写笔迹 |
| 5 | 试卷下载 | `试卷/试卷下载.html` | 已上线 | 按学科和类型筛选下载试卷 |
| 6 | 试卷讲解 | `试卷讲解/试卷讲解.html` | 已上线 | 按科目/版本/年级筛选试卷，点击进入视频逐题讲解 |

| 8 | 中考真题 | `试卷/试卷列表.html?type=middle` | 已上线 | 历年中考真题资源专区 |

#### 交互逻辑

- **错因分析**：入口交互与上传错题共用拍照页（mode=wrong），但结果页增加错因分析模块，展示 AI 对错误原因的诊断

#### 交互逻辑

- 所有卡片点击后跳转 `视频/知识点讲解.html?cat={category}`，进入手风琴展开式的视频目录页

> 校内同步课默认匹配用户已选年级对应的教材版本，避免每次让用户重新选择。

## 6. 精品试卷

#### 结构说明

精品试卷以列表形式展示，支持按学科筛选：

- **顶部 Tab**：语文 | 数学 | 英语 | 科学
- **列表项结构**：每行包含学科图标 + 试卷标题 + 类型标签 + 下载量 + 右箭头

#### 试卷类型

| 类型 | 说明 |
|------|------|
| 期中 | 期中考试试卷 |
| 期末 | 期末考试试卷 |
| 单元测试 | 单元检测试卷 |
| 模拟题 | 模拟考试试卷 |

#### 数据结构

试卷数据由 JS 对象 `PAPER_DATA` 定义，按学科分组：
- `title`：试卷名称
- `type`：试卷类型（期中/期末/单元测试/模拟题）
- `typeCls`：类型标签样式类名
- `downloads`：下载量展示文案

#### 交互逻辑

- Tab 切换渲染对应学科的试卷列表
- 每个试卷项点击后跳转 `试卷/试卷详情.html?id={id}&title={title}`，展示试卷预览和下载入口
- 底部「查看全部」按钮跳转 `试卷/试卷下载.html`

[!] 精品试卷当前为静态 mock 数据，上线后需对接后端试卷资源接口，支持分页加载和搜索。
