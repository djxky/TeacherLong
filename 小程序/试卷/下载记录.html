<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 下载记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #e8edf4 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
            display: flex; flex-direction: column;
        }

        .mesh-bg {
            position: absolute; top: -10%; left: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.3) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-2 {
            position: absolute; top: 15%; right: -30%; width: 90%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(236,72,153,0.22) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-3 {
            position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.22) 0%, transparent 65%);
            filter: blur(70px); pointer-events: none; z-index: 0;
        }

        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }
        .wx-capsule {
            position: absolute; top: 56px; right: 10px; z-index: 999;
            display: flex; align-items: center; height: 32px; border-radius: 16px;
            background: rgba(0,0,0,0.06);
            border: 0.5px solid rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .wx-capsule-btn {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 32px;
            border: none; background: none; cursor: pointer; color: #3c3c3c; padding: 0;
        }
        .wx-capsule-btn:active { background: rgba(0,0,0,0.05); }
        .wx-capsule-divider { width: 0.5px; height: 18px; background: rgba(0,0,0,0.12); }

        .topbar {
            display: flex; align-items: center; padding: 60px 16px 12px; flex-shrink: 0;
            position: relative; z-index: 20;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.7); cursor: pointer;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06);
            -webkit-tap-highlight-color: transparent;
            transition: transform .18s cubic-bezier(0.16,1,0.3,1);
        }
        .back-btn:active { transform: scale(0.92); background: rgba(0,0,0,0.05); }
        .topbar-title {
            position: absolute; left: 0; right: 0; text-align: center;
            font-size: 1.0625rem; font-weight: 700;
            color: #0f172a; letter-spacing: -0.02em;
            pointer-events: none;
        }
        .topbar-spacer { width: 40px; height: 40px; flex-shrink: 0; }

        .scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            position: relative; z-index: 1;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .sec { padding: 0 20px; }

        .paper-tabs {
            display: flex; gap: 4px; margin-bottom: 14px;
        }
        .paper-tab {
            padding: 5px 14px; font-size: 0.75rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: none;
            cursor: pointer; border-radius: 10px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .paper-tab.active {
            color: #0f172a;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05);
        }

        .paper-recommend {
            display: inline; font-size: 0.5625rem; font-weight: 700; padding: 1px 6px;
            border-radius: 3px; letter-spacing: .02em; margin-right: 4px;
            vertical-align: middle;
        }
        .pr-recommend { background: rgba(239,68,68,0.08); color: #ef4444; }
        .pr-pick { background: rgba(99,102,241,0.08); color: #6366f1; }

        .paper-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 24px; }
        .paper-item {
            position: relative; display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: 14px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            border: none; background: rgba(255, 255, 255, 0.55);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .paper-item:active { transform: scale(0.97); }
        .paper-icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .pi-chinese { background: linear-gradient(135deg, rgba(238,242,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #6366f1; }
        .pi-math { background: linear-gradient(135deg, rgba(255,251,235,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #d97706; }
        .pi-eng { background: linear-gradient(135deg, rgba(236,253,245,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #059669; }
        .pi-sci { background: linear-gradient(135deg, rgba(236,254,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #0891b2; }
        .paper-info { flex: 1; min-width: 0; }
        .paper-title {
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            margin: 0; line-height: 1.4;
            max-height: 2.8em; overflow: hidden;
        }
        .paper-row {
            display: flex; align-items: center; gap: 8px; margin-top: 6px;
        }
        .paper-meta {
            font-size: 0.625rem; color: #94a3b8;
            display: flex; align-items: center; gap: 3px;
        }
        .paper-arrow { color: #d4d4d8; flex-shrink: 0; }

        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 20px; color: #a1a1aa;
        }
        .empty-state svg { color: #d4d4d8; margin-bottom: 12px; }
        .empty-state p { font-size: 0.8125rem; font-weight: 500; }
        .empty-state span { font-size: 0.6875rem; margin-top: 4px; color: #c4c4cc; }

        .mode-toggle { position: fixed; top: 24px; right: 32px; z-index: 900; display: flex; align-items: center; gap: 0; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06); overflow: hidden; font-size: 0.8125rem; font-weight: 600; }
        .mode-toggle button { padding: 10px 24px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-family: inherit; font-size: 0.8125rem; font-weight: 600; transition: all 0.2s; }
        .mode-toggle button.active { background: #4f46e5; color: #ffffff; }
        .sb-panel { position: fixed; top: 50%; right: 32px; width: 380px; max-height: 80vh; transform: translateY(-50%) translateX(20px); background: #ffffff; border-radius: 20px; box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06); z-index: 800; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; overflow: hidden; }
        .sb-panel.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
        .sb-drag-bar { padding: 12px 16px 8px; cursor: move; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .sb-drag-title { font-size: 0.8125rem; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 6px; }
        .sb-drag-title .sb-ver { font-size: 0.5625rem; font-weight: 600; color: #4f46e5; background: rgba(99,102,241,0.08); padding: 2px 8px; border-radius: 6px; }
        .sb-close { width: 24px; height: 24px; border-radius: 8px; border: none; background: rgba(0,0,0,0.04); color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; transition: background 0.2s; }
        .sb-close:hover { background: rgba(0,0,0,0.08); }
        .sb-content { flex: 1; overflow-y: auto; padding: 12px 16px 20px; -webkit-overflow-scrolling: touch; }
        .sb-content::-webkit-scrollbar { width: 3px; }
        .sb-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .sb-changelog { margin-bottom: 16px; }
        .sb-changelog-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; padding: 8px 0; user-select: none; }
        .sb-changelog-toggle svg { transition: transform 0.2s; }
        .sb-changelog-toggle.open svg { transform: rotate(90deg); }
        .sb-changelog-body { display: none; padding: 0 0 0 8px; border-left: 2px solid rgba(99,102,241,0.15); margin-left: 4px; }
        .sb-changelog-body.open { display: block; }
        .sb-changelog-body h3 { font-size: 0.6875rem; font-weight: 700; color: #334155; margin: 12px 0 4px; padding: 0; }
        .sb-changelog-body ul { margin: 0; padding: 0 0 0 16px; font-size: 0.6875rem; color: #475569; line-height: 1.8; }
        .sb-section { margin-bottom: 2px; }
        .sb-hd { display: flex; align-items: center; gap: 8px; padding: 10px 8px; border-radius: 10px; cursor: pointer; font-size: 0.8125rem; font-weight: 600; color: #0f172a; transition: background 0.15s; user-select: none; }
        .sb-hd:hover { background: rgba(0,0,0,0.02); }
        .sb-hd .sb-arrow { width: 16px; height: 16px; color: #94a3b8; flex-shrink: 0; transition: transform 0.2s; }
        .sb-section.op .sb-hd .sb-arrow { transform: rotate(90deg); }
        .sb-hd .sb-badge-new { font-size: 0.5rem; font-weight: 700; color: #059669; background: rgba(5,150,105,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-hd .sb-badge-updated { font-size: 0.5rem; font-weight: 700; color: #d97706; background: rgba(217,119,6,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-bd { display: none; padding: 4px 8px 12px 32px; font-size: 0.75rem; color: #475569; line-height: 1.75; }
        .sb-section.op .sb-bd { display: block; }
        .sb-bd h4 { font-size: 0.75rem; font-weight: 700; color: #2563eb; margin: 12px 0 4px; padding: 0; }
        .sb-bd blockquote { margin: 8px 0; padding: 8px 12px; border-radius: 8px; background: rgba(37,99,235,0.04); border-left: 3px solid rgba(37,99,235,0.3); font-size: 0.6875rem; color: #334155; }
        .sb-bd ul, .sb-bd ol { margin: 4px 0; padding-left: 16px; }
        .sb-bd li { margin: 2px 0; }
        .sb-bd .diff-add { background: rgba(5,150,105,0.06); color: #065f46; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-mod { background: rgba(217,119,6,0.06); color: #92400e; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-note { background: rgba(234,179,8,0.06); color: #854d0e; padding: 4px 8px; border-radius: 6px; display: block; margin: 6px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div class="iphone-frame" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>

        <div class="topbar">
            <button class="back-btn" onclick="history.back()" aria-label="返回">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <span class="topbar-title">下载记录</span>
            <div class="topbar-spacer"></div>
        </div>

        <div class="scroll-area">
            <section class="sec" style="margin-top:4px;">
                <div class="paper-tabs" id="paperTabs">
                    <button class="paper-tab active" data-subj="chinese">语文</button>
                    <button class="paper-tab" data-subj="math">数学</button>
                    <button class="paper-tab" data-subj="english">英语</button>
                    <button class="paper-tab" data-subj="science">科学</button>
                </div>
                <div class="paper-list" id="paperList"></div>
            </section>
        </div>
    </div>

    <script>
        const DOWNLOAD_HISTORY = [
            { id: 'cn02', title: '2025-2026学年人教版六年级语文小升初真题卷（全国通用版）', subj: 'chinese', date: '2026-04-07', recommend: '精选' },
            { id: 'ma01', title: '2025-2026学年北师大版七年级数学上册期末综合测试卷', subj: 'math', date: '2026-04-06', recommend: '推荐' },
            { id: 'en01', title: '2025-2026学年外研版八年级英语上册阅读理解专项训练', subj: 'english', date: '2026-04-05' },
            { id: 'cn01', title: '2025年新课标全国卷语文模拟题（一）：阅读理解+写作', subj: 'chinese', date: '2026-04-04', recommend: '推荐' },
            { id: 'ma02', title: '2025-2026学年西师版（新课标版）六年级数学小升初真题精选', subj: 'math', date: '2026-04-03', recommend: '精选' },
            { id: 'sc01', title: '2025-2026学年浙教版九年级科学中考真题汇编（含实验探究）', subj: 'science', date: '2026-04-02', recommend: '精选' },
            { id: 'cn04', title: '2025-2026学年部编版八年级语文上册期末综合检测卷', subj: 'chinese', date: '2026-04-01' },
            { id: 'en03', title: '2025-2026学年人教版七年级英语下册期末综合试卷', subj: 'english', date: '2026-03-30' },
            { id: 'ma03', title: '2025-2026学年苏教版五年级数学下册期中检测卷', subj: 'math', date: '2026-03-28' },
            { id: 'cn05', title: '2025-2026学年人教版三年级语文下册第三单元测试卷', subj: 'chinese', date: '2026-03-25' },
        ];

        const SUBJ_LABEL = { chinese: '语文', math: '数学', english: '英语', science: '科学' };
        const ICON_MAP = { chinese: 'pi-chinese', math: 'pi-math', english: 'pi-eng', science: 'pi-sci' };

        let activeSubj = 'chinese';

        function renderList() {
            const list = document.getElementById('paperList');
            let items = activeSubj === 'all' ? DOWNLOAD_HISTORY : DOWNLOAD_HISTORY.filter(p => p.subj === activeSubj);

            if (!items.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                        <p>暂无下载记录</p>
                        <span>下载的试卷将会显示在这里</span>
                    </div>`;
                return;
            }

            list.innerHTML = items.map(p => {
                const icon = ICON_MAP[p.subj] || 'pi-chinese';
                const recHtml = p.recommend
                    ? `<span class="paper-recommend ${p.recommend === '推荐' ? 'pr-recommend' : 'pr-pick'}">${p.recommend}</span>`
                    : '';
                return `
                <div class="paper-item" onclick="window.location.href='试卷详情.html?id=${p.id}&title=${encodeURIComponent(p.title)}'">
                    <div class="paper-icon ${icon}">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </div>
                    <div class="paper-info">
                        <div class="paper-title">${recHtml}${p.title}</div>
                        <div class="paper-row">
                            <span class="paper-meta">
                                <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                ${p.date}
                            </span>
                        </div>
                    </div>
                    <div class="paper-arrow"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>
                </div>`;
            }).join('');
        }

        document.getElementById('paperTabs').addEventListener('click', e => {
            const tab = e.target.closest('.paper-tab');
            if (!tab) return;
            document.querySelectorAll('#paperTabs .paper-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeSubj = tab.dataset.subj;
            renderList();
        });

        renderList();
    </script>


    <div class="mode-toggle" id="modeToggle">
        <button class="active" onclick="setMode('demo')">演示</button>
        <button onclick="setMode('review')">过稿</button>
    </div>
    <div class="sb-panel" id="sbPanel">
        <div class="sb-drag-bar" id="sbDragBar">
            <span class="sb-drag-title">产品稿 · 下载记录 <span class="sb-ver">v1.0</span></span>
            <button class="sb-close" onclick="setMode('demo')">✕</button>
        </div>
        <div class="sb-content" id="sidebarContent"></div>
    </div>

    <script>
var _currentMode = 'demo';
function setMode(mode) {
    if (mode === _currentMode) return;
    _currentMode = mode;
    var btns = document.querySelectorAll('#modeToggle button');
    btns.forEach(function(b, i) { b.classList.toggle('active', (mode === 'demo' ? i === 0 : i === 1)); });
    var panel = document.getElementById('sbPanel');
    if (mode === 'review') { panel.classList.add('open'); renderSidebar(); } else { panel.classList.remove('open'); }
}
document.getElementById('modeToggle').addEventListener('click', function(e) { e.stopPropagation(); });
if (new URLSearchParams(window.location.search).get('mode') === 'review') {
    setTimeout(function() { _currentMode = 'demo'; setMode('review'); }, 100);
}
function renderSidebar() {
    var container = document.getElementById('sidebarContent');
    var changelogSrc = document.getElementById('prd-changelog');
    var sectionsSrc = document.getElementById('prd-sections');
    if (!changelogSrc || !sectionsSrc) return;
    container.innerHTML = buildChangelog(changelogSrc.textContent) + buildSections(sectionsSrc.textContent);
    container.querySelectorAll('.sb-hd').forEach(function(hd) {
        hd.addEventListener('click', function(e) { e.stopPropagation(); this.parentElement.classList.toggle('op'); });
    });
    container.querySelectorAll('.sb-changelog-toggle').forEach(function(t) {
        t.addEventListener('click', function(e) { e.stopPropagation(); this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); });
    });
}
function buildChangelog(md) {
    var html = marked.parse(md);
    return '<div class="sb-changelog"><div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div><div class="sb-changelog-body">' + html + '</div></div>';
}
function buildSections(md) {
    var lines = md.split('\n'); var sections = []; var cur = null;
    lines.forEach(function(line) {
        var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
        if (m) { if (cur) sections.push(cur); cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] }; }
        else if (cur) { cur.lines.push(line); }
    });
    if (cur) sections.push(cur);
    return sections.map(function(s) {
        var badge = '';
        if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
        if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
        var body = marked.parse(s.lines.join('\n'));
