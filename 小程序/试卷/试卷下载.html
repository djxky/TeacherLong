        .grade-picker {
            position: relative; flex-shrink: 0;
        }
        .grade-btn {

        .grade-option:active { background: rgba(99,102,241,0.08); }
        .grade-option.active {

        .paper-recommend {

        .paper-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 72px; }

            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            border: none; background: rgba(255, 255, 255, 0.55);

        .pi-chinese { background: linear-gradient(135deg, rgba(238,242,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #6366f1; }

        .paper-dl {

        .paper-arrow { color: #d4d4d8; flex-shrink: 0; }

        /* ── ep-filter 筛选栏 ── */
        .ep-filters { display:flex; align-items:center; flex-shrink:0; border-bottom:1px solid rgba(226,232,240,.5); position:relative; z-index:110; }
        .ep-filter-btn { flex:1; min-width:0; display:flex; align-items:center; justify-content:center; gap:4px; background:none; border:none; font-size:.875rem; font-weight:500; color:#475569; cursor:pointer; padding:12px 4px; -webkit-tap-highlight-color:transparent; transition:color .15s; font-family:inherit; }

        .ep-dd-overlay { position:absolute; inset:0; z-index:100; background:rgba(0,0,0,.18); display:none; }

        .ep-rs-overlay { position:absolute; inset:0; z-index:105; background:rgba(15,23,42,.4); display:none; }

        .ep-region-sheet { position:absolute; left:0; right:0; bottom:0; z-index:112; background:#fff; border-radius:16px 16px 0 0; box-shadow:0 -8px 32px rgba(0,0,0,.12); max-height:min(60%,520px); display:flex; flex-direction:column; transform:translateY(105%); transition:transform .28s cubic-bezier(.32,.72,0,1); padding-bottom:max(12px,env(safe-area-inset-bottom)); }

        .ep-rs-handle { width:36px; height:4px; background:#e2e8f0; border-radius:99px; margin:10px auto 2px; flex-shrink:0; }

        /* ── 地区选择器状态（ep 风格，与 试卷讲解 一致） ── */
        let rsTab = 'province';
        let rsProv = null, rsCity = null, rsDist = null;
        let activeRsProv = null, activeRsCity = null, activeRsDist = null;
        let activeRegionKey = '广东'; // 默认广东省

        function buildRegionKey(p, c, d) {
            if (!p) return null;
            if (p.value === '全国卷') return '全国卷';
            let k = p.value;
            if (c) k += '-' + c.value;
            if (d) k += '-' + d.value;
            return k;
        }
        function matchRegionFn(itemRegion, filterKey) {
            if (!filterKey) return true;
            if (!itemRegion) return true;
            if (filterKey === '全国卷') return itemRegion === '全国卷';
            return itemRegion === filterKey || itemRegion.startsWith(filterKey + '-');
        }
        function getRegionLabel(p, c, d) {
            if (!p) return '全国';
            if (p.value === '全国卷') return '全国卷';
            const parts = [p.label.replace(/[省市]$/, '')];
            if (c) parts.push(c.label.replace(/[市区县]$/, ''));
            if (d) parts.push(d.label.replace(/区$/, ''));
            return parts.join('·');
        }

        function openRegionSheet() {
            rsProv = activeRsProv; rsCity = activeRsCity; rsDist = activeRsDist;
            rsTab = 'province';
            syncRsUI();
            document.getElementById('regionOverlay').classList.add('open');
            document.getElementById('regionSheet').classList.add('open');
        }
        function closeRegionSheet() {
            document.getElementById('regionOverlay').classList.remove('open');
            document.getElementById('regionSheet').classList.remove('open');
            openFilter = null;
            document.querySelectorAll('.ep-filter-btn').forEach(b => b.classList.remove('open'));
        }
        function confirmRegion() {
            activeRsProv = rsProv; activeRsCity = rsCity; activeRsDist = rsDist;
            activeRegionKey = buildRegionKey(activeRsProv, activeRsCity, activeRsDist);
            const label = getRegionLabel(activeRsProv, activeRsCity, activeRsDist);
            document.getElementById('filterRegionLabel').textContent = label;
            document.querySelector('[data-filter="region"]').classList.toggle('active', !!activeRegionKey);
            closeRegionSheet();
            renderPapers();

        function resetRegion() {
            rsProv = null; rsCity = null; rsDist = null; rsTab = 'province';
            syncRsUI();
        }
        function syncRsUI() {
            renderRsTabs(); renderRsList(); updateRsSub();

        function updateRsSub() {
            const parts = [];
            if (rsProv) parts.push(rsProv.label);
            if (rsCity) parts.push(rsCity.label);
            if (rsDist) parts.push(rsDist.label);
            document.getElementById('rsSubLine').textContent = parts.length ? parts.join(' · ') : '全部地区';
        }
        function renderRsTabs() {
            const hasCities = rsProv && rsProv.value !== '全国卷' && rsProv.cities && rsProv.cities.length > 0;
            const hasDistricts = rsCity && rsCity.districts && rsCity.districts.length > 0;
            const tabs = document.getElementById('rsTabs');
            tabs.innerHTML = [
                { key: 'province', label: '省/直辖市', enabled: true },
                { key: 'city', label: rsProv && rsProv.directCity ? '区/县' : '市', enabled: hasCities },
                { key: 'district', label: '区/县', enabled: hasDistricts },
            ].map(t =>
                `<button class="ep-rs-tab${rsTab === t.key ? ' active' : ''}${!t.enabled ? ' disabled' : ''}"
                    ${!t.enabled ? 'disabled' : `onclick="switchRsTab('${t.key}')"`}>${t.label}</button>`
            ).join('');
        }
        function switchRsTab(tab) { rsTab = tab; syncRsUI(); }
        function renderRsList() {
            const list = document.getElementById('rsList');
            let html = '';
            const chk = `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#6366f1" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
            const arr = `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>`;
            if (rsTab === 'province') {
                const provs = [{ label: '全部地区', value: null, _all: true }, ...REGION_DATA];
                html = provs.map(p => {
                    const sel = p._all ? !rsProv : (rsProv && rsProv.value === p.value);
                    const has = p.cities && p.cities.length > 0;
                    return `<div class="ep-rs-item${sel ? ' selected' : ''}" data-pv="${p.value || ''}">${p.label}${sel ? chk : (has ? arr : '')}</div>`;
                }).join('');
            } else if (rsTab === 'city') {
                const allLabel = rsProv && rsProv.directCity ? '不限（全区）' : '不限（全市）';
                const cities = [{ label: allLabel, value: null }, ...(rsProv ? rsProv.cities : [])];
                html = cities.map(c => {
                    const sel = c.value === null ? !rsCity : (rsCity && rsCity.value === c.value);
                    const has = c.districts && c.districts.length > 0;
                    return `<div class="ep-rs-item${sel ? ' selected' : ''}" data-cv="${c.value || ''}">${c.label}${sel ? chk : (has ? arr : '')}</div>`;
                }).join('');
            } else {
                const dists = [{ label: '不限（全区）', value: null }, ...(rsCity ? rsCity.districts : [])];
                html = dists.map(d => {
                    const sel = d.value === null ? !rsDist : (rsDist && rsDist.value === d.value);
                    return `<div class="ep-rs-item${sel ? ' selected' : ''}" data-dv="${d.value || ''}">${d.label}${sel ? chk : ''}</div>`;
                }).join('');

            list.innerHTML = html;

                        const pv = el.dataset.pv;
                        if (pv === '') { rsProv = null; rsCity = null; rsDist = null; }
                        else { rsProv = REGION_DATA.find(p => p.value === pv); rsCity = null; rsDist = null; if (rsProv && rsProv.cities && rsProv.cities.length) rsTab = 'city'; }
                    } else if (rsTab === 'city') {
                        const cv = el.dataset.cv;
                        if (cv === '') { rsCity = null; rsDist = null; }
                        else { rsCity = rsProv.cities.find(c => c.value === cv); rsDist = null; if (rsCity && rsCity.districts && rsCity.districts.length) rsTab = 'district'; }
                    } else {
                        const dv = el.dataset.dv;
                        rsDist = dv === '' ? null : rsCity.districts.find(d => d.value === dv);
                    }
                    syncRsUI();
                });

        /* ── 试卷渲染 ── */
        function renderPapers() {
            const list = document.getElementById('paperList');
            let items = PAPER_DATA[activePaperSubj] || [];
            if (activeGrade !== '不限') items = items.filter(p => p.grade === activeGrade);
            if (activePaperFilter !== '全部') items = items.filter(p => getItemType(p) === activePaperFilter);
            items = items.filter(p => matchRegionFn(p.region, activeRegionKey));
            const iconMap = { chinese: 'pi-chinese', math: 'pi-math', english: 'pi-eng', science: 'pi-sci' };
            const icon = iconMap[activePaperSubj] || 'pi-chinese';
            if (!items.length) {
                list.innerHTML = '<div style="text-align:center;padding:40px 16px;color:#a1a1aa;font-size:.8125rem;line-height:1.7;">暂无符合条件的试卷<br><span style="font-size:.75rem">请调整筛选条件后重试</span></div>';
                return;

            list.innerHTML = items.map(p => {
                const recHtml = p.recommend
                    ? `<span class="paper-recommend ${p.recommend === '推荐' ? 'pr-recommend' : 'pr-pick'}">${p.recommend}</span>`
                    : '';
                const typeHtml = `<span class="paper-type-tag ${p.typeCls}">${getItemType(p)}</span>`;
                return `
                <div class="paper-item" onclick="window.location.href='试卷详情.html?id=${p.id}&title=${encodeURIComponent(p.title)}'">
                    <div class="paper-icon ${icon}">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

                    <div class="paper-info">
                        <div class="paper-title">${recHtml}${p.title}</div>
                        <div class="paper-row">

    <script>
var _currentMode = 'demo';
function setMode(mode) {
    if (mode === _currentMode) return;
    _currentMode = mode;
    var btns = document.querySelectorAll('#modeToggle button');
    btns.forEach(function(b, i) { b.classList.toggle('active', (mode === 'demo' ? i === 0 : i === 1)); });
    var panel = document.getElementById('sbPanel');
    if (mode === 'review') { panel.classList.add('open'); renderSidebar(); } else { panel.classList.remove('open'); }
}
document.getElementById('modeToggle').addEventListener('click', function(e) { e.stopPropagation(); });
if (new URLSearchParams(window.location.search).get('mode') === 'review') {
    setTimeout(function() { _currentMode = 'demo'; setMode('review'); }, 100);
}
function renderSidebar() {
    var container = document.getElementById('sidebarContent');
    var changelogSrc = document.getElementById('prd-changelog');
    var sectionsSrc = document.getElementById('prd-sections');
    if (!changelogSrc || !sectionsSrc) return;
    container.innerHTML = buildChangelog(changelogSrc.textContent) + buildSections(sectionsSrc.textContent);
    container.querySelectorAll('.sb-hd').forEach(function(hd) {
        hd.addEventListener('click', function(e) { e.stopPropagation(); this.parentElement.classList.toggle('op'); });
    });
    container.querySelectorAll('.sb-changelog-toggle').forEach(function(t) {
        t.addEventListener('click', function(e) { e.stopPropagation(); this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); });
    });
}
function buildChangelog(md) {
    var html = marked.parse(md);
    return '<div class="sb-changelog"><div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div><div class="sb-changelog-body">' + html + '</div></div>';
}
function buildSections(md) {
    var lines = md.split('\n'); var sections = []; var cur = null;
    lines.forEach(function(line) {
        var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
        if (m) { if (cur) sections.push(cur); cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] }; }
        else if (cur) { cur.lines.push(line); }
    });
    if (cur) sections.push(cur);
    return sections.map(function(s) {
        var badge = '';
        if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
        if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
        var body = marked.parse(s.lines.join('\n'));
        body = body.replace(/\[\+\]\s*/g, '<span class="diff-add">[+] </span>');
        body = body.replace(/\[~\]\s*/g, '<span class="diff-mod">[~] </span>');
        body = body.replace(/\[!\]\s*(.+?)(<br|<\/p|$)/g, '<span class="diff-note">[!] $1</span>$2');
        return '<div class="sb-section" data-sb="' + s.num + '"><div class="sb-hd"><svg class="sb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' + s.num + '. ' + s.title + badge + '</div><div class="sb-bd">' + body + '</div></div>';
    }).join('');
}
(function() {
    var panel = document.getElementById('sbPanel'); var bar = document.getElementById('sbDragBar');
    var isDragging = false, startX, startY, origX, origY;
    function clampPos(x, y) { var pw = panel.offsetWidth, ph = panel.offsetHeight; return { x: Math.max(0, Math.min(x, window.innerWidth - pw)), y: Math.max(0, Math.min(y, window.innerHeight - ph)) }; }
    bar.addEventListener('mousedown', function(e) { isDragging = true; startX = e.clientX; startY = e.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; });
    document.addEventListener('mousemove', function(e) { if (!isDragging) return; var p = clampPos(origX + e.clientX - startX, origY + e.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; });
    document.addEventListener('mouseup', function() { isDragging = false; });
    bar.addEventListener('touchstart', function(e) { isDragging = true; var t = e.touches[0]; startX = t.clientX; startY = t.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; }, { passive: true });
    document.addEventListener('touchmove', function(e) { if (!isDragging) return; var t = e.touches[0]; var p = clampPos(origX + t.clientX - startX, origY + t.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; }, { passive: true });
    document.addEventListener('touchend', function() { isDragging = false; });
})();
    </script>

    <script type="text/markdown" id="prd-sections">
## 1. 页面概述

试卷下载页面，支持按科目、地区、年级多维筛选，结合类型 chip 快速定位目标试卷资源。默认展示广东省试卷。

## 2. 三维筛选栏

顶部横排三个下拉按钮：**科目 ∨ | 地区 ∨ | 年级 ∨**，与试卷讲解页保持一致样式。

#### 交互逻辑

1. 点击任一按钮 → 展开对应选项（科目/年级为下拉列表，地区为底部弹窗）
2. 选中后按钮文字更新，字体加粗；点击已展开的按钮或遮罩层 → 收起
3. 同一时间只有一个选项展开

#### 科目选项
语文、数学、英语、科学

#### 年级选项
不限、一年级 ～ 九年级

#### 地区选项（底部弹窗，三级级联）
- 省/直辖市 → 市 → 区/县，每级均可选"不限"
- 选省后自动切换至市 tab，选市后自动切换至区 tab
- "重置"清空，"完成"生效并关闭弹窗
- 默认：**广东省**

#### 业务规则
- 三个维度独立生效，交叉过滤
- 无地区字段的试卷（普通练习卷）在任意地区筛选下均显示
- 有地区字段的试卷（真题）按地区精确/前缀匹配

## 3. 类型筛选 Chips

筛选栏下方横向 chips，可与三维筛选叠加使用。

#### 选项
全部 / 月考 / 单元测试 / 期中 / 期末 / 真题 / 模拟题 / 其它

> "其它"包括：开学考试、同步练习及后台其它分类

#### 业务规则
- 默认选"全部"，展示该科目所有类型试卷
- 切换类型时，科目/地区/年级筛选保持不变

## 4. 试卷列表

列表项：学科图标 + 试卷标题 + 推荐/精选标签 + 类型标签 + 下载量；点击跳转试卷详情页

## 5. 下载记录入口

底部"查看下载记录"按钮，点击跳转 `下载记录.html`
