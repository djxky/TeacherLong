<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 试卷列表</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .topbar {
            display: flex; align-items: center; padding: 4px 4px; flex-shrink: 0;
            position: relative; z-index: 20; min-height: 44px; margin-top: 50px;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.8); cursor: pointer;
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06);
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active { background: rgba(0,0,0,0.05); }
        .topbar-title {
            position: absolute; left: 0; right: 0; text-align: center;
            font-size: 1.0625rem; font-weight: 700;
            color: #18181b; letter-spacing: -0.02em;
            pointer-events: none;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .topbar-spacer { height: 40px; flex-shrink: 0; }

        .scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 0 16px 40px;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* ── ep-filter 筛选栏（与试卷讲解一致） ── */
        .ep-filters { display:flex; align-items:center; flex-shrink:0; border-bottom:1px solid rgba(226,232,240,.5); position:relative; z-index:110; }
        .ep-filter-btn { flex:1; min-width:0; display:flex; align-items:center; justify-content:center; gap:4px; background:none; border:none; font-size:.875rem; font-weight:500; color:#475569; cursor:pointer; padding:12px 4px; -webkit-tap-highlight-color:transparent; transition:color .15s; font-family:inherit; }
        .ep-filter-btn > span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .ep-filter-btn:active { background:rgba(0,0,0,.02); }
        .ep-filter-btn.active { color:#0f172a; font-weight:600; }
        .ep-filter-btn.open { color:#6366f1; font-weight:600; }
        .ep-filter-btn svg { width:12px; height:12px; flex-shrink:0; transition:transform .2s; }
        .ep-filter-btn.open svg { transform:rotate(180deg); color:#6366f1; }
        .ep-filter-sep { width:1px; height:18px; background:rgba(226,232,240,.6); flex-shrink:0; }
        .ep-dd-overlay { position:absolute; inset:0; z-index:100; background:rgba(0,0,0,.18); display:none; }
        .ep-dd-overlay.open { display:block; }
        .ep-dd-wrap { position:relative; flex-shrink:0; }
        .ep-dropdown { position:absolute; top:0; left:0; right:0; z-index:111; background:#fff; box-shadow:0 8px 32px rgba(0,0,0,.1); border-radius:0 0 16px 16px; display:none; max-height:320px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .ep-dropdown.open { display:block; }
        .ep-dropdown::-webkit-scrollbar { display:none; }
        .ep-dd-item { padding:14px 20px; font-size:.875rem; font-weight:400; color:#475569; cursor:pointer; border-bottom:1px solid #f8fafc; transition:background .12s; }
        .ep-dd-item:active { background:#fafafa; }
        .ep-dd-item.selected { color:#6366f1; font-weight:600; background:rgba(99,102,241,.04); }
        .ep-rs-overlay { position:absolute; inset:0; z-index:105; background:rgba(15,23,42,.4); display:none; }
        .ep-rs-overlay.open { display:block; }
        .ep-region-sheet { position:absolute; left:0; right:0; bottom:0; z-index:112; background:#fff; border-radius:16px 16px 0 0; box-shadow:0 -8px 32px rgba(0,0,0,.12); max-height:min(60%,520px); display:flex; flex-direction:column; transform:translateY(105%); transition:transform .28s cubic-bezier(.32,.72,0,1); padding-bottom:max(12px,env(safe-area-inset-bottom)); }
        .ep-region-sheet.open { transform:translateY(0); }
        .ep-rs-handle { width:36px; height:4px; background:#e2e8f0; border-radius:99px; margin:10px auto 2px; flex-shrink:0; }
        .ep-rs-head { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 16px 8px; flex-shrink:0; border-bottom:1px solid #f1f5f9; }
        .ep-rs-title { font-size:1rem; font-weight:700; color:#0f172a; flex:1; }
        .ep-rs-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }
        .ep-rs-reset { font-size:.8125rem; font-weight:600; color:#64748b; background:none; border:none; padding:6px 10px; border-radius:8px; cursor:pointer; font-family:inherit; }
        .ep-rs-reset:active { background:#f1f5f9; }
        .ep-rs-done { font-size:.8125rem; font-weight:700; color:#fff; background:linear-gradient(135deg,#6366f1,#8b5cf6); border:none; padding:6px 14px; border-radius:8px; cursor:pointer; font-family:inherit; }
        .ep-rs-done:active { transform:scale(.98); opacity:.95; }
        .ep-rs-sub { font-size:.6875rem; color:#64748b; line-height:1.5; padding:6px 16px 8px; flex-shrink:0; background:#f8fafc; border-bottom:1px solid #f1f5f9; }
        .ep-rs-tabs { display:flex; align-items:stretch; border-bottom:1px solid #f1f5f9; flex-shrink:0; background:#fafafa; }
        .ep-rs-tab { flex:1; padding:12px 6px; font-size:.8125rem; font-weight:500; color:#64748b; border:none; background:transparent; cursor:pointer; position:relative; -webkit-tap-highlight-color:transparent; transition:color .15s; font-family:inherit; }
        .ep-rs-tab.active { color:#0f172a; font-weight:700; }
        .ep-rs-tab.active::after { content:''; position:absolute; left:16%; right:16%; bottom:0; height:2.5px; background:#6366f1; border-radius:2px 2px 0 0; }
        .ep-rs-tab:disabled { color:#cbd5e1; cursor:default; }
        .ep-rs-list { flex:1; min-height:120px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .ep-rs-list::-webkit-scrollbar { width:4px; }
        .ep-rs-list::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:2px; }
        .ep-rs-item { padding:14px 20px; font-size:.9375rem; color:#334155; cursor:pointer; border-bottom:1px solid #f8fafc; -webkit-tap-highlight-color:transparent; transition:background .12s; display:flex; align-items:center; justify-content:space-between; }
        .ep-rs-item:active { background:#f8fafc; }
        .ep-rs-item.selected { color:#6366f1; font-weight:600; background:rgba(99,102,241,.06); }
        .type-chips-row { display:flex; gap:6px; padding:10px 0 6px; overflow-x:auto; flex-shrink:0; -webkit-overflow-scrolling:touch; }
        .type-chips-row::-webkit-scrollbar { display:none; }
        .type-chip { flex-shrink:0; padding:5px 14px; font-size:.75rem; font-weight:600; color:#94a3b8; background:transparent; border:1px solid rgba(226,232,240,.6); border-radius:99px; cursor:pointer; transition:all .15s; white-space:nowrap; font-family:inherit; -webkit-tap-highlight-color:transparent; }
        .type-chip.active { color:#6366f1; background:rgba(99,102,241,.06); border-color:rgba(99,102,241,.25); }
        .type-chip:active { transform:scale(.96); }

        /* ── 科目 Tab（保留备用） ── */
        .subj-tabs {
            display: flex; gap: 4px; padding: 16px 0 12px;
            position: sticky; top: 0; z-index: 10;
            background: linear-gradient(180deg, rgba(241,245,249,0.95) 0%, rgba(241,245,249,0.7) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .subj-tab {
            padding: 7px 18px; font-size: 0.8125rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: none;
            cursor: pointer; border-radius: 10px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .subj-tab.active {
            color: #0f172a;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05);
        }

        /* ── 筛选区 ── */
        .filter-bar {
            display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .filter-chip {
            flex-shrink: 0; padding: 4px 10px; font-size: 0.625rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: 1px solid rgba(226,232,240,0.5);
            border-radius: 16px; cursor: pointer; transition: all .18s;
            -webkit-tap-highlight-color: transparent;
        }
        .filter-chip.active {
            color: #6366f1; background: rgba(99,102,241,0.06);
            border-color: rgba(99,102,241,0.25);
        }

        /* ── 地区筛选触发按钮 ── */
        .rp-btn {
            display: flex; align-items: center; gap: 3px; flex-shrink: 0;
            padding: 4px 10px; font-size: 0.625rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: 1px solid rgba(226,232,240,0.5);
            border-radius: 16px; cursor: pointer; transition: all .18s;
            -webkit-tap-highlight-color: transparent; font-family: inherit;
        }
        .rp-btn.active {
            color: #6366f1; background: rgba(99,102,241,0.06);
            border-color: rgba(99,102,241,0.25);
        }

        /* ── 地区选择器底部弹窗 ── */
        .rp-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.35);
            z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity .25s ease;
        }
        .rp-overlay.show { opacity: 1; pointer-events: auto; }
        .rp-sheet {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: #fff; border-radius: 20px 20px 0 0;
            z-index: 201; transform: translateY(100%);
            transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; max-height: 74%;
        }
        .rp-sheet.show { transform: translateY(0); }
        .rp-handle { width: 36px; height: 4px; border-radius: 2px; background: #e2e8f0; margin: 10px auto 0; flex-shrink: 0; }
        .rp-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 0; flex-shrink: 0; }
        .rp-title { font-size: 0.875rem; font-weight: 700; color: #0f172a; }
        .rp-reset { font-size: 0.75rem; font-weight: 600; color: #d4d4d8; background: none; border: none; cursor: pointer; padding: 4px 0; transition: color .15s; font-family: inherit; }
        .rp-reset.active { color: #6366f1; }
        .rp-crumb { padding: 4px 20px 2px; font-size: 0.625rem; color: #94a3b8; min-height: 22px; flex-shrink: 0; line-height: 1.5; }
        .rp-crumb b { color: #6366f1; font-weight: 700; font-style: normal; }
        .rp-tabs { display: flex; padding: 0 20px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
        .rp-tab {
            padding: 8px 14px; font-size: 0.75rem; font-weight: 600; color: #a1a1aa;
            background: none; border: none; border-bottom: 2px solid transparent;
            margin-bottom: -1px; cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: all .15s; white-space: nowrap; font-family: inherit;
        }
        .rp-tab.active { color: #6366f1; border-bottom-color: #6366f1; }
        .rp-tab.disabled { color: #e2e8f0; pointer-events: none; }
        .rp-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .rp-list::-webkit-scrollbar { display: none; }
        .rp-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 11px 20px; font-size: 0.8125rem; font-weight: 500; color: #374151;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            border-bottom: 1px solid rgba(241,245,249,0.8);
        }
        .rp-item:active { background: rgba(99,102,241,0.04); }
        .rp-item.sel { color: #6366f1; font-weight: 700; }
        .rp-item .rp-check { color: #6366f1; font-size: 0.8125rem; }
        .rp-item .rp-arrow { color: #d4d4d8; font-size: 1rem; font-weight: 300; }
        .rp-footer { padding: 10px 20px 16px; flex-shrink: 0; border-top: 1px solid #f1f5f9; }
        .rp-confirm-btn {
            width: 100%; padding: 13px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; font-size: 0.9375rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            transition: transform .15s, opacity .15s;
        }
        .rp-confirm-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* ── 试卷列表 ── */
        .paper-list { display: flex; flex-direction: column; gap: 10px; }
        .paper-item {
            position: relative; display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: 14px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: transform .1s;
            -webkit-tap-highlight-color: transparent;
        }
        .paper-item:active { transform: scale(0.98); }
        .paper-icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .pi-chinese { background: linear-gradient(135deg, rgba(238,242,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #6366f1; }
        .pi-math { background: linear-gradient(135deg, rgba(255,251,235,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #d97706; }
        .pi-eng { background: linear-gradient(135deg, rgba(236,253,245,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #059669; }
        .paper-info { flex: 1; min-width: 0; }
        .paper-title {
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            margin: 0; line-height: 1.4;
            max-height: 2.8em; overflow: hidden;
        }
        .paper-row {
            display: flex; align-items: center; gap: 8px; margin-top: 6px;
        }
        .paper-meta-tags {
            display: flex; align-items: center; gap: 6px;
        }
        .paper-type-tag {
            font-size: 0.5625rem; font-weight: 700;
            padding: 2px 8px; border-radius: 4px;
        }
        .pt-real { background: rgba(139,92,246,0.08); color: #8b5cf6; }
        .pt-mock { background: rgba(245,158,11,0.08); color: #f59e0b; }
        .paper-textbook {
            font-size: 0.5625rem; font-weight: 600; color: #94a3b8;
        }
        .paper-recommend {
            display: inline; font-size: 0.5625rem; font-weight: 700; padding: 1px 6px;
            border-radius: 3px; letter-spacing: .02em; margin-right: 4px;
            vertical-align: middle;
        }
        .pr-recommend { background: rgba(239,68,68,0.08); color: #ef4444; }
        .pr-pick { background: rgba(99,102,241,0.08); color: #6366f1; }
        .paper-dl {
            font-size: 0.625rem; color: #64748b;
            display: flex; align-items: center; gap: 3px;
        }
        .paper-arrow { color: #d4d4d8; flex-shrink: 0; }

        /* ── 空状态 ── */
        .empty-state {
            text-align: center; padding: 48px 20px;
        }
        .empty-icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, rgba(238,242,255,0.6), rgba(255,255,255,0.5));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; color: #c7d2fe;
        }
        .empty-title {
            font-size: 0.875rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px;
        }
        .empty-desc {
            font-size: 0.75rem; color: #cbd5e1;
        }

        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(15,23,42,0.88); color: #fff; padding: 10px 24px; border-radius: 12px; font-size: .8125rem; font-weight: 500; opacity: 0; transition: all .3s; pointer-events: none; z-index: 9999; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .mode-toggle { position: fixed; top: 24px; right: 32px; z-index: 900; display: flex; align-items: center; gap: 0; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06); overflow: hidden; font-size: 0.8125rem; font-weight: 600; }
        .mode-toggle button { padding: 10px 24px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-family: inherit; font-size: 0.8125rem; font-weight: 600; transition: all 0.2s; }
        .mode-toggle button.active { background: #4f46e5; color: #ffffff; }
        .sb-panel { position: fixed; top: 50%; right: 32px; width: 380px; max-height: 80vh; transform: translateY(-50%) translateX(20px); background: #ffffff; border-radius: 20px; box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06); z-index: 800; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; overflow: hidden; }
        .sb-panel.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
        .sb-drag-bar { padding: 12px 16px 8px; cursor: move; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .sb-drag-title { font-size: 0.8125rem; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 6px; }
        .sb-drag-title .sb-ver { font-size: 0.5625rem; font-weight: 600; color: #4f46e5; background: rgba(99,102,241,0.08); padding: 2px 8px; border-radius: 6px; }
        .sb-close { width: 24px; height: 24px; border-radius: 8px; border: none; background: rgba(0,0,0,0.04); color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; transition: background 0.2s; }
        .sb-close:hover { background: rgba(0,0,0,0.08); }
        .sb-content { flex: 1; overflow-y: auto; padding: 12px 16px 20px; -webkit-overflow-scrolling: touch; }
        .sb-content::-webkit-scrollbar { width: 3px; }
        .sb-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .sb-changelog { margin-bottom: 16px; }
        .sb-changelog-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; padding: 8px 0; user-select: none; }
        .sb-changelog-toggle svg { transition: transform 0.2s; }
        .sb-changelog-toggle.open svg { transform: rotate(90deg); }
        .sb-changelog-body { display: none; padding: 0 0 0 8px; border-left: 2px solid rgba(99,102,241,0.15); margin-left: 4px; }
        .sb-changelog-body.open { display: block; }
        .sb-changelog-body h3 { font-size: 0.6875rem; font-weight: 700; color: #334155; margin: 12px 0 4px; padding: 0; }
        .sb-changelog-body ul { margin: 0; padding: 0 0 0 16px; font-size: 0.6875rem; color: #475569; line-height: 1.8; }
        .sb-section { margin-bottom: 2px; }
        .sb-hd { display: flex; align-items: center; gap: 8px; padding: 10px 8px; border-radius: 10px; cursor: pointer; font-size: 0.8125rem; font-weight: 600; color: #0f172a; transition: background 0.15s; user-select: none; }
        .sb-hd:hover { background: rgba(0,0,0,0.02); }
        .sb-hd .sb-arrow { width: 16px; height: 16px; color: #94a3b8; flex-shrink: 0; transition: transform 0.2s; }
        .sb-section.op .sb-hd .sb-arrow { transform: rotate(90deg); }
        .sb-hd .sb-badge-new { font-size: 0.5rem; font-weight: 700; color: #059669; background: rgba(5,150,105,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-hd .sb-badge-updated { font-size: 0.5rem; font-weight: 700; color: #d97706; background: rgba(217,119,6,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-bd { display: none; padding: 4px 8px 12px 32px; font-size: 0.75rem; color: #475569; line-height: 1.75; }
        .sb-section.op .sb-bd { display: block; }
        .sb-bd h4 { font-size: 0.75rem; font-weight: 700; color: #2563eb; margin: 12px 0 4px; padding: 0; }
        .sb-bd blockquote { margin: 8px 0; padding: 8px 12px; border-radius: 8px; background: rgba(37,99,235,0.04); border-left: 3px solid rgba(37,99,235,0.3); font-size: 0.6875rem; color: #334155; }
        .sb-bd ul, .sb-bd ol { margin: 4px 0; padding-left: 16px; }
        .sb-bd li { margin: 2px 0; }
        .sb-bd .diff-add { background: rgba(5,150,105,0.06); color: #065f46; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-mod { background: rgba(217,119,6,0.06); color: #92400e; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-note { background: rgba(234,179,8,0.06); color: #854d0e; padding: 4px 8px; border-radius: 6px; display: block; margin: 6px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

    <div class="iphone-frame is-column">
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>

        function buildRegionKey(p, c, d) {
            if (!p) return null;
            if (p.value === '全国卷') return '全国卷';
            var k = p.value;
            if (c) k += '-' + c.value;
            if (d) k += '-' + d.value;
            return k;
        }
        function matchRegion(itemRegion, filterKey) {
            if (!filterKey) return true;
            if (!itemRegion) return true;
            if (filterKey === '全国卷') return itemRegion === '全国卷';
            return itemRegion === filterKey || itemRegion.startsWith(filterKey + '-');
        }
        function getRegionLabel(p, c, d) {
            if (!p) return '全国';
            if (p.value === '全国卷') return '全国卷';
            var parts = [p.label.replace(/[省市]$/, '')];
            if (c) parts.push(c.label.replace(/[市区县]$/, ''));
            if (d) parts.push(d.label.replace(/区$/, ''));
            return parts.join('·');
        }

    <script>
var _currentMode = 'demo';
function setMode(mode) {
    if (mode === _currentMode) return;
    _currentMode = mode;
    var btns = document.querySelectorAll('#modeToggle button');
    btns.forEach(function(b, i) { b.classList.toggle('active', (mode === 'demo' ? i === 0 : i === 1)); });
    var panel = document.getElementById('sbPanel');
    if (mode === 'review') { panel.classList.add('open'); renderSidebar(); } else { panel.classList.remove('open'); }
}
document.getElementById('modeToggle').addEventListener('click', function(e) { e.stopPropagation(); });
if (new URLSearchParams(window.location.search).get('mode') === 'review') {
    setTimeout(function() { _currentMode = 'demo'; setMode('review'); }, 100);
}
function renderSidebar() {
    var container = document.getElementById('sidebarContent');
    var changelogSrc = document.getElementById('prd-changelog');
    var sectionsSrc = document.getElementById('prd-sections');
    if (!changelogSrc || !sectionsSrc) return;
    container.innerHTML = buildChangelog(changelogSrc.textContent) + buildSections(sectionsSrc.textContent);
    container.querySelectorAll('.sb-hd').forEach(function(hd) {
        hd.addEventListener('click', function(e) { e.stopPropagation(); this.parentElement.classList.toggle('op'); });
    });
    container.querySelectorAll('.sb-changelog-toggle').forEach(function(t) {
        t.addEventListener('click', function(e) { e.stopPropagation(); this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); });
    });
}
function buildChangelog(md) {
    var html = marked.parse(md);
    return '<div class="sb-changelog"><div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div><div class="sb-changelog-body">' + html + '</div></div>';
}
function buildSections(md) {
    var lines = md.split('\n'); var sections = []; var cur = null;
    lines.forEach(function(line) {
        var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
        if (m) { if (cur) sections.push(cur); cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] }; }
        else if (cur) { cur.lines.push(line); }
    });
    if (cur) sections.push(cur);
    return sections.map(function(s) {
        var badge = '';
        if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
        if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
        var body = marked.parse(s.lines.join('\n'));
        body = body.replace(/\[\+\]\s*/g, '<span class="diff-add">[+] </span>');
        body = body.replace(/\[~\]\s*/g, '<span class="diff-mod">[~] </span>');
        body = body.replace(/\[!\]\s*(.+?)(<br|<\/p|$)/g, '<span class="diff-note">[!] $1</span>$2');
        return '<div class="sb-section" data-sb="' + s.num + '"><div class="sb-hd"><svg class="sb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' + s.num + '. ' + s.title + badge + '</div><div class="sb-bd">' + body + '</div></div>';
    }).join('');
}
(function() {
    var panel = document.getElementById('sbPanel'); var bar = document.getElementById('sbDragBar');
    var isDragging = false, startX, startY, origX, origY;
    function clampPos(x, y) { var pw = panel.offsetWidth, ph = panel.offsetHeight; return { x: Math.max(0, Math.min(x, window.innerWidth - pw)), y: Math.max(0, Math.min(y, window.innerHeight - ph)) }; }
    bar.addEventListener('mousedown', function(e) { isDragging = true; startX = e.clientX; startY = e.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; });
    document.addEventListener('mousemove', function(e) { if (!isDragging) return; var p = clampPos(origX + e.clientX - startX, origY + e.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; });
    document.addEventListener('mouseup', function() { isDragging = false; });
    bar.addEventListener('touchstart', function(e) { isDragging = true; var t = e.touches[0]; startX = t.clientX; startY = t.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; }, { passive: true });
    document.addEventListener('touchmove', function(e) { if (!isDragging) return; var t = e.touches[0]; var p = clampPos(origX + t.clientX - startX, origY + t.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; }, { passive: true });
    document.addEventListener('touchend', function() { isDragging = false; });
})();
    </script>

    <script type="text/markdown" id="prd-sections">
## 1. 页面概述

真题试卷列表页，展示小升初或中考的真题和模拟题资源。通过 URL 参数 `type` 区分：primary（小升初）、middle（中考）。默认展示广东省试卷。

## 2. 三维筛选栏

顶部横排三个下拉按钮：**科目 ∨ | 地区 ∨ | 年份 ∨**，与试卷讲解页保持一致样式。

#### 交互逻辑

1. 点击任一按钮 → 展开对应选项（科目/年份为下拉列表，地区为底部弹窗）
2. 选中后按钮文字更新，字体加粗；再次点击或点遮罩 → 收起
3. 同一时间只有一个选项展开

#### 科目选项
语文、数学、英语

#### 年份选项
全部年份、2025年、2024年、2023年、2022年

#### 地区选项（底部弹窗，三级级联）
- 省/直辖市 → 市 → 区/县，每级均可选"不限"
- 选省后自动切换至市 tab，选市后自动切换至区 tab
- "重置"清空，"完成"生效并关闭弹窗
- 默认：**广东省**

#### 业务规则
- 三个维度独立生效，交叉过滤
- 直辖市（北京/上海）第二级直接展示区/县，无市级

## 3. 类型筛选 Chips

筛选栏下方两个 chip：**历年真题 / 模拟题**，默认选中"历年真题"。

#### 业务规则
- 与三维筛选叠加生效
- 切换科目时，类型 chip 重置为"历年真题"

## 4. 试卷列表

列表项：学科图标 + 试卷标题 + 推荐/精选标签 + 年份标签 + 地区标签 + 下载量；点击跳转试卷详情页
    </script>
