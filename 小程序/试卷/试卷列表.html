<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 试卷列表</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #e8edf4 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
            display: flex; flex-direction: column;
        }
        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }
        .wx-capsule {
            position: absolute; top: 56px; right: 10px; z-index: 999;
            display: flex; align-items: center; height: 32px; border-radius: 16px;
            background: rgba(0,0,0,0.06);
            border: 0.5px solid rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .wx-capsule-btn {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 32px;
            border: none; background: none; cursor: pointer; color: #3c3c3c; padding: 0;
        }
        .wx-capsule-btn:active { background: rgba(0,0,0,0.05); }
        .wx-capsule-divider { width: 0.5px; height: 18px; background: rgba(0,0,0,0.12); }

        .topbar {
            display: flex; align-items: center; padding: 60px 16px 12px; flex-shrink: 0;
            background: rgba(248,250,252,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: relative; z-index: 20;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.8); cursor: pointer;
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06);
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active { background: rgba(0,0,0,0.05); }
        .topbar-title {
            position: absolute; left: 0; right: 0; text-align: center;
            font-size: 1.0625rem; font-weight: 700;
            color: #18181b; letter-spacing: -0.02em;
            pointer-events: none;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding: 0 8px;
        }
        .topbar-spacer { width: 40px; height: 40px; flex-shrink: 0; }

        .scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 0 20px 40px;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* ── 科目 Tab ── */
        .subj-tabs {
            display: flex; gap: 4px; padding: 16px 0 12px;
            position: sticky; top: 0; z-index: 10;
            background: linear-gradient(180deg, rgba(241,245,249,0.95) 0%, rgba(241,245,249,0.7) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .subj-tab {
            padding: 7px 18px; font-size: 0.8125rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: none;
            cursor: pointer; border-radius: 10px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .subj-tab.active {
            color: #0f172a;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05);
        }

        /* ── 筛选区 ── */
        .filter-bar {
            display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .filter-chip {
            flex-shrink: 0; padding: 4px 10px; font-size: 0.625rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: 1px solid rgba(226,232,240,0.5);
            border-radius: 16px; cursor: pointer; transition: all .18s;
            -webkit-tap-highlight-color: transparent;
        }
        .filter-chip.active {
            color: #6366f1; background: rgba(99,102,241,0.06);
            border-color: rgba(99,102,241,0.25);
        }

        /* ── 教材版本下拉 ── */
        .tb-dropdown-wrap {
            position: relative; flex-shrink: 0;
        }
        .tb-dropdown-btn {
            display: flex; align-items: center; gap: 3px;
            padding: 4px 10px; font-size: 0.625rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: 1px solid rgba(226,232,240,0.5);
            border-radius: 16px; cursor: pointer; transition: all .18s;
            -webkit-tap-highlight-color: transparent;
        }
        .tb-dropdown-btn.active {
            color: #6366f1; background: rgba(99,102,241,0.06);
            border-color: rgba(99,102,241,0.25);
        }
        .tb-dropdown-btn svg {
            transition: transform .2s ease;
        }
        .tb-dropdown-btn.open svg {
            transform: rotate(180deg);
        }
        .tb-dropdown-panel {
            position: absolute; top: calc(100% + 6px); left: 0;
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 10px 12px; min-width: 180px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 8px 24px -4px rgba(0,0,0,0.1), 0 0 0 1px rgba(226,232,240,0.6);
            z-index: 50; opacity: 0; transform: translateY(-4px);
            pointer-events: none;
            transition: opacity .18s ease, transform .18s ease;
        }
        .tb-dropdown-panel.show {
            opacity: 1; transform: translateY(0); pointer-events: auto;
        }
        .tb-panel-chip {
            padding: 4px 10px; font-size: 0.625rem; font-weight: 600;
            color: #a1a1aa; background: transparent;
            border: 1px solid rgba(226,232,240,0.5);
            border-radius: 16px; cursor: pointer; transition: all .18s;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .tb-panel-chip:active { transform: scale(0.96); }
        .tb-panel-chip.active {
            color: #6366f1; background: rgba(99,102,241,0.06);
            border-color: rgba(99,102,241,0.25);
        }

        /* ── 试卷列表 ── */
        .paper-list { display: flex; flex-direction: column; gap: 10px; }
        .paper-item {
            position: relative; display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: 14px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: transform .1s;
            -webkit-tap-highlight-color: transparent;
        }
        .paper-item:active { transform: scale(0.98); }
        .paper-icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04);
        }
        .pi-chinese { background: linear-gradient(135deg, rgba(238,242,255,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #6366f1; }
        .pi-math { background: linear-gradient(135deg, rgba(255,251,235,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #d97706; }
        .pi-eng { background: linear-gradient(135deg, rgba(236,253,245,0.85) 0%, rgba(255,255,255,0.5) 100%); color: #059669; }
        .paper-info { flex: 1; min-width: 0; }
        .paper-title {
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            margin: 0; line-height: 1.4;
            max-height: 2.8em; overflow: hidden;
        }
        .paper-row {
            display: flex; align-items: center; gap: 8px; margin-top: 6px;
        }
        .paper-meta-tags {
            display: flex; align-items: center; gap: 6px;
        }
        .paper-type-tag {
            font-size: 0.5625rem; font-weight: 700;
            padding: 2px 8px; border-radius: 4px;
        }
        .pt-real { background: rgba(139,92,246,0.08); color: #8b5cf6; }
        .pt-mock { background: rgba(245,158,11,0.08); color: #f59e0b; }
        .paper-textbook {
            font-size: 0.5625rem; font-weight: 600; color: #94a3b8;
        }
        .paper-recommend {
            display: inline; font-size: 0.5625rem; font-weight: 700; padding: 1px 6px;
            border-radius: 3px; letter-spacing: .02em; margin-right: 4px;
            vertical-align: middle;
        }
        .pr-recommend { background: rgba(239,68,68,0.08); color: #ef4444; }
        .pr-pick { background: rgba(99,102,241,0.08); color: #6366f1; }
        .paper-dl {
            font-size: 0.625rem; color: #64748b;
            display: flex; align-items: center; gap: 3px;
        }
        .paper-arrow { color: #d4d4d8; flex-shrink: 0; }

        /* ── 空状态 ── */
        .empty-state {
            text-align: center; padding: 48px 20px;
        }
        .empty-icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, rgba(238,242,255,0.6), rgba(255,255,255,0.5));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; color: #c7d2fe;
        }
        .empty-title {
            font-size: 0.875rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px;
        }
        .empty-desc {
            font-size: 0.75rem; color: #cbd5e1;
        }

        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(15,23,42,0.88); color: #fff; padding: 10px 24px; border-radius: 12px; font-size: .8125rem; font-weight: 500; opacity: 0; transition: all .3s; pointer-events: none; z-index: 9999; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

        var activeType = '真题';
        var activeTextbook = 'all';

        var iconMap = { chinese: 'pi-chinese', math: 'pi-math', english: 'pi-eng' };

        function renderList() {
            var data = (EXAM_DATA[examType] || {})[activeSubj] || [];
            var filtered = data.filter(function(p) {
                var matchType = activeType === 'all' || p.examType === activeType;
                var matchTb = activeTextbook === 'all' || p.textbook === activeTextbook;
                return matchType && matchTb;
            });

            var list = document.getElementById('paperList');
            var icon = iconMap[activeSubj] || 'pi-chinese';

            if (!filtered.length) {
                list.innerHTML = '<div class="empty-state">' +
                    '<div class="empty-icon"><svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>' +

                    '<div class="empty-desc">请尝试调整筛选条件</div>' +
                    '</div>';
                return;
            }

            list.innerHTML = filtered.map(function(p) {
                var recHtml = p.recommend
                    ? '<span class="paper-recommend ' + (p.recommend === '推荐' ? 'pr-recommend' : 'pr-pick') + '">' + p.recommend + '</span>'
                    : '';
                return '<div class="paper-item" onclick="goDetail(\'' + p.id + '\',\'' + encodeURIComponent(p.title) + '\')">' +
                    '<div class="paper-icon ' + icon + '">' +
                        '<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>' +
                    '</div>' +
                    '<div class="paper-info">' +
                        '<div class="paper-title">' + recHtml + p.title + '</div>' +
                        '<div class="paper-row">' +
                            '<div class="paper-meta-tags"><span class="paper-textbook">' + p.textbook + '</span></div>' +
                            '<span class="paper-dl">' +
                                '<svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>' +
                                p.downloads + '人下载' +
                            '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="paper-arrow"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>' +
                '</div>';
            }).join('');
        }

        function goDetail(id, title) {
            window.location.href = '试卷详情.html?id=' + id + '&title=' + title;
        }

        document.getElementById('subjTabs').addEventListener('click', function(e) {
            var tab = e.target.closest('.subj-tab');
            if (!tab) return;
            document.querySelectorAll('#subjTabs .subj-tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            activeSubj = tab.dataset.subj;
            activeType = '真题';
            activeTextbook = 'all';
            document.querySelectorAll('#filterBar .filter-chip[data-type]').forEach(function(c) { c.classList.toggle('active', c.dataset.type === '真题'); });
            document.querySelectorAll('#tbPanel .tb-panel-chip').forEach(function(c) { c.classList.toggle('active', c.dataset.tb === 'all'); });
            document.getElementById('tbBtnLabel').textContent = '教材版本';
            tbBtn.classList.remove('active');
            closeTbPanel();
            renderList();
        });

        document.getElementById('filterBar').addEventListener('click', function(e) {
            var btn = e.target.closest('.filter-chip');
            if (!btn) return;
            document.querySelectorAll('#filterBar .filter-chip[data-type]').forEach(function(c) { c.classList.remove('active'); });
            btn.classList.add('active');
            activeType = btn.dataset.type;
            renderList();
        });

        var tbBtn = document.getElementById('tbBtn');
        var tbPanel = document.getElementById('tbPanel');

        tbBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            var isOpen = tbPanel.classList.contains('show');
            if (isOpen) {
                closeTbPanel();
            } else {
                tbPanel.classList.add('show');
                tbBtn.classList.add('open');
            }
        });

        tbPanel.addEventListener('click', function(e) {
            var chip = e.target.closest('.tb-panel-chip');
            if (!chip) return;
            e.stopPropagation();
            document.querySelectorAll('#tbPanel .tb-panel-chip').forEach(function(c) { c.classList.remove('active'); });
            chip.classList.add('active');
            activeTextbook = chip.dataset.tb;
            var label = activeTextbook === 'all' ? '教材版本' : activeTextbook;
            document.getElementById('tbBtnLabel').textContent = label;
            tbBtn.classList.toggle('active', activeTextbook !== 'all');
            closeTbPanel();
            renderList();
        });

        document.addEventListener('click', function() {
            closeTbPanel();
        });

        function closeTbPanel() {
            tbPanel.classList.remove('show');
            tbBtn.classList.remove('open');
        }

        renderList();

        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }
    </script>
</body>
</html>
