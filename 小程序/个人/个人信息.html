<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>个人信息 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #e8edf4 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
            display: flex; flex-direction: column;
        }

        .mesh-bg { position: absolute; top: -10%; left: -20%; width: 80%; height: 60%; background: radial-gradient(ellipse at center, rgba(99,102,241,0.3) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-2 { position: absolute; top: 15%; right: -30%; width: 90%; height: 70%; background: radial-gradient(ellipse at center, rgba(236,72,153,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-3 { position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%; background: radial-gradient(ellipse at center, rgba(168,85,247,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }

        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        .topbar {
            display: flex; align-items: center; padding: 0 16px; height: 44px; flex-shrink: 0;
            position: relative; z-index: 20;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.7); cursor: pointer;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06);
            -webkit-tap-highlight-color: transparent;
            transition: transform .18s cubic-bezier(0.16,1,0.3,1);
        }
        .back-btn:active { transform: scale(0.92); background: rgba(0,0,0,0.05); }
        .topbar-title {
            flex: 1; text-align: center; font-size: 1.0625rem; font-weight: 700;
            color: #0f172a; letter-spacing: -0.02em;
        }
        .topbar-spacer { width: 40px; height: 40px; flex-shrink: 0; }

        .scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            position: relative; z-index: 1; padding: 16px 20px;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .glass-card {
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            border: none; background: rgba(255,255,255,0.55);
            border-radius: 16px; overflow: hidden;
        }

        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; font-size: 0.875rem;
        }
        .info-row + .info-row { border-top: 1px solid rgba(0,0,0,0.04); }
        .info-label { color: #64748b; font-weight: 500; }
        .info-value { color: #0f172a; font-weight: 500; }

        .bottom-bar {
            flex-shrink: 0; padding: 12px 20px calc(env(safe-area-inset-bottom, 20px) + 12px);
            position: relative; z-index: 10;
        }
        .btn-logout {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            font-size: 0.9375rem; font-weight: 600; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform .18s cubic-bezier(0.16,1,0.3,1);
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 12px -4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
            color: #e11d48;
        }
        .btn-logout:active { transform: scale(0.97); }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="iphone-frame" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="dynamic-island"></div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <div class="topbar">
                <button class="back-btn" onclick="goBack()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="topbar-title">个人信息</span>
                <div class="topbar-spacer"></div>
            </div>

            <div class="scroll-area">
                <div class="glass-card">
                    <div class="info-row">
                        <span class="info-label">学生姓名</span>
                        <span id="display-name" class="info-value">薛云腾</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">学籍号</span>
                        <span id="display-student-id" class="info-value">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">年级</span>
                        <span id="display-class" class="info-value">初一(3)班</span>
                    </div>
                </div>
            </div>

            <div class="bottom-bar">
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = '../首页.html';
        }

        function logout() {
            sessionStorage.removeItem('loggedIn');
            sessionStorage.removeItem('studentId');
            window.location.href = '../登录/index.html';
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        function initPage() {
            var studentId = sessionStorage.getItem('studentId');
            if (studentId) {
                document.getElementById('display-student-id').textContent = studentId;
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
