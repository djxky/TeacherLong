<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>切换学生 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #e8edf4 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
        }
        .mesh-bg { position: absolute; top: -10%; left: -20%; width: 80%; height: 60%; background: radial-gradient(ellipse at center, rgba(99,102,241,0.3) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-2 { position: absolute; top: 15%; right: -30%; width: 90%; height: 70%; background: radial-gradient(ellipse at center, rgba(236,72,153,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-3 { position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%; background: radial-gradient(ellipse at center, rgba(168,85,247,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        .wx-capsule {
            position: absolute; top: 56px; right: 10px; z-index: 999;
            display: flex; align-items: center; height: 32px; border-radius: 16px;
            background: rgba(0,0,0,0.06); border: 0.5px solid rgba(0,0,0,0.08); overflow: hidden;
        }
        .wx-capsule-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 32px; border: none; background: none; cursor: pointer; color: #3c3c3c; padding: 0; }
        .wx-capsule-btn:active { background: rgba(0,0,0,0.05); }
        .wx-capsule-divider { width: 0.5px; height: 18px; background: rgba(0,0,0,0.12); }

        .page-bar {
            height: 44px; padding: 0 16px; display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .page-back {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #52525b; cursor: pointer; background: none; border: none;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .page-back:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }
        .page-title {
            position: absolute; left: 0; right: 0; text-align: center;
            font-size: 1.125rem; font-weight: 600; color: #18181b;
            pointer-events: none;
        }
        .page-add {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #4f46e5; cursor: pointer; background: rgba(99,102,241,0.08); border: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0;
        }
        .page-add:active { transform: scale(0.92); background: rgba(99,102,241,0.15); }

        .student-list {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 8px 20px 0;
        }
        .student-list::-webkit-scrollbar { display: none; }

        .student-card {
            padding: 18px 20px; border-radius: 20px; margin-bottom: 12px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 8px 24px -8px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.7);
            border: 2px solid transparent;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .student-card:active { transform: scale(0.98); }
        .student-card.selected {
            border-color: rgba(99,102,241,0.5);
            background: rgba(238,242,255,0.6);
            box-shadow: 0 8px 24px -8px rgba(99,102,241,0.1), inset 0 0 0 1px rgba(255,255,255,0.7);
        }
        .student-card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .student-card-name { font-size: 1.0625rem; font-weight: 700; color: #0f172a; }
        .student-card-check {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #d1d5db; background: #fff;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .student-card.selected .student-card-check {
            border-color: #6366f1; background: #6366f1;
        }
        .student-card-info {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px;
        }
        .student-card-field {}
        .student-card-field .field-label { font-size: 0.6875rem; color: #94a3b8; margin-bottom: 2px; }
        .student-card-field .field-value { font-size: 0.8125rem; color: #475569; font-weight: 500; }

        .bottom-bar {
            padding: 12px 20px calc(env(safe-area-inset-bottom, 20px) + 12px);
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .btn-confirm {
            width: 100%; padding: 16px; border-radius: 20px;
            font-size: 0.9375rem; font-weight: 700; color: #fff; border: none;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            box-shadow: 0 8px 24px -6px rgba(99,102,241,0.3);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-confirm:active { transform: scale(0.97); }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: #94a3b8; font-size: 0.875rem;
        }
        .empty-state svg { margin: 0 auto 12px; color: #cbd5e1; }

        .student-card-unbind {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.6875rem; font-weight: 500; color: #94a3b8;
            background: none; border: none; cursor: pointer;
            padding: 4px 8px; border-radius: 8px;
            transition: all 0.15s; margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .student-card-unbind:active { color: #e11d48; background: rgba(225,29,72,0.06); }

        .student-count {
            font-size: 0.6875rem; color: #94a3b8; font-weight: 500;
            padding: 0 4px 8px; text-align: right;
        }

        .modal-overlay {
            position: absolute; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.25); display: none;
            align-items: center; justify-content: center; padding: 32px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: rgba(255,255,255,0.95); border-radius: 24px; padding: 28px 24px 20px;
            width: 100%; max-width: 300px; text-align: center;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,0.8);
            backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border: none;
        }
        .modal-box h3 { font-size: 1.0625rem; font-weight: 700; color: #0f172a; margin: 0; }
        .modal-box p { font-size: 0.8125rem; color: #64748b; margin: 10px 0 0; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions button {
            flex: 1; padding: 13px; border-radius: 14px; font-size: 0.9375rem;
            font-weight: 600; cursor: pointer; border: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-actions button:active { transform: scale(0.96); }
        .btn-cancel { color: #475569; background: rgba(0,0,0,0.04); }
        .btn-confirm-red { color: #fff; background: #e11d48; }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── 模式切换按钮（手机框外，页面右上角） ── */
        .mode-toggle {
            position: fixed; top: 24px; right: 32px; z-index: 900;
            display: flex; align-items: center; gap: 0;
            background: #ffffff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden; font-size: 0.8125rem; font-weight: 600;
        }
        .mode-toggle button {
            padding: 10px 24px; border: none; background: transparent;
            color: #94a3b8; cursor: pointer; font-family: inherit;
            font-size: 0.8125rem; font-weight: 600; transition: all 0.2s;
        }
        .mode-toggle button.active { background: #4f46e5; color: #ffffff; }
        .sb-panel {
            position: fixed; top: 50%; right: 32px; width: 380px;
            max-height: 80vh; transform: translateY(-50%) translateX(20px);
            background: #ffffff; border-radius: 20px;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
            z-index: 800; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s; overflow: hidden;
        }
        .sb-panel.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
        .sb-drag-bar {
            padding: 12px 16px 8px; cursor: move; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .sb-drag-title { font-size: 0.8125rem; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 6px; }
        .sb-drag-title .sb-ver { font-size: 0.5625rem; font-weight: 600; color: #4f46e5; background: rgba(99,102,241,0.08); padding: 2px 8px; border-radius: 6px; }
        .sb-close { width: 24px; height: 24px; border-radius: 8px; border: none; background: rgba(0,0,0,0.04); color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; transition: background 0.2s; }
        .sb-close:hover { background: rgba(0,0,0,0.08); }
        .sb-content { flex: 1; overflow-y: auto; padding: 12px 16px 20px; -webkit-overflow-scrolling: touch; }
        .sb-content::-webkit-scrollbar { width: 3px; }
        .sb-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .sb-changelog { margin-bottom: 16px; }
        .sb-changelog-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; padding: 8px 0; user-select: none; }
        .sb-changelog-toggle svg { transition: transform 0.2s; }
        .sb-changelog-toggle.open svg { transform: rotate(90deg); }
        .sb-changelog-body { display: none; padding: 0 0 0 8px; border-left: 2px solid rgba(99,102,241,0.15); margin-left: 4px; }
        .sb-changelog-body.open { display: block; }
        .sb-changelog-body h3 { font-size: 0.6875rem; font-weight: 700; color: #334155; margin: 12px 0 4px; padding: 0; }
        .sb-changelog-body ul { margin: 0; padding: 0 0 0 16px; font-size: 0.6875rem; color: #475569; line-height: 1.8; }
        .sb-section { margin-bottom: 2px; }
        .sb-hd { display: flex; align-items: center; gap: 8px; padding: 10px 8px; border-radius: 10px; cursor: pointer; font-size: 0.8125rem; font-weight: 600; color: #0f172a; transition: background 0.15s; user-select: none; }
        .sb-hd:hover { background: rgba(0,0,0,0.02); }
        .sb-hd .sb-arrow { width: 16px; height: 16px; color: #94a3b8; flex-shrink: 0; transition: transform 0.2s; }
        .sb-section.op .sb-hd .sb-arrow { transform: rotate(90deg); }
        .sb-hd .sb-badge-new { font-size: 0.5rem; font-weight: 700; color: #059669; background: rgba(5,150,105,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-hd .sb-badge-updated { font-size: 0.5rem; font-weight: 700; color: #d97706; background: rgba(217,119,6,0.08); padding: 1px 6px; border-radius: 4px; }
        .sb-bd { display: none; padding: 4px 8px 12px 32px; font-size: 0.75rem; color: #475569; line-height: 1.75; }
        .sb-section.op .sb-bd { display: block; }
        .sb-bd h4 { font-size: 0.75rem; font-weight: 700; color: #2563eb; margin: 12px 0 4px; padding: 0; }
        .sb-bd blockquote { margin: 8px 0; padding: 8px 12px; border-radius: 8px; background: rgba(37,99,235,0.04); border-left: 3px solid rgba(37,99,235,0.3); font-size: 0.6875rem; color: #334155; }
        .sb-bd ul, .sb-bd ol { margin: 4px 0; padding-left: 16px; }
        .sb-bd li { margin: 2px 0; }
        .sb-bd .diff-add { background: rgba(5,150,105,0.06); color: #065f46; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-mod { background: rgba(217,119,6,0.06); color: #92400e; padding: 2px 6px; border-radius: 4px; }
        .sb-bd .diff-note { background: rgba(234,179,8,0.06); color: #854d0e; padding: 4px 8px; border-radius: 6px; display: block; margin: 6px 0; }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <div class="page-bar">
                <button class="page-back" onclick="goBack()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="page-title">切换学生</span>
                <button class="page-add" onclick="goAddStudent()" title="添加学生">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                </button>
            </div>

            <div class="student-list" id="student-list"></div>

            <div class="bottom-bar">
                <button class="btn-confirm" onclick="confirmSwitch()">确定</button>
            </div>
        </div>

        <!-- 解除绑定确认弹窗 -->
        <div id="modal-unbind" class="modal-overlay">
            <div class="modal-box">
                <h3>确认解除绑定？</h3>
                <p id="unbind-desc">解除绑定后，该学生将从列表中移除。</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeUnbindModal()">取消</button>
                    <button class="btn-confirm-red" onclick="confirmUnbind()">解除绑定</button>
                </div>
            </div>
        </div>
    </div>

    <div class="mode-toggle" id="modeToggle">
        <button class="active" onclick="setMode('demo')">演示</button>
        <button onclick="setMode('review')">过稿</button>
    </div>
    <div class="sb-panel" id="sbPanel">
        <div class="sb-drag-bar" id="sbDragBar">
            <span class="sb-drag-title">产品稿 · 切换学生 <span class="sb-ver">v1.0</span></span>
            <button class="sb-close" onclick="setMode('demo')">✕</button>
        </div>
        <div class="sb-content" id="sidebarContent"></div>
    </div>

    <script>
        var MAX_STUDENTS = 10;
        var selectedIndex = parseInt(localStorage.getItem('currentStudentIndex') || '0', 10);
        var unbindTargetIndex = -1;

        function getStudents() {
            try { return JSON.parse(localStorage.getItem('students')) || []; } catch(e) { return []; }
        }

        function renderList() {
            var list = getStudents();
            var container = document.getElementById('student-list');

            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state">' +
                    '<svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>' +
                    '<p>还没有添加学生<br>点击右上角 + 添加</p></div>';
                return;
            }

            if (selectedIndex >= list.length) selectedIndex = 0;

            var countHtml = '<div class="student-count">已绑定 ' + list.length + ' / ' + MAX_STUDENTS + ' 个学生</div>';

            container.innerHTML = countHtml + list.map(function(s, i) {
                var isSelected = i === selectedIndex;
                return '<div class="student-card' + (isSelected ? ' selected' : '') + '" onclick="selectStudent(' + i + ')">' +
                    '<div class="student-card-header">' +
                        '<span class="student-card-name">' + s.name + '</span>' +
                        '<span class="student-card-check">' +
                            (isSelected ? '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : '') +
                        '</span>' +
                    '</div>' +
                    '<div class="student-card-info">' +
                        '<div class="student-card-field"><div class="field-label">学校</div><div class="field-value">' + (s.school || '') + '</div></div>' +
                        '<div class="student-card-field"><div class="field-label">学号</div><div class="field-value">' + (s.studentId || '') + '</div></div>' +
                        '<div class="student-card-field"><div class="field-label">班级</div><div class="field-value">' + (s.className || '') + '</div></div>' +
                    '</div>' +
                    '<button class="student-card-unbind" onclick="event.stopPropagation();openUnbindModal(' + i + ')">' +
                        '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.181 8.68a4.503 4.503 0 011.903 6.405m-9.768-2.782L3.56 14.06a4.5 4.5 0 006.364 6.365l.636-.636m5.96-5.96l1.757-1.757a4.5 4.5 0 00-6.364-6.365l-.636.636m8.728 8.728a4.5 4.5 0 01-6.364 0M3.515 3.515a4.5 4.5 0 016.364 0"/></svg>' +
                        '解除绑定' +
                    '</button>' +
                '</div>';
            }).join('');
        }

        function selectStudent(idx) {
            selectedIndex = idx;
            renderList();
        }

        function openUnbindModal(idx) {
            unbindTargetIndex = idx;
            var list = getStudents();
            var name = list[idx] ? list[idx].name : '';
            document.getElementById('unbind-desc').textContent = '解除绑定后，「' + name + '」将从列表中移除。';
            document.getElementById('modal-unbind').classList.add('open');
        }

        function closeUnbindModal() {
            document.getElementById('modal-unbind').classList.remove('open');
            unbindTargetIndex = -1;
        }

        function confirmUnbind() {
            if (unbindTargetIndex < 0) return;
            var list = getStudents();
            var name = list[unbindTargetIndex] ? list[unbindTargetIndex].name : '';
            list.splice(unbindTargetIndex, 1);
            localStorage.setItem('students', JSON.stringify(list));

            if (selectedIndex === unbindTargetIndex) {
                selectedIndex = 0;
            } else if (selectedIndex > unbindTargetIndex) {
                selectedIndex--;
            }
            if (list.length > 0 && selectedIndex >= list.length) selectedIndex = 0;
            localStorage.setItem('currentStudentIndex', String(selectedIndex));

            closeUnbindModal();
            renderList();
            showToast('已解除「' + name + '」的绑定');
        }

        function confirmSwitch() {
            var list = getStudents();
            if (list.length === 0) { showToast('请先添加学生'); return; }
            localStorage.setItem('currentStudentIndex', String(selectedIndex));
            var s = list[selectedIndex];
            sessionStorage.setItem('name', s.name);
            sessionStorage.setItem('school', s.school || '');
            sessionStorage.setItem('gradeClass', s.className || '');
            showToast('已切换到 ' + s.name);
            setTimeout(function() { window.location.href = '../我的.html'; }, 600);
        }

        function goAddStudent() {
            var list = getStudents();
            if (list.length >= MAX_STUDENTS) {
                showToast('最多绑定 ' + MAX_STUDENTS + ' 个学生');
                return;
            }
            window.location.href = '添加学生.html';
        }

        function goBack() { window.location.href = '../我的.html'; }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        renderList();
    </script>

    <script type="text/markdown" id="prd-changelog">
### v1.0 — 2026-04-09
- 初始版本
    </script>

    <script type="text/markdown" id="prd-sections">
## 1. 页面概述

切换学生页面，展示当前用户已绑定的学生列表，支持选择切换当前学生、添加新学生、解除绑定。

## 2. 学生列表

#### 交互逻辑

1. 展示已绑定学生卡片列表，每张卡片包含：学生姓名、学校、学号、班级
2. 当前选中的学生卡片高亮并显示勾选标识
3. 点击卡片切换选中状态
4. 顶部显示已绑定数量（如「已绑定 2 / 10 个学生」）

## 3. 添加学生

#### 交互逻辑

1. 点击右上角 + 按钮跳转「添加学生」页面
2. 已达上限（10 个）时点击提示「最多绑定 10 个学生」

## 4. 解除绑定

#### 交互逻辑

1. 点击卡片底部「解除绑定」按钮，弹窗提示"确认解除绑定？解除绑定后，「学生姓名」将从列表中移除。"
2. 点击「取消」关闭弹窗，点击「解除绑定」移除该学生并刷新列表

## 5. 确认切换

#### 交互逻辑

点击底部「确定」按钮，将选中学生信息写入 sessionStorage，提示「已切换到 XX」，跳转至「我的」页面
    </script>

    <script>
    var _currentMode = 'demo';
    function setMode(mode) {
        if (mode === _currentMode) return;
        _currentMode = mode;
        var btns = document.querySelectorAll('#modeToggle button');
        btns.forEach(function(b, i) { b.classList.toggle('active', (mode === 'demo' ? i === 0 : i === 1)); });
        var panel = document.getElementById('sbPanel');
        if (mode === 'review') { panel.classList.add('open'); renderSidebar(); } else { panel.classList.remove('open'); }
    }
    document.getElementById('modeToggle').addEventListener('click', function(e) { e.stopPropagation(); });
    if (new URLSearchParams(window.location.search).get('mode') === 'review') {
        setTimeout(function() { _currentMode = 'demo'; setMode('review'); }, 100);
    }
    function renderSidebar() {
        var container = document.getElementById('sidebarContent');
        var changelogSrc = document.getElementById('prd-changelog');
        var sectionsSrc = document.getElementById('prd-sections');
        if (!changelogSrc || !sectionsSrc) return;
        container.innerHTML = buildChangelog(changelogSrc.textContent) + buildSections(sectionsSrc.textContent);
        container.querySelectorAll('.sb-hd').forEach(function(hd) {
            hd.addEventListener('click', function(e) { e.stopPropagation(); this.parentElement.classList.toggle('op'); });
        });
        container.querySelectorAll('.sb-changelog-toggle').forEach(function(t) {
            t.addEventListener('click', function(e) { e.stopPropagation(); this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); });
        });
    }
    function buildChangelog(md) {
        var html = marked.parse(md);
        return '<div class="sb-changelog"><div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div><div class="sb-changelog-body">' + html + '</div></div>';
    }
    function buildSections(md) {
        var lines = md.split('\n'); var sections = []; var cur = null;
        lines.forEach(function(line) {
            var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
            if (m) { if (cur) sections.push(cur); cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] }; }
            else if (cur) { cur.lines.push(line); }
        });
        if (cur) sections.push(cur);
        return sections.map(function(s) {
            var badge = '';
            if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
            if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
            var body = marked.parse(s.lines.join('\n'));
            body = body.replace(/\[\+\]\s*/g, '<span class="diff-add">[+] </span>');
            body = body.replace(/\[~\]\s*/g, '<span class="diff-mod">[~] </span>');
            body = body.replace(/\[!\]\s*(.+?)(<br|<\/p|$)/g, '<span class="diff-note">[!] $1</span>$2');
            return '<div class="sb-section" data-sb="' + s.num + '"><div class="sb-hd"><svg class="sb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' + s.num + '. ' + s.title + badge + '</div><div class="sb-bd">' + body + '</div></div>';
        }).join('');
    }
    (function() {
        var panel = document.getElementById('sbPanel'); var bar = document.getElementById('sbDragBar');
        var isDragging = false, startX, startY, origX, origY;
        function clampPos(x, y) { var pw = panel.offsetWidth, ph = panel.offsetHeight; return { x: Math.max(0, Math.min(x, window.innerWidth - pw)), y: Math.max(0, Math.min(y, window.innerHeight - ph)) }; }
        bar.addEventListener('mousedown', function(e) { isDragging = true; startX = e.clientX; startY = e.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; });
        document.addEventListener('mousemove', function(e) { if (!isDragging) return; var p = clampPos(origX + e.clientX - startX, origY + e.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; });
        document.addEventListener('mouseup', function() { isDragging = false; });
        bar.addEventListener('touchstart', function(e) { isDragging = true; var t = e.touches[0]; startX = t.clientX; startY = t.clientY; var r = panel.getBoundingClientRect(); origX = r.left; origY = r.top; }, { passive: true });
        document.addEventListener('touchmove', function(e) { if (!isDragging) return; var t = e.touches[0]; var p = clampPos(origX + t.clientX - startX, origY + t.clientY - startY); panel.style.position = 'fixed'; panel.style.transform = 'none'; panel.style.left = p.x + 'px'; panel.style.top = p.y + 'px'; panel.style.right = 'auto'; }, { passive: true });
        document.addEventListener('touchend', function() { isDragging = false; });
    })();
    </script>
