<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>添加学生 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 40%, #e8edf4 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
        }
        .mesh-bg { position: absolute; top: -10%; left: -20%; width: 80%; height: 60%; background: radial-gradient(ellipse at center, rgba(99,102,241,0.3) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-2 { position: absolute; top: 15%; right: -30%; width: 90%; height: 70%; background: radial-gradient(ellipse at center, rgba(236,72,153,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .mesh-bg-3 { position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%; background: radial-gradient(ellipse at center, rgba(168,85,247,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none; z-index: 0; }
        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        .wx-capsule {
            position: absolute; top: 56px; right: 10px; z-index: 999;
            display: flex; align-items: center; height: 32px; border-radius: 16px;
            background: rgba(0,0,0,0.06); border: 0.5px solid rgba(0,0,0,0.08); overflow: hidden;
        }
        .wx-capsule-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 32px; border: none; background: none; cursor: pointer; color: #3c3c3c; padding: 0; }
        .wx-capsule-btn:active { background: rgba(0,0,0,0.05); }
        .wx-capsule-divider { width: 0.5px; height: 18px; background: rgba(0,0,0,0.12); }

        .page-bar {
            height: 44px; padding: 0 16px; display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .page-back {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #52525b; cursor: pointer; background: none; border: none;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .page-back:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }
        .page-title {
            position: absolute; left: 0; right: 0; text-align: center;
            font-size: 1.125rem; font-weight: 600; color: #18181b;
            pointer-events: none;
        }

        .form-scroll {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 20px 20px;
        }
        .form-scroll::-webkit-scrollbar { display: none; }

        .form-card {
            border-radius: 24px; overflow: hidden;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.7);
            border: none;
        }
        .form-section { padding: 18px 20px; }
        .form-section + .form-section { border-top: 1px solid rgba(0,0,0,0.04); }
        .form-label {
            font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.04em;
            color: #94a3b8; margin-bottom: 10px;
        }

        /* 学校选择器 */
        .school-select {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-radius: 16px;
            background: rgba(255,255,255,0.8); border: 1px solid rgba(226,232,240,0.9);
            cursor: pointer; transition: all 0.2s;
        }
        .school-select:active { background: #fff; border-color: rgba(99,102,241,0.3); }
        .school-select.has-value { border-color: rgba(99,102,241,0.3); background: #fff; }
        .school-select svg { color: #94a3b8; flex-shrink: 0; }
        .school-select-text {
            flex: 1; font-size: 0.9375rem; color: #94a3b8;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .school-select-text.selected { color: #1e293b; }

        .text-input-wrap {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-radius: 16px;
            background: rgba(255,255,255,0.8); border: 1px solid rgba(226,232,240,0.9);
            transition: all 0.2s;
        }
        .text-input-wrap:focus-within { background: #fff; border-color: rgba(99,102,241,0.3); box-shadow: 0 0 0 2px rgba(99,102,241,0.1); }
        .text-input-wrap svg { color: #94a3b8; flex-shrink: 0; }
        .text-input-wrap input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 0.9375rem; color: #1e293b; min-width: 0;
            font-family: inherit;
        }
        .text-input-wrap input::placeholder { color: #94a3b8; }

        .bottom-bar {
            padding: 12px 20px calc(env(safe-area-inset-bottom, 20px) + 12px);
            flex-shrink: 0; position: relative; z-index: 10;
            background: linear-gradient(to top, rgba(241,245,249,0.95) 0%, rgba(241,245,249,0) 100%);
        }
        .btn-verify {
            width: 100%; padding: 16px; border-radius: 20px;
            font-size: 0.9375rem; font-weight: 700; color: #fff; border: none;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            box-shadow: 0 8px 24px -6px rgba(99,102,241,0.3);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-verify:active { transform: scale(0.97); }
        .btn-verify.loading { pointer-events: none; opacity: 0.8; }
        .btn-verify.loading .btn-text { display: none; }
        .btn-verify.loading .btn-loader { display: flex; }
        .btn-loader {
            display: none; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-loader-dot {
            width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.8);
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .btn-loader-dot:nth-child(2) { animation-delay: 0.15s; }
        .btn-loader-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .verify-result {
            margin-top: 16px; padding: 14px 18px; border-radius: 16px;
            display: none; align-items: center; gap: 10px;
            font-size: 0.875rem; font-weight: 500;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .verify-result.success {
            display: flex; background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2); color: #059669;
        }
        .verify-result.fail {
            display: flex; background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2); color: #dc2626;
        }
        .verify-result svg { flex-shrink: 0; }
        .verify-result-info { flex: 1; }
        .verify-result-sub { font-size: 0.75rem; font-weight: 400; opacity: 0.7; margin-top: 2px; }

        /* 学校选择弹窗 */
        .picker-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.4);
            display: none; align-items: flex-end; justify-content: center;
        }
        .picker-overlay.open { display: flex; }
        .picker-sheet {
            width: 100%; background: #fff;
            border-radius: 20px 20px 0 0;
            max-height: 65%; display: flex; flex-direction: column;
            animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .picker-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px 12px; border-bottom: 1px solid #f1f5f9;
        }
        .picker-header h3 { font-size: 1.0625rem; font-weight: 700; color: #18181b; margin: 0; }
        .picker-close {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #f4f4f5; border: none; cursor: pointer; color: #71717a;
        }
        .picker-close:active { background: #e4e4e7; }
        .picker-search {
            margin: 12px 20px; padding: 10px 14px; border-radius: 12px;
            background: #f8fafc; border: 1px solid #e2e8f0;
            display: flex; align-items: center; gap: 8px;
        }
        .picker-search input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 0.875rem; color: #334155; min-width: 0; font-family: inherit;
        }
        .picker-search input::placeholder { color: #94a3b8; }
        .picker-list {
            flex: 1; overflow-y: auto; padding: 8px 12px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .picker-item {
            padding: 14px 12px; border-radius: 12px; font-size: 0.9375rem; color: #334155;
            cursor: pointer; transition: background 0.15s;
            display: flex; align-items: center; gap: 10px;
        }
        .picker-item:active { background: rgba(99,102,241,0.06); }
        .picker-item.selected { background: rgba(99,102,241,0.08); color: #4f46e5; font-weight: 600; }
        .picker-item-icon {
            width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(6,182,212,0.1));
            display: flex; align-items: center; justify-content: center;
        }
        .picker-empty { padding: 40px 20px; text-align: center; color: #94a3b8; font-size: 0.875rem; }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <div class="page-bar">
                <button class="page-back" onclick="goBack()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="page-title">添加学生</span>
            </div>

            <div class="form-scroll">
                <div class="form-card">
                    <div class="form-section">
                        <p class="form-label">所在学校</p>
                        <div class="school-select" id="school-select" onclick="openSchoolPicker()">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21"/></svg>
                            <span class="school-select-text" id="school-text">请选择学校</span>
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                        </div>
                    </div>
                    <div class="form-section">
                        <p class="form-label">学生姓名</p>
                        <div class="text-input-wrap">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            <input type="text" id="input-name" placeholder="请输入学生姓名" oninput="clearResult()">
                        </div>
                    </div>
                    <div class="form-section">
                        <p class="form-label">学号</p>
                        <div class="text-input-wrap">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15A2.25 2.25 0 002.25 6.75v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z"/></svg>
                            <input type="text" id="input-studentId" placeholder="请输入学号" inputmode="numeric" oninput="clearResult()">
                        </div>
                    </div>
                </div>

                <div class="verify-result" id="verify-result">
                    <svg id="result-icon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"></svg>
                    <div class="verify-result-info">
                        <div id="result-text"></div>
                        <div id="result-sub" class="verify-result-sub"></div>
                    </div>
                </div>

            </div>

            <div class="bottom-bar">
                <button type="button" class="btn-verify" id="btn-verify" onclick="doVerify()">
                    <span class="btn-text">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                        验证并添加
                    </span>
                    <span class="btn-loader">
                        <span class="btn-loader-dot"></span>
                        <span class="btn-loader-dot"></span>
                        <span class="btn-loader-dot"></span>
                    </span>
                </button>
            </div>
        </div>

        <!-- 学校选择弹窗 -->
        <div id="picker-overlay" class="picker-overlay">
            <div class="picker-sheet">
                <div class="picker-header">
                    <h3>选择学校</h3>
                    <button type="button" class="picker-close" onclick="closeSchoolPicker()">
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="picker-search">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:#94a3b8;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
                    <input type="text" id="school-search" placeholder="搜索学校名称" oninput="filterSchools()">
                </div>
                <div class="picker-list" id="school-list"></div>
            </div>
        </div>
    </div>

    <script>
        var schoolData = [
            { id: 'lgwx', name: '龙岗区外国语学校' },
            { id: 'lgsy', name: '龙岗区实验学校' },
            { id: 'lgps', name: '龙岗区平安里学校' },
            { id: 'lgyc', name: '龙岗区育才学校' },
            { id: 'lgxn', name: '龙岗区新南学校' },
            { id: 'lgzx', name: '龙岗中学' },
            { id: 'lgdl', name: '龙岗区东联学校' },
            { id: 'lglh', name: '龙岗区龙华学校' },
            { id: 'lgbg', name: '龙岗区百高学校' },
            { id: 'lgkj', name: '龙岗区科技城学校' }
        ];
        var selectedSchool = null;

        function renderSchoolList(keyword) {
            var kw = (keyword || '').trim().toLowerCase();
            var filtered = kw ? schoolData.filter(function(s) { return s.name.toLowerCase().indexOf(kw) >= 0; }) : schoolData;
            var listEl = document.getElementById('school-list');
            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="picker-empty">未找到匹配的学校</div>';
                return;
            }
            listEl.innerHTML = filtered.map(function(s) {
                var isSel = selectedSchool && selectedSchool.id === s.id;
                return '<div class="picker-item' + (isSel ? ' selected' : '') + '" onclick="selectSchool(\'' + s.id + '\')">' +
                    '<div class="picker-item-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="color:#8b5cf6;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21"/></svg></div>' +
                    '<span>' + s.name + '</span></div>';
            }).join('');
        }

        function openSchoolPicker() {
            document.getElementById('school-search').value = '';
            renderSchoolList('');
            document.getElementById('picker-overlay').classList.add('open');
        }
        function closeSchoolPicker() {
            document.getElementById('picker-overlay').classList.remove('open');
        }
        function filterSchools() {
            renderSchoolList(document.getElementById('school-search').value);
        }
        function selectSchool(id) {
            selectedSchool = schoolData.find(function(s) { return s.id === id; });
            if (selectedSchool) {
                document.getElementById('school-text').textContent = selectedSchool.name;
                document.getElementById('school-text').classList.add('selected');
                document.getElementById('school-select').classList.add('has-value');
            }
            closeSchoolPicker();
            clearResult();
        }

        function clearResult() {
            var el = document.getElementById('verify-result');
            el.classList.remove('success', 'fail');
            el.style.display = 'none';
        }

        var MAX_STUDENTS = 10;

        function doVerify() {
            var existingList = [];
            try { existingList = JSON.parse(localStorage.getItem('students')) || []; } catch(e) {}
            if (existingList.length >= MAX_STUDENTS) {
                showToast('最多绑定 ' + MAX_STUDENTS + ' 个学生');
                return;
            }

            if (!selectedSchool) { showToast('请选择学校'); return; }
            var name = document.getElementById('input-name').value.trim();
            if (!name) { showToast('请输入学生姓名'); return; }
            var studentId = document.getElementById('input-studentId').value.trim();
            if (!studentId) { showToast('请输入学号'); return; }

            var btn = document.getElementById('btn-verify');
            btn.classList.add('loading');
            clearResult();

            setTimeout(function() {
                btn.classList.remove('loading');

                var el = document.getElementById('verify-result');
                var iconEl = document.getElementById('result-icon');
                var textEl = document.getElementById('result-text');
                var subEl = document.getElementById('result-sub');

                el.classList.add('success');
                el.style.display = 'flex';
                iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>';
                textEl.textContent = '验证成功';
                subEl.textContent = name + ' · ' + selectedSchool.name;

                var classNames = ['三年级(1)班', '四年级(2)班', '五年级(3)班', '一年级(1)班', '二年级(4)班', '六年级(2)班'];
                var className = classNames[Math.floor(Math.random() * classNames.length)];

                var newStudent = {
                    name: name,
                    school: selectedSchool.name,
                    studentId: studentId,
                    className: className
                };

                var list = [];
                try { list = JSON.parse(localStorage.getItem('students')) || []; } catch(e) {}
                list.push(newStudent);
                var newIndex = list.length - 1;
                localStorage.setItem('students', JSON.stringify(list));
                localStorage.setItem('currentStudentIndex', String(newIndex));

                sessionStorage.setItem('name', name);
                sessionStorage.setItem('school', selectedSchool.name);
                sessionStorage.setItem('gradeClass', className);

                showToast('添加成功，已切换到 ' + name);
                setTimeout(function() {
                    window.location.href = '切换学生.html';
                }, 1200);
            }, 1500);
        }

        function goBack() { window.location.href = '切换学生.html'; }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }
    </script>
</body>
</html>
