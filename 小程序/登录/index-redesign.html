<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登录 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- UI/UX Pro Max 推荐字体：Poppins + Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <style>
        /* 基础字体设置 - UI/UX Pro Max 推荐 */
        body {
            font-family: 'Open Sans', 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, #ECFEFF 0%, #E0F2FE 50%, #CFFAFE 100%);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', 'Noto Sans SC', sans-serif;
        }

        /* Aurora 背景效果 */
        .aurora-orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(90px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* 玻璃态面板 - 调整为更好的对比度 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 12px 40px rgba(8, 145, 178, 0.12),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.9);
        }

        /* 输入框样式 - 确保足够对比度 */
        .input-wrap {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(203, 213, 225, 0.8);
            border-radius: 16px;
            transition: all 200ms ease;
        }

        .input-wrap:focus-within {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.15);
            border-color: #0891B2;
        }

        /* 主按钮 - 使用设计系统配色 */
        .btn-primary {
            background: linear-gradient(135deg, #0891B2 0%, #22D3EE 100%);
            background-size: 200% 200%;
            box-shadow: 0 12px 40px -8px rgba(8, 145, 178, 0.4);
            transition: transform 200ms ease, box-shadow 200ms ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 48px -8px rgba(8, 145, 178, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* 品牌渐变 - 使用设计系统配色 */
        .brand-gradient {
            background: linear-gradient(135deg, #0891B2, #22D3EE, #22C55E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Toast 提示 */
        #toast {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(22, 78, 99, 0.95);
            color: white;
            padding: 14px 28px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: all 250ms ease;
            z-index: 2000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 获取验证码按钮 */
        .btn-code {
            background: rgba(8, 145, 178, 0.12);
            color: #0891B2;
            border: 1.5px solid rgba(8, 145, 178, 0.3);
            font-weight: 600;
            white-space: nowrap;
            transition: all 200ms ease;
            cursor: pointer;
        }

        .btn-code:hover:not(:disabled) {
            background: rgba(8, 145, 178, 0.18);
            border-color: rgba(8, 145, 178, 0.5);
        }

        .btn-code:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 信息面板 */
        .info-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 16px 48px rgba(8, 145, 178, 0.08),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            overflow: hidden;
        }

        .info-section {
            padding: 24px;
        }

        .info-section:not(:last-child) {
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .info-section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        /* 姓名输入框 */
        .name-input-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(226, 232, 240, 0.9);
            transition: all 200ms ease;
        }

        .name-input-wrap:focus-within {
            background: #fff;
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.15);
            border-color: #0891B2;
        }

        /* 年级选择器 */
        .grade-tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .grade-chip {
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 200ms ease;
            border: 2px solid rgba(203, 213, 225, 0.6);
            background: rgba(248, 250, 252, 0.95);
            color: #475569;
        }

        .grade-chip:hover {
            background: rgba(236, 254, 255, 0.9);
            border-color: rgba(8, 145, 178, 0.4);
            color: #164e63;
            transform: translateY(-2px);
        }

        .grade-chip:active {
            transform: scale(0.97);
        }

        .grade-chip.selected {
            background: linear-gradient(135deg, rgba(8, 145, 178, 0.15), rgba(34, 211, 238, 0.15));
            border-color: #0891B2;
            color: #0e7490;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(8, 145, 178, 0.2);
        }

        /* 确保文本对比度 4.5:1 以上 (WCAG AA) */
        .text-primary { color: #164e63; }
        .text-secondary { color: #475569; }
        .text-muted { color: #64748b; }

        /* 焦点状态可见性 - 无障碍要求 */
        *:focus-visible {
            outline: 2px solid #0891B2;
            outline-offset: 2px;
        }

        /* 尊重用户的减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="iphone-frame is-column" id="app-root">
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button type="button" class="wx-capsule-btn" aria-label="更多" onclick="showToast('小程序菜单')"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button type="button" class="wx-capsule-btn" aria-label="关闭" onclick="showToast('关闭小程序')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>
        <div id="toast" role="alert" aria-live="polite"><span id="toast-msg">提示</span></div>

        <div class="absolute inset-0 flex flex-col pt-[50px] relative app-main-safe">
            <!-- Aurora 背景装饰 - 使用设计系统配色 -->
            <div class="aurora-orb w-72 h-72 bg-[#0891B2]/30 -top-40 -left-32"></div>
            <div class="aurora-orb w-80 h-80 bg-[#22C55E]/25 bottom-40 -right-36"></div>

            <main class="flex-1 flex flex-col items-center justify-center px-6 relative z-10">
                <div class="w-full max-w-[320px]">
                    <!-- 品牌区 -->
                    <div class="text-center mb-10">
                        <div class="inline-flex w-20 h-20 rounded-2xl glass-panel items-center justify-center mb-5 shadow-lg">
                            <!-- 教育图标 -->
                            <svg class="w-10 h-10 text-[#0891B2]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.905 59.905 0 0 1 12 3.493a59.902 59.902 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
                            </svg>
                        </div>
                        <h1 class="text-3xl font-bold brand-gradient mb-2">AI 龙老师</h1>
                        <p class="text-sm text-[#64748b]" id="step-desc">手机号验证码登录</p>
                    </div>

                    <!-- 步骤1：手机号登录 -->
                    <form id="login-form" class="block">
                        <div class="glass-panel rounded-3xl p-6 space-y-5" id="panel-login">
                            <!-- 手机号输入 -->
                            <div>
                                <label for="phone" class="block text-xs font-semibold text-[#64748b] uppercase tracking-wider mb-2">手机号</label>
                                <div class="input-wrap flex items-center gap-3 px-4 py-3.5">
                                    <svg class="w-5 h-5 text-[#64748b] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                    </svg>
                                    <input
                                        type="tel"
                                        id="phone"
                                        name="phone"
                                        placeholder="请输入手机号"
                                        class="flex-1 bg-transparent text-[#164e63] placeholder-[#94a3b8] text-[16px] focus:outline-none"
                                        autocomplete="tel"
                                        maxlength="11"
                                        required
                                        aria-required="true">
                                </div>
                            </div>

                            <!-- 验证码输入 -->
                            <div>
                                <label for="code" class="block text-xs font-semibold text-[#64748b] uppercase tracking-wider mb-2">验证码</label>
                                <div class="input-wrap flex items-center gap-2 px-4 py-3.5 min-w-0">
                                    <svg class="w-5 h-5 text-[#64748b] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                                    </svg>
                                    <input
                                        type="text"
                                        id="code"
                                        name="code"
                                        placeholder="请输入验证码"
                                        class="flex-1 min-w-0 bg-transparent text-[#164e63] placeholder-[#94a3b8] text-[16px] focus:outline-none"
                                        inputmode="numeric"
                                        maxlength="6"
                                        autocomplete="one-time-code"
                                        required
                                        aria-required="true">
                                    <button
                                        type="button"
                                        id="btn-send-code"
                                        class="btn-code shrink-0 px-4 py-2 rounded-xl text-sm transition-all whitespace-nowrap"
                                        aria-label="获取验证码">
                                        获取验证码
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 登录按钮 -->
                        <button
                            type="submit"
                            class="w-full py-4 rounded-2xl font-bold text-base btn-primary text-white mt-6 flex items-center justify-center gap-2"
                            id="btn-login">
                            <span>登录</span>
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                            </svg>
                        </button>
                    </form>

                    <!-- 步骤2：完善信息 -->
                    <form id="info-form" class="hidden">
                        <div class="info-panel" id="panel-info">
                            <!-- 姓名输入 -->
                            <div class="info-section">
                                <p class="info-section-label">姓名</p>
                                <div class="name-input-wrap">
                                    <svg class="w-5 h-5 text-[#64748b] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                    <input
                                        type="text"
                                        id="name"
                                        name="name"
                                        placeholder="请输入你的姓名"
                                        class="flex-1 bg-transparent text-[#164e63] placeholder-[#94a3b8] text-[16px] focus:outline-none min-w-0"
                                        required
                                        aria-required="true">
                                </div>
                            </div>

                            <!-- 年级选择 -->
                            <div class="info-section">
                                <p class="info-section-label">请选择年级</p>
                                <input type="hidden" id="grade-class" name="gradeClass" value="" required>
                                <div class="grade-tiles" id="grade-tiles" role="radiogroup" aria-label="选择年级">
                                    <span class="grade-chip" data-grade="一年级" role="radio" aria-checked="false" tabindex="0">一年级</span>
                                    <span class="grade-chip" data-grade="二年级" role="radio" aria-checked="false" tabindex="0">二年级</span>
                                    <span class="grade-chip" data-grade="三年级" role="radio" aria-checked="false" tabindex="0">三年级</span>
                                    <span class="grade-chip" data-grade="四年级" role="radio" aria-checked="false" tabindex="0">四年级</span>
                                    <span class="grade-chip" data-grade="五年级" role="radio" aria-checked="false" tabindex="0">五年级</span>
                                    <span class="grade-chip" data-grade="六年级" role="radio" aria-checked="false" tabindex="0">六年级</span>
                                    <span class="grade-chip" data-grade="七年级" role="radio" aria-checked="false" tabindex="0">七年级</span>
                                    <span class="grade-chip" data-grade="八年级" role="radio" aria-checked="false" tabindex="0">八年级</span>
                                    <span class="grade-chip" data-grade="九年级" role="radio" aria-checked="false" tabindex="0">九年级</span>
                                    <span class="grade-chip" data-grade="高一" role="radio" aria-checked="false" tabindex="0">高一</span>
                                    <span class="grade-chip" data-grade="高二" role="radio" aria-checked="false" tabindex="0">高二</span>
                                    <span class="grade-chip" data-grade="高三" role="radio" aria-checked="false" tabindex="0">高三</span>
                                </div>
                            </div>
                        </div>

                        <!-- 完成按钮 -->
                        <button
                            type="submit"
                            class="w-full py-4 rounded-2xl font-bold text-base btn-primary text-white mt-6 flex items-center justify-center gap-2"
                            id="btn-info">
                            <span>完成并进入</span>
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                            </svg>
                        </button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script>
        var codeCountdown = 0;
        var codeTimer = null;

        // 获取验证码（演示：仅前端倒计时，不真实发送）
        document.getElementById('btn-send-code').onclick = function() {
            var phone = document.getElementById('phone').value.trim();
            if (!phone) {
                showToast('请先输入手机号');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号');
                return;
            }
            if (codeCountdown > 0) return;

            showToast('验证码已发送');
            codeCountdown = 60;
            var btn = document.getElementById('btn-send-code');
            btn.disabled = true;
            btn.textContent = codeCountdown + 's';

            codeTimer = setInterval(function() {
                codeCountdown--;
                btn.textContent = codeCountdown + 's';
                if (codeCountdown <= 0) {
                    clearInterval(codeTimer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        };

        // 年级选择 - 支持键盘导航
        var gradeTiles = document.getElementById('grade-tiles');
        gradeTiles.addEventListener('click', handleGradeSelect);
        gradeTiles.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                handleGradeSelect(e);
            }
        });

        function handleGradeSelect(e) {
            var chip = e.target.closest('.grade-chip');
            if (!chip) return;

            var value = chip.getAttribute('data-grade');
            document.getElementById('grade-class').value = value;

            // 更新所有 chip 的状态
            document.querySelectorAll('.grade-chip').forEach(function(c) {
                c.classList.remove('selected');
                c.setAttribute('aria-checked', 'false');
            });

            chip.classList.add('selected');
            chip.setAttribute('aria-checked', 'true');
        }

        // 步骤1：手机号验证码登录
        document.getElementById('login-form').onsubmit = function(e) {
            e.preventDefault();

            var phone = document.getElementById('phone').value.trim();
            var code = document.getElementById('code').value.trim();

            if (!phone) {
                showToast('请输入手机号');
                return false;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号');
                return false;
            }

            if (!code) {
                showToast('请输入验证码');
                return false;
            }

            if (!/^\d{6}$/.test(code)) {
                showToast('验证码格式不正确');
                return false;
            }

            // 保存手机号
            sessionStorage.setItem('phone', phone);
            showToast('登录成功，请完善信息');

            // 切换到信息填写步骤
            setTimeout(function() {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('info-form').classList.remove('hidden');
                document.getElementById('step-desc').textContent = '请填写姓名与年级';
            }, 600);

            return false;
        };

        // 步骤2：填写姓名与年级
        document.getElementById('info-form').onsubmit = function(e) {
            e.preventDefault();

            var name = document.getElementById('name').value.trim();
            var gradeClass = document.getElementById('grade-class').value.trim();

            if (!name) {
                showToast('请输入姓名');
                return false;
            }

            if (!gradeClass) {
                showToast('请选择年级');
                return false;
            }

            // 保存用户信息
            sessionStorage.setItem('gradeClass', gradeClass);
            sessionStorage.setItem('name', name);
            sessionStorage.setItem('loggedIn', 'true');

            showToast('信息保存成功，即将进入首页');

            setTimeout(function() {
                window.location.href = '../首页.html';
            }, 800);

            return false;
        };

        // Toast 提示函数
        function showToast(msg) {
            var el = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            el.classList.add('show');

            setTimeout(function() {
                el.classList.remove('show');
            }, 2500);
        }

        // 页面加载时的输入焦点
        window.addEventListener('load', function() {
            document.getElementById('phone').focus();
        });
    </script>
</body>
</html>
