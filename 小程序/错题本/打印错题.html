<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 打印错题</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .page-view {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            background: #F6F7F9;
            transition: opacity 0.3s;
        }
        .page-view.hidden { display: none; }

        /* ── 选题页 ── */
        .date-label {
            font-size: 13px; font-weight: 600; color: #94a3b8;
            padding: 12px 0 6px; margin: 0;
        }
        .q-card {
            background: #fff; border-radius: 16px;
            margin-bottom: 10px; overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            position: relative;
        }
        .q-card .q-img {
            width: 100%; display: block;
            max-height: 180px; object-fit: cover;
        }
        .q-check {
            position: absolute; top: 10px; left: 10px;
            width: 26px; height: 26px; border-radius: 50%;
            border: 2.5px solid #c4b5fd;
            background: rgba(255,255,255,0.85);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 5;
            transition: all 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .q-check.checked {
            background: #7c3aed; border-color: #7c3aed;
        }
        .q-check.checked::after {
            content: '✓'; color: #fff; font-size: 14px; font-weight: 700;
        }

        /* 底部操作栏 */
        .bottom-bar {
            flex-shrink: 0;
            background: #fff;
            border-top: 1px solid #f1f5f9;
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
            display: flex; align-items: center; gap: 10px;
        }
        .bar-btn {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 6px;
            padding: 10px 18px; border-radius: 999px;
            font-size: 14px; font-weight: 600; font-family: inherit;
            cursor: pointer; border: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s;
        }
        .bar-btn:active { transform: scale(0.97); }
        .bar-select-all {
            background: none; color: #1e293b; padding-left: 0;
        }
        .bar-select-all .sa-check {
            width: 22px; height: 22px; border-radius: 6px;
            border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .bar-select-all .sa-check.checked {
            background: #7c3aed; border-color: #7c3aed;
        }
        .bar-select-all .sa-check.checked::after {
            content: '✓'; color: #fff; font-size: 12px; font-weight: 700;
        }
        .bar-cancel {
            background: #f1f5f9; color: #64748b;
        }
        .bar-print {
            flex: 1; justify-content: center;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: #fff; font-size: 15px; font-weight: 700;
            border-radius: 999px; padding: 12px 20px;
            box-shadow: 0 4px 12px -3px rgba(124,58,237,0.4);
        }
        .bar-print:disabled {
            background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed;
        }

        /* ── 生成中遮罩 ── */
        .gen-overlay {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center;
        }
        .gen-overlay.show { display: flex; }
        .gen-card {
            background: #fff; border-radius: 20px;
            padding: 36px 48px; text-align: center;
            box-shadow: 0 8px 32px -6px rgba(0,0,0,0.12);
        }
        .gen-icon {
            width: 64px; height: 64px; margin: 0 auto 14px;
            position: relative;
        }
        .gen-icon .gi-box {
            width: 48px; height: 36px; border-radius: 8px;
            background: linear-gradient(135deg, #dbeafe, #c7d2fe);
            margin: 14px auto 0;
        }
        .gen-icon .gi-ball {
            width: 14px; height: 14px; border-radius: 50%;
            background: #7c3aed; position: absolute;
            top: 6px; right: 12px;
            animation: genBounce 1.2s ease-in-out infinite;
        }
        .gen-icon .gi-ball2 {
            width: 8px; height: 8px; border-radius: 50%;
            background: #a78bfa; position: absolute;
            top: 0; right: 24px;
            animation: genBounce 1.2s ease-in-out 0.2s infinite;
        }
        @keyframes genBounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .gen-text {
            font-size: 15px; font-weight: 600; color: #334155;
        }

        /* ── 分享页 ── */
        .share-center {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 0 32px;
        }
        .pdf-icon {
            width: 72px; height: 72px; border-radius: 16px;
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        .pdf-icon svg { width: 36px; height: 36px; color: #ef4444; }
        .pdf-filename {
            font-size: 17px; font-weight: 700; color: #0f172a;
            text-align: center; margin-bottom: 6px;
        }
        .pdf-size {
            font-size: 13px; color: #94a3b8; margin-bottom: 0;
        }
        .share-bar {
            flex-shrink: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
            display: flex; gap: 10px;
        }
        .share-preview-btn {
            flex-shrink: 0;
            padding: 12px 24px; border-radius: 999px;
            background: #f1f5f9; color: #334155;
            font-size: 14px; font-weight: 600; font-family: inherit;
            border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .share-preview-btn:active { background: #e2e8f0; }
        .share-wechat-btn {
            flex: 1; padding: 12px 20px; border-radius: 999px;
            background: linear-gradient(135deg, #07c160, #06ad56);
            color: #fff; font-size: 15px; font-weight: 700; font-family: inherit;
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 16px -4px rgba(7,193,96,0.45);
            -webkit-tap-highlight-color: transparent;
        }
        .share-wechat-btn:active { transform: scale(0.98); }

        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white;
            padding: 12px 24px; border-radius: 8px;
            z-index: 1000; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="iphone-frame is-column" id="app-root">
        <div class="dynamic-island"></div>
        <div class="wx-capsule">
            <button type="button" class="wx-capsule-btn" aria-label="更多"><svg width="18" height="4" viewBox="0 0 18 4"><circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg></button>
            <div class="wx-capsule-divider"></div>
            <button type="button" class="wx-capsule-btn" aria-label="关闭"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M2 2l8 8M10 2l-8 8"/></svg></button>
        </div>

        <!-- ===== 第 1 页：选题 ===== -->
        <div id="page-select" class="page-view">
            <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md pt-[56px] pb-3 px-4" style="border-bottom: 1px solid rgba(0,0,0,0.04);">
                <div class="flex items-center gap-2">
                    <button onclick="goBack()" class="p-1 -ml-1 active:opacity-60">
                        <svg class="w-6 h-6 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <h1 id="page-title" class="text-[17px] font-bold text-slate-800">错题本</h1>
                </div>
            </header>

            <main id="question-list" class="flex-1 overflow-y-auto no-scrollbar px-4 pt-1 pb-4">
            </main>

            <div class="bottom-bar">
                <button type="button" class="bar-btn bar-select-all" onclick="toggleSelectAll()">
                    <div id="sa-check" class="sa-check"></div>
                    全选
                </button>
                <button type="button" class="bar-btn bar-cancel" onclick="goBack()">取消</button>
                <button type="button" id="btn-print" class="bar-btn bar-print" onclick="startGenerate()" disabled>
                    打印 (<span id="selected-count">0</span>)
                </button>
            </div>

            <!-- 生成中遮罩 -->
            <div id="gen-overlay" class="gen-overlay">
                <div class="gen-card">
                    <div class="gen-icon">
                        <div class="gi-ball"></div>
                        <div class="gi-ball2"></div>
                        <div class="gi-box"></div>
                    </div>
                    <div class="gen-text" id="gen-text">生成中 1%...</div>
                </div>
            </div>
        </div>

        <!-- ===== 第 2 页：分享 ===== -->
        <div id="page-share" class="page-view hidden">
            <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md pt-[56px] pb-3 px-4" style="border-bottom: 1px solid rgba(0,0,0,0.04);">
                <div class="flex items-center gap-2">
                    <button onclick="backToSelect()" class="p-1 -ml-1 active:opacity-60">
                        <svg class="w-6 h-6 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                </div>
            </header>

            <div class="share-center">
                <div class="pdf-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <text x="7" y="17" font-size="6" font-weight="bold" fill="#ef4444" stroke="none" font-family="sans-serif">PDF</text>
                    </svg>
                </div>
                <div id="pdf-filename" class="pdf-filename">练习.pdf</div>
                <div id="pdf-size" class="pdf-size">文件大小：-- KB</div>
            </div>

            <div class="share-bar">
                <button type="button" class="share-preview-btn" onclick="previewPdf()">预览</button>
                <button type="button" class="share-wechat-btn" onclick="downloadPdf()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.266 6.266 0 01-.247-1.72c0-3.571 3.354-6.467 7.49-6.467.266 0 .526.02.784.042C16.794 4.986 13.177 2.188 8.691 2.188zm-2.6 4.408c.56 0 1.015.46 1.015 1.025 0 .566-.455 1.025-1.015 1.025-.56 0-1.015-.46-1.015-1.025 0-.565.455-1.025 1.015-1.025zm5.209 0c.56 0 1.015.46 1.015 1.025 0 .566-.455 1.025-1.015 1.025-.56 0-1.015-.46-1.015-1.025 0-.565.455-1.025 1.015-1.025zM16.245 8.63c-3.588 0-6.5 2.512-6.5 5.611 0 3.1 2.912 5.612 6.5 5.612a7.928 7.928 0 002.227-.319.723.723 0 01.597.082l1.583.926a.273.273 0 00.139.045c.133 0 .241-.11.241-.245 0-.06-.024-.12-.04-.178l-.324-1.232a.492.492 0 01.177-.554c1.523-1.12 2.5-2.782 2.5-4.637 0-3.1-2.912-5.611-6.5-5.611h-.6zm-2.166 3.436c.466 0 .845.383.845.854 0 .472-.379.854-.845.854s-.845-.382-.845-.854c0-.471.379-.854.845-.854zm4.332 0c.466 0 .845.383.845.854 0 .472-.379.854-.845.854s-.845-.382-.845-.854c0-.471.379-.854.845-.854z"/></svg>
                    下载分享到微信
                </button>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script>
        var allQuestions = [];
        var selectedIds = new Set();
        var pdfBlob = null;
        var pdfSizeKB = 0;
        var printMode = localStorage.getItem('printMode') || 'original';
        var SIMILAR_PER_Q = 3;

        var SIMILAR_QUESTIONS = {
            math: [
                { num: '第1题', type: '选择题', text: '已知 a+b=12, ab=32, 则 a²+b² = ?\nA. 80  B. 82  C. 78  D. 84', answer: 'A（a²+b²=(a+b)²-2ab=80）' },
                { num: '第2题', type: '填空题', text: '若 x+y=10, xy=21, 则 x²+y² = ______。', answer: '58' },
                { num: '第3题', type: '解答题', text: '解方程组: x+y=8, x-y=2。', answer: 'x=5, y=3' }
            ],
            eng: [
                { num: '第1题', type: '阅读题', text: 'Read the passage and choose the best title.\nA. My School Day  B. A Trip', answer: 'A' },
                { num: '第2题', type: '语法题', text: 'He asked me ______ I had finished.\nA. if  B. what', answer: 'A' },
                { num: '第3题', type: '写作题', text: 'Write about "My Favorite Season" in 60 words.', answer: '要点: 季节+原因+活动' }
            ]
        };

        function initPage() {
            loadQuestions();
            renderQuestions();
            updateUI();
            var title = document.getElementById('page-title');
            if (title) title.textContent = '错题本';
        }

        function loadQuestions() {
            try {
                var s = localStorage.getItem('wrongQuestions');
                allQuestions = s ? JSON.parse(s) : [];
            } catch(e) { allQuestions = []; }
        }

        function groupByDate(qs) {
            var sorted = qs.slice().sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
            var groups = [];
            var lastLabel = '';
            sorted.forEach(function(q) {
                var label = q.dateLabel || (q.date||'').split(' ')[0] || '未知日期';
                if (label !== lastLabel) {
                    groups.push({ label: label, items: [] });
                    lastLabel = label;
                }
                groups[groups.length-1].items.push(q);
            });
            return groups;
        }

        function renderQuestions() {
            var list = document.getElementById('question-list');
            list.innerHTML = '';
            if (allQuestions.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:80px 0;color:#94a3b8;font-size:14px;">暂无错题</div>';
                return;
            }
            var groups = groupByDate(allQuestions);
            groups.forEach(function(g) {
                var dl = document.createElement('div');
                dl.className = 'date-label';
                dl.textContent = g.label;
                list.appendChild(dl);
                g.items.forEach(function(q) {
                    var card = document.createElement('div');
                    card.className = 'q-card';
                    card.dataset.id = q.id;
                    card.innerHTML = '<div class="q-check" data-qid="' + q.id + '" onclick="event.stopPropagation();toggleCheck(this)"></div>' +
                        '<img class="q-img" src="' + (q.image||'') + '" alt="错题" onerror="this.style.height=\'80px\';this.style.background=\'#f1f5f9\';">';
                    card.onclick = function(){ toggleCheck(card.querySelector('.q-check')); };
                    list.appendChild(card);
                });
            });
        }

        function toggleCheck(el) {
            var id = parseInt(el.dataset.qid || el.closest('.q-card').querySelector('.q-check').dataset.qid, 10);
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
                el.classList.remove('checked');
            } else {
                selectedIds.add(id);
                el.classList.add('checked');
            }
            updateUI();
        }

        function toggleSelectAll() {
            var allChecked = selectedIds.size === allQuestions.length;
            if (allChecked) {
                selectedIds.clear();
                document.querySelectorAll('.q-check').forEach(function(c){ c.classList.remove('checked'); });
            } else {
                allQuestions.forEach(function(q){ selectedIds.add(q.id); });
                document.querySelectorAll('.q-check').forEach(function(c){ c.classList.add('checked'); });
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('selected-count').textContent = selectedIds.size;
            document.getElementById('btn-print').disabled = selectedIds.size === 0;
            var sa = document.getElementById('sa-check');
            if (selectedIds.size === allQuestions.length && allQuestions.length > 0) {
                sa.classList.add('checked');
            } else {
                sa.classList.remove('checked');
            }
        }

        function getSubjLabel(s) {
            return {math:'数学',eng:'英语',chinese:'语文',science:'科学'}[s] || s || '综合';
        }

        function startGenerate() {
            if (selectedIds.size === 0) return;
            var overlay = document.getElementById('gen-overlay');
            var text = document.getElementById('gen-text');
            overlay.classList.add('show');
            var pct = 1;
            text.textContent = '生成中 ' + pct + '%...';
            var interval = setInterval(function(){
                pct += Math.floor(Math.random()*15) + 5;
                if (pct > 95) pct = 95;
                text.textContent = '生成中 ' + pct + '%...';
            }, 300);

            var selected = allQuestions.filter(function(q){ return selectedIds.has(q.id); });
            generatePDF(selected, function(blob, sizeKB){
                clearInterval(interval);
                text.textContent = '生成中 100%...';
                pdfBlob = blob;
                pdfSizeKB = sizeKB;
                setTimeout(function(){
                    overlay.classList.remove('show');
                    showSharePage(selected.length, sizeKB);
                }, 400);
            });
        }

        function generatePDF(questions, callback) {
            var jsPDF = window.jspdf.jsPDF;
            var pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            var pageW = pdf.internal.pageSize.getWidth();
            var pageH = pdf.internal.pageSize.getHeight();

            var imgTasks = [];
            questions.forEach(function(q, idx) {
                imgTasks.push({ kind: 'image', src: q.image, label: '原题 ' + (idx+1), q: q });
            });

            if (printMode === 'original_with_similar') {
                var answerTexts = [];
                questions.forEach(function(q, qi) {
                    var subj = q.subject || 'math';
                    var sqs = (SIMILAR_QUESTIONS[subj] || SIMILAR_QUESTIONS.math).slice(0, SIMILAR_PER_Q);
                    sqs.forEach(function(sq, si) {
                        imgTasks.push({ kind: 'text', label: '原题' + (qi+1) + ' 相似题' + (si+1), body: sq.type + '\n' + sq.text });
                        answerTexts.push({ label: '原题' + (qi+1) + ' 相似题' + (si+1) + ' 答案', body: sq.answer });
                    });
                });
                answerTexts.forEach(function(a) {
                    imgTasks.push({ kind: 'text', label: a.label, body: a.body });
                });
            }

            var loaded = 0;
            var results = [];

            function tryFinish() {
                if (loaded < imgTasks.length) return;
                results.forEach(function(r, i) {
                    if (i > 0) pdf.addPage();
                    if (r.kind === 'image' && r.img) {
                        var ratio = Math.min((pageW - 16) / r.img.width, (pageH - 24) / r.img.height);
                        var w = r.img.width * ratio;
                        var h = r.img.height * ratio;
                        pdf.addImage(r.img, 'JPEG', (pageW - w)/2, 12 + (pageH - 24 - h)/2, w, h);
                    } else if (r.kind === 'text') {
                        pdf.setFont('helvetica', 'bold');
                        pdf.setFontSize(13);
                        pdf.text(r.label || '', 14, 20);
                        pdf.setFont('helvetica', 'normal');
                        pdf.setFontSize(11);
                        var lines = pdf.splitTextToSize(r.body || '', pageW - 28);
                        var y = 30;
                        lines.forEach(function(line) {
                            if (y > pageH - 14) { pdf.addPage(); y = 20; }
                            pdf.text(line, 14, y);
                            y += 6;
                        });
                    }
                });

                var blob = pdf.output('blob');
                var sizeKB = (blob.size / 1024).toFixed(2);
                callback(blob, sizeKB);
            }

            imgTasks.forEach(function(task, idx) {
                if (task.kind === 'text') {
                    results[idx] = { kind: 'text', label: task.label, body: task.body };
                    loaded++;
                    tryFinish();
                } else {
                    var img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = function() {
                        results[idx] = { kind: 'image', img: img, label: task.label };
                        loaded++;
                        tryFinish();
                    };
                    img.onerror = function() {
                        results[idx] = { kind: 'text', label: task.label, body: '（图片加载失败）' };
                        loaded++;
                        tryFinish();
                    };
                    img.src = task.src;
                }
            });
        }

        function showSharePage(count, sizeKB) {
            document.getElementById('page-select').classList.add('hidden');
            document.getElementById('page-share').classList.remove('hidden');
            var today = new Date();
            var dateStr = today.getFullYear() + '-' +
                String(today.getMonth()+1).padStart(2,'0') + '-' +
                String(today.getDate()).padStart(2,'0');
            var suffix = printMode === 'original_with_similar' ? '练习' : '错题';
            document.getElementById('pdf-filename').textContent = dateStr + ' ' + suffix + '.pdf';
            document.getElementById('pdf-size').textContent = '文件大小：' + sizeKB + ' KB';
        }

        function backToSelect() {
            document.getElementById('page-share').classList.add('hidden');
            document.getElementById('page-select').classList.remove('hidden');
        }

        function previewPdf() {
            if (!pdfBlob) { showToast('请先生成PDF'); return; }
            var url = URL.createObjectURL(pdfBlob);
            window.open(url, '_blank');
        }

        function downloadPdf() {
            if (!pdfBlob) { showToast('请先生成PDF'); return; }
            var a = document.createElement('a');
            a.href = URL.createObjectURL(pdfBlob);
            a.download = document.getElementById('pdf-filename').textContent;
            a.click();
            showToast('PDF已生成，请使用微信分享');
        }

        function goBack() {
            window.location.href = '错题本.html';
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function(){ t.classList.remove('show'); }, 2000);
        }

        window.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
