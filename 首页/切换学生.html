<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>切换学生 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
        }
        .mesh-bg { position: absolute; top: -10%; left: -20%; width: 80%; height: 60%; background: radial-gradient(ellipse at center, rgba(99,102,241,0.45) 0%, transparent 65%); filter: blur(60px); pointer-events: none; z-index: 0; }
        .mesh-bg-2 { position: absolute; top: 15%; right: -30%; width: 90%; height: 70%; background: radial-gradient(ellipse at center, rgba(236,72,153,0.35) 0%, transparent 65%); filter: blur(60px); pointer-events: none; z-index: 0; }
        .mesh-bg-3 { position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%; background: radial-gradient(ellipse at center, rgba(168,85,247,0.35) 0%, transparent 65%); filter: blur(60px); pointer-events: none; z-index: 0; }
        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        .page-bar {
            height: 44px; padding: 0 16px; display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .page-back {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #52525b; cursor: pointer; background: none; border: none;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .page-back:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }
        .page-title { font-size: 1.125rem; font-weight: 600; color: #18181b; flex: 1; }
        .page-add {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #4f46e5; cursor: pointer; background: rgba(99,102,241,0.08); border: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0;
        }
        .page-add:active { transform: scale(0.92); background: rgba(99,102,241,0.15); }

        .student-list {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 8px 20px 0;
        }
        .student-list::-webkit-scrollbar { display: none; }

        .student-card {
            padding: 18px 20px; border-radius: 20px; margin-bottom: 12px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 8px 24px -8px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.7);
            border: 2px solid transparent;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .student-card:active { transform: scale(0.98); }
        .student-card.selected {
            border-color: rgba(99,102,241,0.5);
            background: rgba(238,242,255,0.6);
            box-shadow: 0 8px 24px -8px rgba(99,102,241,0.1), inset 0 0 0 1px rgba(255,255,255,0.7);
        }
        .student-card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .student-card-name { font-size: 1.0625rem; font-weight: 700; color: #0f172a; }
        .student-card-check {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #d1d5db; background: #fff;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .student-card.selected .student-card-check {
            border-color: #6366f1; background: #6366f1;
        }
        .student-card-info {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px;
        }
        .student-card-field {}
        .student-card-field .field-label { font-size: 0.6875rem; color: #94a3b8; margin-bottom: 2px; }
        .student-card-field .field-value { font-size: 0.8125rem; color: #475569; font-weight: 500; }

        .bottom-bar {
            padding: 12px 20px calc(env(safe-area-inset-bottom, 20px) + 12px);
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .btn-confirm {
            width: 100%; padding: 16px; border-radius: 20px;
            font-size: 0.9375rem; font-weight: 700; color: #fff; border: none;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            box-shadow: 0 8px 24px -6px rgba(99,102,241,0.3);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-confirm:active { transform: scale(0.97); }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: #94a3b8; font-size: 0.875rem;
        }
        .empty-state svg { margin: 0 auto 12px; color: #cbd5e1; }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="dynamic-island"></div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <div class="page-bar">
                <button class="page-back" onclick="goBack()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="page-title">切换学生</span>
                <button class="page-add" onclick="goAddStudent()" title="添加学生">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                </button>
            </div>

            <div class="student-list" id="student-list"></div>

            <div class="bottom-bar">
                <button class="btn-confirm" onclick="confirmSwitch()">确定</button>
            </div>
        </div>
    </div>

    <script>
        var selectedIndex = parseInt(localStorage.getItem('currentStudentIndex') || '0', 10);

        function getStudents() {
            try { return JSON.parse(localStorage.getItem('students')) || []; } catch(e) { return []; }
        }

        function renderList() {
            var list = getStudents();
            var container = document.getElementById('student-list');

            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state">' +
                    '<svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>' +
                    '<p>还没有添加学生<br>点击右上角 + 添加</p></div>';
                return;
            }

            if (selectedIndex >= list.length) selectedIndex = 0;

            container.innerHTML = list.map(function(s, i) {
                var isSelected = i === selectedIndex;
                return '<div class="student-card' + (isSelected ? ' selected' : '') + '" onclick="selectStudent(' + i + ')">' +
                    '<div class="student-card-header">' +
                        '<span class="student-card-name">' + s.name + '</span>' +
                        '<span class="student-card-check">' +
                            (isSelected ? '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : '') +
                        '</span>' +
                    '</div>' +
                    '<div class="student-card-info">' +
                        '<div class="student-card-field"><div class="field-label">学校</div><div class="field-value">' + s.school + '</div></div>' +
                        '<div class="student-card-field"><div class="field-label">学号</div><div class="field-value">' + s.studentId + '</div></div>' +
                        '<div class="student-card-field"><div class="field-label">班级</div><div class="field-value">' + s.className + '</div></div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function selectStudent(idx) {
            selectedIndex = idx;
            renderList();
        }

        function confirmSwitch() {
            var list = getStudents();
            if (list.length === 0) { showToast('请先添加学生'); return; }
            localStorage.setItem('currentStudentIndex', String(selectedIndex));
            var s = list[selectedIndex];
            sessionStorage.setItem('name', s.name);
            sessionStorage.setItem('school', s.school);
            sessionStorage.setItem('gradeClass', s.className);
            showToast('已切换到 ' + s.name);
            setTimeout(function() { window.location.href = '我的.html'; }, 600);
        }

        function goAddStudent() { window.location.href = '添加学生.html'; }
        function goBack() { window.location.href = '我的.html'; }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        renderList();
    </script>
</body>
</html>
