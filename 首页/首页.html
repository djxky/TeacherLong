<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
        }

        /* Mesh Gradients */
        .mesh-bg {
            position: absolute; top: -10%; left: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.45) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-2 {
            position: absolute; top: 15%; right: -30%; width: 90%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(236,72,153,0.35) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-3 {
            position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.35) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-4 {
            position: absolute; top: 40%; left: 10%; width: 70%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(56,189,248,0.3) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-5 {
            position: absolute; bottom: 10%; right: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(245,158,11,0.25) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }

        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        .tab-panel { display: flex !important; visibility: visible; pointer-events: auto; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

        .home-scroll {
            flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; position: relative; z-index: 1;
        }
        .home-scroll::-webkit-scrollbar { display: none; }

        /* 顶部导航 */
        .top-nav {
            height: 44px; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .top-nav-tabs { display: flex; gap: 20px; align-items: baseline; }
        .top-nav-tab {
            font-size: 1.125rem; font-weight: 400; color: #a1a1aa;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 0; background: none; border: none;
            font-family: inherit; position: relative;
        }
        .top-nav-tab.active {
            font-size: 1.25rem; font-weight: 700; color: #18181b;
        }
        .top-nav-icon {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #71717a; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .top-nav-icon:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }

        /* 通用玻璃拟态样式 */
        .main-card, .minor-tools, .vz-featured, .vz-mini, .vz-course-card, .paper-item {
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.7);
            border: none;
        }
        
        .minor-tools, .paper-item { background: rgba(255, 255, 255, 0.6); }
        
        .main-card, .minor-tool, .minor-tool-icon, .vz-featured, .vz-mini, .vz-course-card, .paper-item {
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-card:active, .minor-tool:active, .vz-featured:active, .vz-mini:active, .vz-course-card:active, .paper-item:active {
            transform: scale(0.96);
        }

        /* AI 龙老师问候区 */
        .hero-banner {
            margin: 12px 20px 0; padding: 12px 8px;
            position: relative;
            display: flex; align-items: center; gap: 16px;
        }
        .mascot-img {
            position: relative; z-index: 2; width: 68px; height: 68px;
            object-fit: cover; object-position: top center;
            border-radius: 50%; flex-shrink: 0;
            box-shadow: 0 6px 16px -4px rgba(15,23,42,0.1), inset 0 0 0 1px rgba(255,255,255,0.5);
        }
        .hero-text {
            flex: 1; min-width: 0; position: relative; z-index: 1;
        }
        .hero-text h1 {
            font-size: 1.125rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; line-height: 1.3;
            background: linear-gradient(135deg, #312e81, #9333ea);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-text p {
            font-size: 0.75rem; color: #64748b; margin: 4px 0 0 0; line-height: 1.4;
            display: flex; align-items: center; gap: 4px;
        }
        .hero-text p svg { color: #8b5cf6; }

        /* ── 主功能双卡 ── */
        .tools-area { margin: 24px 20px 0; }
        .main-tools {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            margin-bottom: 20px;
        }
        .main-card {
            padding: 18px 16px; border-radius: 20px;
            position: relative; overflow: hidden;
        }
        .main-card-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .main-card h3 {
            font-size: 0.9375rem; font-weight: 700; margin: 0; color: #0f172a;
            line-height: 1.3; position: relative; z-index: 2;
        }
        .main-card p {
            font-size: 0.6875rem; margin: 4px 0 0; color: #64748b;
            line-height: 1.3; position: relative; z-index: 2;
        }
        .mc-indigo { background: linear-gradient(135deg, rgba(238,242,255,0.8) 0%, rgba(255,255,255,0.5) 100%); }
        .mc-indigo .main-card-icon { color: #4338ca; }
        .mc-amber { background: linear-gradient(135deg, rgba(255,251,235,0.8) 0%, rgba(255,255,255,0.5) 100%); }
        .mc-amber .main-card-icon { color: #b45309; }

        /* ── 次级工具行 ── */
        .minor-tools {
            display: grid; grid-template-columns: repeat(4, 1fr);
            border-radius: 20px; padding: 16px 8px 10px;
            row-gap: 12px;
        }
        .minor-tool {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .minor-tool-icon {
            width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .minor-tool-label {
            font-size: 0.6875rem; font-weight: 500; color: #475569;
            text-align: center;
        }
        .minor-tool-icon.mi-green { color: #059669; }
        .minor-tool-icon.mi-orange { color: #ea580c; }
        .minor-tool-icon.mi-purple { color: #7c3aed; }
        .minor-tool-icon.mi-rose { color: #e11d48; }
        .minor-tool-icon.mi-blue { color: #2563eb; }
        .minor-tool-icon.mi-amber { color: #d97706; }
        .minor-tool-icon.mi-teal { color: #0d9488; }

        /* ── 视频课堂专区 ── */
        .vz-section { padding: 0 20px; margin-top: 32px; }
        .vz-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .vz-header h2 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .vz-header-badge {
            font-size: 0.5625rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(99,102,241,0.1);
            color: #4f46e5;
        }

        /* ── 视频卡片 (featured大卡 + 2小卡并排) ── */
        .vz-featured {
            border-radius: 20px; padding: 20px 18px;
            position: relative; overflow: hidden;
            margin-bottom: 12px;
            background: linear-gradient(135deg, rgba(240, 253, 250, 0.7) 0%, rgba(255, 255, 255, 0.4) 100%);
        }
        .vz-featured .vf-glow {
            position: absolute; right: -40px; top: -40px; width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(16,185,129,0.25) 0%, transparent 70%);
            pointer-events: none; filter: blur(32px);
        }
        .vz-featured .vf-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.625rem; font-weight: 700; padding: 4px 10px;
            border-radius: 8px; background: rgba(99,102,241,0.1); color: #4f46e5;
            margin-bottom: 12px; position: relative; z-index: 1;
        }
        .vz-featured .vf-title {
            font-size: 1.125rem; font-weight: 700; margin: 0; color: #0f172a;
            line-height: 1.3; position: relative; z-index: 1;
        }
        .vz-featured .vf-desc {
            font-size: 0.8125rem; color: #64748b;
            margin: 6px 0 0; position: relative; z-index: 1;
        }
        .vz-featured .vf-tags {
            display: flex; gap: 6px; margin-top: 14px; position: relative; z-index: 1;
        }
        .vz-featured .vf-tag {
            font-size: 0.6875rem; font-weight: 600; padding: 4px 10px;
            border-radius: 8px; background: rgba(255,255,255,0.6); color: #475569;
        }

        .vz-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .vz-mini {
            border-radius: 16px; padding: 16px 14px;
            position: relative; overflow: hidden;
        }
        .vz-mini-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.8);
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .vz-mini-green { background: linear-gradient(135deg, rgba(240, 253, 244, 0.7) 0%, rgba(255, 255, 255, 0.4) 100%); }
        .vz-mini-green .vz-mini-icon { color: #059669; }
        .vz-mini-orange { background: linear-gradient(135deg, rgba(255, 247, 237, 0.7) 0%, rgba(255, 255, 255, 0.4) 100%); }
        .vz-mini-orange .vz-mini-icon { color: #b45309; }
        .vz-mini h4 {
            font-size: 0.875rem; font-weight: 700; color: #0f172a;
            margin: 0; line-height: 1.3;
        }
        .vz-mini p {
            font-size: 0.6875rem; color: #64748b;
            margin: 4px 0 0;
        }
        .vz-mini-tags {
            display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap;
        }
        .vm-tag {
            font-size: 0.625rem; font-weight: 600; padding: 3px 8px; border-radius: 6px;
            background: rgba(255,255,255,0.6); color: #475569;
        }

        /* ── 视频课堂·按学科课程网格 ── */
        .vz-course-tabs {
            display: flex; gap: 4px; margin: 20px 0 16px;
        }
        .vz-course-tab {
            padding: 6px 14px; font-size: 0.75rem; font-weight: 600;
            color: #a1a1aa; background: transparent; border: none;
            cursor: pointer; border-radius: 12px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .vz-course-tab.active {
            color: #18181b;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .vz-course-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .vz-course-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(248, 250, 252, 0.5) 100%);
            border-radius: 16px;
            overflow: hidden;
        }
        .vz-course-cover {
            height: 72px; display: flex; align-items: center;
            justify-content: center;
            position: relative;
        }
        .vz-course-play-btn {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 4px 12px -2px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        .vz-course-play-btn svg { width: 14px; height: 14px; margin-left: 2px; }
        .vc-indigo { background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(99,102,241,0.02) 100%); color: #4f46e5; }
        .vc-green { background: linear-gradient(135deg, rgba(16,185,129,0.15) 0%, rgba(16,185,129,0.02) 100%); color: #059669; }
        .vc-amber { background: linear-gradient(135deg, rgba(245,158,11,0.15) 0%, rgba(245,158,11,0.02) 100%); color: #d97706; }
        .vc-rose { background: linear-gradient(135deg, rgba(225,29,72,0.15) 0%, rgba(225,29,72,0.02) 100%); color: #e11d48; }
        .vc-cyan { background: linear-gradient(135deg, rgba(6,182,212,0.15) 0%, rgba(6,182,212,0.02) 100%); color: #0891b2; }
        .vz-course-body { padding: 12px; }
        .vz-course-title {
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            margin: 0; line-height: 1.35;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; min-height: 2.7em;
        }
        .vz-course-meta {
            display: flex; align-items: center; gap: 6px; margin-top: 8px;
        }
        .vz-course-tag {
            font-size: 0.5rem; font-weight: 600;
            padding: 2px 6px; border-radius: 4px;
        }
        .vct-new { background: rgba(99,102,241,0.08); color: #6366f1; }
        .vct-sync { background: rgba(5,150,105,0.08); color: #059669; }
        .vct-special { background: rgba(217,119,6,0.08); color: #b45309; }
        .vz-course-lessons {
            font-size: 0.5625rem; color: #64748b;
        }

        /* ── 内容推荐横滑区 ── */
        .feed-section { margin-top: 32px; }
        .feed-header {
            display: flex; align-items: center; padding: 0 20px; margin-bottom: 20px;
        }
        .feed-header h2 {
            font-size: 1.125rem; font-weight: 700; color: #0f172a;
            margin: 0; letter-spacing: -0.01em;
            display: flex; align-items: center; gap: 6px;
        }
        .paper-tabs {
            display: flex; gap: 4px; padding: 0 20px; margin-bottom: 16px;
        }
        .paper-tab {
            padding: 6px 16px; font-size: 0.8125rem; font-weight: 600;
            color: #64748b; background: transparent; border: none;
            cursor: pointer; border-radius: 12px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .paper-tab.active {
            color: #0f172a;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .paper-list { padding: 0 20px; }
        .paper-item {
            display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: 16px;
            margin-bottom: 12px;
        }
        .paper-item:last-child { margin-bottom: 0; }
        .paper-icon {
            width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.8);
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .pi-chinese { background: linear-gradient(135deg, rgba(238,242,255,0.9) 0%, rgba(255,255,255,0.6) 100%); color: #4f46e5; }
        .pi-math { background: linear-gradient(135deg, rgba(255,251,235,0.9) 0%, rgba(255,255,255,0.6) 100%); color: #d97706; }
        .pi-eng { background: linear-gradient(135deg, rgba(236,253,245,0.9) 0%, rgba(255,255,255,0.6) 100%); color: #059669; }
        .pi-sci { background: linear-gradient(135deg, rgba(236,254,255,0.9) 0%, rgba(255,255,255,0.6) 100%); color: #0891b2; }
        .paper-info { flex: 1; min-width: 0; }
        .paper-title {
            font-size: 0.8125rem; font-weight: 600; color: #0f172a;
            margin: 0; line-height: 1.4;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .paper-row {
            display: flex; align-items: center; gap: 6px; margin-top: 6px;
        }
        .paper-type-tag {
            font-size: 0.5rem; font-weight: 600;
            padding: 2px 5px; border-radius: 4px;
        }
        .pt-midterm { background: rgba(37,99,235,0.08); color: #2563eb; }
        .pt-final { background: rgba(219,39,119,0.08); color: #db2777; }
        .pt-unit { background: rgba(22,163,74,0.08); color: #16a34a; }
        .pt-mock { background: rgba(217,119,6,0.08); color: #d97706; }
        .paper-dl {
            font-size: 0.625rem; color: #a1a1aa;
            display: flex; align-items: center; gap: 3px;
        }
        .paper-arrow { color: #d4d4d8; flex-shrink: 0; }

        /* ── 模式切换按钮（手机框外，页面右上角） ── */
        .mode-toggle {
            position: fixed; top: 24px; right: 32px;
            z-index: 900;
            display: flex; align-items: center; gap: 0;
            background: #ffffff; border-radius: 12px;
            box-shadow: 0 4px 24px -4px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            overflow: hidden; font-size: 0.8125rem; font-weight: 600;
        }
        .mode-toggle button {
            padding: 10px 24px; border: none; background: transparent;
            color: #94a3b8; cursor: pointer; font-family: inherit;
            font-size: 0.8125rem; font-weight: 600; transition: all 0.2s;
        }
        .mode-toggle button.active {
            background: #4f46e5; color: #ffffff;
        }

        /* ── 侧边栏浮窗（手机框右侧） ── */
        .sb-panel {
            position: fixed; top: 50%; right: 32px; width: 380px;
            max-height: 80vh; transform: translateY(-50%) translateX(20px);
            background: #ffffff; border-radius: 20px;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
            z-index: 800; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            overflow: hidden;
        }
        .sb-panel.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }

        .sb-drag-bar {
            padding: 12px 16px 8px; cursor: move; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .sb-drag-title {
            font-size: 0.8125rem; font-weight: 700; color: #0f172a;
            display: flex; align-items: center; gap: 6px;
        }
        .sb-drag-title .sb-ver {
            font-size: 0.5625rem; font-weight: 600; color: #4f46e5;
            background: rgba(99,102,241,0.08); padding: 2px 8px; border-radius: 6px;
        }
        .sb-close {
            width: 24px; height: 24px; border-radius: 8px; border: none;
            background: rgba(0,0,0,0.04); color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; transition: background 0.2s;
        }
        .sb-close:hover { background: rgba(0,0,0,0.08); }

        .sb-content {
            flex: 1; overflow-y: auto; padding: 12px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .sb-content::-webkit-scrollbar { width: 3px; }
        .sb-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

        /* 产品稿 changelog */
        .sb-changelog { margin-bottom: 16px; }
        .sb-changelog-toggle {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; font-weight: 600; color: #64748b;
            cursor: pointer; padding: 8px 0; user-select: none;
        }
        .sb-changelog-toggle svg { transition: transform 0.2s; }
        .sb-changelog-toggle.open svg { transform: rotate(90deg); }
        .sb-changelog-body {
            display: none; padding: 0 0 0 8px;

        function buildChangelog(md) {
            var html = marked.parse(md);
            return '<div class="sb-changelog">' +
                '<div class="sb-changelog-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 更新日志</div>' +
                '<div class="sb-changelog-body">' + html + '</div></div>';
        }

        function buildSections(md) {
            var lines = md.split('\n');
            var sections = []; var cur = null;
            lines.forEach(function(line) {
                var m = line.match(/^## (\d+)\.\s+(.+?)(?:\s+\[(NEW|UPDATED)\])?\s*$/);
                if (m) {
                    if (cur) sections.push(cur);
                    cur = { num: m[1], title: m[2], badge: m[3] || '', lines: [] };
                } else if (cur) {
                    cur.lines.push(line);
                }
            });
            if (cur) sections.push(cur);
            return sections.map(function(s) {
                var badge = '';
                if (s.badge === 'NEW') badge = ' <span class="sb-badge-new">NEW</span>';
                if (s.badge === 'UPDATED') badge = ' <span class="sb-badge-updated">UPDATED</span>';
                var body = marked.parse(s.lines.join('\n'));
                body = body.replace(/\[\+\]\s*/g, '<span class="diff-add">[+] </span>');
                body = body.replace(/\[~\]\s*/g, '<span class="diff-mod">[~] </span>');
                body = body.replace(/\[!\]\s*(.+?)(<br|<\/p|$)/g, '<span class="diff-note">[!] $1</span>$2');
                return '<div class="sb-section" data-sb="' + s.num + '">' +
                    '<div class="sb-hd"><svg class="sb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' +
                    s.num + '. ' + s.title + badge + '</div>' +
                    '<div class="sb-bd">' + body + '</div></div>';
            }).join('');
        }

        function bindSidebarLinkage() {
            document.querySelectorAll('[data-s]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    if (e.target.closest('.sb-panel') || e.target.closest('.mode-toggle')) return;
                    var sId = this.getAttribute('data-s');
                    var target = document.querySelector('[data-sb="' + sId + '"]');
                    if (target) {
                        target.parentElement.classList.add('op');
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        target.style.background = 'rgba(99,102,241,0.08)';
                        setTimeout(function() { target.style.background = ''; }, 2000);
                    }
                });
            });
            document.querySelectorAll('[data-sb]').forEach(function(el) {
                el.querySelector('.sb-hd').addEventListener('dblclick', function() {
                    var sId = el.getAttribute('data-sb');
                    var target = document.querySelector('[data-s="' + sId + '"]');

                        setTimeout(function() { target.classList.remove('sb-glow'); }, 2500);
                    }
                });
            });
        }

        /* 浮窗拖拽 */
        (function() {

            var bar = document.getElementById('sbDragBar');
            var isDragging = false, startX, startY, origX, origY;
            bar.addEventListener('mousedown', function(e) {
                isDragging = true;
                startX = e.clientX; startY = e.clientY;
                var r = panel.getBoundingClientRect();
                origX = r.left; origY = r.top;
                e.preventDefault();
            });
            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                panel.style.position = 'fixed';
                panel.style.left = (origX + e.clientX - startX) + 'px';
                panel.style.top = (origY + e.clientY - startY) + 'px';
                panel.style.right = 'auto';
            });
            document.addEventListener('mouseup', function() { isDragging = false; });
            bar.addEventListener('touchstart', function(e) {
                isDragging = true;
                var t = e.touches[0];
                startX = t.clientX; startY = t.clientY;
                var r = panel.getBoundingClientRect();
                origX = r.left; origY = r.top;
            }, { passive: true });
            document.addEventListener('touchmove', function(e) {
                if (!isDragging) return;

                panel.style.top = (origY + t.clientY - startY) + 'px';
                panel.style.right = 'auto';
            }, { passive: true });
            document.addEventListener('touchend', function() { isDragging = false; });

    <script type="text/markdown" id="prd-sections">
## 1. 顶部导航栏

#### 结构说明

页面顶部导航栏包含两部分：

- **左侧 Tab**：「首页」和「我的」，文字形式切换。首页为当前页面高亮态（加粗加大），我的点击后跳转独立页面 `我的.html`
- **右侧图标**：历史记录入口（时钟图标），点击跳转历史记录页面

#### 交互逻辑

- 「我的」为 `<a>` 标签直接跳转，非 Tab 面板切换（页面已拆分为独立 HTML）
- 历史记录展示作业批改和拍照答疑的历史记录列表，支持按类型筛选

#### 布局规范

- 导航栏高度 44px，左右 padding 20px
- 首页 Tab 字号 1.25rem/700，我的 Tab 字号 1.125rem/400 + 灰色（#a1a1aa）
- 历史记录图标 36×36 圆形热区

## 2. AI 龙老师问候区

#### 结构说明

品牌 IP 问候区，不可交互，纯展示用途：

- **左侧**：AI 龙老师 IP 形象图（68×68 圆形头像）
- **右侧**：问候文案
  - 标题：「Hi，我是AI 龙老师」，紫色渐变色
  - 副标题：闪电图标 + 「学习有疑问，尽管找我」

#### 设计说明

- 无背景卡片、无边框，直接融入页面底色
- IP 图片使用 `组 7660.png`，后续替换为正式 IP 形象资源
- 文案固定，不随用户信息变化

> 这是品牌展示区，不承载功能逻辑。设计上追求简洁、亲切的第一印象。

## 3. 主功能双卡

#### 结构说明

双列等宽卡片，是首页最核心的两个功能入口：

| 卡片 | 名称 | 描述 | 跳转 | 配色 |
|------|------|------|------|------|
| 左 | 作业批改 | 拍照即出批改结果 | `作业批改.html?mode=correction` | indigo 紫蓝 |
| 右 | 拍照解题 | AI 逐步解析答疑 | `作业批改.html?mode=qa` | amber 琥珀 |

#### 交互逻辑

- 两个入口共用同一拍照页面 `作业批改.html`，通过 URL 参数 `mode` 区分功能模式
- 作业批改（mode=correction）：拍照后识别题目并返回批改结果，标记对错
- 拍照解题（mode=qa）：拍照后 AI 逐步解析答题过程，进入苏氏问答交互页
- 点击时同步写入 `sessionStorage.cameraMode`，拍照页读取决定识别逻辑

#### 卡片规范

- 圆角 20px，padding 18px 16px
- 图标区 40×40 圆角 12px，白色半透背景

## 5. 视频课堂专区

#### 结构说明

视频课堂分为两层结构：

**第一层：课程体系入口（1 大 + 2 小卡片）**

| 卡片 | 名称 | 副标题 | 学科 | 类型 |
|------|------|--------|------|------|
| 大卡 | 新课标重点讲 | 紧扣新课标考点，重点题型逐个突破 | 语文/数学/英语 | 重磅推荐 |
| 小卡左 | 校内同步课 | 与教材同步 | 语文/数学/英语 | — |
| 小卡右 | 拓展提升课 | 1200+专题精讲 | 语文/英语 | — |

所有卡片点击后跳转 `知识点讲解视频.html?cat={category}`，进入手风琴展开式的视频目录页。

**第二层：按学科浏览课程网格**

- 顶部 Tab：语文 | 数学 | 英语 | 科学 | 道法
- Tab 切换后渲染双列课程卡片网格
- 每张课程卡片包含：
  - 彩色封面 + 播放按钮（32×32 圆形白底）
  - 课程标题（最多两行，超出省略）
  - 标签（新课标 / 同步课 / 拓展课）+ 学习进度
- 课程卡片点击后跳转对应 category 的视频目录

#### 数据结构

课程数据由 JS 对象 `COURSE_DATA` 定义，按学科分组：
- `title`：课程标题
- `tag`：课程体系标签（新课标 / 同步课 / 拓展课）
- `tagCls`：标签样式类名
- `lessons`：总课时数
- `done`：已学课时数（0 = 显示"N节课"，全部完成 = "已学完"，部分完成 = "已学X/Y节"）
- `cover`：封面配色类名
- `cat`：跳转 category 参数

#### 交互逻辑

- Tab 点击事件委托在容器 `#vzCourseTabs` 上，切换 active 类并调用 `renderVzCourses(subj)` 重新渲染网格
- 课程卡片点击跳转 `知识点讲解视频.html?cat={cat}`

> 校内同步课默认匹配用户已选年级对应的教材版本，避免每次让用户重新选择。

## 6. 精品试卷

#### 结构说明

精品试卷以列表形式展示，支持按学科筛选：

- **顶部 Tab**：语文 | 数学 | 英语 | 科学
- **列表项结构**：每行包含学科图标 + 试卷标题 + 类型标签 + 下载量 + 右箭头

#### 试卷类型

| 类型 | 标签色 | 说明 |
|------|--------|------|
| 期中 | 蓝色 | 期中考试试卷 |
| 期末 | 粉色 | 期末考试试卷 |
| 单元测试 | 绿色 | 单元检测试卷 |
| 模拟题 | 橙色 | 模拟考试试卷 |

#### 数据结构

试卷数据由 JS 对象 `PAPER_DATA` 定义，按学科分组：
- `title`：试卷名称
- `type`：试卷类型（期中/期末/单元测试/模拟题）
- `typeCls`：类型标签样式类名
- `downloads`：下载量展示文案

#### 交互逻辑

- Tab 切换渲染对应学科的试卷列表
- 每个试卷项点击后触发 `openExamPapers()` → 当前显示 Toast（即将上线），后续跳转试卷详情/下载页
- 学科图标根据当前 Tab 学科自动匹配配色

[!] 精品试卷当前为静态 mock 数据，上线后需对接后端试卷资源接口，支持分页加载和搜索。
