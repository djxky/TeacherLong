<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登录 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: linear-gradient(180deg, #F3E8FF 0%, #E8F4FD 50%, #E0F2FE 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .iphone-frame {
            width: 393px; height: 852px; background: linear-gradient(180deg, #F3E8FF 0%, #E8F4FD 50%, #E0F2FE 100%); position: relative; overflow: hidden;
            box-shadow: 0 0 0 12px #333, 0 0 0 13px #555, 0 20px 50px rgba(0,0,0,0.3);
            border-radius: 50px;
        }
        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: #000; border-radius: 20px; z-index: 1000; pointer-events: none; }
        .aurora-orb { position: absolute; border-radius: 9999px; filter: blur(90px); opacity: 0.35; pointer-events: none; z-index: 0; }
        .glass-panel { background: rgba(255,255,255,0.75); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 12px 40px rgba(139,92,246,0.12), inset 0 1px 0 0 rgba(255,255,255,0.8); }
        .input-wrap { background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8); border-radius: 16px; transition: all 0.2s; }
        .input-wrap:focus-within { background: rgba(255,255,255,0.85); box-shadow: 0 0 0 2px rgba(139,92,246,0.2); }
        .btn-liquid { background: linear-gradient(135deg, #6A2C70 0%, #8B5CF6 50%, #06B6D4 100%); background-size: 200% 200%; box-shadow: 0 12px 40px -8px rgba(139,92,246,0.4); transition: transform 0.2s, box-shadow 0.2s; }
        .btn-liquid:hover, .btn-liquid:active { transform: scale(1.02); box-shadow: 0 14px 48px -8px rgba(139,92,246,0.45); }
        .brand-gradient { background: linear-gradient(135deg, #6A2C70, #8B5CF6, #06B6D4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        #toast { position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(0,0,0,0.82); color: white; padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .btn-code { background: rgba(139,92,246,0.15); color: #7c3aed; border: 1px solid rgba(139,92,246,0.4); font-weight: 600; white-space: nowrap; }
        .btn-code:disabled { opacity: 0.6; cursor: not-allowed; }
        .info-panel { background: rgba(255,255,255,0.78); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.85); box-shadow: 0 16px 48px rgba(139,92,246,0.08), inset 0 1px 0 0 rgba(255,255,255,0.9); border-radius: 24px; overflow: hidden; }
        .info-section { padding: 20px 20px 24px; }
        .info-section:not(:last-child) { border-bottom: 1px solid rgba(226,232,240,0.8); }
        .info-section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: #94a3b8; margin-bottom: 12px; }
        .name-input-wrap { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 16px; background: rgba(255,255,255,0.9); border: 1px solid rgba(226,232,240,0.9); transition: all 0.2s; }
        .name-input-wrap:focus-within { background: #fff; box-shadow: 0 0 0 2px rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.3); }
        .grade-tiles { display: flex; flex-wrap: wrap; gap: 10px; }
        .grade-chip { padding: 12px 18px; border-radius: 14px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; border: 1.5px solid rgba(203,213,225,0.8); background: rgba(248,250,252,0.9); color: #64748b; }
        .grade-chip:hover { background: rgba(241,245,249,1); color: #475569; border-color: rgba(148,163,184,0.5); }
        .grade-chip:active { transform: scale(0.98); }
        .grade-chip.selected { background: linear-gradient(135deg, rgba(106,44,112,0.12), rgba(139,92,246,0.12)); border-color: rgba(139,92,246,0.55); color: #5b21b6; font-weight: 600; box-shadow: 0 2px 12px rgba(139,92,246,0.15); }

        /* 手机号快速验证 */
        .quick-verify-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 999px;
            background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.15);
            font-size: 12px; font-weight: 500; color: #7c3aed;
        }
        .quick-verify-badge svg { color: #8B5CF6; flex-shrink: 0; }
        .btn-quick-verify {
            width: 100%; padding: 16px; border-radius: 16px;
            font-size: 16px; font-weight: 700; color: white; border: none; cursor: pointer;
            background: linear-gradient(135deg, #6A2C70 0%, #8B5CF6 50%, #06B6D4 100%);
            box-shadow: 0 12px 40px -8px rgba(139,92,246,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-quick-verify:active { transform: scale(0.98); box-shadow: 0 6px 24px rgba(139,92,246,0.3); }
        .other-login-link {
            font-size: 13px; color: #94a3b8; cursor: pointer;
            transition: color 0.2s; border: none; background: none; padding: 8px;
        }
        .other-login-link:active { color: #64748b; }

        /* 步骤切换动画 */
        .step-view {
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .step-view.hidden {
            display: none !important;
        }
        .step-view.fade-out {
            opacity: 0; transform: translateY(8px); pointer-events: none;
        }
        .step-view.fade-in {
            opacity: 1; transform: translateY(0);
        }

        /* 手机号登录弹出面板 */
        .phone-login-sheet {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255,255,255,0.96); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -12px 48px rgba(0,0,0,0.1);
            padding: 20px 24px calc(env(safe-area-inset-bottom, 20px) + 20px);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .phone-login-sheet.open { transform: translateY(0); }
        .sheet-overlay {
            position: absolute; inset: 0; z-index: 90;
            background: rgba(0,0,0,0.35);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .sheet-overlay.open { opacity: 1; pointer-events: auto; }
        .sheet-handle {
            width: 36px; height: 4px; border-radius: 2px;
            background: #d4d4d8; margin: 0 auto 16px;
        }
        .sheet-title {
            font-size: 17px; font-weight: 700; color: #18181b;
            text-align: center; margin-bottom: 20px;
        }

        /* 协议确认弹窗（未勾选时弹出） */
        .agree-sheet-overlay {
            position: absolute; inset: 0; z-index: 250;
            background: rgba(0,0,0,0.4);
            display: none; align-items: flex-end; justify-content: center;
        }
        .agree-sheet-overlay.open { display: flex; }
        .agree-sheet {
            width: 100%; background: #fff;
            border-radius: 16px 16px 0 0;
            padding: 24px 24px calc(env(safe-area-inset-bottom, 20px) + 16px);
            animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .agree-sheet-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .agree-sheet-header h3 {
            font-size: 17px; font-weight: 700; color: #18181b; margin: 0;
        }
        .agree-sheet-close {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #f4f4f5; border: none; cursor: pointer; color: #71717a;
        }
        .agree-sheet-close:active { background: #e4e4e7; }
        .agree-sheet-links {
            font-size: 14px; color: #475569; line-height: 1.8;
            padding: 8px 0 20px;
        }
        .agree-sheet-links a { color: #8B5CF6; text-decoration: none; }
        .btn-agree-continue {
            width: 100%; padding: 14px; border-radius: 12px;
            font-size: 16px; font-weight: 600; color: white; border: none; cursor: pointer;
            background: linear-gradient(135deg, #6A2C70 0%, #8B5CF6 50%, #06B6D4 100%);
            box-shadow: 0 4px 16px rgba(139,92,246,0.3);
        }
        .btn-agree-continue:active { opacity: 0.9; }

        /* 授权弹窗（模拟微信手机号获取） */
        .auth-modal-overlay {
            position: absolute; inset: 0; z-index: 300;
            background: rgba(0,0,0,0.75);
            display: none; align-items: flex-end; justify-content: center;
        }
        .auth-modal-overlay.open { display: flex; }
        .auth-modal {
            width: 100%; background: #1e1e2e;
            border-radius: 16px 16px 0 0;
            padding: 24px 24px calc(env(safe-area-inset-bottom, 20px) + 16px);
            animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .auth-modal-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
        }
        .auth-modal-icon {
            width: 32px; height: 32px; border-radius: 8px; overflow: hidden; flex-shrink: 0;
            background: linear-gradient(135deg, #6A2C70, #8B5CF6); display: flex; align-items: center; justify-content: center;
        }
        .auth-modal-info { flex: 1; }
        .auth-modal-info h4 { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.9); margin: 0; }
        .auth-modal-subtitle {
            font-size: 16px; font-weight: 700; color: #fff; margin: 14px 0 4px;
        }
        .auth-modal-hint {
            font-size: 12px; color: rgba(255,255,255,0.4); margin: 0 0 16px;
        }
        .auth-phone-option {
            width: 100%; padding: 16px; border-radius: 12px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px; cursor: pointer;
            text-align: center; transition: background 0.15s;
        }
        .auth-phone-option:active { background: rgba(255,255,255,0.12); }
        .auth-phone-number {
            font-size: 18px; font-weight: 600; color: #fff; letter-spacing: 1px;
        }
        .auth-phone-label {
            font-size: 11px; color: rgba(139,92,246,0.9); margin-top: 4px;
        }
        .btn-auth-deny {
            width: 100%; padding: 14px; border-radius: 12px;
            font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.5); border: none;
            background: rgba(255,255,255,0.06); cursor: pointer; margin-top: 4px;
        }
        .btn-auth-deny:active { background: rgba(255,255,255,0.1); }

        /* 协议勾选 */
        .protocol-check {
            display: flex; align-items: flex-start; gap: 8px;
            margin-top: 20px; padding: 0 4px;
        }
        .protocol-check input[type="checkbox"] {
            appearance: none; -webkit-appearance: none;
            width: 16px; height: 16px; min-width: 16px; border-radius: 50%;
            border: 1.5px solid #cbd5e1; background: #fff; cursor: pointer;
            margin-top: 2px; transition: all 0.2s; position: relative;
        }
        .protocol-check input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #6A2C70, #8B5CF6);
            border-color: #8B5CF6;
        }
        .protocol-check input[type="checkbox"]:checked::after {
            content: ''; position: absolute;
            left: 4.5px; top: 2px; width: 4px; height: 7px;
            border: solid #fff; border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg);
        }
        .protocol-check label {
            font-size: 11px; color: #94a3b8; line-height: 1.7; cursor: pointer;
        }
        .protocol-check label a { color: #8B5CF6; text-decoration: none; }
        .protocol-check.shake { animation: protocolShake 0.4s ease; }
        @keyframes protocolShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(3px); }
        }

        /* Logo 图片 */
        .brand-logo {
            width: 96px; height: 96px; border-radius: 24px; object-fit: cover;
            box-shadow: 0 8px 28px rgba(139,92,246,0.15);
        }
    </style>
</head>
<body>

    <div class="iphone-frame" id="app-root">
        <div class="dynamic-island"></div>
        <div id="toast"><span id="toast-msg">提示</span></div>

        <div class="absolute inset-0 flex flex-col pt-[50px] relative">
            <div class="aurora-orb w-72 h-72 bg-[#8B5CF6]/40 -top-40 -left-32"></div>
            <div class="aurora-orb w-80 h-80 bg-[#06B6D4]/35 bottom-40 -right-36"></div>

            <main class="flex-1 flex flex-col items-center justify-center px-6 relative z-10">
                <div class="w-full max-w-[320px]">

                    <!-- ═══ 步骤0：手机号快速验证 ═══ -->
                    <div id="step-quick-verify" class="step-view fade-in flex flex-col" style="min-height: 580px;">
                        <!-- 品牌区：Logo + 名称 + slogan -->
                        <div class="text-center mb-6 pt-4">
                            <img src="../组 7660.png" alt="AI 龙老师" class="brand-logo mx-auto mb-4">
                            <h1 class="text-2xl font-bold brand-gradient mb-1">AI 龙老师</h1>
                            <p class="text-sm text-slate-400 mt-1">智能学习，快乐成长</p>
                        </div>

                        <div class="flex-1"></div>

                        <!-- 手机号快速验证按钮 -->
                        <button type="button" class="btn-quick-verify" id="btn-quick-verify" onclick="onQuickVerify()">
                            手机号快速验证
                        </button>

                        <!-- 协议勾选 -->
                        <div class="protocol-check" id="protocol-check-0">
                            <input type="checkbox" id="agree-0">
                            <label for="agree-0">我已阅读并同意<a href="#">《AI龙老师用户协议》</a><a href="#">《隐私政策》</a><a href="#">《儿童隐私保护政策》</a></label>
                        </div>

                        <!-- 其他方式 -->
                        <div class="flex items-center justify-center gap-4 mt-5 mb-2">
                            <button type="button" class="other-login-link" onclick="openPhoneSheet()">验证码登录</button>
                        </div>
                    </div>

                    <!-- ═══ 步骤1：手机号验证码登录（表单） ═══ -->
                    <div id="step-phone-login" class="step-view hidden">
                        <div class="text-center mb-6">
                            <img src="../组 7660.png" alt="AI 龙老师" class="brand-logo mx-auto mb-4" style="width: 72px; height: 72px; border-radius: 18px;">
                            <h1 class="text-xl font-bold brand-gradient mb-1">AI 龙老师</h1>
                            <p class="text-sm text-slate-400">验证码登录</p>
                        </div>

                        <form id="login-form">
                        <div class="glass-panel rounded-3xl p-5 space-y-4" id="panel-login">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-1.5">手机号</label>
                                <div class="input-wrap flex items-center gap-3 px-4 py-3">
                                    <svg class="w-5 h-5 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                    <input type="tel" id="phone" name="phone" placeholder="请输入手机号"
                                        class="flex-1 bg-transparent text-slate-800 placeholder-slate-400 text-[15px] focus:outline-none"
                                        autocomplete="tel" maxlength="11">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-1.5">验证码</label>
                                <div class="input-wrap flex items-center gap-2 px-4 py-3 min-w-0">
                                    <svg class="w-5 h-5 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                                    <input type="text" id="code" name="code" placeholder="请输入验证码"
                                        class="flex-1 min-w-0 bg-transparent text-slate-800 placeholder-slate-400 text-[15px] focus:outline-none"
                                        inputmode="numeric" maxlength="6" autocomplete="one-time-code">
                                    <button type="button" id="btn-send-code" class="btn-code shrink-0 px-3 py-2 rounded-xl text-sm transition-all whitespace-nowrap">获取验证码</button>
                                </div>
                            </div>
                        </div>

                        <!-- 协议勾选 -->
                        <div class="protocol-check" id="protocol-check-1">
                            <input type="checkbox" id="agree-1">
                            <label for="agree-1">我已阅读并同意<a href="#">《AI龙老师用户协议》</a><a href="#">《隐私政策》</a><a href="#">《儿童隐私保护政策》</a></label>
                        </div>

                        <button type="submit" form="login-form" class="w-full py-4 rounded-2xl font-bold text-base btn-liquid text-white mt-5 active:scale-[0.98] transition-transform flex items-center justify-center gap-2" id="btn-login">
                            <span>登录</span>
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                        </button>
                        </form>

                        <div class="text-center mt-4">
                            <button type="button" class="other-login-link" onclick="backToQuickVerify()">
                                ← 返回快速验证
                            </button>
                        </div>
                    </div>

                    <!-- ═══ 步骤2：完善信息 ═══ -->
                    <div id="step-info" class="step-view hidden">
                        <div class="text-center mb-6">
                            <img src="../组 7660.png" alt="AI 龙老师" class="brand-logo mx-auto mb-4" style="width: 72px; height: 72px; border-radius: 18px;">
                            <h1 class="text-xl font-bold brand-gradient mb-1">AI 龙老师</h1>
                            <p class="text-sm text-slate-400">请填写姓名与年级</p>
                        </div>

                        <form id="info-form">
                        <div class="info-panel" id="panel-info">
                            <div class="info-section">
                                <p class="info-section-label">姓名</p>
                                <div class="name-input-wrap">
                                    <svg class="w-5 h-5 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                    <input type="text" id="name" name="name" placeholder="请输入你的姓名"
                                        class="flex-1 bg-transparent text-slate-800 placeholder-slate-400 text-[16px] focus:outline-none min-w-0">
                                </div>
                            </div>
                            <div class="info-section">
                                <p class="info-section-label">请选择年级</p>
                                <input type="hidden" id="grade-class" name="gradeClass" value="">
                                <div class="grade-tiles" id="grade-tiles">
                                    <span class="grade-chip" data-grade="一年级">一年级</span>
                                    <span class="grade-chip" data-grade="二年级">二年级</span>
                                    <span class="grade-chip" data-grade="三年级">三年级</span>
                                    <span class="grade-chip" data-grade="四年级">四年级</span>
                                    <span class="grade-chip" data-grade="五年级">五年级</span>
                                    <span class="grade-chip" data-grade="六年级">六年级</span>
                                    <span class="grade-chip" data-grade="七年级">七年级</span>
                                    <span class="grade-chip" data-grade="八年级">八年级</span>
                                    <span class="grade-chip" data-grade="九年级">九年级</span>
                                    <span class="grade-chip" data-grade="高一">高一</span>
                                    <span class="grade-chip" data-grade="高二">高二</span>
                                    <span class="grade-chip" data-grade="高三">高三</span>
                                </div>
                            </div>
                        </div>
                        <button type="submit" form="info-form" class="w-full py-4 rounded-2xl font-bold text-base btn-liquid text-white mt-6 active:scale-[0.98] transition-transform flex items-center justify-center gap-2 shadow-lg shadow-purple-500/20" id="btn-info">
                            <span>完成并进入</span>
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                        </button>
                        </form>
                    </div>

                </div>
            </main>
        </div>

        <!-- ═══ 协议确认弹窗（未勾选时弹出） ═══ -->
        <div id="agree-sheet" class="agree-sheet-overlay">
            <div class="agree-sheet">
                <div class="agree-sheet-header">
                    <h3>请阅读并同意以下条款</h3>
                    <button type="button" class="agree-sheet-close" onclick="closeAgreeSheet()">
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                <div class="agree-sheet-links">
                    <a href="#">《AI龙老师用户协议》</a>&nbsp;&nbsp;<a href="#">《隐私政策》</a>&nbsp;&nbsp;<a href="#">《儿童隐私保护政策》</a>
                </div>
                <button type="button" class="btn-agree-continue" onclick="onAgreeAndContinue()">同意并继续</button>
            </div>
        </div>

        <!-- ═══ 手机号获取授权弹窗（模拟微信原生） ═══ -->
        <div id="auth-modal" class="auth-modal-overlay">
            <div class="auth-modal">
                <div class="auth-modal-header">
                    <div class="auth-modal-icon">
                        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.905 59.905 0 0 1 12 3.493a59.902 59.902 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342" /></svg>
                    </div>
                    <div class="auth-modal-info">
                        <h4>AI 龙老师</h4>
                    </div>
                </div>
                <p class="auth-modal-subtitle">申请获取并验证你的手机号</p>
                <p class="auth-modal-hint">登录</p>

                <div class="auth-phone-option" onclick="onAuthAllow()">
                    <div class="auth-phone-number">138****5678</div>
                    <div class="auth-phone-label">上次提供</div>
                </div>

                <button type="button" class="btn-auth-deny" onclick="onAuthDeny()">不允许</button>
            </div>
        </div>
    </div>

    <script>
        var codeCountdown = 0;
        var codeTimer = null;

        function showStep(stepId) {
            document.querySelectorAll('.step-view').forEach(function(el) {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            });
            var target = document.getElementById(stepId);
            target.classList.remove('hidden');
            target.offsetHeight;
            target.classList.add('fade-in');
        }

        var pendingAction = null;

        function checkAgreement(checkboxId, wrapId) {
            var cb = document.getElementById(checkboxId);
            if (!cb.checked) {
                showToast('请先阅读并同意隐私协议');
                var wrap = document.getElementById(wrapId);
                wrap.classList.remove('shake');
                void wrap.offsetWidth;
                wrap.classList.add('shake');
                return false;
            }
            return true;
        }

        // 手机号快速验证 → 校验协议
        function onQuickVerify() {
            var cb = document.getElementById('agree-0');
            if (cb.checked) {
                document.getElementById('auth-modal').classList.add('open');
            } else {
                pendingAction = 'quick-verify';
                document.getElementById('agree-sheet').classList.add('open');
            }
        }

        function closeAgreeSheet() {
            document.getElementById('agree-sheet').classList.remove('open');
            pendingAction = null;
        }

        function onAgreeAndContinue() {
            document.getElementById('agree-sheet').classList.remove('open');
            document.getElementById('agree-0').checked = true;
            document.getElementById('agree-1').checked = true;
            var action = pendingAction;
            pendingAction = null;
            setTimeout(function() {
                if (action === 'quick-verify') {
                    document.getElementById('auth-modal').classList.add('open');
                } else if (action === 'phone-login') {
                    var phone = document.getElementById('phone').value.trim();
                    doPhoneLogin(phone);
                }
            }, 200);
        }

        // 授权允许
        function onAuthAllow() {
            document.getElementById('auth-modal').classList.remove('open');
            sessionStorage.setItem('phone', '138****5678');
            showToast('验证成功，请完善信息');
            setTimeout(function() {
                showStep('step-info');
            }, 400);
        }

        // 授权拒绝
        function onAuthDeny() {
            document.getElementById('auth-modal').classList.remove('open');
            showToast('已拒绝，可使用验证码登录');
        }

        // 打开验证码登录
        function openPhoneSheet() {
            showStep('step-phone-login');
        }

        // 返回快速验证
        function backToQuickVerify() {
            showStep('step-quick-verify');
        }

        // 获取验证码
        document.getElementById('btn-send-code').onclick = function() {
            var phone = document.getElementById('phone').value.trim();
            if (!phone) { showToast('请先输入手机号'); return; }
            if (codeCountdown > 0) return;

            showToast('验证码已发送');
            codeCountdown = 60;
            var btn = document.getElementById('btn-send-code');
            btn.disabled = true;
            btn.textContent = codeCountdown + 's';
            codeTimer = setInterval(function() {
                codeCountdown--;
                btn.textContent = codeCountdown + 's';
                if (codeCountdown <= 0) {
                    clearInterval(codeTimer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        };

        // 年级选择
        document.getElementById('grade-tiles').addEventListener('click', function(e) {
            var chip = e.target.closest('.grade-chip');
            if (!chip) return;
            var value = chip.getAttribute('data-grade');
            document.getElementById('grade-class').value = value;
            document.querySelectorAll('.grade-chip').forEach(function(c) { c.classList.remove('selected'); });
            chip.classList.add('selected');
        });

        // 手机号验证码登录
        document.getElementById('login-form').onsubmit = function(e) {
            e.preventDefault();
            var phone = document.getElementById('phone').value.trim();
            var code = document.getElementById('code').value.trim();
            if (!phone) { showToast('请输入手机号'); return false; }
            if (!code) { showToast('请输入验证码'); return false; }

            var cb = document.getElementById('agree-1');
            if (!cb.checked) {
                pendingAction = 'phone-login';
                document.getElementById('agree-sheet').classList.add('open');
                return false;
            }

            doPhoneLogin(phone);
            return false;
        };

        function doPhoneLogin(phone) {
            sessionStorage.setItem('phone', phone);
            showToast('登录成功，请完善信息');
            setTimeout(function() {
                showStep('step-info');
            }, 400);
        }

        // 完善信息
        document.getElementById('info-form').onsubmit = function(e) {
            e.preventDefault();
            var gradeClass = (document.getElementById('grade-class').value || '').trim();
            var name = document.getElementById('name').value.trim();

            sessionStorage.setItem('gradeClass', gradeClass);
            sessionStorage.setItem('name', name);
            sessionStorage.setItem('loggedIn', 'true');

            showToast('进入首页');
            setTimeout(function() {
                window.location.href = '../首页.html';
            }, 600);
            return false;
        };

        function showToast(msg) {
            var el = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 2000);
        }
    </script>
</body>
</html>
