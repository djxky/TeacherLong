<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
        }

        .mesh-bg {
            position: absolute; top: -10%; left: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.45) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-2 {
            position: absolute; top: 15%; right: -30%; width: 90%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(236,72,153,0.35) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-3 {
            position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.35) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-4 {
            position: absolute; top: 40%; left: 10%; width: 70%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(56,189,248,0.3) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-5 {
            position: absolute; bottom: 10%; right: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(245,158,11,0.25) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }

        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        /* 顶部导航 */
        .top-nav {
            height: 44px; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .top-nav-tabs { display: flex; gap: 20px; align-items: baseline; }
        .top-nav-tab {
            font-size: 1.125rem; font-weight: 400; color: #a1a1aa;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 0; background: none; border: none;
            font-family: inherit; position: relative; text-decoration: none;
        }
        .top-nav-tab.active {
            font-size: 1.25rem; font-weight: 700; color: #18181b;
        }

        /* 玻璃拟态 */
        .me-list, .btn-logout-outline, .btn-logout-red {
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.7);
            border: none;
            background: rgba(255, 255, 255, 0.6);
        }
        .me-list-item.clickable, .btn-logout-outline, .btn-logout-red {
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-logout-outline:active, .btn-logout-red:active {
            transform: scale(0.96);
        }

        /* 我的页面 */
        .me-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .me-scroll::-webkit-scrollbar { display: none; }
        .me-header {
            padding: 16px 20px 32px 20px; display: flex; flex-direction: column;
        }
        .me-username {
            font-size: 1.75rem; font-weight: 700; color: #0f172a;
            margin: 0; letter-spacing: -0.02em;
        }
        .me-list {
            border-radius: 24px;
            overflow: hidden; margin: 0 20px;
        }
        .me-list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px;
            font-size: 0.9375rem; cursor: default;
        }
        .me-list-item .label {
            display: flex; align-items: center; gap: 12px; color: #475569; font-weight: 500;
        }
        .me-list-item .label svg { width: 20px; height: 20px; color: #94a3b8; }
        .me-list-item .value { color: #0f172a; font-weight: 500; }
        .me-list-item .arrow { color: #cbd5e1; }
        .me-list-item.clickable { cursor: pointer; transition: background 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .me-list-item.clickable:active { background: rgba(15,23,42,0.03); }

        .btn-logout-outline {
            display: block; width: calc(100% - 40px); margin: 32px auto 0;
            padding: 16px; border-radius: 20px; font-size: 0.9375rem;
            font-weight: 600; color: #0f172a; text-align: center;
        }

        .me-protocols {
            margin-top: auto; padding: 24px 20px 16px; text-align: center;
            font-size: 0.6875rem; color: #a1a1aa; line-height: 1.6;
        }
        .me-protocols a { color: #a1a1aa; text-decoration: none; }

        /* 设置页 */
        .settings-panel {
            position: absolute; inset: 0; z-index: 200;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            display: none; flex-direction: column;
        }
        .settings-panel.open { display: flex; }
        .settings-top-bar {
            height: 44px; padding: 0 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .settings-back {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #52525b; cursor: pointer; background: none; border: none;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .settings-back:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }
        .settings-title { font-size: 1.125rem; font-weight: 600; color: #18181b; }
        .settings-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 20px; gap: 12px;
        }
        .settings-logo {
            width: 96px; height: 96px; border-radius: 28px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: rgba(255,255,255,0.7);
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .settings-logo img { width: 100%; height: 100%; object-fit: cover; }
        .settings-app-name { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin: 16px 0 0; }
        .btn-logout-red {
            width: 100%; margin-top: 48px; padding: 16px; border-radius: 20px;
            font-size: 0.9375rem; font-weight: 600; color: #e11d48; text-align: center;
        }
        .settings-protocols {
            margin-top: auto; padding: 16px 20px 32px; text-align: center;
            font-size: 0.6875rem; color: #64748b; line-height: 1.8;
        }
        .settings-protocols a { color: #64748b; text-decoration: none; }

        /* 退出确认弹窗 */
        .modal-overlay {
            position: absolute; inset: 0; z-index: 500;
            background: rgba(255,255,255,0.2); display: none;
            align-items: center; justify-content: center; padding: 32px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: rgba(255,255,255,0.9); border-radius: 28px; padding: 32px 24px 24px;
            width: 100%; max-width: 320px; text-align: center;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.8);
            backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
            border: none;
        }
        .modal-box h3 { font-size: 1.125rem; font-weight: 700; color: #0f172a; margin: 0; }
        .modal-box p { font-size: 0.8125rem; color: #475569; margin: 12px 0 0; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; margin-top: 32px; }
        .modal-actions button {
            flex: 1; padding: 14px; border-radius: 16px; font-size: 0.9375rem;
            font-weight: 600; cursor: pointer; border: none;
            background: rgba(255,255,255,0.5);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-actions button:active { transform: scale(0.96); }
        .btn-cancel { color: #475569; }
        .btn-confirm-red { color: #e11d48; }

        /* Toast */
        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px;
            border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="mesh-bg-4"></div>
        <div class="mesh-bg-5"></div>
        <div class="dynamic-island"></div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <!-- 顶部导航 -->
            <nav class="top-nav">
                <div class="top-nav-tabs">
                    <a class="top-nav-tab" href="首页.html">首页</a>
                    <button class="top-nav-tab active">我的</button>
                </div>
            </nav>

            <div class="me-scroll">
                <div class="me-header">
                    <h1 id="me-username" class="me-username">薛云腾</h1>
                </div>

                <div class="me-list">
                    <div class="me-list-item">
                        <span class="label">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                            年级
                        </span>
                        <span id="me-grade" class="value">三年级</span>
                    </div>
                    <div class="me-list-item">
                        <span class="label">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                            手机号
                        </span>
                        <span id="me-phone" class="value">138****5678</span>
                    </div>
                    <div class="me-list-item clickable" onclick="openSettings()">
                        <span class="label">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            设置
                        </span>
                        <span class="arrow">
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                        </span>
                    </div>
                </div>

                <button type="button" class="btn-logout-outline" onclick="openLogoutConfirm()">退出登录</button>

                <div class="me-protocols">
                    <a href="#">《AI龙老师用户协议》</a> <a href="#">《隐私政策》</a> <a href="#">《儿童隐私保护政策》</a>
                </div>
            </div>
        </div>

        <!-- 设置页（覆盖层） -->
        <div id="settings-panel" class="settings-panel">
            <div class="settings-top-bar">
                <button class="settings-back" onclick="closeSettings()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <span class="settings-title">设置</span>
            </div>
            <div class="settings-content">
                <div class="settings-logo">
                    <img src="dragon.png" alt="AI 龙老师">
                </div>
                <p class="settings-app-name">AI 龙老师</p>
                <button type="button" class="btn-logout-red" onclick="openLogoutConfirm()">退出登录</button>
            </div>
            <div class="settings-protocols">
                <a href="#">《产品使用协议隐私政策》</a><br>
                <a href="#">《子数据使用协议用户协议》</a><br>
                <a href="#">《儿童隐私保护政策》</a>
            </div>
        </div>

        <!-- 退出确认弹窗 -->
        <div id="modal-logout" class="modal-overlay">
            <div class="modal-box">
                <h3>确认退出登录？</h3>
                <p>退出登录不会丢失任何数据。</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeLogoutConfirm()">取消</button>
                    <button class="btn-confirm-red" onclick="logout()">确认退出</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openSettings() {
            document.getElementById('settings-panel').classList.add('open');
        }
        function closeSettings() {
            document.getElementById('settings-panel').classList.remove('open');
        }
        function openLogoutConfirm() {
            document.getElementById('modal-logout').classList.add('open');
        }
        function closeLogoutConfirm() {
            document.getElementById('modal-logout').classList.remove('open');
        }

        function logout() {
            sessionStorage.removeItem('phone');
            sessionStorage.removeItem('gradeClass');
            sessionStorage.removeItem('name');
            sessionStorage.removeItem('loggedIn');
            window.location.href = '登录/index.html';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function loadMeInfo() {
            const phone = sessionStorage.getItem('phone') || '138****5678';
            const gradeClass = sessionStorage.getItem('gradeClass') || '三年级';
            const name = sessionStorage.getItem('name') || '薛云腾';
            const el = id => document.getElementById(id);
            if (el('me-phone')) el('me-phone').textContent = phone;
            if (el('me-grade')) el('me-grade').textContent = gradeClass;
            if (el('me-username')) el('me-username').textContent = name || '薛云腾';
        }

        loadMeInfo();
    </script>
</body>
</html>
