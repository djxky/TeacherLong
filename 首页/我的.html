<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 龙老师 - 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }

        .iphone-frame {
            width: 393px; height: 852px; position: relative; overflow: hidden;
            background: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
            box-shadow: 0 0 0 12px #18181b, 0 0 0 14px #27272a, 0 24px 48px -12px rgba(24,24,27,0.2);
            border-radius: 50px;
        }

        .mesh-bg {
            position: absolute; top: -10%; left: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.45) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-2 {
            position: absolute; top: 15%; right: -30%; width: 90%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(236,72,153,0.35) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-3 {
            position: absolute; bottom: -10%; left: -20%; width: 80%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.35) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-4 {
            position: absolute; top: 40%; left: 10%; width: 70%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(56,189,248,0.3) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }
        .mesh-bg-5 {
            position: absolute; bottom: 10%; right: -20%; width: 80%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(245,158,11,0.25) 0%, transparent 65%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }

        .dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: linear-gradient(180deg, #27272a 0%, #18181b 100%); border-radius: 20px; z-index: 1000; pointer-events: none; }

        .top-nav {
            height: 44px; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; position: relative; z-index: 20;
        }
        .top-nav-tabs { display: flex; gap: 20px; align-items: baseline; }
        .top-nav-tab {
            font-size: 1.125rem; font-weight: 400; color: #a1a1aa;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 0; background: none; border: none;
            font-family: inherit; position: relative; text-decoration: none;
        }
        .top-nav-tab.active { font-size: 1.25rem; font-weight: 700; color: #18181b; }

        .glass-card {
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.7);
            border: none; background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
        }

        .me-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .me-scroll::-webkit-scrollbar { display: none; }

        /* 姓名头部 */
        .me-header { padding: 20px 20px 20px; }
        .me-username {
            font-size: 1.75rem; font-weight: 700; color: #0f172a;
            margin: 0; letter-spacing: -0.02em; line-height: 1.2;
        }

        /* 学生信息卡片 */
        .me-section { margin: 0 20px 16px; }
        .me-section-title {
            font-size: 0.6875rem; font-weight: 600; color: #94a3b8;
            letter-spacing: 0.05em; padding: 0 4px 8px;
        }
        .me-info-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; font-size: 0.875rem;
        }
        .me-info-row + .me-info-row { border-top: 1px solid rgba(0,0,0,0.04); }
        .me-info-row .info-icon {
            width: 18px; height: 18px; color: #94a3b8; flex-shrink: 0; margin-right: 10px;
        }
        .me-info-row .info-left {
            display: flex; align-items: center; color: #64748b; font-weight: 500;
        }
        .me-info-row .info-right { color: #0f172a; font-weight: 500; }

        /* 功能入口卡片 */
        .me-action-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; font-size: 0.9375rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: background 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .me-action-row:active { background: rgba(15,23,42,0.03); }
        .me-action-row + .me-action-row { border-top: 1px solid rgba(0,0,0,0.04); }
        .me-action-row .act-left {
            display: flex; align-items: center; gap: 12px; color: #334155; font-weight: 500;
        }
        .me-action-row .act-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .me-action-row .act-icon svg { width: 18px; height: 18px; }
        .act-icon-switch { background: rgba(99,102,241,0.08); color: #6366f1; }
        .act-icon-settings { background: rgba(100,116,139,0.08); color: #64748b; }
        .me-action-row .act-arrow { color: #cbd5e1; }

        .me-protocols {
            margin-top: auto; padding: 24px 20px 16px; text-align: center;
            font-size: 0.6875rem; color: #a1a1aa; line-height: 1.6;
        }
        .me-protocols a { color: #a1a1aa; text-decoration: none; }

        /* ── 设置页 ── */
        .settings-panel {
            position: absolute; inset: 0; z-index: 200;
            background: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
            display: none; flex-direction: column;
            overflow: hidden;
        }
        .settings-panel.open { display: flex; }

        .settings-top-bar {
            height: 44px; padding: 0 16px; display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .settings-back {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #52525b; cursor: pointer; background: none; border: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .settings-back:active { transform: scale(0.92); background: rgba(0,0,0,0.03); }
        .settings-title { font-size: 1.125rem; font-weight: 600; color: #18181b; }

        .settings-scroll {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            display: flex; flex-direction: column;
        }
        .settings-scroll::-webkit-scrollbar { display: none; }

        .settings-brand {
            display: flex; flex-direction: column; align-items: center;
            padding: 32px 20px 24px; gap: 4px;
        }
        .settings-mascot {
            width: 80px; height: 80px; border-radius: 24px; overflow: hidden;
            background: rgba(255,255,255,0.7);
            box-shadow: 0 8px 24px -6px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        .settings-mascot img { width: 100%; height: 100%; object-fit: cover; }
        .settings-app-name { font-size: 1.125rem; font-weight: 700; color: #0f172a; margin: 12px 0 0; }
        .settings-version { font-size: 0.6875rem; color: #94a3b8; font-weight: 500; }

        .settings-section { margin: 0 20px 16px; }
        .settings-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; font-size: 0.9375rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: background 0.2s;
        }
        .settings-row:active { background: rgba(15,23,42,0.03); }
        .settings-row + .settings-row { border-top: 1px solid rgba(0,0,0,0.04); }
        .settings-row .sr-left {
            display: flex; align-items: center; gap: 12px; font-weight: 500;
        }
        .settings-row .sr-left svg { width: 18px; height: 18px; color: #94a3b8; }
        .settings-row .sr-arrow { color: #cbd5e1; }
        .settings-row.logout .sr-left { color: #e11d48; }
        .settings-row.logout .sr-left svg { color: #e11d48; }

        .settings-protocols {
            margin-top: auto; padding: 16px 20px 32px; text-align: center;
            font-size: 0.6875rem; color: #a1a1aa; line-height: 1.8;
        }
        .settings-protocols a { color: #a1a1aa; text-decoration: none; }

        /* 退出确认弹窗 */
        .modal-overlay {
            position: absolute; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.25); display: none;
            align-items: center; justify-content: center; padding: 32px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: rgba(255,255,255,0.95); border-radius: 24px; padding: 28px 24px 20px;
            width: 100%; max-width: 300px; text-align: center;
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,0.8);
            backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border: none;
        }
        .modal-box h3 { font-size: 1.0625rem; font-weight: 700; color: #0f172a; margin: 0; }
        .modal-box p { font-size: 0.8125rem; color: #64748b; margin: 10px 0 0; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions button {
            flex: 1; padding: 13px; border-radius: 14px; font-size: 0.9375rem;
            font-weight: 600; cursor: pointer; border: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-actions button:active { transform: scale(0.96); }
        .btn-cancel { color: #475569; background: rgba(0,0,0,0.04); }
        .btn-confirm-red { color: #fff; background: #e11d48; }

        #toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.8); color: #0f172a;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 9999px;
            font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 8px; border: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col" id="app-root">
        <div class="mesh-bg"></div>
        <div class="mesh-bg-2"></div>
        <div class="mesh-bg-3"></div>
        <div class="mesh-bg-4"></div>
        <div class="mesh-bg-5"></div>
        <div class="dynamic-island"></div>
        <div id="toast"><svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg><span id="toast-msg">操作成功</span></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <nav class="top-nav">
                <div class="top-nav-tabs">
                    <a class="top-nav-tab" href="首页.html">首页</a>
                    <button class="top-nav-tab active">我的</button>
                </div>
            </nav>

            <div class="me-scroll">
                <div class="me-header">
                    <h1 id="me-username" class="me-username">薛云腾</h1>
                </div>

                <!-- 学生信息 -->
                <div class="me-section">
                    <div class="me-section-title">学生信息</div>
                    <div class="glass-card">
                        <div class="me-info-row">
                            <span class="info-left">
                                <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21"/></svg>
                                学校
                            </span>
                            <span id="me-school" class="info-right">龙岗区外国语学校</span>
                        </div>
                        <div class="me-info-row">
                            <span class="info-left">
                                <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z"/></svg>
                                学号
                            </span>
                            <span id="me-studentId" class="info-right">2024001</span>
                        </div>
                        <div class="me-info-row">
                            <span class="info-left">
                                <svg class="info-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342"/></svg>
                                班级
                            </span>
                            <span id="me-class" class="info-right">三年级(1)班</span>
                        </div>
                    </div>
                </div>

                <!-- 功能入口 -->
                <div class="me-section">
                    <div class="glass-card">
                        <div class="me-action-row" onclick="goSwitchStudent()">
                            <span class="act-left">
                                <span class="act-icon act-icon-switch">
                                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                                </span>
                                切换学生
                            </span>
                            <span class="act-arrow">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                            </span>
                        </div>
                        <div class="me-action-row" onclick="openSettings()">
                            <span class="act-left">
                                <span class="act-icon act-icon-settings">
                                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                </span>
                                设置
                            </span>
                            <span class="act-arrow">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="me-protocols">
                    <a href="#">《AI龙老师用户协议》</a> <a href="#">《隐私政策》</a> <a href="#">《儿童隐私保护政策》</a>
                </div>
            </div>
        </div>

        <!-- ── 设置页 ── -->
        <div id="settings-panel" class="settings-panel">
            <div class="mesh-bg"></div>
            <div class="mesh-bg-2"></div>
            <div class="mesh-bg-3"></div>
            <div class="mesh-bg-4"></div>
            <div class="mesh-bg-5"></div>

            <div class="pt-[50px] flex-1 min-h-0 flex flex-col" style="position:relative;z-index:1;">
                <div class="settings-top-bar">
                    <button class="settings-back" onclick="closeSettings()">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <span class="settings-title">设置</span>
                </div>

                <div class="settings-scroll">
                    <div class="settings-brand">
                        <div class="settings-mascot"><img src="dragon.png" alt="AI 龙老师"></div>
                        <p class="settings-app-name">AI 龙老师</p>
                        <span class="settings-version">v1.0.0</span>
                    </div>

                    <div class="settings-section">
                        <div class="glass-card">
                            <div class="settings-row logout" onclick="openLogoutConfirm()">
                                <span class="sr-left">
                                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
                                    退出登录
                                </span>
                                <span class="sr-arrow"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></span>
                            </div>
                        </div>
                    </div>

                    <div class="settings-protocols">
                        <a href="#">《AI龙老师用户协议》</a><br>
                        <a href="#">《隐私政策》</a><br>
                        <a href="#">《儿童隐私保护政策》</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 退出确认弹窗 -->
        <div id="modal-logout" class="modal-overlay">
            <div class="modal-box">
                <h3>确认退出登录？</h3>
                <p>退出登录不会丢失任何数据。</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeLogoutConfirm()">取消</button>
                    <button class="btn-confirm-red" onclick="logout()">确认退出</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getStudents() {
            try { return JSON.parse(localStorage.getItem('students')) || []; } catch(e) { return []; }
        }
        function getCurrentIndex() {
            return parseInt(localStorage.getItem('currentStudentIndex') || '0', 10);
        }
        function getCurrentStudent() {
            var list = getStudents();
            if (list.length === 0) {
                var fallback = {
                    name: sessionStorage.getItem('name') || '薛云腾',
                    school: sessionStorage.getItem('school') || '龙岗区外国语学校',
                    studentId: sessionStorage.getItem('studentId') || '2024001',
                    className: sessionStorage.getItem('gradeClass') || '三年级(1)班'
                };
                list.push(fallback);
                localStorage.setItem('students', JSON.stringify(list));
                localStorage.setItem('currentStudentIndex', '0');
                return fallback;
            }
            var idx = getCurrentIndex();
            if (idx >= list.length) idx = 0;
            return list[idx];
        }

        function loadMeInfo() {
            var s = getCurrentStudent();
            document.getElementById('me-username').textContent = s.name;
            document.getElementById('me-school').textContent = s.school;
            document.getElementById('me-studentId').textContent = s.studentId;
            document.getElementById('me-class').textContent = s.className;

            sessionStorage.setItem('name', s.name);
            sessionStorage.setItem('school', s.school);
            sessionStorage.setItem('gradeClass', s.className);
        }

        function goSwitchStudent() { window.location.href = '切换学生.html'; }
        function openSettings() { document.getElementById('settings-panel').classList.add('open'); }
        function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }
        function openLogoutConfirm() { document.getElementById('modal-logout').classList.add('open'); }
        function closeLogoutConfirm() { document.getElementById('modal-logout').classList.remove('open'); }

        function logout() {
            sessionStorage.clear();
            localStorage.removeItem('students');
            localStorage.removeItem('currentStudentIndex');
            window.location.href = '登录/index.html';
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        loadMeInfo();
    </script>
</body>
</html>
