<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知识点讲解视频 - AI 龙老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter','Noto Sans SC',sans-serif;background:#f4f4f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .iphone-frame{width:393px;height:852px;position:relative;overflow:hidden;background:#f5f3ff;box-shadow:0 0 0 12px #18181b,0 0 0 14px #27272a,0 24px 48px -12px rgba(24,24,27,.2);border-radius:50px;display:flex;flex-direction:column}
        .dynamic-island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:120px;height:35px;background:linear-gradient(180deg,#27272a,#18181b);border-radius:20px;z-index:1000;pointer-events:none}

        /* ── 顶栏 ── */
        .v-topbar{min-height:44px;padding:4px 8px 4px 4px;display:flex;align-items:center;gap:4px;flex-shrink:0;position:relative;z-index:20}
        .v-back{width:40px;height:40px;border-radius:10px;border:none;background:0 0;display:flex;align-items:center;justify-content:center;color:#52525b;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
        .v-back:active{background:rgba(0,0,0,.05)}
        .v-topbar-title{flex:1;text-align:center;font-size:1.0625rem;font-weight:700;color:#18181b;letter-spacing:-.02em}
        .v-topbar-spacer{width:40px;height:40px;flex-shrink:0;pointer-events:none}

        /* ── 学科 Tab ── */
        .v-subj-bar{display:flex;gap:6px;padding:6px 20px 4px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
        .v-subj-bar::-webkit-scrollbar{display:none}
        .v-subj-tab{flex-shrink:0;padding:6px 14px;border-radius:10px;font-size:.8125rem;font-weight:600;cursor:pointer;color:#71717a;background:transparent;transition:all .2s;border:none;-webkit-tap-highlight-color:transparent}
        .v-subj-tab:active{transform:scale(.97)}
        .v-subj-tab.active{background:rgba(0,0,0,.06);color:#18181b}

        /* ── 科目介绍卡片 ── */
        .v-intro{position:relative;margin:6px 20px 2px;border-radius:16px;padding:18px 18px 16px;overflow:hidden;color:#fff;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1)}
        .v-intro::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 55%);border-radius:16px;pointer-events:none}
        .v-intro[data-cat="new-standard"]{background:linear-gradient(145deg,#3730a3 0%,#4f46e5 35%,#6366f1 65%,#818cf8 100%)}
        .v-intro[data-cat="sync-course"]{background:linear-gradient(145deg,#065f46 0%,#059669 35%,#10b981 65%,#34d399 100%)}
        .v-intro[data-cat="special-skills"]{background:linear-gradient(145deg,#9a3412 0%,#ea580c 35%,#f97316 65%,#fb923c 100%)}
        .v-intro-content{position:relative;z-index:2}
        .v-intro h3{font-size:1.0625rem;font-weight:800;line-height:1.3;letter-spacing:-.02em;margin-bottom:6px}
        .v-intro p{font-size:.75rem;opacity:.88;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .v-intro-decor{position:absolute;right:-10px;bottom:-14px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.07);z-index:1;pointer-events:none}
        .v-intro-decor2{position:absolute;right:42px;bottom:24px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.05);z-index:1;pointer-events:none}

        /* ── 教材选择器（校内同步课专属） ── */
        .v-textbook-bar{display:flex;align-items:center;gap:8px;padding:6px 20px 2px;flex-shrink:0}
        .v-textbook-bar.hidden{display:none}
        .v-tb-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:10px;font-size:.75rem;font-weight:600;color:#52525b;background:rgba(255,255,255,.88);border:1px solid rgba(226,232,240,.85);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
        .v-tb-chip:active{background:rgba(226,232,240,.5)}
        .v-tb-chip svg{width:14px;height:14px;color:#a1a1aa}
        .v-tb-chip .v-tb-val{color:#18181b}

        /* ── 内容滚动区 ── */
        .v-content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:8px}
        .v-content::-webkit-scrollbar{display:none}

        /* ── 章节手风琴 ── */
        .v-chapter{margin:0 20px 10px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(226,232,240,.85);box-shadow:0 4px 20px rgba(0,0,0,.04);overflow:hidden}
        .v-ch-header{display:flex;align-items:center;gap:12px;padding:14px 14px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
        .v-ch-header:active{background:rgba(99,102,241,.04)}
        .v-chapter.is-open .v-ch-header{border-bottom:1px solid rgba(226,232,240,.7)}
        .v-ch-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.125rem}
        [data-active-cat="new-standard"] .v-ch-icon{background:linear-gradient(135deg,rgba(99,102,241,.14),rgba(139,92,246,.1));color:#6366f1}
        [data-active-cat="sync-course"] .v-ch-icon{background:linear-gradient(135deg,rgba(16,185,129,.14),rgba(5,150,105,.1));color:#059669}
        [data-active-cat="special-skills"] .v-ch-icon{background:linear-gradient(135deg,rgba(249,115,22,.14),rgba(234,88,12,.1));color:#ea580c}
        .v-ch-body{flex:1;min-width:0}
        .v-ch-title{font-size:.875rem;font-weight:700;color:#18181b;line-height:1.35}
        .v-ch-meta{font-size:.6875rem;color:#a1a1aa;margin-top:4px}
        .v-ch-arrow{color:#d4d4d8;flex-shrink:0;transition:transform .25s ease}
        .v-chapter.is-open .v-ch-arrow{transform:rotate(90deg)}

        .v-ch-expand{display:none;padding:10px 10px 6px}
        .v-chapter.is-open .v-ch-expand{display:block}

        /* 视频条目 */
        .v-ep{margin-bottom:6px;background:rgba(255,255,255,.95);border-radius:10px;padding:10px 10px;border:1px solid rgba(226,232,240,.9);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
        .v-ep:active{transform:scale(.99)}
        .v-ep-num{width:24px;height:24px;border-radius:6px;background:#f4f4f5;color:#71717a;font-size:.6875rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .v-ep-info{flex:1;min-width:0}
        .v-ep-title{font-size:.8125rem;font-weight:600;color:#18181b;line-height:1.35}
        .v-ep-dur{font-size:.625rem;color:#a1a1aa;margin-top:2px}
        .v-ep-play-icon{flex-shrink:0;color:#c7c7cc;transition:color .15s}
        .v-ep:active .v-ep-play-icon{color:#6366f1}
        [data-active-cat="sync-course"] .v-ep:active .v-ep-play-icon{color:#059669}
        [data-active-cat="special-skills"] .v-ep:active .v-ep-play-icon{color:#ea580c}

        /* ── 教材弹窗 ── */
        .v-modal-overlay{position:absolute;inset:0;z-index:500;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center}
        .v-modal-overlay.open{display:flex}
        .v-modal-sheet{width:100%;background:#fff;border-radius:20px 20px 0 0;max-height:70%;display:flex;flex-direction:column;box-shadow:0 -12px 48px rgba(0,0,0,.15)}
        .v-modal-handle{width:40px;height:4px;border-radius:999px;background:#d4d4d8;margin:10px auto 0}
        .v-modal-head{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between}
        .v-modal-head h3{font-size:1rem;font-weight:700;color:#18181b}
        .v-modal-close{width:32px;height:32px;border-radius:999px;border:none;background:#f4f4f5;color:#71717a;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .v-modal-body{flex:1;overflow-y:auto;padding:0 20px 24px;-webkit-overflow-scrolling:touch}
        .v-modal-body::-webkit-scrollbar{display:none}
        .v-modal-label{font-size:.75rem;font-weight:600;color:#71717a;margin:14px 0 8px}
        .v-modal-options{display:flex;flex-wrap:wrap;gap:8px}
        .v-modal-opt{padding:8px 16px;border-radius:10px;font-size:.8125rem;font-weight:600;color:#52525b;background:#f4f4f5;border:1.5px solid transparent;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .v-modal-opt:active{transform:scale(.97)}
        .v-modal-opt.selected{background:rgba(99,102,241,.1);color:#4f46e5;border-color:rgba(99,102,241,.4)}

        /* ── 空状态 ── */
        .v-empty{padding:60px 20px;text-align:center;color:#a1a1aa;font-size:.8125rem;line-height:1.6}

        /* ── 模式切换按钮（页面右上角，手机框外） ── */
        .mode-toggle{position:fixed;top:16px;right:24px;z-index:9999;display:flex;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:8px;border:1px solid rgba(226,232,240,.8);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .mode-btn{padding:5px 14px;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:transparent;color:#71717a;transition:all .15s}
        .mode-btn.active{background:#4f46e5;color:#fff}

        /* ── 产品稿浮窗（页面级，手机框外） ── */
        .sb-float{position:fixed;top:56px;right:24px;width:360px;height:680px;z-index:9998;display:flex;flex-direction:column;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;border:1px solid rgba(226,232,240,.85);box-shadow:0 12px 48px rgba(0,0,0,.12);opacity:0;pointer-events:none;transition:opacity .25s;overflow:hidden;resize:both;min-width:280px;min-height:300px}
        .sb-float.show{opacity:1;pointer-events:auto}
        .sb-drag{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:grab;border-bottom:1px solid rgba(226,232,240,.7);flex-shrink:0;user-select:none;-webkit-user-select:none}
        .sb-drag:active{cursor:grabbing}
        .sb-drag-dot{width:6px;height:6px;border-radius:50%;background:#818cf8}
        .sb-drag-title{flex:1;font-size:.8125rem;font-weight:700;color:#18181b}
        .sb-drag-ver{font-size:.625rem;color:#a1a1aa;font-weight:600}
        .sb-body{flex:1;overflow-y:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch}
        .sb-body::-webkit-scrollbar{width:3px}
        .sb-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}

        /* changelog */
        .sb-cl{margin:12px 14px;padding:10px 12px;background:#f8fafc;border-radius:10px;border:1px solid rgba(226,232,240,.7)}
        .sb-cl-hd{font-size:.6875rem;font-weight:700;color:#64748b;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:4px}
        .sb-cl-hd::before{content:'▸';font-size:8px;transition:transform .2s}
        .sb-cl.op .sb-cl-hd::before{transform:rotate(90deg)}
        .sb-cl-bd{display:none;font-size:.6875rem;color:#64748b;line-height:1.6}
        .sb-cl.op .sb-cl-bd{display:block}
        .sb-cl-bd h3{font-size:.6875rem;font-weight:700;color:#334155;margin:6px 0 2px}
        .sb-cl-bd ul{padding-left:16px;margin:0}
        .sb-cl-bd li{margin-bottom:2px}

        /* sections */
        .sb-sec{margin:6px 14px;border-radius:10px;border:1px solid rgba(226,232,240,.7);overflow:hidden;transition:border-color .2s}
        .sb-sec.glow{border-color:#818cf8;box-shadow:0 0 0 2px rgba(129,140,248,.2)}
        .sb-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .12s}
        .sb-hd:active{background:rgba(99,102,241,.04)}
        .sb-hd-num{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);color:#4f46e5;font-size:.625rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .sb-hd-title{flex:1;font-size:.75rem;font-weight:700;color:#18181b;line-height:1.3}
        .sb-hd-arrow{color:#d4d4d8;font-size:8px;transition:transform .2s}
        .sb-sec.op .sb-hd-arrow{transform:rotate(90deg)}
        .sb-hd-badge{font-size:.5625rem;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0}
        .sb-hd-badge.new{background:#dcfce7;color:#16a34a}
        .sb-hd-badge.updated{background:#fef3c7;color:#d97706}
        .sb-bd{display:none;padding:0 12px 10px;font-size:.6875rem;color:#52525b;line-height:1.7}
        .sb-sec.op .sb-bd{display:block}
        .sb-bd h4{font-size:.6875rem;font-weight:700;color:#3b82f6;margin:8px 0 4px}
        .sb-bd blockquote{border-left:3px solid #3b82f6;padding:6px 10px;margin:6px 0;background:#eff6ff;border-radius:0 6px 6px 0;font-size:.6875rem;color:#1e40af}
        .sb-bd ul,.sb-bd ol{padding-left:16px;margin:4px 0}
        .sb-bd li{margin-bottom:2px}
        .sb-diff-add{background:#dcfce7;color:#16a34a;padding:1px 4px;border-radius:3px;font-size:.625rem;font-weight:600}
        .sb-diff-mod{background:#fef3c7;color:#d97706;padding:1px 4px;border-radius:3px;font-size:.625rem;font-weight:600}
        .sb-diff-note{background:#fefce8;border-left:3px solid #eab308;padding:6px 10px;margin:6px 0;border-radius:0 6px 6px 0;font-size:.6875rem;color:#854d0e}
    </style>
</head>
<body>
    <!-- 模式切换（手机框外，页面右上角） -->
    <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="demo">演示</button>
        <button class="mode-btn" data-mode="review">过稿</button>
    </div>

    <!-- 产品稿浮窗（手机框外） -->
    <div class="sb-float" id="sbFloat">
        <div class="sb-drag" id="sbDrag">
            <div class="sb-drag-dot"></div>
            <span class="sb-drag-title">产品稿 · 知识点讲解视频</span>
            <span class="sb-drag-ver">v1.0</span>
        </div>
        <div class="sb-body" id="sidebarContent"></div>
    </div>

    <div class="iphone-frame" id="app" data-active-cat="new-standard">
        <div class="dynamic-island"></div>

        <div class="flex-1 min-h-0 flex flex-col pt-[50px]">
            <!-- 顶栏 -->
            <header class="v-topbar">
                <button type="button" class="v-back" onclick="goBack()" aria-label="返回" data-doc="back-btn" data-prd="返回首页，跳转至首页.html" data-track="/click/videoListPage/back | 点击返回 | 无">
                    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="v-topbar-title" data-doc="page-title" data-prd="页面标题，根据 URL 参数 cat 动态设置（新课标重点讲/校内同步课/拓展提升课）；无参数时默认显示'知识点讲解视频'">知识点讲解视频</span>
                <div class="v-topbar-spacer" aria-hidden="true"></div>
            </header>

            <!-- 学科 Tab -->
            <div class="v-subj-bar" id="subj-bar" data-doc="subj-bar" data-s="1" data-prd="科目横向Tab栏，根据当前分类动态渲染可选科目；专项大招课(special-skills)时隐藏Tab栏；切换科目联动刷新介绍卡片、教材选择器和视频列表" data-track="/click/videoListPage/switchSubject | 切换科目 | subject#String"></div>

            <!-- 科目介绍卡片 -->
            <div class="v-intro" id="intro-card" data-cat="new-standard" data-doc="intro-card" data-s="2" data-prd="科目介绍卡片，渐变色背景（indigo/green/orange对应三种分类）；切换科目时标题和描述文案跟随变化；文案来自 CATEGORIES[].intro[科目] 数据">
                <div class="v-intro-content">
                    <h3 id="intro-title"></h3>
                    <p id="intro-desc"></p>
                </div>
                <div class="v-intro-decor"></div>
                <div class="v-intro-decor2"></div>
            </div>

            <!-- 教材选择器（仅校内同步课展示） -->
            <div class="v-textbook-bar hidden" id="textbook-bar" data-doc="textbook-bar" data-s="3" data-prd="教材选择器，仅校内同步课(sync-course)显示；包含年级和教材版本两个筛选chip，点击弹出底部弹窗选择；年级默认取 sessionStorage 中的 gradeClass 值">
                <div class="v-tb-chip" id="tb-grade" onclick="openTextbookModal('grade')" data-doc="tb-grade" data-prd="点击弹出年级选择弹窗，选项为一~六年级" data-track="/click/videoListPage/openGradeModal | 打开年级选择 | 无">
                    <span class="v-tb-val" id="tb-grade-val">三年级</span>
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                </div>
                <div class="v-tb-chip" id="tb-edition" onclick="openTextbookModal('edition')" data-doc="tb-edition" data-prd="点击弹出教材版本选择弹窗，选项因科目而异（如数学有人教版/北师大版/苏教版）" data-track="/click/videoListPage/openEditionModal | 打开教材版本选择 | 无">
                    <span class="v-tb-val" id="tb-edition-val">人教版</span>
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                </div>
            </div>

            <!-- 内容列表 -->
            <div class="v-content" id="content-area" data-doc="content-area" data-s="4" data-prd="视频章节列表区域，手风琴交互：点击章节头展开/折叠视频列表；视频条目点击跳转到横屏播放页(视频播放.html)，携带 title/dur/cat/nextTitle/nextDur 参数；初中学生(七八九年级)展示 middleData 数据源"></div>
        </div>

        <!-- 教材选择弹窗 -->
        <div class="v-modal-overlay" id="tb-modal">
            <div class="v-modal-sheet">
                <div class="v-modal-handle"></div>
                <div class="v-modal-head">
                    <h3 id="tb-modal-title">选择年级</h3>
                    <button class="v-modal-close" onclick="closeTextbookModal()">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="v-modal-body" id="tb-modal-body"></div>
            </div>
        </div>
    </div>

    <script>
    /* ══════════ 数据层 ══════════ */
    const STUDENT_GRADE = sessionStorage.getItem('gradeClass') || '三年级';
    const STUDENT_GRADE_NUM = parseInt(STUDENT_GRADE) || 3;

    const CATEGORIES = [
        {
            id: 'new-standard',
            label: '新课标重点讲',
            badge: '精选课程',
            title: '新课标重点讲',
            desc: '紧扣新课标考点，重点题型逐个突破',
            subjects: ['语文', '数学', '英语'],
            intro: {
                '语文': { title: '新课标语文重点讲', desc: '聚焦新课标核心素养，融入情境化、任务驱动等新理念，深度融合新教材，紧扣最新命题趋势，精准剖析十大新考法解题策略，助力学生快速掌握新题型，全面提升语文综合能力。' },
                '数学': { title: '新课标数学重点讲', desc: '紧扣新课标数学核心素养，聚焦几何直观、数据分析与数学建模，系统梳理重难点知识，突破典型考题解题策略，培养数学思维，提前适应新考法。' },
                '英语': { title: '新课标英语重点讲', desc: '围绕新课标英语学科核心素养，强化语篇理解与语用能力，精讲新题型解题思路，提升阅读理解与写作表达水平，全面对接新中考英语要求。' },
            },

    /* ══════════ 状态 ══════════ */
    let activeCat = 'new-standard';
    let activeSubject = {};
    let expandedChapter = {};
    let syncGrade = STUDENT_GRADE.replace(/[^\u4e00-\u9fa5]/g, '') || '三年级';
    let syncEdition = {};

    CATEGORIES.forEach(c => {
        activeSubject[c.id] = c.subjects[0];
        if (c.needsTextbook) {
            Object.keys(c.editions).forEach(subj => {
                syncEdition[subj] = c.editions[subj][0];
            });
        }
    });

    /* ══════════ 渲染 ══════════ */
    const $ = id => document.getElementById(id);

    function renderIntro() {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const subj = activeSubject[activeCat];
        const intro = (cat.intro && cat.intro[subj]) || { title: cat.title, desc: cat.desc };
        const card = $('intro-card');
        card.style.display = '';
        card.dataset.cat = activeCat;
        $('app').dataset.activeCat = activeCat;
        $('intro-title').textContent = intro.title;
        $('intro-desc').textContent = intro.desc;
    }

    function renderSubjBar() {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const subj = activeSubject[activeCat];
        if (activeCat === 'special-skills') {
            $('subj-bar').style.display = 'none';
            return;
        }
        $('subj-bar').style.display = '';
        $('subj-bar').innerHTML = cat.subjects.map(s =>
            `<button class="v-subj-tab${s === subj ? ' active' : ''}" data-subj="${s}">${s}</button>`
        ).join('');
    }

    function renderTextbookBar() {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const bar = $('textbook-bar');
        if (!cat.needsTextbook) {
            bar.classList.add('hidden');
            return;
        }
        bar.classList.remove('hidden');
        const subj = activeSubject[activeCat];
        $('tb-grade-val').textContent = syncGrade;
        $('tb-edition-val').textContent = syncEdition[subj] || '人教版';
    }

    function renderContent() {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const subj = activeSubject[activeCat];
        const isMiddle = /[七八九]年级|初[一二三]/.test(STUDENT_GRADE);
        const dataSource = (isMiddle && cat.middleData) ? cat.middleData : cat.data;
        const chapters = (dataSource && dataSource[subj]) || [];
        const area = $('content-area');

        if (!chapters.length) {
            area.innerHTML = '<div class="v-empty">该学科视频即将上线，敬请期待</div>';
            return;
        }

        const key = activeCat + '|' + subj;

        area.innerHTML = chapters.map((ch, ci) => {
            const isOpen = expandedChapter[key] === ci;

            const eps = ch.videos.map((v, vi) => `
                <div class="v-ep" data-chi="${ci}" data-vi="${vi}">
                    <div class="v-ep-num">${vi + 1}</div>
                    <div class="v-ep-info">
                        <p class="v-ep-title">${v.title}</p>
                        <p class="v-ep-dur">${v.dur}</p>
                    </div>
                    <svg class="v-ep-play-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
                </div>
            `).join('');

            return `
                <div class="v-chapter${isOpen ? ' is-open' : ''}" data-chi="${ci}">
                    <div class="v-ch-header" role="button" tabindex="0" aria-expanded="${isOpen}">
                        <div class="v-ch-icon">
                            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="v-ch-body">
                            <p class="v-ch-title">${ch.title}</p>
                            <p class="v-ch-meta">${ch.meta}</p>
                        </div>
                        <div class="v-ch-arrow">
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                        </div>
                    </div>
                    <div class="v-ch-expand">
                        ${eps}
                    </div>
                </div>`;
        }).join('');
    }

    function renderAll() {
        renderSubjBar();
        renderIntro();
        renderTextbookBar();
        renderContent();
    }

    /* ══════════ 交互 ══════════ */
    function goBack() { window.location.href = '首页.html'; }

    $('subj-bar').addEventListener('click', e => {
        const tab = e.target.closest('.v-subj-tab');
        if (!tab) return;
        activeSubject[activeCat] = tab.dataset.subj;
        renderSubjBar();
        renderIntro();
        renderTextbookBar();
        renderContent();
    });

    $('content-area').addEventListener('click', e => {
        const hdr = e.target.closest('.v-ch-header');
        if (hdr) {
            const chapter = hdr.closest('.v-chapter');
            const ci = parseInt(chapter.dataset.chi);
            const key = activeCat + '|' + activeSubject[activeCat];
            expandedChapter[key] = expandedChapter[key] === ci ? null : ci;
            renderContent();
            return;
        }
        const ep = e.target.closest('.v-ep');
        if (ep) {
            const ci = parseInt(ep.dataset.chi);
            const vi = parseInt(ep.dataset.vi);
            const cat = CATEGORIES.find(c => c.id === activeCat);
            const isMiddle = /[七八九]年级|初[一二三]/.test(STUDENT_GRADE);
            const dataSource = (isMiddle && cat.middleData) ? cat.middleData : cat.data;
            const chapters = (dataSource && dataSource[activeSubject[activeCat]]) || [];
            const ch = chapters[ci];
            const v = ch && ch.videos[vi];
            if (v) {
                const qs = new URLSearchParams({ title: v.title, dur: v.dur, cat: activeCat });
                let nextV = null;
                if (vi + 1 < ch.videos.length) {
                    nextV = ch.videos[vi + 1];
                } else if (ci + 1 < chapters.length && chapters[ci + 1].videos.length) {
                    nextV = chapters[ci + 1].videos[0];
                }
                if (nextV) {
                    qs.set('nextTitle', nextV.title);
                    qs.set('nextDur', nextV.dur);
                    qs.set('nextCat', activeCat);
                }
                window.location.href = '视频播放.html?' + qs.toString();
            }
            return;
        }
    });

    /* ── 教材弹窗 ── */
    let tbModalType = 'grade';

    function openTextbookModal(type) {
        tbModalType = type;
        const modal = $('tb-modal');
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const subj = activeSubject[activeCat];

        if (type === 'grade') {
            $('tb-modal-title').textContent = '选择年级';
            $('tb-modal-body').innerHTML = `
                <p class="v-modal-label">年级</p>
                <div class="v-modal-options">${cat.grades.map(g =>
                    `<div class="v-modal-opt${g === syncGrade ? ' selected' : ''}" data-val="${g}">${g}</div>`
                ).join('')}</div>`;
        } else {
            const editions = cat.editions[subj] || ['人教版'];
            const cur = syncEdition[subj] || editions[0];
            $('tb-modal-title').textContent = '选择教材版本';
            $('tb-modal-body').innerHTML = `
                <p class="v-modal-label">教材版本</p>
                <div class="v-modal-options">${editions.map(e =>
                    `<div class="v-modal-opt${e === cur ? ' selected' : ''}" data-val="${e}">${e}</div>`
                ).join('')}</div>`;
        }
        modal.classList.add('open');
    }

    function closeTextbookModal() {
        $('tb-modal').classList.remove('open');
    }

    $('tb-modal').addEventListener('click', e => {
        if (e.target === $('tb-modal')) { closeTextbookModal(); return; }
        const opt = e.target.closest('.v-modal-opt');
        if (!opt) return;
        const val = opt.dataset.val;
        if (tbModalType === 'grade') {
            syncGrade = val;
        } else {
            const subj = activeSubject[activeCat];
            syncEdition[subj] = val;
        }
        closeTextbookModal();
        renderTextbookBar();
        renderContent();
    });

    /* ══════════ 初始化 ══════════ */
    const urlParams = new URLSearchParams(window.location.search);
    const urlCat = urlParams.get('cat');
    if (urlCat && CATEGORIES.find(c => c.id === urlCat)) {
        activeCat = urlCat;
        const catObj = CATEGORIES.find(c => c.id === urlCat);
        document.querySelector('.v-topbar-title').textContent = catObj.label;
        document.title = catObj.label + ' - AI 龙老师';
    }
    const urlSubj = urlParams.get('subj');
    if (urlSubj) {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        if (cat && cat.subjects.includes(urlSubj)) {
            activeSubject[activeCat] = urlSubj;
        }
    }
    renderAll();

    const urlTopic = urlParams.get('topic');
    if (urlTopic) {
        const cat = CATEGORIES.find(c => c.id === activeCat);
        const isMiddle = /[七八九]年级|初[一二三]/.test(STUDENT_GRADE);
        const dataSource = (isMiddle && cat.middleData) ? cat.middleData : cat.data;
        const subj = activeSubject[activeCat];
        const chapters = (dataSource && dataSource[subj]) || [];
        const idx = chapters.findIndex(ch => ch.title === urlTopic);
        if (idx >= 0) {
            expandedChapter[activeCat + '|' + subj] = idx;
            renderContent();
            const chapterEl = document.querySelector(`.v-chapter[data-chi="${idx}"]`);
            if (chapterEl) chapterEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
    </script>

### v1.0 · 2026-04-08

    <script type="text/markdown" id="prd-sections">
## 1. 页面入口与路由

#### 入口来源
- 首页视频模块卡片点击，携带 `?cat=new-standard` / `?cat=sync-course` / `?cat=special-skills`
- 首页也可携带 `?subj=数学` 直接定位到某科目
- 可携带 `?topic=探究性试题：阅读策略类` 自动展开对应章节并滚动定位

#### URL 参数说明
> **cat**：分类 ID（new-standard / sync-course / special-skills），决定页面标题和数据源
> **subj**：科目名称（语文/数学/英语等），定位默认选中科目
> **topic**：章节标题，匹配后自动展开并滚动到视图中心

#### 页面标题
- 有 cat 参数时：顶栏标题和 document.title 设为对应分类名称（如"新课标重点讲"）
- 无 cat 参数时：默认显示"知识点讲解视频"

## 2. 科目 Tab 栏

#### 交互逻辑
- 横向滚动胶囊按钮，数据来自 `CATEGORIES[].subjects`
- 新课标重点讲：语文 / 数学 / 英语
- 校内同步课：语文 / 数学 / 英语 / 科学 / 道法
- 拓展提升课（special-skills）：**隐藏 Tab 栏**，直接展示视频列表

#### 切换联动
- 切换科目时同步刷新：科目介绍卡片 + 教材选择器 + 视频列表
- 切换不重置章节展开状态（expandedChapter 按 `分类|科目` 独立存储）

[!] 拓展提升课只有语文和英语两个科目，由首页入口参数 subj 决定展示哪个，用户在此页面无法切换科目

## 3. 科目介绍卡片

#### 视觉规范
- 渐变色背景卡片，圆角 16px，三种主题色对应三种分类：
  - 新课标重点讲：indigo 渐变（#3730a3 → #818cf8）
  - 校内同步课：green 渐变（#065f46 → #34d399）
  - 拓展提升课：orange 渐变（#9a3412 → #fb923c）
- 装饰元素：右下角半透明圆圈
- 文案来自 `CATEGORIES[].intro[科目]`，含标题(h3)和描述(p)

#### 内容切换
- 切换科目时标题和描述文案平滑过渡
- 描述文字最多 3 行，超出用 `-webkit-line-clamp` 截断

## 4. 教材选择器（校内同步课专属）

#### 显示条件
- 仅当 `activeCat === 'sync-course'` 时显示，其他分类隐藏

#### 年级选择
- 默认值取 `sessionStorage.getItem('gradeClass')`，提取中文部分
- 底部弹窗展示一~六年级，选中后更新 chip 文案并刷新视频列表
- 弹窗可点击遮罩关闭

#### 教材版本选择
- 选项因科目而异：
  - 语文：人教版 / 部编版
  - 数学：人教版 / 北师大版 / 苏教版
  - 英语：人教版(PEP) / 外研版 / 译林版
  - 科学：教科版 / 苏教版
  - 道法：人教版
- 各科目版本选择独立记忆

[!] 当前为 demo 原型，切换年级/版本不会实际更换视频数据源，正式版需根据年级+版本组合请求后端

## 5. 视频章节列表

#### 手风琴交互
- 点击章节头（v-ch-header）展开/折叠视频条目列表
- 同一时刻同一科目只允许一个章节展开
- 展开时章节头下方出现分割线，箭头旋转 90°
- 展开状态按 `分类|科目` 键独立存储

#### 视频条目
- 每条显示：序号 + 标题 + 时长 + 播放小图标
- 点击跳转到 `视频播放.html`，携带参数：
  - `title`：当前视频标题
  - `dur`：视频时长
  - `cat`：当前分类 ID
  - `nextTitle`：下一个视频标题（同章节下一条 → 下一章节首条）
  - `nextDur`：下一个视频时长
  - `nextCat`：下一个视频分类

#### 初中学段适配
- 当 `STUDENT_GRADE` 匹配 `七八九年级` 或 `初一二三` 时，拓展提升课使用 `middleData` 数据源
- 其他分类不受影响

> **数据口径**：初中判断使用正则 `/[七八九]年级|初[一二三]/` 匹配 `sessionStorage.gradeClass`

## 6. 视频播放页联动

#### 跳转方式
- 使用 `window.location.href` 整页跳转（非弹窗/iframe）

#### 返回逻辑
- 播放页返回按钮使用 `history.back()`，回到列表页保持之前的分类和科目状态（通过浏览器历史栈）

#### 下一课逻辑
- 优先取同章节下一个视频
- 若为章节最后一条，取下一章节的第一个视频
- 若为所有章节的最后一个视频，不传 nextTitle（播放完成页不展示下一课卡片）

    <script>
    (function(){
        var mode = new URLSearchParams(window.location.search).get('mode') === 'review' ? 'review' : 'demo';
        var sbFloat = document.getElementById('sbFloat');
        var modeToggle = document.getElementById('modeToggle');

        function setMode(m) {
            mode = m;
            modeToggle.querySelectorAll('.mode-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.mode === m);
            });
            if (m === 'review') {
                sbFloat.classList.add('show');
                renderSidebar();
            } else {
                sbFloat.classList.remove('show');
            }
        }

        modeToggle.addEventListener('click', function(e) {
            var btn = e.target.closest('.mode-btn');
            if (btn) setMode(btn.dataset.mode);
        });

        function parseMd(text) {
            return text
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^\[!\] (.+)$/gm, '<div class="sb-diff-note">$1</div>')
                .replace(/^\[\+\] (.+)$/gm, '<span class="sb-diff-add">[新增]</span> $1<br>')
                .replace(/^\[~\] (.+)$/gm, '<span class="sb-diff-mod">[修改]</span> $1<br>')
                .replace(/^\- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
                .replace(/<\/ul>\s*<ul>/g, '')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.+?)`/g, '<code style="background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:.625rem">$1</code>')
                .replace(/\n{2,}/g, '<br>');
        }

        function buildChangelog(src) {
            if (!src) return '';
            return '<div class="sb-cl" id="sb-changelog"><div class="sb-cl-hd" onclick="this.parentElement.classList.toggle(\'op\')">更新日志</div><div class="sb-cl-bd">' + parseMd(src) + '</div></div>';
        }

        function buildSections(src) {
            if (!src) return '';
            var parts = src.split(/^## (\d+)\. /m);
            var html = '';
            for (var i = 1; i < parts.length; i += 2) {
                var num = parts[i];
                var rest = parts[i + 1] || '';
                var firstLine = rest.split('\n')[0];
                var badge = '';
                var title = firstLine;
                if (/\[NEW\]/i.test(firstLine)) {
                    badge = '<span class="sb-hd-badge new">NEW</span>';
                    title = firstLine.replace(/\s*\[NEW\]/i, '');
                } else if (/\[UPDATED\]/i.test(firstLine)) {
                    badge = '<span class="sb-hd-badge updated">UPDATED</span>';
                    title = firstLine.replace(/\s*\[UPDATED\]/i, '');
                }
                var body = rest.substring(rest.indexOf('\n') + 1);
                html += '<div class="sb-sec" data-sb="' + num + '">' +
                    '<div class="sb-hd" onclick="this.parentElement.classList.toggle(\'op\')">' +
                    '<div class="sb-hd-num">' + num + '</div>' +
                    '<div class="sb-hd-title">' + title.trim() + '</div>' +
                    badge +
                    '<span class="sb-hd-arrow">▸</span></div>' +
                    '<div class="sb-bd">' + parseMd(body) + '</div></div>';
            }
            return html;
        }

        function renderSidebar() {
            var container = document.getElementById('sidebarContent');
            var clSrc = document.getElementById('prd-changelog');
            var secSrc = document.getElementById('prd-sections');
            container.innerHTML = buildChangelog(clSrc ? clSrc.textContent : '') + buildSections(secSrc ? secSrc.textContent : '');
        }

        /* 左→右联动 */
        document.addEventListener('click', function(e) {
            if (mode !== 'review') return;
            var el = e.target.closest('[data-s]');
            if (!el) return;
            var id = el.dataset.s;
            var sec = document.querySelector('.sb-sec[data-sb="' + id + '"]');
            if (sec) {
                sec.classList.add('op');
                sec.scrollIntoView({ behavior: 'smooth', block: 'center' });
                sec.classList.add('glow');
                setTimeout(function() { sec.classList.remove('glow'); }, 3000);
            }
        });

        /* 右→左联动 */
        document.addEventListener('click', function(e) {
            if (mode !== 'review') return;
            var sec = e.target.closest('.sb-sec[data-sb]');
            if (!sec || e.target.closest('.sb-hd')) return;
            var id = sec.dataset.sb;
            var el = document.querySelector('[data-s="' + id + '"]');
            if (el) {
                el.style.outline = '2px solid #818cf8';
                el.style.outlineOffset = '2px';
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(function() { el.style.outline = ''; el.style.outlineOffset = ''; }, 3000);
            }
        });

        /* 拖拽浮窗 */
        var drag = document.getElementById('sbDrag');
        var isDrag = false, ox = 0, oy = 0;
        drag.addEventListener('mousedown', function(e) {
            isDrag = true;
            ox = e.clientX - sbFloat.offsetLeft;
            oy = e.clientY - sbFloat.offsetTop;
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!isDrag) return;
            sbFloat.style.left = (e.clientX - ox) + 'px';
            sbFloat.style.top = (e.clientY - oy) + 'px';
            sbFloat.style.right = 'auto';
        });
        document.addEventListener('mouseup', function() { isDrag = false; });

        drag.addEventListener('touchstart', function(e) {
            isDrag = true;
            var t = e.touches[0];
            ox = t.clientX - sbFloat.offsetLeft;
            oy = t.clientY - sbFloat.offsetTop;
        }, { passive: true });
        document.addEventListener('touchmove', function(e) {
            if (!isDrag) return;
            var t = e.touches[0];
            sbFloat.style.left = (t.clientX - ox) + 'px';
            sbFloat.style.top = (t.clientY - oy) + 'px';
            sbFloat.style.right = 'auto';
        }, { passive: true });
        document.addEventListener('touchend', function() { isDrag = false; });

        setMode(mode);
    })();
    </script>
</body>
</html>
